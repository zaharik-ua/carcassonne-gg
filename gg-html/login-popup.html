<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
    .lp-auth {
      --lp-auth-bg: #ffffff;
      --lp-auth-text: #222;
      --lp-auth-muted: #666;
      --lp-auth-border: #d8d8d8;
      --lp-auth-shadow: 0 8px 20px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.08);
      --lp-auth-btn: #1f5d99;
      --lp-auth-btn-hover: #174775;
      --lp-auth-btn-text: #fff;
      --lp-auth-google: #fff;
      --lp-auth-google-border: #dadce0;
      --lp-auth-google-text: #3c4043;
      position: relative;
      display: block;
      width: 100%;
      font-family: "Montserrat", sans-serif;
      color: var(--lp-auth-text);
      background: transparent;
    }

    .lp-auth,
    .lp-auth * {
      box-sizing: border-box;
    }

    .lp-auth__bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      width: 100%;
    }

    .lp-auth__button {
      appearance: none;
      border: 0;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      border-radius: 3px;
      cursor: pointer;
      background: var(--lp-auth-btn);
      color: var(--lp-auth-btn-text);
      transition: background 0.15s ease;
    }

    .lp-auth__button:hover { background: var(--lp-auth-btn-hover); }

    .lp-auth__toggle {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .lp-auth__dropdown {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.2s ease;
    }

    .lp-auth__row {
      margin-top: 8px;
      padding: 8px;
      border: 1px solid var(--lp-auth-border);
      border-radius: 6px;
      background: var(--lp-auth-bg);
      box-shadow: var(--lp-auth-shadow);
      min-width: 240px;
    }

    .lp-auth__toggle:checked ~ .lp-auth__dropdown {
      max-height: 120px;
    }

    .lp-auth__google-btn {
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--lp-auth-google);
      border: 1px solid var(--lp-auth-google-border);
      border-radius: 4px;
      font-weight: 600;
      font-size: 13px;
      color: var(--lp-auth-google-text);
      cursor: pointer;
      transition: box-shadow 0.15s ease;
      text-decoration: none;
    }

    .lp-auth__google-btn:hover { box-shadow: 0 1px 2px rgba(0,0,0,0.12); }

    .lp-auth__google-icon {
      width: 18px;
      height: 18px;
      display: inline-block;
    }

    .lp-auth__user {
      position: relative;
      display: none;
    }

    .lp-auth__user--visible {
      display: inline-block;
    }

    .lp-auth__user-trigger {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--lp-auth-border);
      background: #fff;
      cursor: pointer;
      max-width: 260px;
    }

    .lp-auth__user-trigger:hover {
      border-color: #bdbdbd;
    }

    .lp-auth__user-picture {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      object-fit: cover;
      border: 1px solid var(--lp-auth-border);
    }

    .lp-auth__user-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--lp-auth-text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 160px;
    }

    .lp-auth__user-caret {
      font-size: 10px;
      color: var(--lp-auth-muted);
    }

    .lp-auth__menu {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      min-width: 170px;
      border: 1px solid var(--lp-auth-border);
      border-radius: 6px;
      background: #fff;
      box-shadow: var(--lp-auth-shadow);
      overflow: hidden;
      z-index: 1000;
    }

    .lp-auth__menu-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 600;
      color: var(--lp-auth-text);
      background: #fff;
      border: 0;
      text-decoration: none;
      cursor: pointer;
    }

    .lp-auth__menu-item:hover {
      background: #f5f7fa;
    }

    .lp-auth__hidden {
      display: none !important;
    }
  </style>

  <div class="lp-auth">
    <input type="checkbox" id="lpAuthToggle" class="lp-auth__toggle" />

    <div class="lp-auth__bar">
      <label id="lpAuthSignInLabel" class="lp-auth__button" for="lpAuthToggle">Sign in</label>

      <div id="lpAuthUser" class="lp-auth__user">
        <button id="lpAuthUserTrigger" class="lp-auth__user-trigger" type="button" aria-expanded="false" aria-controls="lpAuthUserMenu">
          <img id="lpAuthUserPicture" class="lp-auth__user-picture" alt="User" />
          <span id="lpAuthUserName" class="lp-auth__user-name"></span>
          <span class="lp-auth__user-caret">▼</span>
        </button>

        <div id="lpAuthUserMenu" class="lp-auth__menu lp-auth__hidden" role="menu">
          <a id="lpAuthAdminLink" class="lp-auth__menu-item lp-auth__hidden" href="https://carcassonne.gg/admin" role="menuitem">Admin panel</a>
          <a id="lpAuthManageTeamLink" class="lp-auth__menu-item lp-auth__hidden" href="https://carcassonne.gg/captain/" role="menuitem">Manage Team</a>
          <a id="lpAuthProfileLink" class="lp-auth__menu-item" href="https://carcassonne.gg/player/?id=noprofile" role="menuitem">My profile</a>
          <button id="lpAuthLogoutButton" class="lp-auth__menu-item" type="button" role="menuitem">Log out</button>
        </div>
      </div>
    </div>

    <div id="lpAuthSignInDropdown" class="lp-auth__dropdown">
      <div class="lp-auth__row">
        <a id="lpAuthGoogleAuthLink" class="lp-auth__google-btn" href="/auth/google">
          <img class="lp-auth__google-icon" alt="Google" src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" />
          Sign in with Google
        </a>
      </div>
    </div>
  </div>

  <script>
    const AUTH_BASE = window.AUTH_BASE_URL || "https://api.carcassonne.gg";

    const signInLabel = document.getElementById("lpAuthSignInLabel");
    const signInDropdown = document.getElementById("lpAuthSignInDropdown");
    const googleAuthLink = document.getElementById("lpAuthGoogleAuthLink");
    const authToggle = document.getElementById("lpAuthToggle");
    const authUser = document.getElementById("lpAuthUser");
    const authUserTrigger = document.getElementById("lpAuthUserTrigger");
    const authUserPicture = document.getElementById("lpAuthUserPicture");
    const authUserName = document.getElementById("lpAuthUserName");
    const adminLink = document.getElementById("lpAuthAdminLink");
    const manageTeamLink = document.getElementById("lpAuthManageTeamLink");
    const profileLink = document.getElementById("lpAuthProfileLink");
    const userMenu = document.getElementById("lpAuthUserMenu");
    const logoutButton = document.getElementById("lpAuthLogoutButton");

    function toBool(value) {
      if (typeof value === "boolean") return value;
      if (typeof value === "number") return value === 1;
      const raw = String(value || "").trim().toLowerCase();
      return raw === "1" || raw === "true" || raw === "yes" || raw === "on";
    }

    function getFirstName(name) {
      const parts = String(name || "").trim().split(/\s+/).filter(Boolean);
      return parts[0] || "";
    }

    function closeUserMenu() {
      userMenu.classList.add("lp-auth__hidden");
      authUserTrigger.setAttribute("aria-expanded", "false");
    }

    function openUserMenu() {
      userMenu.classList.remove("lp-auth__hidden");
      authUserTrigger.setAttribute("aria-expanded", "true");
    }

    function setLoggedOutUI() {
      signInLabel.classList.remove("lp-auth__hidden");
      signInDropdown.classList.remove("lp-auth__hidden");
      authUser.classList.remove("lp-auth__user--visible");
      profileLink.href = "https://carcassonne.gg/player/?id=noprofile";
      adminLink.classList.add("lp-auth__hidden");
      adminLink.href = "https://carcassonne.gg/admin";
      manageTeamLink.classList.add("lp-auth__hidden");
      manageTeamLink.href = "https://carcassonne.gg/captain/";
      closeUserMenu();
      authToggle.checked = false;
    }

    function applyCaptainMenuAccess(user) {
      const isTeamCaptain = toBool(user?.profile?.teamCaptain ?? user?.teamCaptain);
      if (isTeamCaptain) {
        manageTeamLink.classList.remove("lp-auth__hidden");
        manageTeamLink.href = "https://carcassonne.gg/captain/";
      } else {
        manageTeamLink.classList.add("lp-auth__hidden");
        manageTeamLink.href = "https://carcassonne.gg/captain/";
      }
    }

    function setLoggedInUI(user) {
      signInLabel.classList.add("lp-auth__hidden");
      signInDropdown.classList.add("lp-auth__hidden");
      authUser.classList.add("lp-auth__user--visible");
      authUserName.textContent = getFirstName(user.name) || user.email || "User";
      authUserPicture.src = user.picture || "https://www.gravatar.com/avatar/?d=mp";
      authUserPicture.alt = user.name || "User";
      profileLink.href = user.myProfileUrl || "https://carcassonne.gg/player/?id=noprofile";
      if (user.isAdmin) {
        adminLink.classList.remove("lp-auth__hidden");
        adminLink.href = user.adminPanelUrl || "https://carcassonne.gg/admin";
      } else {
        adminLink.classList.add("lp-auth__hidden");
        adminLink.href = "https://carcassonne.gg/admin";
      }
      manageTeamLink.classList.add("lp-auth__hidden");
      manageTeamLink.href = "https://carcassonne.gg/captain/";
      applyCaptainMenuAccess(user);
      authToggle.checked = false;
      closeUserMenu();
    }

    async function fetchSession() {
      try {
        const response = await fetch(`${AUTH_BASE}/auth/me`, {
          method: "GET",
          credentials: "include",
        });

        if (!response.ok) {
          setLoggedOutUI();
          return;
        }

        const data = await response.json();
        if (data.authenticated && data.user) {
          setLoggedInUI(data.user);
        } else {
          setLoggedOutUI();
        }
      } catch (error) {
        setLoggedOutUI();
      }
    }

    googleAuthLink.addEventListener("click", (event) => {
      event.preventDefault();
      const popup = window.open(
        `${AUTH_BASE}/auth/google`,
        "googleAuth",
        "width=520,height=640,left=100,top=100"
      );

      if (!popup) {
        window.location.href = `${AUTH_BASE}/auth/google`;
        return;
      }

      authToggle.checked = false;
    });

    authUserTrigger.addEventListener("click", () => {
      if (userMenu.classList.contains("lp-auth__hidden")) {
        openUserMenu();
      } else {
        closeUserMenu();
      }
    });

    logoutButton.addEventListener("click", async () => {
      try {
        await fetch(`${AUTH_BASE}/auth/logout`, {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
        });
      } finally {
        setLoggedOutUI();
      }
    });

    document.addEventListener("click", (event) => {
      if (!authUser.contains(event.target)) {
        closeUserMenu();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeUserMenu();
      }
    });

    window.addEventListener("message", (event) => {
      if (event.origin !== new URL(AUTH_BASE).origin) return;
      if (event.data && event.data.type === "google-auth-success") {
        fetchSession();
      }
    });

    fetchSession();
  </script>
