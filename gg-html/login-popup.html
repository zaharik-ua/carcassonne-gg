<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
    .lp-auth {
      --lp-auth-bg: #ffffff;
      --lp-auth-text: #222;
      --lp-auth-muted: #666;
      --lp-auth-border: #d8d8d8;
      --lp-auth-shadow: 0 8px 20px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.08);
      --lp-auth-btn: #1f5d99;
      --lp-auth-btn-hover: #174775;
      --lp-auth-btn-text: #fff;
      --lp-auth-google: #fff;
      --lp-auth-google-border: #dadce0;
      --lp-auth-google-text: #3c4043;
      position: relative;
      display: block;
      width: 100%;
      font-family: "Montserrat", sans-serif;
      color: var(--lp-auth-text);
      background: transparent;
    }

    .lp-auth,
    .lp-auth * {
      box-sizing: border-box;
    }

    .lp-auth__bar {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      width: 100%;
    }

    .lp-auth__button {
      appearance: none;
      border: 0;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      border-radius: 3px;
      cursor: pointer;
      background: var(--lp-auth-btn);
      color: var(--lp-auth-btn-text);
      transition: background 0.15s ease;
    }

    .lp-auth__button:hover { background: var(--lp-auth-btn-hover); }

    .lp-auth__dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      z-index: 1001;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(-6px);
      transition: opacity 0.2s ease, transform 0.2s ease, visibility 0s linear 0.2s;
    }

    .lp-auth__row {
      padding: 8px;
      border: 1px solid var(--lp-auth-border);
      border-radius: 6px;
      background: var(--lp-auth-bg);
      box-shadow: var(--lp-auth-shadow);
      min-width: 240px;
    }

    .lp-auth__dropdown--open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(0);
      transition-delay: 0s;
    }

    .lp-auth__google-btn {
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--lp-auth-google);
      border: 1px solid var(--lp-auth-google-border);
      border-radius: 4px;
      font-weight: 600;
      font-size: 13px;
      color: var(--lp-auth-google-text);
      cursor: pointer;
      transition: box-shadow 0.15s ease;
      text-decoration: none;
    }

    .lp-auth__google-btn:hover { box-shadow: 0 1px 2px rgba(0,0,0,0.12); }

    .lp-auth__google-icon {
      width: 18px;
      height: 18px;
      display: inline-block;
    }

    .lp-auth__user {
      position: relative;
      display: none;
    }

    .lp-auth__user--visible {
      display: inline-block;
    }

    .lp-auth__user-trigger {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--lp-auth-border);
      background: #fff;
      cursor: pointer;
      max-width: 260px;
    }

    .lp-auth__user-trigger:hover {
      border-color: #bdbdbd;
    }

    .lp-auth__user-picture {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      object-fit: cover;
      border: 1px solid var(--lp-auth-border);
    }

    .lp-auth__user-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--lp-auth-text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 160px;
    }

    .lp-auth__user-caret {
      font-size: 10px;
      color: var(--lp-auth-muted);
    }

    .lp-auth__menu {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      min-width: 170px;
      border: 1px solid var(--lp-auth-border);
      border-radius: 6px;
      background: #fff;
      box-shadow: var(--lp-auth-shadow);
      overflow: hidden;
      z-index: 1000;
    }

    .lp-auth__menu-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 600;
      color: var(--lp-auth-text);
      background: #fff;
      border: 0;
      text-decoration: none;
      cursor: pointer;
    }

    .lp-auth__menu-item:hover {
      background: #f5f7fa;
    }

    .lp-auth__hidden {
      display: none !important;
    }
  </style>

  <div class="lp-auth">
    <div class="lp-auth__bar">
      <button id="lpAuthSignInLabel" class="lp-auth__button lp-auth__hidden" type="button" aria-expanded="false" aria-controls="lpAuthSignInDropdown">Sign in</button>

      <div id="lpAuthSignInDropdown" class="lp-auth__dropdown lp-auth__hidden" aria-hidden="true" inert>
        <div class="lp-auth__row">
          <a id="lpAuthGoogleAuthLink" class="lp-auth__google-btn" href="/auth/google">
            <img class="lp-auth__google-icon" alt="Google" src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" />
            Sign in with Google
          </a>
        </div>
      </div>

      <div id="lpAuthUser" class="lp-auth__user">
        <button id="lpAuthUserTrigger" class="lp-auth__user-trigger" type="button" aria-expanded="false" aria-controls="lpAuthUserMenu">
          <img id="lpAuthUserPicture" class="lp-auth__user-picture" alt="User" />
          <span id="lpAuthUserName" class="lp-auth__user-name"></span>
          <span class="lp-auth__user-caret">▼</span>
        </button>

        <div id="lpAuthUserMenu" class="lp-auth__menu lp-auth__hidden" role="menu">
          <a id="lpAuthAdminLink" class="lp-auth__menu-item lp-auth__hidden" href="https://carcassonne.gg/admin" role="menuitem">Admin panel</a>
          <a id="lpAuthManageTeamLink" class="lp-auth__menu-item lp-auth__hidden" href="https://carcassonne.gg/player-hub/" role="menuitem">Player Hub</a>
          <a id="lpAuthProfileLink" class="lp-auth__menu-item" href="https://carcassonne.gg/player/?id=noprofile" role="menuitem">My profile</a>
          <button id="lpAuthLogoutButton" class="lp-auth__menu-item" type="button" role="menuitem">Log out</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const AUTH_BASE = window.AUTH_BASE_URL || "https://api.carcassonne.gg";
    const portalState = {
      container: null,
      cleanup: [],
    };

    const signInLabel = document.getElementById("lpAuthSignInLabel");
    const signInDropdown = document.getElementById("lpAuthSignInDropdown");
    const googleAuthLink = document.getElementById("lpAuthGoogleAuthLink");
    const authUser = document.getElementById("lpAuthUser");
    const authUserTrigger = document.getElementById("lpAuthUserTrigger");
    const authUserPicture = document.getElementById("lpAuthUserPicture");
    const authUserName = document.getElementById("lpAuthUserName");
    const adminLink = document.getElementById("lpAuthAdminLink");
    const manageTeamLink = document.getElementById("lpAuthManageTeamLink");
    const profileLink = document.getElementById("lpAuthProfileLink");
    const userMenu = document.getElementById("lpAuthUserMenu");
    const logoutButton = document.getElementById("lpAuthLogoutButton");
    let lastAuthStateKey = null;

    function toBool(value) {
      if (typeof value === "boolean") return value;
      if (typeof value === "number") return value === 1;
      const raw = String(value || "").trim().toLowerCase();
      return raw === "1" || raw === "true" || raw === "yes" || raw === "on";
    }

    function getFirstName(name) {
      const parts = String(name || "").trim().split(/\s+/).filter(Boolean);
      return parts[0] || "";
    }

    function closeUserMenu() {
      userMenu.classList.add("lp-auth__hidden");
      authUserTrigger.setAttribute("aria-expanded", "false");
    }

    function openUserMenu() {
      userMenu.classList.remove("lp-auth__hidden");
      authUserTrigger.setAttribute("aria-expanded", "true");
    }

    function canUseParentDocument() {
      try {
        return !!(window.parent && window.parent !== window && window.parent.document && window.frameElement);
      } catch (error) {
        return false;
      }
    }

    function ensurePortalStyles(parentDocument) {
      if (parentDocument.getElementById("lpAuthPortalStyles")) return;
      const style = parentDocument.createElement("style");
      style.id = "lpAuthPortalStyles";
      style.textContent = `
        .lp-auth__portal {
          position: fixed;
          z-index: 2147483647;
          opacity: 0;
          visibility: hidden;
          pointer-events: none;
          transform: translateY(-6px);
          transition: opacity 0.2s ease, transform 0.2s ease, visibility 0s linear 0.2s;
          font-family: "Montserrat", sans-serif;
        }
        .lp-auth__portal--open {
          opacity: 1;
          visibility: visible;
          pointer-events: auto;
          transform: translateY(0);
          transition-delay: 0s;
        }
        .lp-auth__portal-row {
          padding: 8px;
          border: 1px solid #d8d8d8;
          border-radius: 6px;
          background: #fff;
          box-shadow: 0 8px 20px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.08);
          min-width: 240px;
        }
        .lp-auth__portal-link {
          width: 100%;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          gap: 10px;
          padding: 10px 12px;
          background: #fff;
          border: 1px solid #dadce0;
          border-radius: 4px;
          font-weight: 600;
          font-size: 13px;
          color: #3c4043;
          cursor: pointer;
          transition: box-shadow 0.15s ease;
          text-decoration: none;
          white-space: nowrap;
        }
        .lp-auth__portal-link:hover {
          box-shadow: 0 1px 2px rgba(0,0,0,0.12);
        }
        .lp-auth__portal-icon {
          width: 18px;
          height: 18px;
          display: inline-block;
        }
      `;
      parentDocument.head.appendChild(style);
    }

    function positionPortal(container) {
      const iframeRect = window.frameElement.getBoundingClientRect();
      const buttonRect = signInLabel.getBoundingClientRect();
      const containerRect = container.getBoundingClientRect();
      const top = iframeRect.top + buttonRect.bottom + 8;
      const rightEdge = iframeRect.left + buttonRect.right;
      const left = Math.max(8, rightEdge - containerRect.width);
      container.style.top = `${Math.max(8, top)}px`;
      container.style.left = `${left}px`;
    }

    function teardownPortal() {
      while (portalState.cleanup.length) {
        const dispose = portalState.cleanup.pop();
        dispose();
      }
      if (portalState.container) {
        portalState.container.remove();
        portalState.container = null;
      }
    }

    function openGoogleAuthPopup() {
      const popup = window.open(
        `${AUTH_BASE}/auth/google`,
        "googleAuth",
        "width=520,height=640,left=100,top=100"
      );

      if (!popup) {
        window.location.href = `${AUTH_BASE}/auth/google`;
        return;
      }

      closeSignInDropdown();
    }

    function openPortalDropdown() {
      const parentDocument = window.parent.document;
      ensurePortalStyles(parentDocument);
      teardownPortal();

      const container = parentDocument.createElement("div");
      container.className = "lp-auth__portal";
      container.setAttribute("role", "dialog");
      container.setAttribute("aria-label", "Sign in");
      container.innerHTML = `
        <div class="lp-auth__portal-row">
          <a class="lp-auth__portal-link" href="/auth/google">
            <img class="lp-auth__portal-icon" alt="Google" src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" />
            Sign in with Google
          </a>
        </div>
      `;

      parentDocument.body.appendChild(container);
      positionPortal(container);
      container.classList.add("lp-auth__portal--open");

      const portalLink = container.querySelector(".lp-auth__portal-link");
      const closeOnOutside = (event) => {
        if (!container.contains(event.target)) {
          closeSignInDropdown();
        }
      };
      const closeOnEscape = (event) => {
        if (event.key === "Escape") {
          closeSignInDropdown();
        }
      };
      const reposition = () => {
        if (portalState.container) {
          positionPortal(portalState.container);
        }
      };

      portalLink.addEventListener("click", (event) => {
        event.preventDefault();
        openGoogleAuthPopup();
      });
      parentDocument.addEventListener("mousedown", closeOnOutside);
      window.parent.addEventListener("scroll", reposition, true);
      window.addEventListener("resize", reposition);
      window.parent.addEventListener("resize", reposition);
      parentDocument.addEventListener("keydown", closeOnEscape);

      portalState.container = container;
      portalState.cleanup.push(() => parentDocument.removeEventListener("mousedown", closeOnOutside));
      portalState.cleanup.push(() => window.parent.removeEventListener("scroll", reposition, true));
      portalState.cleanup.push(() => window.removeEventListener("resize", reposition));
      portalState.cleanup.push(() => window.parent.removeEventListener("resize", reposition));
      portalState.cleanup.push(() => parentDocument.removeEventListener("keydown", closeOnEscape));
    }

    function moveFocusOutOfSignInDropdown() {
      if (!signInDropdown) return;
      const activeElement = document.activeElement;
      if (activeElement && signInDropdown.contains(activeElement)) {
        signInLabel.focus();
      }
    }

    function openSignInDropdown() {
      signInDropdown.classList.add("lp-auth__dropdown--open");
      signInDropdown.setAttribute("aria-hidden", "false");
      signInDropdown.removeAttribute("inert");
      signInLabel.setAttribute("aria-expanded", "true");
      if (canUseParentDocument()) {
        moveFocusOutOfSignInDropdown();
        signInDropdown.classList.remove("lp-auth__dropdown--open");
        signInDropdown.setAttribute("aria-hidden", "true");
        signInDropdown.setAttribute("inert", "");
        openPortalDropdown();
      }
    }

    function closeSignInDropdown() {
      moveFocusOutOfSignInDropdown();
      signInDropdown.classList.remove("lp-auth__dropdown--open");
      signInDropdown.setAttribute("aria-hidden", "true");
      signInDropdown.setAttribute("inert", "");
      signInLabel.setAttribute("aria-expanded", "false");
      teardownPortal();
    }

    function toggleSignInDropdown() {
      if (signInLabel.classList.contains("lp-auth__hidden")) return;
      if (portalState.container || signInDropdown.classList.contains("lp-auth__dropdown--open")) {
        closeSignInDropdown();
      } else {
        closeUserMenu();
        openSignInDropdown();
      }
    }

    function emitAuthStateChange(user) {
      const stateKey = user
        ? `in:${String(user.id || user.player_id || user.playerId || user.email || user.name || "user").trim()}`
        : "out";
      if (stateKey === lastAuthStateKey) return;
      lastAuthStateKey = stateKey;
      window.dispatchEvent(new CustomEvent("gg-auth-state-change", {
        detail: {
          authenticated: !!user,
          user: user || null,
        },
      }));
    }

    function setLoggedOutUI() {
      signInLabel.classList.remove("lp-auth__hidden");
      signInDropdown.classList.remove("lp-auth__hidden");
      signInDropdown.setAttribute("inert", "");
      authUser.classList.remove("lp-auth__user--visible");
      profileLink.href = "https://carcassonne.gg/player/?id=noprofile";
      adminLink.classList.add("lp-auth__hidden");
      adminLink.href = "https://carcassonne.gg/admin";
      manageTeamLink.classList.add("lp-auth__hidden");
      manageTeamLink.href = "https://carcassonne.gg/player-hub/";
      closeUserMenu();
      closeSignInDropdown();
      emitAuthStateChange(null);
    }

    function setLoggedInUI(user) {
      signInLabel.classList.add("lp-auth__hidden");
      signInDropdown.classList.add("lp-auth__hidden");
      signInDropdown.setAttribute("inert", "");
      authUser.classList.add("lp-auth__user--visible");
      authUserName.textContent = getFirstName(user.name) || user.email || "User";
      authUserPicture.src = user.picture || "https://www.gravatar.com/avatar/?d=mp";
      authUserPicture.alt = user.name || "User";
      profileLink.href = user.myProfileUrl || "https://carcassonne.gg/player/?id=noprofile";
      if (user.isAdmin) {
        adminLink.classList.remove("lp-auth__hidden");
        adminLink.href = user.adminPanelUrl || "https://carcassonne.gg/admin";
      } else {
        adminLink.classList.add("lp-auth__hidden");
        adminLink.href = "https://carcassonne.gg/admin";
      }
      manageTeamLink.classList.remove("lp-auth__hidden");
      manageTeamLink.href = "https://carcassonne.gg/player-hub/";
      closeSignInDropdown();
      closeUserMenu();
      emitAuthStateChange(user);
    }

    async function fetchSession() {
      try {
        const response = await fetch(`${AUTH_BASE}/auth/me`, {
          method: "GET",
          credentials: "include",
        });

        if (!response.ok) {
          setLoggedOutUI();
          return;
        }

        const data = await response.json();
        if (data.authenticated && data.user) {
          setLoggedInUI(data.user);
        } else {
          setLoggedOutUI();
        }
      } catch (error) {
        setLoggedOutUI();
      }
    }

    signInLabel.addEventListener("click", toggleSignInDropdown);
    googleAuthLink.addEventListener("click", (event) => {
      event.preventDefault();
      openGoogleAuthPopup();
    });

    authUserTrigger.addEventListener("click", () => {
      closeSignInDropdown();
      if (userMenu.classList.contains("lp-auth__hidden")) {
        openUserMenu();
      } else {
        closeUserMenu();
      }
    });

    logoutButton.addEventListener("click", async () => {
      try {
        await fetch(`${AUTH_BASE}/auth/logout`, {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
        });
      } finally {
        setLoggedOutUI();
      }
    });

    document.addEventListener("click", (event) => {
      if (!signInDropdown.contains(event.target) && !signInLabel.contains(event.target)) {
        closeSignInDropdown();
      }

      if (!authUser.contains(event.target)) {
        closeUserMenu();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeSignInDropdown();
        closeUserMenu();
      }
    });

    window.addEventListener("message", (event) => {
      if (event.origin !== new URL(AUTH_BASE).origin) return;
      if (event.data && event.data.type === "google-auth-success") {
        fetchSession();
      }
    });

    fetchSession();
  </script>
