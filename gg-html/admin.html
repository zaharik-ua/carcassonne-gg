<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #f5f7fb;
    --card: #ffffff;
    --text: #1f2937;
    --muted: #6b7280;
    --line: #dbe1ea;
    --primary: #1a73b7;
    --primary-soft: #e7f1f9;
    --danger: #c62828;
    --ok: #1f7a3f;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Montserrat", sans-serif;
  }

  .admin-wrap {
    max-width: 940px;
    margin: 0 auto;
    padding: 16px 10px 24px;
    display: grid;
    gap: 12px;
  }

  .admin-top h1 {
    margin: 0;
    font-size: 22px;
  }

  .admin-note {
    margin: 0;
    color: var(--muted);
    font-size: 13px;
  }

  .admin-card,
  .cp-edit-form,
  .captain-list {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 6px;
    box-shadow: 0 1px 2px rgba(18, 31, 53, 0.06);
  }

  .admin-card {
    padding: 12px;
  }

  .admin-card h2,
  .admin-card h3 {
    margin: 0 0 4px;
  }

  .sub {
    margin: 0;
    font-size: 12px;
    color: var(--muted);
  }

  .hidden {
    display: none !important;
  }

  .admin-sections {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 10px;
  }

  .admin-section-tile {
    border: 1px solid var(--line);
    border-radius: 6px;
    background: #fff;
    padding: 14px;
    text-align: left;
    cursor: pointer;
    font: inherit;
    color: inherit;
    display: grid;
    gap: 4px;
  }

  .admin-section-tile.active {
    border-color: #8fb7d8;
    background: var(--primary-soft);
  }

  .admin-section-name {
    font-size: 16px;
    font-weight: 700;
  }

  .admin-section-hint {
    font-size: 12px;
    color: var(--muted);
  }

  .admin-section-tile .admin-section-hint {
    display: none;
  }

  .admin-section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
  }

  .admin-section-actions {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .captain-list {
    overflow: hidden;
  }

  .cp-match-row {
    display: flex;
    align-items: center;
    min-height: 42px;
    border-top: 1px solid #d9e0ea;
    padding: 3px 8px;
    box-sizing: border-box;
    gap: 8px;
  }

  .cp-match-row:first-child {
    border-top: none;
  }

  .cp-teams {
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .cp-team-row {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
    font-size: 15px;
  }

  .cp-team-row span,
  .cp-player-nick,
  .cp-player-name {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cp-player-main {
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .cp-player-nick {
    font-size: 15px;
    line-height: 1.15;
  }

  .cp-player-name {
    font-size: 12px;
    color: var(--muted);
  }

  .cp-edit-btn,
  .cp-btn {
    border: 1px solid #c8ced8;
    border-radius: 4px;
    padding: 6px 10px;
    font: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    line-height: 1;
    background: #fff;
    color: #2f3947;
  }

  .cp-btn-primary {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }

  .cp-btn-secondary {
    background: #eef2f6;
  }

  .cp-edit-form {
    padding: 12px;
    display: grid;
    gap: 8px 12px;
  }

  .cp-edit-row {
    display: grid;
    gap: 2px;
  }

  .cp-edit-row label {
    font-size: 12px;
    font-weight: 600;
    color: #333;
  }

  .cp-edit-row input,
  .cp-edit-row select {
    width: 100%;
    border: 1px solid #c8ced8;
    border-radius: 4px;
    height: 32px;
    padding: 5px 8px;
    font: inherit;
    font-size: 14px;
    box-sizing: border-box;
    background: #fff;
  }

  .cp-edit-row input.cp-readonly-input,
  .cp-edit-row input[readonly],
  .cp-edit-row select[disabled] {
    background: #f3f4f6;
    color: #444;
  }

  .cp-edit-actions {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .admin-status {
    font-size: 13px;
    min-height: 18px;
  }

  .admin-status.error {
    color: var(--danger);
  }

  .admin-status.ok {
    color: var(--ok);
  }

  .admin-avatar {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    object-fit: cover;
    flex-shrink: 0;
    background: #eef2f6;
  }

  .admin-avatar.admin-avatar-round {
    border-radius: 50%;
  }

  .admin-avatar-placeholder {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: #e8edf4;
    color: #475569;
    font-size: 11px;
    font-weight: 700;
  }

  .admin-empty {
    padding: 16px 12px;
    font-size: 13px;
    color: var(--muted);
  }

  .admin-inline-form {
    padding: 0 8px 8px;
    border-top: 1px solid #d9e0ea;
    background: #fff;
  }

  .admin-inline-form .cp-edit-form {
    margin-top: 8px;
  }

  .admin-create-form {
    margin-top: 8px;
  }

  @media (max-width: 640px) {
    .admin-section-head {
      flex-direction: column;
      align-items: stretch;
    }

    .cp-match-row {
      align-items: flex-start;
    }
  }
</style>

<div class="admin-wrap">
  <div class="admin-top">
    <h1>Admin</h1>
  </div>

  <p class="admin-note">This page is available only for logged-in admin users.</p>

  <div id="adminAccessCard" class="admin-card">
    <h2>Access Check</h2>
    <p id="adminAccessText" class="sub">Checking access...</p>
  </div>

  <div id="adminContent" class="hidden">
    <div class="admin-card">
      <div id="adminSections" class="admin-sections"></div>
    </div>

    <div id="adminSectionCard" class="admin-card hidden">
      <div class="admin-section-head">
        <div>
          <h2 id="sectionTitle">Section</h2>
        </div>
        <div class="admin-section-actions">
          <button id="sectionCreateBtn" class="cp-btn cp-btn-primary hidden" type="button">Create</button>
        </div>
      </div>

      <div id="sectionForm" class="hidden"></div>
      <div id="sectionStatus" class="admin-status"></div>
      <div id="sectionList" class="captain-list"></div>
    </div>
  </div>
</div>

<script>
(function() {
  const AUTH_BASE = window.AUTH_BASE_URL || "https://api.carcassonne.gg";
  const ME_URL = `${AUTH_BASE}/auth/me`;
  const ASSOCIATIONS_URL = `${AUTH_BASE}/associations`;
  const TEAMS_URL = `${AUTH_BASE}/teams`;
  const USERS_URL = `${AUTH_BASE}/users`;

  const SECTION_CONFIG = {
    associations: {
      key: "associations",
      title: "Associations",
      buttonLabel: "Edit",
      createLabel: "Create",
      load: () => apiJson(ASSOCIATIONS_URL, { method: "GET" }).then((data) => data.associations || []),
    },
    teams: {
      key: "teams",
      title: "Teams",
      buttonLabel: "Edit",
      createLabel: "Create",
      load: () => apiJson(TEAMS_URL, { method: "GET" }).then((data) => data.teams || []),
    },
    users: {
      key: "users",
      title: "Users",
      buttonLabel: "View",
      createLabel: "",
      load: () => apiJson(USERS_URL, { method: "GET" }).then((data) => data.users || []),
    },
  };

  const state = {
    accessChecked: false,
    activeSection: "",
    associations: [],
    teams: [],
    users: [],
  };

  const accessCard = document.getElementById("adminAccessCard");
  const accessText = document.getElementById("adminAccessText");
  const content = document.getElementById("adminContent");
  const sectionsEl = document.getElementById("adminSections");
  const sectionCard = document.getElementById("adminSectionCard");
  const sectionTitle = document.getElementById("sectionTitle");
  const sectionCreateBtn = document.getElementById("sectionCreateBtn");
  const sectionStatus = document.getElementById("sectionStatus");
  const sectionList = document.getElementById("sectionList");
  const sectionForm = document.getElementById("sectionForm");

  function setStatus(message, isError) {
    sectionStatus.textContent = message || "";
    sectionStatus.className = message
      ? `admin-status ${isError ? "error" : "ok"}`
      : "admin-status";
  }

  function apiJson(url, options) {
    return fetch(url, {
      credentials: "include",
      ...options,
      headers: {
        "Content-Type": "application/json",
        ...(options && options.headers ? options.headers : {}),
      },
    }).then(async (response) => {
      const data = await response.json().catch(() => ({}));
      if (!response.ok || data?.ok === false) {
        throw new Error(data?.message || "Request failed");
      }
      return data;
    });
  }

  async function setSection(section) {
    state.activeSection = SECTION_CONFIG[section] ? section : "";
    renderSectionTiles();
    closeInlineForm();
    sectionForm.classList.add("hidden");
    sectionForm.innerHTML = "";
    setStatus("", false);

    if (!state.activeSection) {
      sectionCard.classList.add("hidden");
      return;
    }

    sectionCard.classList.remove("hidden");
    sectionTitle.textContent = SECTION_CONFIG[state.activeSection].title;
    sectionList.innerHTML = "<div class=\"admin-empty\">Loading...</div>";
    try {
      await loadSectionData(state.activeSection);
      await renderSection();
    } catch (error) {
      setStatus(error?.message || "Failed to load section.", true);
      renderListEmpty("Failed to load records.");
    }
  }

  function createPlaceholder(text, isRound) {
    const placeholder = document.createElement("span");
    placeholder.className = "admin-avatar-placeholder";
    if (isRound) placeholder.style.borderRadius = "50%";
    placeholder.textContent = String(text || "?").slice(0, 1).toUpperCase();
    return placeholder;
  }

  function createAvatar(src, alt, isRound) {
    const safeSrc = String(src || "").trim();
    if (!safeSrc) return createPlaceholder(alt, isRound);
    const img = document.createElement("img");
    img.className = `admin-avatar${isRound ? " admin-avatar-round" : ""}`;
    img.src = safeSrc;
    img.alt = alt || "";
    img.referrerPolicy = "no-referrer";
    img.addEventListener("error", () => {
      img.replaceWith(createPlaceholder(alt, isRound));
    }, { once: true });
    return img;
  }

  function closeInlineForm() {
    const inline = sectionList.querySelector(".admin-inline-form");
    if (inline) inline.remove();
  }

  function mountDetailForm(formEl, anchorRow, options) {
    const toggleSameRow = !!(options && options.toggleSameRow);
    const nextRow = anchorRow ? anchorRow.nextElementSibling : null;
    if (toggleSameRow && nextRow && nextRow.classList.contains("admin-inline-form")) {
      nextRow.remove();
      return false;
    }

    closeInlineForm();
    const wrap = document.createElement("div");
    wrap.className = "admin-inline-form";
    wrap.appendChild(formEl);
    anchorRow.insertAdjacentElement("afterend", wrap);
    return true;
  }

  function createListRow({ imageSrc, imageAlt, imageRound, title, subtitle, buttonLabel, onClick }) {
    const row = document.createElement("div");
    row.className = "cp-match-row";

    const main = document.createElement("div");
    main.className = "cp-teams";

    const titleRow = document.createElement("div");
    titleRow.className = "cp-team-row";
    titleRow.appendChild(createAvatar(imageSrc, imageAlt || title, imageRound));

    const titleSpan = document.createElement("span");
    titleSpan.textContent = title || "";
    titleRow.appendChild(titleSpan);

    main.appendChild(titleRow);

    if (subtitle) {
      const sub = document.createElement("div");
      sub.className = "cp-player-name";
      sub.textContent = subtitle;
      main.appendChild(sub);
    }

    const actionBtn = document.createElement("button");
    actionBtn.type = "button";
    actionBtn.className = "cp-edit-btn";
    actionBtn.textContent = buttonLabel;
    actionBtn.addEventListener("click", () => onClick(row));

    row.appendChild(main);
    row.appendChild(actionBtn);
    return row;
  }

  function createTextRow(labelText, value, options) {
    const row = document.createElement("div");
    row.className = "cp-edit-row";
    const label = document.createElement("label");
    label.textContent = labelText;
    const input = document.createElement("input");
    input.type = "text";
    input.value = value == null ? "" : String(value);
    if (options && options.readOnly) {
      input.readOnly = true;
      input.className = "cp-readonly-input";
    }
    row.appendChild(label);
    row.appendChild(input);
    return { row, input };
  }

  function createSelectRow(labelText, value, values, disabled) {
    const row = document.createElement("div");
    row.className = "cp-edit-row";
    const label = document.createElement("label");
    label.textContent = labelText;
    const select = document.createElement("select");
    values.forEach((entry) => {
      const option = document.createElement("option");
      option.value = entry;
      option.textContent = entry;
      if (entry === value) option.selected = true;
      select.appendChild(option);
    });
    if (disabled) select.disabled = true;
    row.appendChild(label);
    row.appendChild(select);
    return { row, select };
  }

  function normalizeEntityId(value) {
    return String(value || "")
      .trim()
      .toUpperCase()
      .replace(/[^A-Z0-9]+/g, "_")
      .replace(/^_+|_+$/g, "");
  }

  function normalizeName(value) {
    return String(value || "").trim().toLowerCase();
  }

  function formatDate(value) {
    const raw = String(value || "").trim();
    if (!raw) return "";
    const date = new Date(raw);
    if (Number.isNaN(date.getTime())) return raw;
    return date.toLocaleString();
  }

  function renderSectionTiles() {
    sectionsEl.innerHTML = "";
    Object.values(SECTION_CONFIG).forEach((section) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = `admin-section-tile${state.activeSection === section.key ? " active" : ""}`;
      btn.innerHTML = `<span class="admin-section-name">${section.title}</span>`;
      btn.addEventListener("click", () => {
        setSection(section.key);
      });
      sectionsEl.appendChild(btn);
    });
  }

  function renderListEmpty(text) {
    sectionList.innerHTML = "";
    const empty = document.createElement("div");
    empty.className = "admin-empty";
    empty.textContent = text;
    sectionList.appendChild(empty);
  }

  function showCreateForm(formEl) {
    closeInlineForm();
    sectionForm.classList.remove("hidden");
    sectionForm.innerHTML = "";
    formEl.classList.add("admin-create-form");
    sectionForm.appendChild(formEl);
  }

  function openAssociationForm(mode, item, anchorRow) {
    const form = document.createElement("form");
    form.className = "cp-edit-form";

    const idField = createTextRow("id", item?.id || "", { readOnly: mode === "edit" });
    const nameField = createTextRow("name", item?.name || "");
    const flagField = createTextRow("flag", item?.flag || "");
    form.appendChild(idField.row);
    form.appendChild(nameField.row);
    form.appendChild(flagField.row);

    const actions = document.createElement("div");
    actions.className = "cp-edit-actions";

    const saveBtn = document.createElement("button");
    saveBtn.type = "submit";
    saveBtn.className = "cp-btn cp-btn-primary";
    saveBtn.textContent = mode === "create" ? "Create" : "Save";

    const cancelBtn = document.createElement("button");
    cancelBtn.type = "button";
    cancelBtn.className = "cp-btn cp-btn-secondary";
    cancelBtn.textContent = "Cancel";
    cancelBtn.addEventListener("click", () => {
      if (mode === "create") {
        sectionForm.classList.add("hidden");
        sectionForm.innerHTML = "";
      } else {
        closeInlineForm();
      }
      setStatus("", false);
    });

    actions.appendChild(saveBtn);
    actions.appendChild(cancelBtn);
    form.appendChild(actions);

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const payload = {
        id: normalizeEntityId(idField.input.value),
        name: String(nameField.input.value || "").trim(),
        flag: String(flagField.input.value || "").trim(),
      };
      if (!payload.id) {
        setStatus("Association id is required.", true);
        return;
      }
      if (!payload.name) {
        setStatus("Association name is required.", true);
        return;
      }

      const duplicate = state.associations.find((entry) => (
        (normalizeEntityId(entry.id) === payload.id || normalizeName(entry.name) === normalizeName(payload.name))
        && normalizeEntityId(entry.id) !== normalizeEntityId(item?.id)
      ));
      if (duplicate) {
        setStatus("Association id or name already exists.", true);
        return;
      }

      try {
        if (mode === "create") {
          await apiJson(ASSOCIATIONS_URL, {
            method: "POST",
            body: JSON.stringify(payload),
          });
          setStatus("Association created.", false);
        } else {
          await apiJson(`${ASSOCIATIONS_URL}/${encodeURIComponent(item.id)}`, {
            method: "PATCH",
            body: JSON.stringify(payload),
          });
          setStatus("Association updated.", false);
        }
        if (mode === "create") {
          sectionForm.classList.add("hidden");
          sectionForm.innerHTML = "";
        } else {
          closeInlineForm();
        }
        await loadSectionData("associations");
        renderSection();
      } catch (error) {
        setStatus(error?.message || "Failed to save association.", true);
      }
    });

    if (mode === "create") {
      closeInlineForm();
      showCreateForm(form);
    } else if (anchorRow) {
      mountDetailForm(form, anchorRow);
    }
  }

  function openTeamForm(mode, item, anchorRow) {
    const form = document.createElement("form");
    form.className = "cp-edit-form";

    const idField = createTextRow("id", item?.id || "", { readOnly: mode === "edit" });
    const nameField = createTextRow("name", item?.name || "");
    const flagField = createTextRow("flag", item?.flag || item?.logo || "");
    const typeField = createSelectRow("type", item?.type || "National", ["National", "Club"], false);
    const timezoneField = createTextRow("timezone", item?.timezone || "");

    form.appendChild(idField.row);
    form.appendChild(nameField.row);
    form.appendChild(flagField.row);
    form.appendChild(typeField.row);
    form.appendChild(timezoneField.row);

    const actions = document.createElement("div");
    actions.className = "cp-edit-actions";

    const saveBtn = document.createElement("button");
    saveBtn.type = "submit";
    saveBtn.className = "cp-btn cp-btn-primary";
    saveBtn.textContent = mode === "create" ? "Create" : "Save";

    const cancelBtn = document.createElement("button");
    cancelBtn.type = "button";
    cancelBtn.className = "cp-btn cp-btn-secondary";
    cancelBtn.textContent = "Cancel";
    cancelBtn.addEventListener("click", () => {
      if (mode === "create") {
        sectionForm.classList.add("hidden");
        sectionForm.innerHTML = "";
      } else {
        closeInlineForm();
      }
      setStatus("", false);
    });

    actions.appendChild(saveBtn);
    actions.appendChild(cancelBtn);
    form.appendChild(actions);

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const payload = {
        id: normalizeEntityId(idField.input.value),
        name: String(nameField.input.value || "").trim(),
        flag: String(flagField.input.value || "").trim(),
        type: String(typeField.select.value || "National"),
        timezone: String(timezoneField.input.value || "").trim(),
      };
      if (!payload.id) {
        setStatus("Team id is required.", true);
        return;
      }
      if (!payload.name) {
        setStatus("Team name is required.", true);
        return;
      }

      const duplicate = state.teams.find((entry) => (
        (normalizeEntityId(entry.id) === payload.id || normalizeName(entry.name) === normalizeName(payload.name))
        && normalizeEntityId(entry.id) !== normalizeEntityId(item?.id)
      ));
      if (duplicate) {
        setStatus("Team id or name already exists.", true);
        return;
      }

      try {
        if (mode === "create") {
          await apiJson(TEAMS_URL, {
            method: "POST",
            body: JSON.stringify(payload),
          });
          setStatus("Team created.", false);
        } else {
          await apiJson(`${TEAMS_URL}/${encodeURIComponent(item.id)}`, {
            method: "PATCH",
            body: JSON.stringify(payload),
          });
          setStatus("Team updated.", false);
        }
        if (mode === "create") {
          sectionForm.classList.add("hidden");
          sectionForm.innerHTML = "";
        } else {
          closeInlineForm();
        }
        await loadSectionData("teams");
        renderSection();
      } catch (error) {
        setStatus(error?.message || "Failed to save team.", true);
      }
    });

    if (mode === "create") {
      closeInlineForm();
      showCreateForm(form);
    } else if (anchorRow) {
      mountDetailForm(form, anchorRow);
    }
  }

  function openUserView(item, anchorRow) {
    const view = document.createElement("div");
    view.className = "cp-edit-form";

    const bgaIdField = createTextRow("BGA id", item.bga_id || "", { readOnly: true });
    const emailField = createTextRow("Email", item.email || "", { readOnly: true });
    const createdAtField = createTextRow("Created at", formatDate(item.created_at), { readOnly: true });
    const lastLoginField = createTextRow("Last login", formatDate(item.last_login), { readOnly: true });

    view.appendChild(bgaIdField.row);
    view.appendChild(emailField.row);
    view.appendChild(createdAtField.row);
    view.appendChild(lastLoginField.row);

    const actions = document.createElement("div");
    actions.className = "cp-edit-actions";
    const closeBtn = document.createElement("button");
    closeBtn.type = "button";
    closeBtn.className = "cp-btn cp-btn-secondary";
    closeBtn.textContent = "Close";
    closeBtn.addEventListener("click", () => {
      closeInlineForm();
    });
    actions.appendChild(closeBtn);
    view.appendChild(actions);

    sectionForm.classList.add("hidden");
    sectionForm.innerHTML = "";
    if (anchorRow) mountDetailForm(view, anchorRow, { toggleSameRow: true });
  }

  function renderAssociations() {
    sectionTitle.textContent = "Associations";
    sectionCreateBtn.textContent = "Create";
    sectionCreateBtn.classList.remove("hidden");
    sectionCreateBtn.onclick = () => openAssociationForm("create", null, null);

    if (!state.associations.length) {
      renderListEmpty("No associations yet.");
      return;
    }

    sectionList.innerHTML = "";
    state.associations.forEach((item) => {
      sectionList.appendChild(createListRow({
        imageSrc: item.flag,
        imageAlt: item.name,
        imageRound: false,
        title: item.name || item.id,
        subtitle: "",
        buttonLabel: "Edit",
        onClick: (row) => openAssociationForm("edit", item, row),
      }));
    });
  }

  function renderTeams() {
    sectionTitle.textContent = "Teams";
    sectionCreateBtn.textContent = "Create";
    sectionCreateBtn.classList.remove("hidden");
    sectionCreateBtn.onclick = () => openTeamForm("create", null, null);

    if (!state.teams.length) {
      renderListEmpty("No teams yet.");
      return;
    }

    sectionList.innerHTML = "";
    state.teams.forEach((item) => {
      sectionList.appendChild(createListRow({
        imageSrc: item.flag || item.logo,
        imageAlt: item.name,
        imageRound: false,
        title: item.name || item.id,
        subtitle: "",
        buttonLabel: "Edit",
        onClick: (row) => openTeamForm("edit", item, row),
      }));
    });
  }

  function renderUsers() {
    sectionTitle.textContent = "Users";
    sectionCreateBtn.classList.add("hidden");
    sectionCreateBtn.onclick = null;

    if (!state.users.length) {
      renderListEmpty("No users yet.");
      return;
    }

    sectionList.innerHTML = "";
    state.users.forEach((item) => {
      const subtitleParts = [];
      if (item.bga_nickname) subtitleParts.push(`BGA: ${item.bga_nickname}`);
      if (item.last_login) subtitleParts.push(`Last login: ${formatDate(item.last_login)}`);
      sectionList.appendChild(createListRow({
        imageSrc: item.picture,
        imageAlt: item.name || item.email,
        imageRound: true,
        title: item.name || item.email || `User #${item.id}`,
        subtitle: subtitleParts.join(" • "),
        buttonLabel: "View",
        onClick: (row) => openUserView(item, row),
      }));
    });
  }

  async function loadSectionData(section) {
    if (!SECTION_CONFIG[section]) return;
    const items = await SECTION_CONFIG[section].load();
    state[section] = Array.isArray(items) ? items : [];
  }

  async function renderSection() {
    renderSectionTiles();
    closeInlineForm();
    sectionForm.classList.add("hidden");
    sectionForm.innerHTML = "";

    if (!state.activeSection) {
      sectionCard.classList.add("hidden");
      return;
    }

    sectionCard.classList.remove("hidden");
    if (state.activeSection === "associations") renderAssociations();
    if (state.activeSection === "teams") renderTeams();
    if (state.activeSection === "users") renderUsers();
  }

  async function init() {
    try {
      const meResponse = await fetch(ME_URL, { credentials: "include" });
      const meData = await meResponse.json().catch(() => ({}));

      if (!meResponse.ok || !meData?.authenticated) {
        accessText.textContent = "Please sign in first.";
        return;
      }

      if (!meData?.user?.isAdmin) {
        accessText.textContent = "Access denied. Admin role required.";
        return;
      }

      accessCard.classList.add("hidden");
      content.classList.remove("hidden");
      renderSectionTiles();
      await renderSection();
      state.accessChecked = true;
    } catch (_error) {
      accessText.textContent = "Failed to verify access.";
    }
  }

  init();
})();
</script>
