<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #f5f7fb;
    --card: #ffffff;
    --text: #1f2937;
    --muted: #6b7280;
    --line: #dbe1ea;
    --primary: #1a73b7;
    --primary-soft: #e7f1f9;
    --danger: #c62828;
    --ok: #1f7a3f;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Montserrat", sans-serif;
  }

  .admin-wrap {
    max-width: 940px;
    margin: 0 auto;
    padding: 16px 10px 24px;
    display: grid;
    gap: 12px;
  }

  .admin-top h1 {
    margin: 0;
    font-size: 22px;
  }

  .admin-note {
    margin: 0;
    color: var(--muted);
    font-size: 13px;
  }

  .admin-card,
  .cp-edit-form,
  .captain-list {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 6px;
    box-shadow: 0 1px 2px rgba(18, 31, 53, 0.06);
  }

  .admin-card {
    padding: 12px;
  }

  .admin-card h2,
  .admin-card h3 {
    margin: 0 0 4px;
  }

  .sub {
    margin: 0;
    font-size: 12px;
    color: var(--muted);
  }

  .hidden {
    display: none !important;
  }

  .admin-sections {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 10px;
  }

  .admin-section-tile {
    border: 1px solid var(--line);
    border-radius: 6px;
    background: #fff;
    padding: 14px;
    text-align: left;
    cursor: pointer;
    font: inherit;
    color: inherit;
    display: grid;
    gap: 4px;
  }

  .admin-section-tile.active {
    border-color: #8fb7d8;
    background: var(--primary-soft);
  }

  .admin-section-name {
    font-size: 16px;
    font-weight: 700;
  }

  .admin-section-hint {
    font-size: 12px;
    color: var(--muted);
  }

  .admin-section-tile .admin-section-hint {
    display: none;
  }

  .admin-section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
  }

  .admin-section-actions {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .captain-list {
    overflow: hidden;
  }

  .cp-match-row {
    display: flex;
    align-items: center;
    min-height: 42px;
    border-top: 1px solid #d9e0ea;
    padding: 3px 8px;
    box-sizing: border-box;
    gap: 8px;
  }

  .cp-match-row:first-child {
    border-top: none;
  }

  .cp-teams {
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .cp-team-row {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
    font-size: 15px;
  }

  .cp-team-row span,
  .cp-player-nick,
  .cp-player-name {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cp-player-main {
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .cp-player-nick {
    font-size: 15px;
    line-height: 1.15;
  }

  .cp-player-name {
    font-size: 12px;
    color: var(--muted);
  }

  .audit-trail-subtitle {
    white-space: normal;
    overflow-wrap: anywhere;
    word-break: break-word;
  }

  .audit-title {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
    flex-wrap: wrap;
  }

  .audit-title-text {
    min-width: 0;
  }

  .audit-title-media {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    object-fit: cover;
    flex-shrink: 0;
    background: #eef2f6;
  }

  .audit-title-separator {
    color: var(--muted);
    font-weight: 600;
  }

  .users-subtitle {
    white-space: normal;
    overflow-wrap: anywhere;
    word-break: break-word;
  }

  .cp-edit-btn,
  .cp-btn {
    border: 1px solid #c8ced8;
    border-radius: 4px;
    padding: 6px 10px;
    font: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    line-height: 1;
    background: #fff;
    color: #2f3947;
  }

  .cp-btn-primary {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }

  .cp-btn-secondary {
    background: #eef2f6;
  }

  .cp-edit-form {
    padding: 12px;
    display: grid;
    gap: 8px 12px;
  }

  .cp-edit-row {
    display: grid;
    gap: 2px;
  }

  .cp-edit-row label {
    font-size: 12px;
    font-weight: 600;
    color: #333;
  }

  .cp-edit-row input,
  .cp-edit-row select {
    width: 100%;
    border: 1px solid #c8ced8;
    border-radius: 4px;
    height: 32px;
    padding: 5px 8px;
    font: inherit;
    font-size: 14px;
    box-sizing: border-box;
    background: #fff;
  }

  .cp-edit-row input.cp-readonly-input,
  .cp-edit-row input[readonly],
  .cp-edit-row select[disabled] {
    background: #f3f4f6;
    color: #444;
  }

  .cp-edit-actions {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .admin-status {
    font-size: 13px;
    min-height: 18px;
  }

  .admin-status.error {
    color: var(--danger);
  }

  .admin-status.ok {
    color: var(--ok);
  }

  .admin-avatar {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    object-fit: cover;
    flex-shrink: 0;
    background: #eef2f6;
  }

  .admin-avatar.admin-avatar-round {
    border-radius: 50%;
  }

  .admin-avatar-placeholder {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: #e8edf4;
    color: #475569;
    font-size: 11px;
    font-weight: 700;
  }

  .admin-avatar-placeholder.audit-icon {
    border-radius: 4px;
    color: #1f2937;
  }

  .admin-avatar-placeholder.audit-icon svg {
    width: 13px;
    height: 13px;
    display: block;
    stroke: currentColor;
  }

  .admin-empty {
    padding: 16px 12px;
    font-size: 13px;
    color: var(--muted);
  }

  .admin-inline-form {
    padding: 0 8px 8px;
    border-top: 1px solid #d9e0ea;
    background: #fff;
  }

  .admin-pagination {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin: 10px 8px 8px;
    padding: 0;
    flex-wrap: wrap;
  }

  .admin-pagination-group {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    font-size: 13px;
    color: var(--muted);
  }

  .admin-pagination-checkbox {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text);
  }

  .admin-pagination-checkbox input {
    margin: 0;
  }

  .admin-list-filter {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin: 10px 0 10px 8px;
    color: var(--text);
    font-size: 13px;
  }

  .admin-list-filter input {
    margin: 0;
  }

  .admin-pagination select {
    min-width: 72px;
    padding: 6px 8px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: #fff;
    color: var(--text);
    font: inherit;
  }

  .admin-inline-form .cp-edit-form {
    margin-top: 8px;
  }
 
  .admin-create-form {
    margin-top: 8px;
  }

  .admin-code-block {
    margin: 0;
    padding: 10px;
    border: 1px solid #d9e0ea;
    border-radius: 4px;
    background: #f8fafc;
    color: #1e293b;
    font: 12px/1.45 Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-x: auto;
  }

  .admin-inline-value {
    margin: 0;
    font-size: 14px;
    line-height: 1.4;
    color: var(--text);
    overflow-wrap: anywhere;
    word-break: break-word;
  }

  .admin-inline-value-label {
    font-weight: 700;
  }

  .admin-picker {
    display: grid;
    gap: 8px;
  }

  .admin-picker-add {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .admin-picker-add select {
    flex: 1 1 auto;
  }

  .admin-picker-list {
    display: grid;
    gap: 6px;
  }

  .admin-picker-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    min-height: 32px;
    padding: 6px 8px;
    border: 1px solid #d9e0ea;
    border-radius: 4px;
    background: #fff;
    box-sizing: border-box;
  }

  .admin-picker-item-text {
    min-width: 0;
    font-size: 13px;
    line-height: 1.3;
    overflow-wrap: anywhere;
    word-break: break-word;
  }

  .admin-picker-empty {
    padding: 8px;
    border: 1px dashed #d9e0ea;
    border-radius: 4px;
    color: var(--muted);
    font-size: 13px;
    background: #fafbfd;
  }

  @media (max-width: 640px) {
    .admin-section-head {
      flex-direction: column;
      align-items: stretch;
    }

    .cp-match-row {
      align-items: flex-start;
    }

    .audit-trail-subtitle {
      line-height: 1.35;
    }

    .users-subtitle {
      line-height: 1.35;
    }
  }
</style>

<div class="admin-wrap">
  <div class="admin-top">
    <h1>Admin</h1>
  </div>

  <p class="admin-note">This page is available only for logged-in admin users.</p>

  <div id="adminAccessCard" class="admin-card">
    <h2>Access Check</h2>
    <p id="adminAccessText" class="sub">Checking access...</p>
  </div>

  <div id="adminContent" class="hidden">
    <div class="admin-card">
      <div id="adminSections" class="admin-sections"></div>
    </div>

    <div id="adminSectionCard" class="admin-card hidden">
      <div class="admin-section-head">
        <div>
          <h2 id="sectionTitle">Section</h2>
        </div>
        <div class="admin-section-actions">
          <button id="sectionCreateBtn" class="cp-btn cp-btn-primary hidden" type="button">Create</button>
        </div>
      </div>

      <div id="sectionForm" class="hidden"></div>
      <div id="sectionStatus" class="admin-status"></div>
      <div id="sectionList" class="captain-list"></div>
    </div>
  </div>
</div>

<script>
(function() {
  const AUTH_BASE = window.AUTH_BASE_URL || "https://api.carcassonne.gg";
  const ME_URL = `${AUTH_BASE}/auth/me`;
  const ASSOCIATIONS_URL = `${AUTH_BASE}/associations`;
  const TEAMS_URL = `${AUTH_BASE}/teams`;
  const STREAMERS_URL = `${AUTH_BASE}/streamers`;
  const TOURNAMENTS_URL = `${AUTH_BASE}/tournaments`;
  const USERS_URL = `${AUTH_BASE}/users`;
  const USER_OPTIONS_URL = `${AUTH_BASE}/users/options`;
  const AUDIT_TRAIL_URL = `${AUTH_BASE}/audit-trail`;
  const MATCHES_URL = `${AUTH_BASE}/matches`;
  const NEWS_EDITORS_URL = `${AUTH_BASE}/news-editors`;
  const PROFILES_PUBLIC_URL = `${AUTH_BASE}/profiles/public`;
  const DUEL_FORMATS_URL = `${AUTH_BASE}/duel-formats`;
  const STREAMER_SCOREBOARD_STYLE_OPTIONS = ["Default", "Nallerheim"];

  const SECTION_CONFIG = {
    associations: {
      key: "associations",
      title: "Associations",
      buttonLabel: "Edit",
      createLabel: "Create",
      load: () => apiJson(ASSOCIATIONS_URL, { method: "GET" }).then((data) => data.associations || []),
    },
    teams: {
      key: "teams",
      title: "Teams",
      buttonLabel: "Edit",
      createLabel: "Create",
      load: () => apiJson(TEAMS_URL, { method: "GET" }).then((data) => data.teams || []),
    },
    streamers: {
      key: "streamers",
      title: "Streamers",
      buttonLabel: "Edit",
      createLabel: "Create",
      load: () => apiJson(STREAMERS_URL, { method: "GET" }).then((data) => data.streamers || []),
    },
    newsEditors: {
      key: "newsEditors",
      title: "News Editors",
      buttonLabel: "Edit",
      createLabel: "Create",
      load: () => apiJson(NEWS_EDITORS_URL, { method: "GET" }).then((data) => data.news_editors || []),
    },
    tournaments: {
      key: "tournaments",
      title: "Tournaments",
      buttonLabel: "Edit",
      createLabel: "Create",
      load: () => apiJson(TOURNAMENTS_URL, { method: "GET" }).then((data) => data.tournaments || []),
    },
    duelFormats: {
      key: "duelFormats",
      title: "Duel Formats",
      buttonLabel: "Edit",
      createLabel: "Create",
      load: () => apiJson(DUEL_FORMATS_URL, { method: "GET" }).then((data) => data.duel_formats || []),
    },
    users: {
      key: "users",
      title: "Users",
      buttonLabel: "View",
      createLabel: "",
      load: () => {
        const pageSize = Number(state.usersPageSize) || 10;
        const page = Number(state.usersPage) || 1;
        const params = new URLSearchParams({
          limit: String(pageSize),
          page: String(page),
        });
        return apiJson(`${USERS_URL}?${params.toString()}`, { method: "GET" }).then((data) => {
          state.usersPage = Number(data?.pagination?.page) || 1;
          state.usersPageSize = Number(data?.pagination?.page_size) || pageSize;
          state.usersTotal = Number(data?.pagination?.total) || 0;
          state.usersTotalPages = Number(data?.pagination?.total_pages) || 1;
          return data.users || [];
        });
      },
    },
    auditTrail: {
      key: "auditTrail",
      title: "Audit Trail",
      buttonLabel: "View",
      createLabel: "",
      load: () => {
        const pageSize = Number(state.auditTrailPageSize) || 10;
        const page = Number(state.auditTrailPage) || 1;
        const params = new URLSearchParams({
          limit: String(pageSize),
          page: String(page),
          not_admins: state.auditTrailNotAdmins ? "1" : "0",
        });
        return Promise.all([
          loadAuditReferenceData(),
          apiJson(`${AUDIT_TRAIL_URL}?${params.toString()}`, { method: "GET" }),
        ]).then(([, data]) => {
          state.auditTrailPage = Number(data?.pagination?.page) || 1;
          state.auditTrailPageSize = Number(data?.pagination?.page_size) || pageSize;
          state.auditTrailTotal = Number(data?.pagination?.total) || 0;
          state.auditTrailTotalPages = Number(data?.pagination?.total_pages) || 1;
          return data.records || [];
        });
      },
    },
  };

  const state = {
    accessChecked: false,
    activeSection: "",
    associations: [],
    teams: [],
    streamers: [],
    newsEditors: [],
    tournaments: [],
    duelFormats: [],
    matchesReference: [],
    profilesPublic: [],
    users: [],
    userOptions: [],
    userOptionsLoaded: false,
    usersPage: 1,
    usersPageSize: 10,
    usersTotal: 0,
    usersTotalPages: 1,
    auditTrail: [],
    auditTrailPage: 1,
    auditTrailPageSize: 10,
    auditTrailTotal: 0,
    auditTrailTotalPages: 1,
    auditTrailNotAdmins: false,
  };

  const accessCard = document.getElementById("adminAccessCard");
  const accessText = document.getElementById("adminAccessText");
  const content = document.getElementById("adminContent");
  const sectionsEl = document.getElementById("adminSections");
  const sectionCard = document.getElementById("adminSectionCard");
  const sectionTitle = document.getElementById("sectionTitle");
  const sectionCreateBtn = document.getElementById("sectionCreateBtn");
  const sectionStatus = document.getElementById("sectionStatus");
  const sectionList = document.getElementById("sectionList");
  const sectionForm = document.getElementById("sectionForm");

  function setStatus(message, isError) {
    sectionStatus.textContent = message || "";
    sectionStatus.className = message
      ? `admin-status ${isError ? "error" : "ok"}`
      : "admin-status";
  }

  function apiJson(url, options) {
    return fetch(url, {
      credentials: "include",
      ...options,
      headers: {
        "Content-Type": "application/json",
        ...(options && options.headers ? options.headers : {}),
      },
    }).then(async (response) => {
      const data = await response.json().catch(() => ({}));
      if (!response.ok || data?.ok === false) {
        throw new Error(data?.message || "Request failed");
      }
      return data;
    });
  }

  async function setSection(section) {
    const nextSection = SECTION_CONFIG[section] ? section : "";
    state.activeSection = state.activeSection === nextSection ? "" : nextSection;
    renderSectionTiles();
    closeInlineForm();
    sectionForm.classList.add("hidden");
    sectionForm.innerHTML = "";
    setStatus("", false);

    if (!state.activeSection) {
      sectionCard.classList.add("hidden");
      return;
    }

    sectionCard.classList.remove("hidden");
    sectionTitle.textContent = SECTION_CONFIG[state.activeSection].title;
    sectionList.innerHTML = "<div class=\"admin-empty\">Loading...</div>";
    try {
      await loadSectionData(state.activeSection);
      await renderSection();
    } catch (error) {
      setStatus(error?.message || "Failed to load section.", true);
      renderListEmpty("Failed to load records.");
    }
  }

  function createPlaceholder(text, isRound) {
    const placeholder = document.createElement("span");
    placeholder.className = "admin-avatar-placeholder";
    if (isRound) placeholder.style.borderRadius = "50%";
    placeholder.textContent = String(text || "?").slice(0, 1).toUpperCase();
    return placeholder;
  }

  function createAuditIcon(eventType, action) {
    const icon = document.createElement("span");
    icon.className = "admin-avatar-placeholder audit-icon";
    const eventKey = String(eventType || "").trim().toLowerCase();
    const actionKey = String(action || "").trim().toLowerCase();
    let bg = "#e8edf4";
    let svg = `
      <svg viewBox="0 0 16 16" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3.5 8h9" />
        <path d="M8 3.5v9" />
      </svg>
    `;

    if (eventKey.endsWith(".updated") || eventKey === "updated" || actionKey === "update") {
      bg = "#cfe6f8";
      svg = `
        <svg viewBox="0 0 16 16" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 11.75V13h1.25l7-7-1.25-1.25-7 7Z" />
          <path d="m9.75 4.75 1.25-1.25 1.25 1.25-1.25 1.25Z" />
        </svg>
      `;
    } else if (eventKey.endsWith(".created") || eventKey === "created" || actionKey === "create") {
      bg = "#d6f0dd";
      svg = `
        <svg viewBox="0 0 16 16" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M8 3.5v9" />
          <path d="M3.5 8h9" />
        </svg>
      `;
    } else if (
      eventKey.endsWith(".deleted")
      || eventKey.includes(".deleted_")
      || eventKey === "deleted"
      || actionKey === "delete"
    ) {
      bg = "#f6d4d4";
      svg = `
        <svg viewBox="0 0 16 16" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3.5 5h9" />
          <path d="M6 5V4h4v1" />
          <path d="M5 5l.5 7h5L11 5" />
          <path d="M6.75 7.25v3.5" />
          <path d="M9.25 7.25v3.5" />
        </svg>
      `;
    } else if (eventKey.endsWith(".bga_linked") || eventKey === "bga_linked") {
      bg = "#e3d4f7";
      svg = `
        <svg viewBox="0 0 16 16" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6.25 9.75 4.5 11.5a2 2 0 1 1-2.75-2.9L3.5 6.85" />
          <path d="m9.75 6.25 1.75-1.75a2 2 0 1 1 2.75 2.9l-1.75 1.75" />
          <path d="M6 10 10 6" />
        </svg>
      `;
    }

    icon.style.background = bg;
    icon.innerHTML = svg;
    return icon;
  }

  function formatAuditTitle(item) {
    const auditTitleNode = createAuditTitleNode(item);
    if (auditTitleNode) return auditTitleNode.textContent || "Audit";
    const entity = String(item?.entity_type || "").trim();
    if (!entity) return "Audit";
    return entity.charAt(0).toUpperCase() + entity.slice(1).replace(/_/g, " ");
  }

  function createAvatar(src, alt, isRound) {
    const safeSrc = String(src || "").trim();
    if (!safeSrc) return createPlaceholder(alt, isRound);
    const img = document.createElement("img");
    img.className = `admin-avatar${isRound ? " admin-avatar-round" : ""}`;
    img.src = safeSrc;
    img.alt = alt || "";
    img.referrerPolicy = "no-referrer";
    img.addEventListener("error", () => {
      img.replaceWith(createPlaceholder(alt, isRound));
    }, { once: true });
    return img;
  }

  function closeInlineForm() {
    const inline = sectionList.querySelector(".admin-inline-form");
    if (inline) inline.remove();
  }

  function mountDetailForm(formEl, anchorRow, options) {
    const toggleSameRow = !!(options && options.toggleSameRow);
    const nextRow = anchorRow ? anchorRow.nextElementSibling : null;
    if (toggleSameRow && nextRow && nextRow.classList.contains("admin-inline-form")) {
      nextRow.remove();
      return false;
    }

    closeInlineForm();
    const wrap = document.createElement("div");
    wrap.className = "admin-inline-form";
    wrap.appendChild(formEl);
    anchorRow.insertAdjacentElement("afterend", wrap);
    return true;
  }

  function createListRow({
    imageSrc,
    imageAlt,
    imageRound,
    title,
    titleNode,
    subtitle,
    subtitleClassName,
    buttonLabel,
    onClick,
    customAvatar,
  }) {
    const row = document.createElement("div");
    row.className = "cp-match-row";

    const main = document.createElement("div");

    const renderAddOptions = () => {

      select.appendChild(placeholder);

      Array.from(optionsMap.values()).forEach((entry) => {
        if (selectedSet.has(entry.value)) return;
        const option = document.createElement("option");
        option.value = entry.value;
        option.textContent = entry.label;
        select.appendChild(option);
      });

      const hasAvailable = select.options.length > 1;
      select.disabled = !hasAvailable;
      addBtn.disabled = !hasAvailable;
    };

    const removeUser = (value) => {
      const normalized = String(value || "");
      selectedSet.delete(normalized);
      const index = selectedOrder.indexOf(normalized);
      if (index >= 0) selectedOrder.splice(index, 1);
      render();
    };

    const addUser = (value) => {
      const normalized = String(value || "");
      if (!normalized || selectedSet.has(normalized) || !optionsMap.has(normalized)) return;
      selectedSet.add(normalized);
      selectedOrder.push(normalized);
      render();
    };

    const renderList = () => {
      list.innerHTML = "";
      if (!selectedOrder.length) {
        const empty = document.createElement("div");
        empty.className = "admin-picker-empty";
        empty.textContent = "No users selected.";
        list.appendChild(empty);
        return;

      selectedOrder.forEach((value) => {

        const item = document.createElement("div");

        list.appendChild(item);

    const render = () => {
      renderAddOptions();
      renderList();
    };

    addBtn.addEventListener("click", () => {
      addUser(select.value);
    });

    select.addEventListener("change", () => {
      if (select.value) addBtn.disabled = false;
    });

    addWrap.appendChild(select);
    addWrap.appendChild(addBtn);
    picker.appendChild(addWrap);
    picker.appendChild(list);
    row.appendChild(label);
    row.appendChild(picker);

    render();

    return {

      select,
      addBtn,
      list,

        addBtn.disabled = disabled || select.options.length <= 1;

  function normalizeEntityId(value) {
    return String(value || "")
      .trim()
      .toUpperCase()
      .replace(/[^A-Z0-9]+/g, "_")
      .replace(/^_+|_+$/g, "");
  }

  function normalizeName(value) {
    return String(value || "").trim().toLowerCase();
  }

  function formatDate(value) {
    const raw = String(value || "").trim();
    if (!raw) return "";
    const date = new Date(raw);
    if (Number.isNaN(date.getTime())) return raw;
    return date.toLocaleString();
  }

  function parseUtcDate(value) {
    const raw = String(value || "").trim();
    if (!raw) return null;
    const normalized = /^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}$/.test(raw)
      ? raw.replace(" ", "T") + "Z"
      : raw;
    const date = new Date(normalized);
    if (Number.isNaN(date.getTime())) return null;
    return date;
  }

  function formatAuditTrailDate(value) {
    const raw = String(value || "").trim();
    if (!raw) return "";
    const date = parseUtcDate(raw);
    if (!date) return raw;
    const day = date.getDate();
    const month = date.toLocaleString("en-US", { month: "short" });
    const hours = date.getHours();
    const minutes = String(date.getMinutes()).padStart(2, "0");
    return `${day} ${month} ${hours}:${minutes}`;
  }

  function formatUserLastLogin(value) {
    const raw = String(value || "").trim();
    if (!raw) return "";
    const date = parseUtcDate(raw);
    if (!date) return raw;
    const parts = new Intl.DateTimeFormat("en-GB", {
      day: "numeric",
      month: "short",
      hour: "2-digit",
      minute: "2-digit",
      hour12: false,
    }).formatToParts(date);
    const day = parts.find((part) => part.type === "day")?.value || "";
    const month = parts.find((part) => part.type === "month")?.value || "";
    const hour = parts.find((part) => part.type === "hour")?.value || "";
    const minute = parts.find((part) => part.type === "minute")?.value || "";
    if (!day || !month || !hour || !minute) return raw;
    return `${day} ${month} ${hour}:${minute}`;
  }

  function formatAuditJson(value) {

  }

  function loadAuditReferenceData() {
    const requests = [];

    if (!Array.isArray(state.associations) || !state.associations.length) {

        apiJson(ASSOCIATIONS_URL, { method: "GET" }).then((data) => {
          state.associations = Array.isArray(data?.associations) ? data.associations : [];
        })
      );
    }

    if (!Array.isArray(state.teams) || !state.teams.length) {
      requests.push(
        apiJson(TEAMS_URL, { method: "GET" }).then((data) => {
          state.teams = Array.isArray(data?.teams) ? data.teams : [];
        })
      );
    }

    if (!Array.isArray(state.matchesReference) || !state.matchesReference.length) {
      requests.push(
        apiJson(MATCHES_URL, { method: "GET" }).then((data) => {

    if (!Array.isArray(state.profilesPublic) || !state.profilesPublic.length) {

  function normalizeLookupKey(value) {

    if (!key) return null;
    return state.associations.find((item) => normalizeLookupKey(item?.id) === key) || null;
  }

    if (!key) return null;
    return state.teams.find((item) => normalizeLookupKey(item?.id) === key) || null;
  }

  function getMatchById(matchId) {

    if (!key) return null;
    return state.matchesReference.find((item) => String(item?.id || "").trim() === key) || null;
  }

  function getProfileById(profileId) {
    const key = String(profileId || "").trim();
    if (!key) return null;
    return state.profilesPublic.find((item) => String(item?.id || "").trim() === key) || null;
  }

  function getAuditChangedField(item, field) {
    const changes = item && typeof item === "object" ? item.changes : null;
    if (!changes || typeof changes !== "object") return null;
    const entry = changes[field];
    return entry && typeof entry === "object" ? entry : null;
  }

  function getAuditFieldValue(item, field, preferredSide) {
    const entry = getAuditChangedField(item, field);
    if (!entry) return null;
    if (preferredSide === "new" && entry.new != null && entry.new !== "") return entry.new;
    if (preferredSide === "old" && entry.old != null && entry.old !== "") return entry.old;
    if (entry.new != null && entry.new !== "") return entry.new;
    if (entry.old != null && entry.old !== "") return entry.old;
    return null;
  }

  function createAuditInlineMedia(src, alt) {
    const safeSrc = String(src || "").trim();
    if (!safeSrc) {
      const placeholder = createPlaceholder(alt, false);
      placeholder.classList.add("audit-title-media");
      return placeholder;
    }

    const img = document.createElement("img");
    img.className = "audit-title-media";
    img.src = safeSrc;
    img.alt = alt || "";
    img.referrerPolicy = "no-referrer";
    img.addEventListener("error", () => {
      const placeholder = createPlaceholder(alt, false);
      placeholder.classList.add("audit-title-media");
      img.replaceWith(placeholder);
    }, { once: true });
    return img;
  }

  function resolveMatchTeams(item, preferredSide) {
    const matchId = String(item?.record_id || item?.metadata?.match_id || "").trim();
    const match = getMatchById(matchId);
    const team1 = getAuditFieldValue(item, "team_1", preferredSide) || item?.metadata?.team_1 || match?.team_1 || null;
    const team2 = getAuditFieldValue(item, "team_2", preferredSide) || item?.metadata?.team_2 || match?.team_2 || null;
    return {
      team1: normalizeLookupKey(team1),
      team2: normalizeLookupKey(team2),
    };
  }

  function resolveProfileIdentity(item, preferredSide) {
    const profileId = String(item?.record_id || getAuditFieldValue(item, "id", preferredSide) || "").trim();
    const profile = getProfileById(profileId);
    return {
      associationId: normalizeLookupKey(
        getAuditFieldValue(item, "association", preferredSide) || profile?.association || ""
      ),
      nickname: String(
        getAuditFieldValue(item, "bga_nickname", preferredSide) || profile?.bga_nickname || profileId || ""

  function createAuditTitleNode(item) {
    const eventType = String(item?.event_type || "").trim().toLowerCase();

        title,
        eventType === "match.created"
          ? "New Match:"
          : eventType === "match.updated"
            ? "Match edited:"
            : "Match removed:"
      );
      if (team1 && team2) appendTeamsPair(title, team1, team2);
      return title;
    }

    if (eventType === "profile.created" || eventType === "profile.updated" || eventType === "profile.deleted") {
      const identity = resolveProfileIdentity(item, eventType === "profile.deleted" ? "old" : "new");
      appendAuditText(
        title,
        eventType === "profile.created"
          ? "New Profile:"
          : eventType === "profile.updated"
            ? "Profile edited:"
            : "Profile removed:"
      );
      if (identity.associationId) appendAssociationVisual(title, identity.associationId);
      if (identity.nickname) appendAuditText(title, identity.nickname);
      return title;
    }

    if (eventType === "user.created") {
      appendAuditText(title, `New User: ${getAuditActorLabel(item)}`);
      return title;
    }

    if (eventType === "user.bga_linked") {
      const linked = resolveLinkedUserProfile(item);
      appendAuditText(title, "User linked to BGA:");
      if (linked.associationId) appendAssociationVisual(title, linked.associationId);
      if (linked.nickname) appendAuditText(title, linked.nickname);
      return title;
    }

    if (eventType === "lineups.created" || eventType === "lineups.updated" || eventType === "lineups.deleted_all") {
      const { team1, team2 } = resolveMatchTeams(item, "new");
      appendAuditText(
        title,
        eventType === "lineups.created"
          ? "Lineups added for"
          : eventType === "lineups.updated"
            ? "Lineups edited for"
            : "Lineups removed for"
      );
      if (team1 && team2) appendTeamsPair(title, team1, team2);
      return title;
    }

    if (eventType === "friendly_find.created" || eventType === "friendly_find.updated" || eventType === "friendly_find.deleted") {
      const teamId = resolveFriendlyFindTeam(item, eventType === "friendly_find.deleted" ? "old" : "new");
      appendAuditText(
        title,
        eventType === "friendly_find.created"
          ? "Friendly find added for"
          : eventType === "friendly_find.updated"
            ? "Friendly find edited for"
            : "Friendly find removed for"
      );
      if (teamId) appendTeamVisual(title, teamId);
      return title;
    }

    return null;
  }

  function createAuditPagination() {
    const total = Number(state.auditTrailTotal) || 0;

    const currentPage = Math.min(Math.max(1, Number(state.auditTrailPage) || 1), totalPages);
    const pageSize = Number(state.auditTrailPageSize) || 10;
    const from = total === 0 ? 0 : ((currentPage - 1) * pageSize) + 1;
    const to = total === 0 ? 0 : Math.min(currentPage * pageSize, total);

    const wrap = document.createElement("div");
    wrap.className = "admin-pagination";

    left.className = "admin-pagination-group";

    const perPageLabel = document.createElement("span");

    const perPageSelect = document.createElement("select");
    [10, 20, 50].forEach((size) => {
      const option = document.createElement("option");
      option.value = String(size);

      if (size === pageSize) option.selected = true;

    const prevBtn = document.createElement("button");
    prevBtn.type = "button";
    prevBtn.className = "cp-btn cp-btn-secondary";

    wrap.appendChild(left);

    return wrap;

      lineupSizeField.input.disabled = !isFixed;
      lineupSizeField.input.required = isFixed;
      lineupSizeField.row.classList.toggle("hidden", !isFixed);
      if (!isFixed) lineupSizeField.input.value = "";
    };

    toggleLineupSizeState();

    const cancelBtn = document.createElement("button");
    cancelBtn.type = "button";
    cancelBtn.className = "cp-btn cp-btn-secondary";

      if (mode === "create") {
        sectionForm.classList.add("hidden");
        sectionForm.innerHTML = "";

        closeInlineForm();

    });

    actions.appendChild(cancelBtn);

      const rawTournamentId = String(idField.input.value || "").trim();
      const payload = {
        id: rawTournamentId,
        name: String(nameField.input.value || "").trim(),
        short_title: String(shortTitleField.input.value || "").trim(),
        logo: String(logoField.input.value || "").trim(),
        link: String(linkField.input.value || "").trim(),
        tournament_type: String(tournamentTypeField.select.value || "Teams").trim(),
        subtype: String(subtypeField.select.value || "Friendly").trim(),
        player_hub_visibility: String(playerHubVisibilityField.select.value || "Visible").trim(),
        lineup_size_type: Number.parseInt(String(lineupSizeTypeField.select.value || "2"), 10) === 1 ? 1 : 2,
        lineup_size: Number.parseInt(String(lineupSizeField.input.value || "").trim(), 10),
        access_users: accessUsersField.getValues(),
      };
      if (!payload.id) {
        setStatus("Tournament id is required.", true);
        return;
      }
      if (!payload.name) {
        setStatus("Tournament name is required.", true);
        return;
      }
      if (payload.tournament_type !== "Teams") {
        payload.subtype = null;
        payload.access_users = [];
      } else if (payload.subtype !== "Official") {
        payload.access_users = [];
      }
      if (payload.lineup_size_type === 2) {
        payload.lineup_size = null;
      } else if (!Number.isInteger(payload.lineup_size) || payload.lineup_size <= 0) {
        setStatus("Lineup size must be a positive integer for fixed lineup size.", true);
        return;
      }

      const duplicate = state.tournaments.find((entry) => (
        String(entry.id || "").trim().toLowerCase() === payload.id.toLowerCase()
        && String(entry.id || "").trim().toLowerCase() !== String(item?.id || "").trim().toLowerCase()
      ));
      if (duplicate) {
        setStatus("Tournament id already exists.", true);
        return;
      }

      try {
        if (mode === "create") {
          await apiJson(TOURNAMENTS_URL, {
            method: "POST",
            body: JSON.stringify(payload),
          });
          setStatus("Tournament created.", false);
        } else {
          await apiJson(`${TOURNAMENTS_URL}/${encodeURIComponent(item.id)}`, {
            method: "PATCH",
            body: JSON.stringify(payload),
          });
          setStatus("Tournament updated.", false);
        }
        if (mode === "create") {
          sectionForm.classList.add("hidden");
          sectionForm.innerHTML = "";

          closeInlineForm();

        await loadSectionData("tournaments");
        renderSection();
      } catch (error) {
        setStatus(error?.message || "Failed to save tournament.", true);
      }
    });

    if (mode === "create") {
      closeInlineForm();
      showCreateForm(form);
    } else if (anchorRow) {
      mountDetailForm(form, anchorRow);

  async function openNewsEditorForm(mode, item, anchorRow) {
    try {

      return;

    const form = document.createElement("form");

      state.profilesPublic
        .slice()
        .sort((left, right) => {
          const leftId = Number.parseInt(String(left?.id || "").trim(), 10);
          const rightId = Number.parseInt(String(right?.id || "").trim(), 10);
          if (Number.isNaN(leftId) && Number.isNaN(rightId)) {
            return String(left?.id || "").trim().localeCompare(String(right?.id || "").trim());
          }
          if (Number.isNaN(leftId)) return 1;
          if (Number.isNaN(rightId)) return -1;
          return leftId - rightId;
        })
        .map((profile) => {

          const parts = [
            id,
            String(profile?.bga_nickname || "").trim(),
            String(profile?.name || "").trim(),
            String(profile?.association || "").trim(),
          ].filter(Boolean);
          return { value: id, label: parts.join(" • ") || id };

        subtitleParts.push(`Tournament: ${String(item.tournament_name || item.tournament_id).trim()}`);
      }
      subtitleParts.push(Number(item?.is_captain) === 1 ? "Captain • auto" : "Manual");

      sectionList.appendChild(createListRow({
        imageSrc: item.profile_avatar,
        imageAlt: titleParts[0] || item?.profile_id || "Profile",
        imageRound: true,
        title: titleParts.join(" • ") || `Profile ${item.profile_id}`,
        subtitle: subtitleParts.join(" • "),
        buttonLabel: "Edit",
        onClick: (row) => openNewsEditorForm("edit", item, row),
      }));
    });
  }

  function renderTournaments() {
    sectionTitle.textContent = "Tournaments";
    sectionCreateBtn.textContent = "Create";
    sectionCreateBtn.classList.remove("hidden");
    sectionCreateBtn.onclick = () => openTournamentForm("create", null, null);

    if (!state.tournaments.length) {
      renderListEmpty("No tournaments yet.");
      return;
    }

    sectionList.innerHTML = "";
    state.tournaments.forEach((item) => {
      const subtitleParts = [];
      const tournamentType = String(item?.tournament_type || item?.type || "").trim();
      const subtype = String(item?.subtype || item?.access_type || "").trim();
      const playerHubVisibility = String(item?.player_hub_visibility || "").trim();
      if (item.short_title) subtitleParts.push(String(item.short_title).trim());
      if (tournamentType) subtitleParts.push(tournamentType);
      if (tournamentType === "Teams" && subtype) subtitleParts.push(subtype);
      if (playerHubVisibility) subtitleParts.push(playerHubVisibility);
      sectionList.appendChild(createListRow({
        imageSrc: item.logo,
        imageAlt: item.name,
        imageRound: false,
        title: item.name || item.id,
        subtitle: subtitleParts.join(" • "),
        buttonLabel: "Edit",
        onClick: (row) => openTournamentForm("edit", item, row),
      }));
    });
  }

  function renderDuelFormats() {
    sectionTitle.textContent = "Duel Formats";
    sectionCreateBtn.textContent = "Create";
    sectionCreateBtn.classList.remove("hidden");
    sectionCreateBtn.onclick = () => openDuelFormatForm("create", null, null);

    if (!state.duelFormats.length) {
      renderListEmpty("No duel formats yet.");
      return;
    }

    sectionList.innerHTML = "";
    state.duelFormats.forEach((item) => {
      sectionList.appendChild(createListRow({
        imageSrc: "",
        imageAlt: item.format,
        imageRound: false,
        title: item.format || "-",
        subtitle: `${item.games_to_win} to win • ${item.minutes_to_play} min`,
        buttonLabel: "Edit",
        onClick: (row) => openDuelFormatForm("edit", item, row),
      }));
    });
  }

  function renderUsers() {
    sectionTitle.textContent = "Users";
    sectionCreateBtn.classList.add("hidden");
    sectionCreateBtn.onclick = null;
    closeInlineForm();

    if (!state.users.length) {
      renderListEmpty("No users yet.");
      sectionList.appendChild(createUsersPagination());
      return;
    }

    sectionList.innerHTML = "";
    state.users.forEach((item) => {
      const subtitleParts = [];
      if (item.bga_nickname) subtitleParts.push(`BGA: ${item.bga_nickname}`);
      if (item.last_login) subtitleParts.push(`Last login: ${formatUserLastLogin(item.last_login)}`);
      sectionList.appendChild(createListRow({
        imageSrc: item.picture,
        imageAlt: item.name || item.email,
        imageRound: true,
        title: item.name || item.email || `User #${item.id}`,
        subtitle: subtitleParts.join(" • "),
        subtitleClassName: "users-subtitle",
        buttonLabel: "View",
        onClick: (row) => openUserView(item, row),
      }));
    });
    sectionList.appendChild(createUsersPagination());
  }

  function renderAuditTrail() {
    sectionTitle.textContent = "Audit Trail";
    sectionCreateBtn.classList.add("hidden");
    sectionCreateBtn.onclick = null;
    closeInlineForm();

    if (!state.auditTrail.length) {
      renderListEmpty("No audit trail records yet.");
      sectionList.insertBefore(createAuditFilterControl(), sectionList.firstChild);
      sectionList.appendChild(createAuditPagination());
      return;
    }

    sectionList.innerHTML = "";
    sectionList.appendChild(createAuditFilterControl());
    state.auditTrail.forEach((item) => {
      const subtitleParts = [];
      if (item.actor_bga_nickname) subtitleParts.push(`By: ${item.actor_bga_nickname}`);
      else if (item.actor_email) subtitleParts.push(`By: ${item.actor_email}`);
      if (item.created_at) subtitleParts.push(formatAuditTrailDate(item.created_at));

      sectionList.appendChild(createListRow({
        imageSrc: "__audit_icon__",
        imageAlt: item.event_type || item.entity_type,
        imageRound: false,
        title: formatAuditTitle(item),
        titleNode: createAuditTitleNode(item),
        subtitle: subtitleParts.join(" • "),
        subtitleClassName: "audit-trail-subtitle",
        buttonLabel: "View",
        onClick: (row) => openAuditView(item, row),
        customAvatar: createAuditIcon(item.event_type, item.action),
      }));
    });
    sectionList.appendChild(createAuditPagination());
  }

  async function loadSectionData(section) {
    if (!SECTION_CONFIG[section]) return;
    const items = await SECTION_CONFIG[section].load();
    state[section] = Array.isArray(items) ? items : [];
  }

  async function renderSection() {
    renderSectionTiles();
    closeInlineForm();
    sectionForm.classList.add("hidden");
    sectionForm.innerHTML = "";

    if (!state.activeSection) {
      sectionCard.classList.add("hidden");
      return;
    }

    sectionCard.classList.remove("hidden");
    if (state.activeSection === "associations") renderAssociations();
    if (state.activeSection === "teams") renderTeams();
    if (state.activeSection === "streamers") renderStreamers();
    if (state.activeSection === "newsEditors") renderNewsEditors();
    if (state.activeSection === "tournaments") renderTournaments();
    if (state.activeSection === "duelFormats") renderDuelFormats();
    if (state.activeSection === "users") renderUsers();
    if (state.activeSection === "auditTrail") renderAuditTrail();
  }

  async function init() {
    try {
      const meResponse = await fetch(ME_URL, { credentials: "include" });
      const meData = await meResponse.json().catch(() => ({}));

      if (!meResponse.ok || !meData?.authenticated) {
        accessText.textContent = "Please sign in first.";
        return;
      }

      if (!meData?.user?.isAdmin) {
        accessText.textContent = "Access denied. Admin role required.";
        return;
      }

      accessCard.classList.add("hidden");
      content.classList.remove("hidden");
      renderSectionTiles();
      await renderSection();
      state.accessChecked = true;
    } catch (_error) {
      accessText.textContent = "Failed to verify access.";
    }
  }

  init();
})();
</script>
