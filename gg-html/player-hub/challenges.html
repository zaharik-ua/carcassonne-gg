    };
    const open = () => {
      const status = STATUS_COPY[currentStatus] || STATUS_COPY.not_selected;
      if (!status.editable || !periodAllowsManualStatus) return;
      closeAllDropdowns();
      btnEl.classList.add("open");
      btnEl.setAttribute("aria-expanded", "true");
      menuEl.classList.add("open");
    };
    const setStatus = (nextStatus, noteOverride) => {
      const statusValue = normalizeStatus(nextStatus);
      const status = STATUS_COPY[statusValue] || STATUS_COPY.not_selected;
      const editable = status.editable && periodAllowsManualStatus;
      currentStatus = statusValue;
      btnEl.classList.remove(
        "is-placeholder",
        "is-not_selected",
        "is-available",
        "is-unavailable",
        "is-scheduled",
        "is-played",
        "disabled"
      );
      btnEl.classList.add(`is-${status.tone}`);
      btnEl.classList.toggle("disabled", !editable);
      btnEl.disabled = !editable;
      btnEl.setAttribute("aria-disabled", editable ? "false" : "true");
      textEl.textContent = status.label;
      noteEl.textContent = noteOverride || (periodAllowsManualStatus
        ? status.note
        : String(period?.status || "") === "draft"
          ? "Status selection will open when the planning period starts."
          : "Status changes are closed for this period.");
      optionEls.forEach((optionEl) => {
        const active = String(optionEl.dataset.value || "") === statusValue;
        optionEl.classList.toggle("active", active);
        optionEl.setAttribute("aria-selected", active ? "true" : "false");
      });
      if (!editable) close();
    };

    btnEl.addEventListener("click", (event) => {
      event.stopPropagation();
      if (menuEl.classList.contains("open")) close();
      else open();
    });

    optionEls.forEach((optionEl) => {
      optionEl.addEventListener("click", async (event) => {
        event.stopPropagation();
        const previousStatus = currentStatus;
        const nextStatus = String(optionEl.dataset.value || "");
        if (nextStatus === previousStatus) {
          close();
          return;
        }
        close();
        if (nextStatus === "unavailable") {
          setStatus(previousStatus, "Checking open requests...");
          let hasOpenRequests = false;
          try {
            hasOpenRequests = await periodHasOpenRequests(period.id);
          } catch (error) {
            setStatus(previousStatus, error?.message || "Failed to check open requests.");
            return;
          }
          if (hasOpenRequests) {
            const confirmed = await showChallengeConfirmDialog(
              "Not playing this period",
              "You have open Challenge requests in this period. Changing your status will close all of them.",
              {
                note: "This includes both incoming and sent requests.",
                confirmText: "Change status",
                confirmClassName: "challenge-btn-danger",
                cancelText: "Back",
              }
            );
            if (!confirmed) {
              setStatus(previousStatus);
              return;
            }
          }
        }
        setStatus(nextStatus, "Saving...");
        try {
          const data = await apiJson(`${CHALLENGE_PERIODS_URL}/${encodeURIComponent(period.id)}/player-status`, {
            method: "PATCH",
            body: JSON.stringify({ status: nextStatus }),
          });
          const savedStatus = data?.period_player?.status || nextStatus;
          period.player_status = savedStatus;
          setStatus(savedStatus);
          await Promise.all([
            refreshRequestPanel(period.id),
            refreshOpponentPanel(period.id),
          ]);
        } catch (error) {
          setStatus(previousStatus, error?.message || "Failed to update status.");
        }
      });
    });

    setStatus(currentStatus);
    dropdowns.push({ close, setStatus });
    return card;
  }

  function createPeriodBand(period, timeContext) {
    const band = document.createElement("section");
    band.className = "challenge-period-band";
    band.dataset.challengePeriodId = String(period?.id || "");
    band.dataset.playerStatus = normalizeStatus(period?.player_status);

    const main = document.createElement("div");
    main.className = "challenge-period-main";
    band.appendChild(main);

    const titleRow = document.createElement("div");
    titleRow.className = "challenge-period-title-row";
    main.appendChild(titleRow);

    const iconSrc = String(period?.logo || "").trim();
    if (iconSrc) {
      const icon = document.createElement("img");
      icon.className = "challenge-period-icon";
      icon.src = iconSrc;
      icon.alt = "";
      titleRow.appendChild(icon);
    }

    const title = document.createElement("div");
    title.className = "challenge-period-title";
    title.textContent = String(period?.name || period?.id || "Challenge period");
    titleRow.appendChild(title);

    const badge = document.createElement("span");
    badge.className = "challenge-period-badge";
    badge.textContent = PERIOD_STATUS_LABELS[period?.status] || String(period?.status || "");
    titleRow.appendChild(badge);

    const descriptionText = String(period?.description || "").trim();
    if (descriptionText) {
      const description = document.createElement("div");
      description.className = "challenge-period-description";
      description.textContent = descriptionText;
      main.appendChild(description);
    }

    const meta = document.createElement("div");
    meta.className = "challenge-period-meta";
    const timezone = getPlayerTimezone(timeContext);
    meta.appendChild(createMetaLine("Registration from:", createLocalDateNode(period?.planning_starts_at, "UTC")));
    meta.appendChild(createMetaLine(
      "Playing days:",
      createLocalDateTimeRangeNode(period?.play_starts_at, period?.play_ends_at, timezone),
      createTimeContextMeta(timeContext)
    ));
    main.appendChild(meta);

    band.appendChild(createStatusDropdown(period, period?.player_status));
    return band;
  }

  function createOpponentsPanel(period) {
    const wrap = document.createElement("div");
    wrap.className = "challenge-panel-wrap";
    wrap.dataset.challengePeriodOpponents = String(period?.id || "");

    const head = document.createElement("div");
    head.className = "challenge-opponents-head";
    wrap.appendChild(head);

    const title = document.createElement("div");
    title.className = "challenge-opponents-title";
    title.textContent = "Open to match";
    head.appendChild(title);

    const count = document.createElement("div");
    count.className = "challenge-opponents-count";
    count.dataset.opponentsCount = "true";
    head.appendChild(count);

    const panel = document.createElement("section");
    panel.className = "challenge-opponents-panel";
    wrap.appendChild(panel);

    const body = document.createElement("div");
    body.className = "challenge-opponents-body";
    body.dataset.opponentsBody = "true";
    panel.appendChild(body);

    opponentPanels.set(String(period?.id || ""), { period, panel: wrap });
    loadOpponentsForPeriod(period, wrap);
    return wrap;
  }

  function createChallengeMatchPanel(period) {
    const wrap = document.createElement("div");
    wrap.className = "challenge-panel-wrap";
    wrap.dataset.challengePeriodMatch = String(period?.id || "");
    wrap.hidden = true;

    const head = document.createElement("div");
    head.className = "challenge-opponents-head";
    wrap.appendChild(head);

    const title = document.createElement("div");
    title.className = "challenge-opponents-title";
    title.textContent = "Match";
    head.appendChild(title);

    const panel = document.createElement("section");
    panel.className = "challenge-requests-panel";
    wrap.appendChild(panel);

    const body = document.createElement("div");
    body.className = "challenge-requests-grid";
    body.dataset.matchBody = "true";
    panel.appendChild(body);

    matchPanels.set(String(period?.id || ""), { period, panel: wrap });
    return wrap;
  }

  function createRequestsPanel(period) {
    const wrap = document.createElement("div");
    wrap.className = "challenge-panel-wrap";
    wrap.dataset.challengePeriodRequests = String(period?.id || "");

    const head = document.createElement("div");
    head.className = "challenge-opponents-head";
    wrap.appendChild(head);

    const title = document.createElement("div");
    title.className = "challenge-opponents-title";
    title.textContent = "Requests";
    head.appendChild(title);

    const panel = document.createElement("section");
    panel.className = "challenge-requests-panel";
    wrap.appendChild(panel);

    const body = document.createElement("div");
    body.className = "challenge-requests-grid";
    body.dataset.requestsBody = "true";
    panel.appendChild(body);

    requestPanels.set(String(period?.id || ""), { period, panel: wrap });
    loadRequestsForPeriod(period, wrap);
    return wrap;
  }

  async function renderChallenges() {
    setAlert("Loading...", false);
    dropdowns.splice(0, dropdowns.length);
    opponentPanels.clear();
    matchPanels.clear();
    requestPanels.clear();

    try {
      const data = await apiJson(PLAYER_CHALLENGE_PERIODS_URL, { method: "GET" });
      const periods = Array.isArray(data?.challenge_periods) ? data.challenge_periods : [];
      const timeContext = await enrichTimeContext(data?.player_time_context || { timezone: "UTC" });
      if (!periods.length) {
        setAlert("No open Challenge periods right now.", false);
        return;
      }
      contentEl.className = "challenges-list";
      contentEl.innerHTML = "";
      periods.forEach((period) => {
        period.player_time_context = timeContext;
        const stack = document.createElement("div");
        stack.className = "challenge-period-stack";
        stack.appendChild(createPeriodBand(period, timeContext));
        if (String(period?.status || "") !== "draft") {
          stack.appendChild(createChallengeMatchPanel(period));
          stack.appendChild(createRequestsPanel(period));
          stack.appendChild(createOpponentsPanel(period));
        }
        contentEl.appendChild(stack);
      });
    } catch (error) {
      setAlert(error?.message || "Failed to load Challenge periods.", true);
    }
  }

  document.addEventListener("click", closeAllDropdowns);

  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape") closeAllDropdowns();
  });

  window.setChallengePeriodStatus = function (status) {
    const firstDropdown = dropdowns[0];
    if (!firstDropdown) return;
    const firstBand = contentEl.querySelector("[data-challenge-period-id]");
    if (firstBand) firstBand.dataset.playerStatus = normalizeStatus(status);
    firstDropdown.setStatus(status);
  };

  renderChallenges();
})();
</script>
