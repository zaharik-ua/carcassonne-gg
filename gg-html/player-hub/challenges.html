<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --text: #222;
    --muted: #666;
    --border: #e0e0e0;
    --card: #fff;
    --soft: #f6f8fb;
    --blue: #1a73b7;
    --blue-hover: #165e93;
    --green: #21a366;
    --green-soft: #e8f6ef;
    --red: #b23a48;
    --red-soft: #fff0f2;
  }

  body {
    font-family: "Montserrat", sans-serif;
  }

  button {
    font: inherit;
  }

  .challenges-wrap {
    display: grid;
    gap: 10px;
    margin: 0 8px 12px;
  }

  .challenges-head {
    display: grid;
    gap: 4px;
  }

  .challenges-title {
    color: #223040;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.2;
  }

  .challenges-subtitle {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.45;
  }

  .challenge-period-band {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(230px, 320px);
    gap: 14px;
    align-items: center;
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--card);
    color: var(--text);
    box-sizing: border-box;
  }

  .challenges-alert {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--card);
    color: var(--muted);
    padding: 12px;
    font-size: 14px;
    line-height: 1.45;
  }

  .challenges-alert.is-error {
    border-color: #f0b8c1;
    background: var(--red-soft);
    color: var(--red);
  }

  .challenges-list {
    display: grid;
    gap: 10px;
  }

  .challenge-period-main {
    display: grid;
    gap: 7px;
    min-width: 0;
  }

  .challenge-period-title-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    min-width: 0;
  }

  .challenge-period-title {
    color: #172232;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.2;
    overflow-wrap: anywhere;
  }

  .challenge-period-badge {
    display: inline-flex;
    align-items: center;
    min-height: 21px;
    padding: 3px 8px;
    border: 1px solid #cfe1f3;
    border-radius: 4px;
    background: #edf6ff;
    color: #155d95;
    font-size: 11px;
    font-weight: 700;
    line-height: 1.2;
    white-space: nowrap;
  }

  .challenge-period-description {
    color: #334155;
    font-size: 13px;
    line-height: 1.45;
  }

  .challenge-period-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 14px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.35;
  }

  .challenge-period-meta b {
    color: #475467;
    font-weight: 700;
  }

  .challenge-time-context {
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .challenge-time-flag {
    width: 12px;
    height: auto;
  }

  .challenge-status-card {
    display: grid;
    gap: 6px;
    width: min(100%, 200px);
    justify-self: end;
    box-sizing: border-box;
  }

  .challenge-status-label {
    color: #333;
    font-size: 12px;
    font-weight: 700;
    line-height: 1.25;
  }

  .challenge-status-dd {
    position: relative;
    display: inline-flex;
    flex-direction: column;
    width: 100%;
  }

  .challenge-status-btn {
    all: unset;
    box-sizing: border-box;
    width: 100%;
    min-height: 34px;
    border: 1px solid #c8ced8;
    border-radius: 4px;
    background: #fff;
    color: #2f3947;
    padding: 6px 8px;
    display: inline-flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    line-height: 1.2;
  }

  .challenge-status-btn:hover,
  .challenge-status-btn:focus-visible,
  .challenge-status-btn.open {
    border-color: #9ea7b3;
  }

  .challenge-status-btn.is-placeholder,
  .challenge-status-btn.is-not_selected {
    color: #7a8492;
    font-weight: 600;
  }

  .challenge-status-btn.is-available {
    border-color: #9dd7b9;
    background: var(--green-soft);
  }

  .challenge-status-btn.is-unavailable {
    border-color: #f0b8c1;
    background: var(--red-soft);
  }

  .challenge-status-btn.is-scheduled {
    border-color: #cfe1f3;
    background: #edf6ff;
    color: #155d95;
  }

  .challenge-status-btn.is-played {
    border-color: #9dd7b9;
    background: var(--green-soft);
    color: #12633e;
  }

  .challenge-status-btn.disabled {
    cursor: not-allowed;
  }

  .challenge-status-text {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .challenge-status-chevron {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #6f7785;
    font-size: 10px;
    transition: transform 0.18s ease;
  }

  .challenge-status-btn.open .challenge-status-chevron {
    transform: rotate(180deg);
  }

  .challenge-status-menu {
    position: absolute;
    left: 0;
    top: calc(100% + 4px);
    z-index: 20;
    display: flex;
    flex-direction: column;
    width: 100%;
    max-height: 0;
    overflow: hidden;
    border: 1px solid #d5dbe4;
    border-radius: 4px;
    background: #fff;
    box-shadow: 0 8px 18px rgba(15, 28, 48, 0.14);
    opacity: 0;
    pointer-events: none;
    transform: translateY(4px);
    transition: opacity 0.16s ease, transform 0.16s ease, max-height 0.16s ease;
  }

  .challenge-status-menu.open {
    max-height: 180px;
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }

  .challenge-status-option {
    all: unset;
    box-sizing: border-box;
    min-height: 34px;
    padding: 7px 9px;
    border-top: 1px solid #edf1f6;
    color: #2f3947;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    line-height: 1.2;
  }

  .challenge-status-option:first-child {
    border-top: none;
  }

  .challenge-status-option:hover,
  .challenge-status-option:focus-visible {
    background: #f5f7fa;
  }

  .challenge-status-option.active {
    background: #e4f0fb;
  }

  .challenge-status-option.is-available.active {
    background: var(--green-soft);
    color: #12633e;
  }

  .challenge-status-option.is-unavailable.active {
    background: var(--red-soft);
    color: var(--red);
  }

  .challenge-status-note {
    color: var(--muted);
    font-size: 11px;
    line-height: 1.35;
  }

  .challenge-period-stack {
    display: grid;
    gap: 8px;
  }

  .challenge-opponents-panel {
    display: grid;
    gap: 9px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
  }

  .challenge-opponents-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    min-width: 0;
  }

  .challenge-opponents-title {
    color: #223040;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.25;
  }

  .challenge-opponents-count {
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }

  .challenge-opponents-body {
    display: grid;
    gap: 7px;
  }

  .challenge-opponents-state {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.4;
  }

  .challenge-opponents-state.is-error {
    color: var(--red);
  }

  .challenge-opponent-row {
    display: grid;
    grid-template-columns: 34px minmax(0, 1fr) minmax(120px, auto);
    gap: 9px;
    align-items: center;
    min-height: 46px;
    padding: 7px 0;
    border-top: 1px solid #edf1f6;
  }

  .challenge-opponent-row:first-child {
    border-top: none;
    padding-top: 0;
  }

  .challenge-opponent-avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: #eef2f6;
    object-fit: cover;
  }

  .challenge-opponent-avatar-fallback {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #526071;
    font-size: 13px;
    font-weight: 700;
  }

  .challenge-opponent-main {
    display: grid;
    gap: 3px;
    min-width: 0;
  }

  .challenge-opponent-name {
    color: #172232;
    font-size: 13px;
    font-weight: 700;
    line-height: 1.25;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .challenge-opponent-sub {
    color: var(--muted);
    font-size: 11px;
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .challenge-opponent-meta {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 6px;
    min-width: 0;
    color: #475467;
    font-size: 12px;
    font-weight: 600;
    line-height: 1.25;
    white-space: nowrap;
  }

  .challenge-opponent-flag {
    width: 16px;
    height: auto;
    flex: 0 0 auto;
  }

  @media (max-width: 720px) {
    .challenge-period-band {
      grid-template-columns: minmax(0, 1fr);
    }

    .challenge-status-card {
      width: 100%;
      justify-self: stretch;
    }

    .challenge-opponent-row {
      grid-template-columns: 34px minmax(0, 1fr);
    }

    .challenge-opponent-meta {
      grid-column: 2;
      justify-content: flex-start;
    }
  }
</style>

<div class="challenges-wrap">
  <div class="challenges-head">
    <div class="challenges-title">Challenges</div>
    <div class="challenges-subtitle">Player Hub</div>
  </div>

  <div id="challengesContent" class="challenges-alert">Loading...</div>
</div>

<script>
(function () {
  const AUTH_BASE = window.AUTH_BASE_URL || "https://api.carcassonne.gg";
  const ME_URL = `${AUTH_BASE}/auth/me`;
  const TEAMS_URL = `${AUTH_BASE}/teams`;
  const CHALLENGE_PERIODS_URL = `${AUTH_BASE}/challenge-periods`;
  const PLAYER_CHALLENGE_PERIODS_URL = `${CHALLENGE_PERIODS_URL}/player`;
  const ELIGIBLE_OPPONENTS_PATH = "eligible-opponents";
  const STATUS_COPY = {
    not_selected: {
      label: "Not selected",
      tone: "placeholder",
      note: "Choose your availability for this period.",
      editable: true,
    },
    available: {
      label: "Open to match",
      tone: "available",
      note: "You are open to Challenge match requests.",
      editable: true,
    },
    unavailable: {
      label: "Not playing this period",
      tone: "unavailable",
      note: "You are not participating in this period.",
      editable: true,
    },
    match_scheduled: {
      label: "Match scheduled",
      tone: "scheduled",
      note: "Status is locked because your match is already scheduled.",
      editable: false,
    },
    played: {
      label: "Match played",
      tone: "played",
      note: "Status is locked because your match has been played.",
      editable: false,
    },
  };
  const PERIOD_STATUS_LABELS = {
    draft: "Draft",
    planning_open: "Open",
    active: "Open",
    result_review: "Closed",
    archived: "Closed",
    cancelled: "Closed",
  };

  const contentEl = document.getElementById("challengesContent");
  const dropdowns = [];
  const opponentPanels = new Map();

  function normalizeStatus(value) {
    const normalized = String(value || "").trim();
    return STATUS_COPY[normalized] ? normalized : "not_selected";
  }

  function normalizeCode(value) {
    return String(value || "").trim().toUpperCase();
  }

  function getPlayerTimezone(timeContext) {
    return String(timeContext?.timezone || "UTC").trim() || "UTC";
  }

  function getCurrentUserAssociation(user) {
    return normalizeCode(user?.profile?.association ?? user?.association ?? "");
  }

  async function fetchCurrentUserAssociation() {
    try {
      const response = await fetch(ME_URL, { method: "GET", credentials: "include" });
      if (!response.ok) return "";
      const data = await response.json().catch(() => ({}));
      return data?.authenticated ? getCurrentUserAssociation(data?.user) : "";
    } catch (_error) {
      return "";
    }
  }

  async function fetchTeamsById() {
    try {
      const response = await fetch(TEAMS_URL, { method: "GET" });
      if (!response.ok) return new Map();
      const data = await response.json().catch(() => ({}));
      const teams = Array.isArray(data?.teams) ? data.teams : [];
      const teamsById = new Map();
      teams.forEach((team) => {
        const key = normalizeCode(team?.id);
        if (!key) return;
        teamsById.set(key, {
          id: key,
          name: String(team?.name || key).trim(),
          flag: String(team?.flag || team?.logo || "").trim(),
          timezone: String(team?.timezone || "").trim(),
        });
      });
      return teamsById;
    } catch (_error) {
      return new Map();
    }
  }

  async function enrichTimeContext(baseTimeContext) {
    const [associationCode, teamsById] = await Promise.all([
      fetchCurrentUserAssociation(),
      fetchTeamsById(),
    ]);
    const teamMeta = teamsById.get(associationCode) || null;
    if (!teamMeta) return baseTimeContext || { timezone: "UTC" };
    return {
      ...(baseTimeContext || {}),
      association_id: teamMeta.id,
      association_name: teamMeta.name,
      association_flag: teamMeta.flag || baseTimeContext?.association_flag || "",
      timezone: teamMeta.timezone || baseTimeContext?.timezone || "UTC",
    };
  }

  function parseUtcDate(value) {
    const raw = String(value || "").trim();
    if (!raw) return null;
    const normalized = /(?:Z|[+-]\d{2}:?\d{2})$/i.test(raw)
      ? raw.replace(" ", "T")
      : `${raw.replace(" ", "T")}Z`;
    const date = new Date(normalized);
    return Number.isNaN(date.getTime()) ? null : date;
  }

  function getDateParts(value, timezone) {
    const date = parseUtcDate(value);
    if (!date) return null;
    const parts = new Intl.DateTimeFormat("en-US", {
      weekday: "long",
      month: "long",
      day: "numeric",
      hour: "numeric",
      minute: "2-digit",
      hourCycle: "h23",
      timeZone: timezone || "UTC",
    }).formatToParts(date);
    const part = (type) => parts.find((item) => item.type === type)?.value || "";
    return {
      weekday: part("weekday"),
      month: part("month"),
      day: part("day"),
      hour: part("hour").replace(/^0(?=\d)/, ""),
      minute: part("minute"),
    };
  }

  function formatLocalDate(value, timezone) {
    const date = getDateParts(value, timezone);
    if (!date) return "-";
    return `${date.weekday}, ${date.month} ${date.day}`;
  }

  function formatLocalDateTime(value, timezone) {
    const date = getDateParts(value, timezone);
    if (!date) return "-";
    return `${date.weekday}, ${date.month} ${date.day}, ${date.hour}:${date.minute}`;
  }

  function createBoldText(text) {
    const bold = document.createElement("b");
    bold.textContent = text;
    return bold;
  }

  function createLocalDateNode(value, timezone) {
    const date = getDateParts(value, timezone);
    if (!date) return document.createTextNode("-");
    return createBoldText(`${date.weekday}, ${date.month} ${date.day}`);
  }

  function createLocalDateTimeRangeNode(startValue, endValue, timezone) {
    const fragment = document.createDocumentFragment();
    const startDate = getDateParts(startValue, timezone);
    const endDate = getDateParts(endValue, timezone);

    if (!startDate && !endDate) {
      fragment.appendChild(document.createTextNode("-"));
      return fragment;
    }

    if (startDate) {
      fragment.appendChild(createBoldText(`${startDate.weekday}, ${startDate.month} ${startDate.day}`));
      fragment.appendChild(document.createTextNode(`, ${startDate.hour}:${startDate.minute}`));
    } else {
      fragment.appendChild(document.createTextNode("-"));
    }

    fragment.appendChild(document.createTextNode(" - "));

    if (endDate) {
      fragment.appendChild(createBoldText(`${endDate.weekday}, ${endDate.month} ${endDate.day}`));
      fragment.appendChild(document.createTextNode(`, ${endDate.hour}:${endDate.minute}`));
    } else {
      fragment.appendChild(document.createTextNode("-"));
    }

    return fragment;
  }

  function createMetaLine(label, content, suffixNode) {
    const line = document.createElement("span");
    const labelEl = document.createElement("span");
    labelEl.textContent = label;
    line.appendChild(labelEl);
    line.appendChild(document.createTextNode(" "));
    if (content instanceof Node) {
      line.appendChild(content);
    } else {
      line.appendChild(document.createTextNode(String(content || "-")));
    }
    if (suffixNode) {
      line.appendChild(document.createTextNode(" "));
      line.appendChild(suffixNode);
    }
    return line;
  }

  function createTimeContextMeta(timeContext) {
    const line = document.createElement("span");
    line.className = "challenge-time-context";
    line.appendChild(document.createTextNode("("));
    if (timeContext?.association_flag) {
      const flag = document.createElement("img");
      flag.className = "challenge-time-flag";
      flag.src = String(timeContext.association_flag || "");
      flag.alt = "";
      flag.title = String(timeContext.association_name || timeContext.association_id || "");
      line.appendChild(flag);
    }
    line.appendChild(document.createTextNode(" time)"));
    return line;
  }

  function formatDate(value) {
    const date = parseUtcDate(value);
    if (!date) return "";
    return new Intl.DateTimeFormat("en-US", {
      month: "short",
      day: "numeric",
      year: "numeric",
      timeZone: "UTC",
    }).format(date);
  }

  function formatDateRange(startValue, endValue) {
    const start = formatDate(startValue);
    const end = formatDate(endValue);
    if (start && end) return `${start} - ${end}`;
    return start || end || "-";
  }

  function closeAllDropdowns() {
    dropdowns.forEach((dropdown) => dropdown.close());
  }

  function setAlert(text, isError) {
    contentEl.className = `challenges-alert${isError ? " is-error" : ""}`;
    contentEl.textContent = text;
  }

  async function apiJson(url, options) {
    const requestOptions = options || {};
    const headers = {};
    if (requestOptions.body !== undefined) {
      headers["Content-Type"] = "application/json";
    }
    const response = await fetch(url, {
      credentials: "include",
      ...requestOptions,
      headers: {
        ...headers,
        ...(requestOptions.headers || {}),
      },
    });
    const data = await response.json().catch(() => ({}));
    if (!response.ok || data?.ok === false) {
      throw new Error(data?.message || "Request failed");
    }
    return data;
  }

  function getOpponentInitials(opponent) {
    const name = String(opponent?.bga_nickname || opponent?.name || "?").trim();
    return (name.slice(0, 2) || "?").toUpperCase();
  }

  function getOpponentDisplayName(opponent) {
    return String(opponent?.bga_nickname || opponent?.name || opponent?.player_id || "Unknown player").trim();
  }

  function createOpponentAvatar(opponent) {
    const avatarUrl = String(opponent?.avatar || "").trim();
    if (avatarUrl) {
      const img = document.createElement("img");
      img.className = "challenge-opponent-avatar";
      img.src = avatarUrl;
      img.alt = "";
      img.loading = "lazy";
      return img;
    }
    const fallback = document.createElement("div");
    fallback.className = "challenge-opponent-avatar challenge-opponent-avatar-fallback";
    fallback.textContent = getOpponentInitials(opponent);
    return fallback;
  }

  function createOpponentRow(opponent) {
    const row = document.createElement("div");
    row.className = "challenge-opponent-row";
    row.dataset.playerId = String(opponent?.player_id || "");
    row.dataset.associationId = String(opponent?.association?.id || "");

    row.appendChild(createOpponentAvatar(opponent));

    const main = document.createElement("div");
    main.className = "challenge-opponent-main";
    row.appendChild(main);

    const name = document.createElement("div");
    name.className = "challenge-opponent-name";
    name.textContent = getOpponentDisplayName(opponent);
    name.title = name.textContent;
    main.appendChild(name);

    const sub = document.createElement("div");
    sub.className = "challenge-opponent-sub";
    const realName = String(opponent?.name || "").trim();
    const idText = String(opponent?.player_id || "").trim();
    sub.textContent = [realName && realName !== name.textContent ? realName : "", idText ? `BGA #${idText}` : ""]
      .filter(Boolean)
      .join(" / ");
    main.appendChild(sub);

    const meta = document.createElement("div");
    meta.className = "challenge-opponent-meta";
    row.appendChild(meta);

    if (opponent?.association?.flag) {
      const flag = document.createElement("img");
      flag.className = "challenge-opponent-flag";
      flag.src = String(opponent.association.flag || "");
      flag.alt = "";
      flag.title = String(opponent?.association?.name || opponent?.association?.id || "");
      meta.appendChild(flag);
    }

    const association = document.createElement("span");
    association.textContent = String(opponent?.association?.name || opponent?.association?.id || "No association");
    meta.appendChild(association);

    if (opponent?.bga_elo !== null && opponent?.bga_elo !== undefined) {
      const elo = document.createElement("span");
      elo.textContent = `Elo ${opponent.bga_elo}`;
      meta.appendChild(elo);
    }

    return row;
  }

  function getEligibilityStateText(eligibility) {
    const reasons = Array.isArray(eligibility?.reasons) ? eligibility.reasons : [];
    if (reasons.includes("period_closed")) return "Requests closed for this period.";
    if (reasons.includes("current_player_unavailable")) return "Your status is Not playing this period.";
    if (reasons.includes("current_player_has_match")) return "You already have a Challenge match in this period.";
    return "";
  }

  function setOpponentsState(panel, text, isError) {
    const countEl = panel.querySelector("[data-opponents-count]");
    const bodyEl = panel.querySelector("[data-opponents-body]");
    if (countEl) countEl.textContent = "";
    if (!bodyEl) return;
    bodyEl.innerHTML = "";
    const state = document.createElement("div");
    state.className = `challenge-opponents-state${isError ? " is-error" : ""}`;
    state.textContent = text;
    bodyEl.appendChild(state);
  }

  async function loadOpponentsForPeriod(period, panel) {
    const periodId = String(period?.id || "").trim();
    if (!periodId) {
      setOpponentsState(panel, "Challenge period is unavailable.", true);
      return;
    }

    setOpponentsState(panel, "Loading opponents...", false);
    try {
      const data = await apiJson(
        `${CHALLENGE_PERIODS_URL}/${encodeURIComponent(periodId)}/${ELIGIBLE_OPPONENTS_PATH}`,
        { method: "GET" }
      );
      const opponents = Array.isArray(data?.available_opponents) ? data.available_opponents : [];
      const countEl = panel.querySelector("[data-opponents-count]");
      const bodyEl = panel.querySelector("[data-opponents-body]");
      if (countEl) {
        countEl.textContent = `${opponents.length} ${opponents.length === 1 ? "player" : "players"}`;
      }
      if (!bodyEl) return;
      bodyEl.innerHTML = "";

      const eligibilityText = getEligibilityStateText(data?.eligibility);
      if (eligibilityText) {
        const state = document.createElement("div");
        state.className = "challenge-opponents-state";
        state.textContent = eligibilityText;
        bodyEl.appendChild(state);
        return;
      }

      if (!opponents.length) {
        const state = document.createElement("div");
        state.className = "challenge-opponents-state";
        state.textContent = "No available opponents right now.";
        bodyEl.appendChild(state);
        return;
      }

      opponents.forEach((opponent) => {
        bodyEl.appendChild(createOpponentRow(opponent));
      });
    } catch (error) {
      setOpponentsState(panel, error?.message || "Failed to load opponents.", true);
    }
  }

  function refreshOpponentPanel(periodId) {
    const item = opponentPanels.get(String(periodId || ""));
    if (!item) return;
    loadOpponentsForPeriod(item.period, item.panel);
  }

  function createStatusDropdown(period, initialStatus) {
    let currentStatus = normalizeStatus(initialStatus);
    const periodAllowsManualStatus = ["planning_open", "active"].includes(String(period?.status || "").trim());
    const labelId = `challengeStatusLabel-${String(period.id || "").replace(/[^A-Za-z0-9_-]/g, "-")}`;

    const card = document.createElement("div");
    card.className = "challenge-status-card";

    const label = document.createElement("div");
    label.className = "challenge-status-label";
    label.id = labelId;
    label.textContent = "Your period status";
    card.appendChild(label);

    const dropdownEl = document.createElement("div");
    dropdownEl.className = "challenge-status-dd";
    card.appendChild(dropdownEl);

    const btnEl = document.createElement("button");
    btnEl.className = "challenge-status-btn";
    btnEl.type = "button";
    btnEl.setAttribute("aria-haspopup", "listbox");
    btnEl.setAttribute("aria-expanded", "false");
    btnEl.setAttribute("aria-labelledby", labelId);
    dropdownEl.appendChild(btnEl);

    const textEl = document.createElement("span");
    textEl.className = "challenge-status-text";
    btnEl.appendChild(textEl);

    const chevronEl = document.createElement("span");
    chevronEl.className = "challenge-status-chevron";
    chevronEl.setAttribute("aria-hidden", "true");
    chevronEl.textContent = "▾";
    btnEl.appendChild(chevronEl);

    const menuEl = document.createElement("div");
    menuEl.className = "challenge-status-menu";
    menuEl.setAttribute("role", "listbox");
    menuEl.setAttribute("aria-labelledby", labelId);
    dropdownEl.appendChild(menuEl);

    const options = [
      { value: "not_selected", label: "Not selected" },
      { value: "available", label: "Open to match" },
      { value: "unavailable", label: "Not playing this period" },
    ];
    const optionEls = options.map((option) => {
      const optionEl = document.createElement("button");
      optionEl.className = `challenge-status-option is-${option.value}`;
      optionEl.type = "button";
      optionEl.setAttribute("role", "option");
      optionEl.dataset.value = option.value;
      optionEl.textContent = option.label;
      menuEl.appendChild(optionEl);
      return optionEl;
    });

    const noteEl = document.createElement("div");
    noteEl.className = "challenge-status-note";
    card.appendChild(noteEl);

    const close = () => {
      btnEl.classList.remove("open");
      btnEl.setAttribute("aria-expanded", "false");
      menuEl.classList.remove("open");
    };
    const open = () => {
      const status = STATUS_COPY[currentStatus] || STATUS_COPY.not_selected;
      if (!status.editable || !periodAllowsManualStatus) return;
      closeAllDropdowns();
      btnEl.classList.add("open");
      btnEl.setAttribute("aria-expanded", "true");
      menuEl.classList.add("open");
    };
    const setStatus = (nextStatus, noteOverride) => {
      const statusValue = normalizeStatus(nextStatus);
      const status = STATUS_COPY[statusValue] || STATUS_COPY.not_selected;
      const editable = status.editable && periodAllowsManualStatus;
      currentStatus = statusValue;
      btnEl.classList.remove(
        "is-placeholder",
        "is-not_selected",
        "is-available",
        "is-unavailable",
        "is-scheduled",
        "is-played",
        "disabled"
      );
      btnEl.classList.add(`is-${status.tone}`);
      btnEl.classList.toggle("disabled", !editable);
      btnEl.disabled = !editable;
      btnEl.setAttribute("aria-disabled", editable ? "false" : "true");
      textEl.textContent = status.label;
      noteEl.textContent = noteOverride || (periodAllowsManualStatus ? status.note : "Status changes are closed for this period.");
      optionEls.forEach((optionEl) => {
        const active = String(optionEl.dataset.value || "") === statusValue;
        optionEl.classList.toggle("active", active);
        optionEl.setAttribute("aria-selected", active ? "true" : "false");
      });
      if (!editable) close();
    };

    btnEl.addEventListener("click", (event) => {
      event.stopPropagation();
      if (menuEl.classList.contains("open")) close();
      else open();
    });

    optionEls.forEach((optionEl) => {
      optionEl.addEventListener("click", async (event) => {
        event.stopPropagation();
        const previousStatus = currentStatus;
        const nextStatus = String(optionEl.dataset.value || "");
        if (nextStatus === previousStatus) {
          close();
          return;
        }
        if (
          nextStatus === "unavailable"
          && !window.confirm("Switch to Not playing this period? Pending Challenge requests for this period will be closed.")
        ) {
          close();
          return;
        }
        setStatus(nextStatus, "Saving...");
        close();
        try {
          const data = await apiJson(`${CHALLENGE_PERIODS_URL}/${encodeURIComponent(period.id)}/player-status`, {
            method: "PATCH",
            body: JSON.stringify({ status: nextStatus }),
          });
          const savedStatus = data?.period_player?.status || nextStatus;
          period.player_status = savedStatus;
          setStatus(savedStatus);
          refreshOpponentPanel(period.id);
        } catch (error) {
          setStatus(previousStatus, error?.message || "Failed to update status.");
        }
      });
    });

    setStatus(currentStatus);
    dropdowns.push({ close, setStatus });
    return card;
  }

  function createPeriodBand(period, timeContext) {
    const band = document.createElement("section");
    band.className = "challenge-period-band";
    band.dataset.challengePeriodId = String(period?.id || "");
    band.dataset.playerStatus = normalizeStatus(period?.player_status);

    const main = document.createElement("div");
    main.className = "challenge-period-main";
    band.appendChild(main);

    const titleRow = document.createElement("div");
    titleRow.className = "challenge-period-title-row";
    main.appendChild(titleRow);

    const title = document.createElement("div");
    title.className = "challenge-period-title";
    title.textContent = String(period?.name || period?.id || "Challenge period");
    titleRow.appendChild(title);

    const badge = document.createElement("span");
    badge.className = "challenge-period-badge";
    badge.textContent = PERIOD_STATUS_LABELS[period?.status] || String(period?.status || "");
    titleRow.appendChild(badge);

    const description = document.createElement("div");
    description.className = "challenge-period-description";
    description.textContent = String(period?.description || "Open rated challenge matches for players from different associations.");
    main.appendChild(description);

    const meta = document.createElement("div");
    meta.className = "challenge-period-meta";
    const timezone = getPlayerTimezone(timeContext);
    meta.appendChild(createMetaLine("Registration from:", createLocalDateNode(period?.planning_starts_at, timezone)));
    meta.appendChild(createMetaLine(
      "Playing days:",
      createLocalDateTimeRangeNode(period?.play_starts_at, period?.play_ends_at, timezone),
      createTimeContextMeta(timeContext)
    ));
    main.appendChild(meta);

    band.appendChild(createStatusDropdown(period, period?.player_status));
    return band;
  }

  function createOpponentsPanel(period) {
    const panel = document.createElement("section");
    panel.className = "challenge-opponents-panel";
    panel.dataset.challengePeriodOpponents = String(period?.id || "");

    const head = document.createElement("div");
    head.className = "challenge-opponents-head";
    panel.appendChild(head);

    const title = document.createElement("div");
    title.className = "challenge-opponents-title";
    title.textContent = "Open to match";
    head.appendChild(title);

    const count = document.createElement("div");
    count.className = "challenge-opponents-count";
    count.dataset.opponentsCount = "true";
    head.appendChild(count);

    const body = document.createElement("div");
    body.className = "challenge-opponents-body";
    body.dataset.opponentsBody = "true";
    panel.appendChild(body);

    opponentPanels.set(String(period?.id || ""), { period, panel });
    loadOpponentsForPeriod(period, panel);
    return panel;
  }

  async function renderChallenges() {
    setAlert("Loading...", false);
    dropdowns.splice(0, dropdowns.length);
    opponentPanels.clear();

    try {
      const data = await apiJson(PLAYER_CHALLENGE_PERIODS_URL, { method: "GET" });
      const periods = Array.isArray(data?.challenge_periods) ? data.challenge_periods : [];
      const timeContext = await enrichTimeContext(data?.player_time_context || { timezone: "UTC" });
      if (!periods.length) {
        setAlert("No open Challenge periods right now.", false);
        return;
      }
      contentEl.className = "challenges-list";
      contentEl.innerHTML = "";
      periods.forEach((period) => {
        const stack = document.createElement("div");
        stack.className = "challenge-period-stack";
        stack.appendChild(createPeriodBand(period, timeContext));
        stack.appendChild(createOpponentsPanel(period));
        contentEl.appendChild(stack);
      });
    } catch (error) {
      setAlert(error?.message || "Failed to load Challenge periods.", true);
    }
  }

  document.addEventListener("click", closeAllDropdowns);

  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape") closeAllDropdowns();
  });

  window.setChallengePeriodStatus = function (status) {
    const firstDropdown = dropdowns[0];
    if (!firstDropdown) return;
    const firstBand = contentEl.querySelector("[data-challenge-period-id]");
    if (firstBand) firstBand.dataset.playerStatus = normalizeStatus(status);
    firstDropdown.setStatus(status);
  };

  renderChallenges();
})();
</script>
