  function createPlayerSearchDropdown(initialValue, options, cfg = {}) {
    const maxMenuHeight = Number.isFinite(Number(cfg.maxMenuHeight)) ? Number(cfg.maxMenuHeight) : 280;
    const normalizedOptions = (Array.isArray(options) ? options : [])
      .map((option) => ({
        value: String(option?.value || option?.id || "").trim(),
        label: String(option?.label || option?.bga_nickname || option?.name || option?.value || "").trim(),
        flag: String(option?.flag || "").trim(),
      }))
      .filter((option) => option.value && option.label);
    let value = String(initialValue || "").trim();
    const root = document.createElement("div");
    root.className = "cp-dd";

    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "cp-dd-btn";
    const btnContent = document.createElement("span");
    btnContent.className = "cp-dd-btn-content";
    const chevron = document.createElement("span");
    chevron.className = "cp-dd-chevron";
    chevron.textContent = "▾";
    btn.appendChild(btnContent);
    btn.appendChild(chevron);

    const menu = document.createElement("div");
    menu.className = "cp-dd-menu";

    const searchWrap = document.createElement("div");
    searchWrap.className = "cp-dd-search";
    const searchInput = document.createElement("input");
    searchInput.type = "text";
    searchInput.placeholder = "Search player...";
    searchWrap.appendChild(searchInput);
    menu.appendChild(searchWrap);

    let filterQuery = "";
    const findOption = (nextValue) => normalizedOptions.find((option) => option.value === String(nextValue || "").trim()) || null;
    const renderButtonContent = () => {
      btnContent.innerHTML = "";
      const selected = findOption(value);
      if (!selected) {
        const placeholder = document.createElement("span");
        placeholder.style.color = "#999";
        placeholder.textContent = String(cfg.placeholderLabel || "Select player");
        btnContent.appendChild(placeholder);
        return;
      }
      if (selected.flag) {
        const img = document.createElement("img");
        img.className = "cp-dd-flag";
        img.src = selected.flag;
        img.alt = "";
        btnContent.appendChild(img);
      }
      const text = document.createElement("span");
      text.textContent = selected.label;
      btnContent.appendChild(text);
    };

    const createHint = (text) => {
      const hint = document.createElement("div");
      hint.className = "cp-dd-hint";
      hint.textContent = text;
      return hint;
    };

    const createOptionButton = (option) => {
      const optionBtn = document.createElement("button");
      optionBtn.type = "button";
      optionBtn.className = "cp-dd-option";
      optionBtn.dataset.value = option.value;
      if (option.flag) {
        const img = document.createElement("img");
        img.className = "cp-dd-flag";
        img.src = option.flag;
        img.alt = "";
        optionBtn.appendChild(img);
      }
      optionBtn.appendChild(document.createTextNode(option.label));
      optionBtn.classList.toggle("active", option.value === value);
      optionBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        setValue(option.value, true);
        close();
      });
      return optionBtn;
    };

    const renderMenuOptions = () => {
      menu.querySelectorAll(".cp-dd-option, .cp-dd-hint").forEach((node) => node.remove());
      const query = String(filterQuery || "").trim().toLowerCase();
      if (query.length < 2) {
        menu.appendChild(createHint("Type at least 2 characters to see players."));
        return;
      }
      const visibleOptions = normalizedOptions.filter((option) => option.label.toLowerCase().includes(query));
      if (!visibleOptions.length) {
        menu.appendChild(createHint("No players found."));
        return;
      }
      visibleOptions.slice(0, 80).forEach((option) => {
        menu.appendChild(createOptionButton(option));
      });
    };

    const close = () => {
      menu.classList.remove("open");
      menu.style.maxHeight = "0px";
      btn.classList.remove("open");
    };
    const open = () => {
      if (btn.disabled) return;
      closeAllDropdowns();
      filterQuery = "";
      searchInput.value = "";
      renderMenuOptions();
      menu.classList.add("open");
      menu.style.maxHeight = `${Math.min(menu.scrollHeight, maxMenuHeight)}px`;
      btn.classList.add("open");
      try {
        searchInput.focus({ preventScroll: true });
      } catch (_error) {
        searchInput.focus();
      }
    };
    const setValue = (nextValue, trigger) => {
      const selected = findOption(nextValue);
      if (!selected) return;
      value = selected.value;
      menu.querySelectorAll(".cp-dd-option").forEach((optionEl) => {
        optionEl.classList.toggle("active", String(optionEl.dataset.value || "") === value);
      });
      renderButtonContent();
      if (trigger && typeof cfg.onChange === "function") cfg.onChange(value);
    };
    const setDisabled = (isDisabled) => {
      btn.disabled = !!isDisabled;
      btn.classList.toggle("disabled", !!isDisabled);
      if (isDisabled) close();
    };

    searchInput.addEventListener("click", (event) => event.stopPropagation());
    searchInput.addEventListener("keydown", (event) => event.stopPropagation());
    searchInput.addEventListener("input", () => {
      filterQuery = String(searchInput.value || "");
      renderMenuOptions();
      menu.style.maxHeight = `${Math.min(menu.scrollHeight, maxMenuHeight)}px`;
    });
    btn.addEventListener("click", (event) => {
      event.stopPropagation();
      if (menu.classList.contains("open")) close();
      else open();
    });

    renderButtonContent();
    renderMenuOptions();
    root.appendChild(btn);
    root.appendChild(menu);
    setDisabled(!!cfg.disabled);

    const api = {
      root,
      close,
      getValue: () => value,
      setValue: (nextValue, trigger) => setValue(nextValue, !!trigger),
      setDisabled,
    };
    dropdowns.push(api);
    return api;
  }

  function openChallengeRequestForm(period, opponent, currentPlayer) {
    const overlay = document.createElement("div");
    overlay.className = "challenge-modal-overlay";
    const dialog = document.createElement("div");
    dialog.className = "challenge-modal";
    dialog.textContent = "Loading...";
    overlay.appendChild(dialog);
    document.body.appendChild(overlay);

    const closeModal = () => {
      overlay.remove();
      closeAllDropdowns();
    };
    overlay.addEventListener("click", (event) => {
      if (event.target === overlay) closeModal();
    });

    (async () => {
      const profiles = await fetchChallengeProfiles();
      const profileById = new Map(profiles.map((profile) => [String(profile.id || "").trim(), profile]));
      const currentPlayerId = String(currentPlayer?.player_id || "").trim();
      const opponentId = String(opponent?.player_id || "").trim();
      const hasInitialOpponent = Boolean(opponentId);
      const currentOption = profileById.get(currentPlayerId) || {
        id: currentPlayerId,
        label: getOpponentDisplayName(currentPlayer),
        flag: String(currentPlayer?.association?.flag || period?.player_time_context?.association_flag || "").trim(),
        timezone: String(currentPlayer?.association?.timezone || period?.player_time_context?.timezone || "UTC").trim(),
      };
      const opponentOption = hasInitialOpponent ? (profileById.get(opponentId) || {
        id: opponentId,
        value: opponentId,
        label: getOpponentDisplayName(opponent),
        flag: String(opponent?.association?.flag || "").trim(),
        timezone: String(opponent?.association?.timezone || "UTC").trim(),
      }) : null;
      const playerOptions = !hasInitialOpponent || profiles.some((profile) => profile.id === opponentId)
        ? profiles
        : profiles.concat(opponentOption);
      let selectedOpponent = opponentOption;

      dialog.innerHTML = "";
      const form = document.createElement("form");
      form.className = "challenge-request-form";
      form.noValidate = true;
      dialog.appendChild(form);

      const title = document.createElement("div");
      title.className = "challenge-request-title";
      title.textContent = "Invite to match";
      form.appendChild(title);

      const opponentDropdown = createPlayerSearchDropdown(opponentId, playerOptions, {
        placeholderLabel: "Select player",
        onChange: (nextValue) => {
          selectedOpponent = profileById.get(String(nextValue || "").trim()) || null;
          updateAllLocalTimes();
        },
      });
      addChallengeFormRow(form, "Opponent", opponentDropdown.root, { required: true });

      const minTime = toDatetimeLocalFromUtc(period?.play_starts_at);
      const maxTime = toDatetimeLocalFromUtc(period?.play_ends_at);
      const timeLocalRows = [];
      const createLocalLine = (player, timeUtc) => {
        const line = document.createElement("span");
        line.className = "challenge-request-local-line";
        if (player?.flag) {
          const flag = document.createElement("img");
          flag.className = "cp-dd-flag";
          flag.src = String(player.flag || "");
          flag.alt = "";
          line.appendChild(flag);
        }
        const text = document.createElement("span");
        text.textContent = formatLocalWeekdayClock(timeUtc, player?.timezone || "UTC") || "-";
        line.appendChild(text);
        return line;
      };
      const refreshLocalRow = (input, local) => {
        local.innerHTML = "";
        const timeUtc = toUtcIsoFromDatetimeLocal(input.value);
        if (!timeUtc) return;
        local.appendChild(createLocalLine(currentOption, timeUtc));
        if (selectedOpponent) {
          local.appendChild(createLocalLine(selectedOpponent, timeUtc));
        }
      };
      const updateAllLocalTimes = () => {
        timeLocalRows.forEach(({ input, local }) => refreshLocalRow(input, local));
      };
      const timeInputs = [1, 2, 3].map((number) => {
        const input = document.createElement("input");
        input.type = "datetime-local";
        input.min = minTime;
        input.max = maxTime;
        input.required = number === 1;
        const row = addChallengeFormRow(form, `Time option ${number}, UTC`, input, { required: number === 1 });
        const local = document.createElement("div");
        local.className = "challenge-request-local-time";
        row.appendChild(local);
        const refreshLocal = () => {
          refreshLocalRow(input, local);
        };
        input.addEventListener("input", refreshLocal);
        input.addEventListener("change", refreshLocal);
        timeLocalRows.push({ input, local });
        return input;
      });

      const formatWrap = document.createElement("div");
      formatWrap.className = "challenge-request-formats";
      const bo3Input = document.createElement("input");
      bo3Input.type = "checkbox";
      bo3Input.checked = true;
      const bo5Input = document.createElement("input");
      bo5Input.type = "checkbox";
      bo5Input.checked = false;
      [
        { input: bo3Input, label: "Bo3" },
        { input: bo5Input, label: "Bo5" },
      ].forEach((item) => {
        const option = document.createElement("label");
        option.className = "challenge-format-option";
        option.appendChild(item.input);
        option.appendChild(document.createTextNode(item.label));
        formatWrap.appendChild(option);
      });
      addChallengeFormRow(form, "Format", formatWrap, { required: true });

      const message = document.createElement("div");
      message.className = "challenge-request-message";
      form.appendChild(message);

      const actions = document.createElement("div");
      actions.className = "challenge-request-actions";
      const submitBtn = document.createElement("button");
      submitBtn.type = "submit";
      submitBtn.className = "challenge-btn challenge-btn-primary";
      submitBtn.textContent = "Send invite";
      const cancelBtn = document.createElement("button");
      cancelBtn.type = "button";
      cancelBtn.className = "challenge-btn challenge-btn-secondary";
      cancelBtn.textContent = "Cancel";
      actions.appendChild(submitBtn);
      actions.appendChild(cancelBtn);
      form.appendChild(actions);

      const setMessage = (text, tone) => {
        message.className = `challenge-request-message${tone ? ` is-${tone}` : ""}`;
        message.textContent = text || "";
      };
      const formatRequestErrorMessage = (error) => {
        const baseMessage = String(error?.message || "Failed to send invite.").trim();
        if (baseMessage === "Time options must be within the Challenge playing window") {
          const playingWindow = formatUtcPlayingWindow(period);
          return playingWindow ? `${baseMessage}\n${playingWindow}` : baseMessage;
        }
        return baseMessage;
      };
      const setSaving = (isSaving) => {
        submitBtn.disabled = !!isSaving;
        cancelBtn.disabled = !!isSaving;
        opponentDropdown.setDisabled(!!isSaving);
        timeInputs.forEach((input) => {
          input.disabled = !!isSaving;
        });
        bo3Input.disabled = !!isSaving;
        bo5Input.disabled = !!isSaving;
      };

      cancelBtn.addEventListener("click", closeModal);
      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const player2Id = opponentDropdown.getValue();
        const timeOptionValues = timeInputs.map((input) => toUtcIsoFromDatetimeLocal(input.value));
        if (!player2Id) {
          setMessage("Choose an opponent.", "error");
          return;
        }
        if (player2Id === currentPlayerId) {
          setMessage("Choose a different opponent.", "error");
          return;
        }
        if (!timeOptionValues[0]) {
          setMessage("First time option is required.", "error");
          return;
        }
        if (timeOptionValues[2] && !timeOptionValues[1]) {
          setMessage("Second time option is required before adding a third option.", "error");
          return;
        }
        const filledTimes = timeOptionValues.filter(Boolean);
        if (new Set(filledTimes).size !== filledTimes.length) {
          setMessage("Time options must be unique.", "error");
          return;
        }
        if (!bo3Input.checked && !bo5Input.checked) {
          setMessage("Choose at least one match format.", "error");
          return;
        }

        setSaving(true);
        setMessage("Sending invite...", "");
        try {
          await apiJson(`${CHALLENGE_PERIODS_URL}/${encodeURIComponent(String(period?.id || ""))}/requests`, {
            method: "POST",
            body: JSON.stringify({
              player_2_id: player2Id,
              time_option_1_utc: timeOptionValues[0],
              time_option_2_utc: timeOptionValues[1] || null,
              time_option_3_utc: timeOptionValues[2] || null,
              allows_bo3: bo3Input.checked,
              allows_bo5: bo5Input.checked,
            }),
          });
          notifyChallengeProgress("request_created");
          setMessage("Request sent.", "success");
          refreshRequestPanel(period?.id);
          refreshOpponentPanel(period?.id);
          window.setTimeout(closeModal, 700);
        } catch (error) {
          setSaving(false);
          setMessage(formatRequestErrorMessage(error), "error");
        }
      });
    })().catch((error) => {
      dialog.innerHTML = "";
      const text = document.createElement("div");
      text.className = "challenge-request-message is-error";
      text.textContent = error?.message || "Failed to load request form.";
      dialog.appendChild(text);
    });
