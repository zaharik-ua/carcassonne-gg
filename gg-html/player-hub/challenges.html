<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --text: #222;
    --muted: #666;
    --border: #e0e0e0;
    --card: #fff;
  }

  body {
    font-family: "Montserrat", sans-serif;
  }

  .challenges-wrap {
    display: grid;
    gap: 10px;
    margin: 0 8px 12px;
  }

  .challenges-title {
    color: var(--text);
    font-size: 20px;
    font-weight: 700;
  }

  .challenges-card {
    display: grid;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    color: var(--text);
    font-size: 14px;
    line-height: 1.45;
  }

  .challenges-card p {
    margin: 0;
  }
</style>

<div class="challenges-wrap">
  <div class="challenges-title">Challenges</div>
  <div class="challenges-card">
    <p>Here you will be able to challenge other players to a rated Bo3 or Bo5 match.</p>
    <p>We plan to launch this closer to the end of WTCOC 2026.</p>
    <p>Follow the announcements on the website.</p>
  </div>
</div>
