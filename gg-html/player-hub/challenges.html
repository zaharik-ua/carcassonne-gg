      const availabilityTitle = document.createElement("div");
      availabilityTitle.className = "challenge-opponent-availability-title";
      availabilityTitle.textContent = `Can play (${timezone}):`;
      availabilityEl.appendChild(availabilityTitle);
      availability.forEach((range) => {
        const line = document.createElement("div");
        line.textContent = formatChallengeAvailabilityRange(range?.start_utc, range?.end_utc, timezone);
        availabilityEl.appendChild(line);
      });
      main.appendChild(availabilityEl);
    }

    const ratings = document.createElement("div");
    ratings.className = "challenge-opponent-ratings";
    row.appendChild(ratings);

    const ggLine = document.createElement("div");
    ggLine.className = "challenge-opponent-rating-line";
    ggLine.appendChild(createRatingLabel("GG Elo: "));
    ggLine.appendChild(createRatingValue(formatGgEloLine(opponent)));
    ratings.appendChild(ggLine);

    const bgaLine = document.createElement("div");
    bgaLine.className = "challenge-opponent-rating-line";
    bgaLine.appendChild(createRatingLabel("BGA Elo: "));
    bgaLine.appendChild(createRatingValue(formatEloValue(opponent?.bga_elo)));
    ratings.appendChild(bgaLine);

    if (isCurrentPlayer) {
      return row;
    }

    if (playerHasScheduledMatch) {
      return row;
    }

    const inviteBtn = document.createElement("button");
    inviteBtn.className = "challenge-opponent-action";
    inviteBtn.type = "button";
    inviteBtn.disabled = challengeAccess.bgaVerified && !canCreateRequests && !hasScheduledMatch;
    inviteBtn.textContent = window.matchMedia("(max-width: 720px)").matches ? "Invite" : "Invite to match";
    if (challengeAccess.bgaVerified && !canCreateRequests && !hasScheduledMatch) {
      inviteBtn.title = "Challenge requests are not available right now.";
    }
    inviteBtn.addEventListener("click", () => {
      if (inviteBtn.disabled) return;
      if (!challengeAccess.bgaVerified) {
        requireChallengeAccess(() => openChallengeRequestForm(period, opponent, {
          player_id: getCurrentUserProfileId(challengeAccess.user),
        }));
        return;
      }
      if (hasScheduledMatch) {
        showChallengeMatchScheduledDialog();
        return;
      }
      if (isSameAssociation) {
        showChallengeInfoDialog(
          "Invite unavailable",
          "Players from the same association cannot play a Challenge match."
        );
        return;
      }
      openChallengeRequestForm(period, opponent, currentPlayer);
    });
    row.appendChild(inviteBtn);

    return row;
  }

  function getEligibilityStateText(eligibility) {
    const reasons = Array.isArray(eligibility?.reasons) ? eligibility.reasons : [];
    if (reasons.includes("period_closed")) return "Requests closed for this period.";
    return "";
  }

  function setOpponentsState(panel, text, isError) {
    const countEl = panel.querySelector("[data-opponents-count]");
    const bodyEl = panel.querySelector("[data-opponents-body]");
    if (countEl) countEl.textContent = "";
    if (!bodyEl) return;
    bodyEl.innerHTML = "";
    const state = document.createElement("div");
    state.className = `challenge-opponents-state${isError ? " is-error" : ""}`;
    state.textContent = text;
    bodyEl.appendChild(state);
  }

  async function loadOpponentsForPeriod(period, panel) {
    const periodId = String(period?.id || "").trim();
    if (!periodId) {
      setOpponentsState(panel, "Challenge period is unavailable.", true);
      return;
    }

    setOpponentsState(panel, "Loading opponents...", false);
    try {
      const data = await apiJson(
        `${CHALLENGE_PERIODS_URL}/${encodeURIComponent(periodId)}/${ELIGIBLE_OPPONENTS_PATH}`,
        { method: "GET" }
      );
      const [ratingsById, bgaPlayersById] = await Promise.all([
        fetchGgRatingsById(),
        fetchBgaPlayersById(),
      ]);
      const opponents = (Array.isArray(data?.available_opponents) ? data.available_opponents : [])
        .map((opponent) => mergeOpponentRating(opponent, ratingsById))
        .map((opponent) => mergeOpponentBgaPlayer(opponent, bgaPlayersById))
        .sort(compareOpponentsByStatusUpdatedAt);
      const countEl = panel.querySelector("[data-opponents-count]");
      const bodyEl = panel.querySelector("[data-opponents-body]");
      if (countEl) {
        countEl.textContent = `${opponents.length} ${opponents.length === 1 ? "player" : "players"}`;
      }
      if (!bodyEl) return;
      bodyEl.innerHTML = "";

      const eligibilityText = getEligibilityStateText(data?.eligibility);
      if (eligibilityText) {
        const state = document.createElement("div");
        state.className = "challenge-opponents-state";
        state.textContent = eligibilityText;
        bodyEl.appendChild(state);
        return;
      }

      if (!opponents.length) {
        const state = document.createElement("div");
        state.className = "challenge-opponents-state";
        state.textContent = "No available opponents right now.";
        bodyEl.appendChild(state);
        return;
      }

      opponents.forEach((opponent) => {
        bodyEl.appendChild(createOpponentRow(opponent, period, data?.current_player || null, data?.eligibility || {}));
      });
    } catch (error) {
      setOpponentsState(panel, error?.message || "Failed to load opponents.", true);
    }
  }

  function refreshOpponentPanel(periodId) {
    const item = opponentPanels.get(String(periodId || ""));
    if (!item) return Promise.resolve();
    return loadOpponentsForPeriod(item.period, item.panel);
  }

  function setRequestsState(panel, text, isError) {
    const bodyEl = panel.querySelector("[data-requests-body]");
    if (!bodyEl) return;
    bodyEl.innerHTML = "";
    const state = document.createElement("div");
    state.className = `challenge-opponents-state${isError ? " is-error" : ""}`;
    state.textContent = text;
    bodyEl.appendChild(state);
  }

  async function patchChallengeRequestAction(period, request, action) {
    return apiJson(
      `${CHALLENGE_PERIODS_URL}/${encodeURIComponent(String(period?.id || ""))}/requests/${encodeURIComponent(String(request?.id || ""))}/${action}`,
      { method: "PATCH" }
    );
  }

  async function runChallengeRequestAction(period, request, action, button) {
    const previousText = button?.textContent || "";
    if (button) {
      button.disabled = true;
      button.textContent = "Saving...";
    }
    try {
      await patchChallengeRequestAction(period, request, action);
      refreshRequestPanel(period?.id);
      refreshOpponentPanel(period?.id);
    } catch (error) {
      window.alert(error?.message || "Request failed.");
      if (button) {
        button.disabled = false;
        button.textContent = previousText;
      }
    }
  }

  async function openDeclineRequestDialog(period, request, button) {
    const confirmed = await showChallengeConfirmDialog(
      "Decline request",
      "Are you sure you want to decline this Challenge request?",
      {
        note: "The request will be closed. Your opponent will need to send a new request if they still want to play.",
        confirmText: "Decline",
        confirmClassName: "challenge-btn-danger",
        cancelText: "Back",
      }
    );
    if (!confirmed) return;
    await runChallengeRequestAction(period, request, "decline", button);
  }

  async function openCancelChallengeMatchDialog(period, request) {
    const confirmed = await showChallengeConfirmDialog(
      "Cancel match",
      "Cancel this scheduled Challenge match?",
      {
        note: "If you have not agreed this with your opponent, they may file a complaint. This can result in a warning and may affect your future Challenge participation.",
        noteClassName: "is-warning",
        confirmText: "Cancel match",
        confirmClassName: "challenge-btn-danger",
        cancelText: "Back",
      }
    );
    if (!confirmed) return;
    try {
      await patchChallengeRequestAction(period, request, "cancel-match");
      renderChallenges();
    } catch (error) {
      showChallengeInfoDialog("Cancel match", error?.message || "Failed to cancel match.");
    }
  }

  function openCancelRequestDialog(period, request, options = {}) {
    const allowRemove = !!options.allowRemove;
    const refreshPanels = () => {
      refreshRequestPanel(period?.id);
      refreshOpponentPanel(period?.id);
    };
    const choices = [
      {
        text: "Cancel",
        className: "challenge-btn-danger",
        onClick: async () => {
          await patchChallengeRequestAction(period, request, "cancel");
          refreshPanels();
        },
      },
    ];
    if (allowRemove) {
      choices.push({
        text: "Cancel and Remove",
        className: "challenge-btn-danger",
        onClick: async () => {
          await patchChallengeRequestAction(period, request, "cancel");
          await patchChallengeRequestAction(period, request, "remove");
          refreshPanels();
        },
      });
    }
    choices.push({
      text: "Back",
      className: "challenge-btn-secondary",
      role: "close",
    });
    showChallengeChoiceDialog(
      "Cancel request",
      allowRemove
        ? "Cancel this request or cancel it and remove it from your Sent list."
        : "Cancel this request?",
      choices
    );
  }

  function createChallengeRequestCard(request, period, currentPlayerId, kind) {
    const adminView = kind === "admin";
    const card = document.createElement("div");
    card.className = "challenge-request-card";
    card.classList.toggle("is-removed", !!request?.hidden_by_creator_at);
    card.dataset.challengeRequestId = String(request?.id || "");

    const otherPlayer = getRequestOtherPlayer(request, currentPlayerId);
    const currentPlayer = getRequestPlayer(request, currentPlayerId);
    const timezone = currentPlayer?.association?.timezone || period?.player_time_context?.timezone || "UTC";
    const timeFlagSrc = currentPlayer?.association?.flag || period?.player_time_context?.association_flag || "";

    const head = document.createElement("div");
    head.className = "challenge-request-card-head";
    if (adminView) {
      head.appendChild(createRequestPlayerInline(request?.player_1 || { player_id: request?.player_1_id }));
      const separator = document.createElement("span");
      separator.textContent = "vs";
      head.appendChild(separator);
      head.appendChild(createRequestPlayerInline(request?.player_2 || { player_id: request?.player_2_id }));
    } else {
      const ggRank = parseFiniteNumber(otherPlayer?.gg_rank);
      if (ggRank !== null) {
        const rank = document.createElement("span");
        rank.className = "challenge-request-rank";
        rank.textContent = `#${Math.trunc(ggRank)}`;
        head.appendChild(rank);
      }
      head.appendChild(createRequestPlayerInline(otherPlayer));
      head.appendChild(createRequestRatingsRow(otherPlayer));
    }
    const status = document.createElement("span");
    const statusKey = String(request?.status || "").trim();
    const displayStatusKey = request?.hidden_by_creator_at ? "removed" : getRequestDisplayStatusKey(request);
    status.className = `challenge-request-status is-${displayStatusKey}`;
    status.textContent = getRequestStatusLabel(displayStatusKey);
    head.appendChild(status);
    card.appendChild(head);

    const meta = document.createElement("div");
    meta.className = "challenge-request-meta";
    meta.appendChild(createRequestOptionsRow(request, timezone, timeFlagSrc));
    card.appendChild(meta);

    if (adminView) return card;

    const canAct = String(request?.status || "") === "pending" && ["planning_open", "active"].includes(String(period?.status || ""));
    const isAwaitingCurrentPlayer = String(request?.awaiting_player_id || "") === String(currentPlayerId || "");
    const actions = document.createElement("div");
    actions.className = "challenge-request-actions-inline";
    if (canAct && isAwaitingCurrentPlayer) {
      actions.appendChild(createActionButton("Accept", "challenge-btn-primary", () => {
        openAcceptRequestForm(period, request, currentPlayerId);
      }));
      actions.appendChild(createActionButton("New time", "challenge-btn-secondary", () => {
        openCounterRequestForm(period, request, currentPlayerId);
      }));
      actions.appendChild(createActionButton("Decline", "challenge-btn-danger", (event) => {
        openDeclineRequestDialog(period, request, event.currentTarget);
      }));
    }
    if (canAct && !isAwaitingCurrentPlayer) {
      actions.appendChild(createActionButton("Cancel", "challenge-btn-danger", () => {
        openCancelRequestDialog(period, request, {
          allowRemove: kind === "sent" && String(request?.created_by_player_id || "") === String(currentPlayerId || ""),
        });
      }));
    }
    const isRequestParticipant = [request?.player_1_id, request?.player_2_id]
      .map((value) => String(value || ""))
      .includes(String(currentPlayerId || ""));
    const isCancelledChallengeMatch = ["cancelled_by_sender", "auto_cancelled"].includes(statusKey)
      && isRequestParticipant
      && String(request?.duel?.status || "") === "Cancelled";
    const canRemoveClosedRequest = isCancelledChallengeMatch
      ? canCurrentPlayerRemoveChallengeDuel(request, currentPlayerId)
      : (
        String(request?.created_by_player_id || "") === String(currentPlayerId || "")
        && ["declined", "cancelled_by_sender", "auto_cancelled", "expired"].includes(statusKey)
      );
    if (canRemoveClosedRequest) {
      actions.appendChild(createActionButton("Remove", "challenge-btn-danger", (event) => {
        runChallengeRequestAction(period, request, "remove", event.currentTarget);
      }));
    }
    if (actions.childNodes.length) {
      card.classList.add("has-actions");
      card.appendChild(actions);
    }
    return card;
  }

  function createRequestListSection(titleText, requests, period, currentPlayerId, kind, emptyText, countText, options = {}) {
    const section = document.createElement("div");
    section.className = "challenge-requests-section";

    const title = document.createElement("div");
    title.className = "challenge-request-list-title";
    const titleLabel = document.createElement("span");
    titleLabel.textContent = titleText;
    title.appendChild(titleLabel);
    if (countText || options.actionButton) {
      const titleActions = document.createElement("span");
      titleActions.className = "challenge-request-title-actions";
      const count = document.createElement("span");
      count.className = "challenge-request-list-count";
      count.textContent = countText || "";
      titleActions.appendChild(count);
      if (options.actionButton) {
        titleActions.appendChild(options.actionButton);
      }
      title.appendChild(titleActions);
    }
    section.appendChild(title);

    const list = document.createElement("div");
    list.className = "challenge-request-list";
    if (!requests.length) {
      const state = document.createElement("div");
      state.className = "challenge-opponents-state";
      state.textContent = emptyText;
      list.appendChild(state);
    } else {
      requests.forEach((request) => {
        list.appendChild(createChallengeRequestCard(request, period, currentPlayerId, kind));
      });
    }
    section.appendChild(list);
    return section;
  }

  function renderChallengeMatchPanel(period, currentPlayerId, requestOrRequests, options = {}) {
    const item = matchPanels.get(String(period?.id || ""));
    if (!item) return;
    const bodyEl = item.panel.querySelector("[data-match-body]");
    if (!bodyEl) return;
    const titleEl = item.panel.querySelector("[data-match-title]");
    if (titleEl) titleEl.textContent = options.readOnly ? "Matches" : "Match";
    bodyEl.innerHTML = "";
    const requests = Array.isArray(requestOrRequests) ? requestOrRequests : [requestOrRequests];
    const duelBlocks = requests
      .map((request) => createChallengeDuelBlock(request, period, currentPlayerId, options))
      .filter(Boolean);
    item.panel.dataset.challengeHasContent = duelBlocks.length ? "true" : "false";
    item.panel.hidden = !duelBlocks.length;
    duelBlocks.forEach((duelBlock) => bodyEl.appendChild(duelBlock));
  }

  function createNewChallengeRequestButton(period, currentPlayerId, pendingSentCount) {
    return createActionButton("Create request", "challenge-btn-primary", () => {
      const openRequest = () => {
        if (normalizeStatus(period?.player_status) === "match_scheduled" || period?.challenge_duel_id) {
          showChallengeMatchScheduledDialog();
          return;
        }
        if (pendingSentCount >= 3) {
          showChallengeInfoDialog(
            "Request limit reached",
            "You can send up to 3 match requests. Remove an already sent request to create a new one."
          );
          return;
        }
        openChallengeRequestForm(period, null, {
          player_id: currentPlayerId || getCurrentUserProfileId(challengeAccess.user),
        });
      };
      requireChallengeAccess(openRequest);
    });
  }

  function renderLockedChallengeRequests(period, panel) {
    const bodyEl = panel.querySelector("[data-requests-body]");
    if (!bodyEl) return;
    const isClosedPeriod = isClosedChallengePeriod(period);
    renderChallengeMatchPanel(period, "", null);
    bodyEl.innerHTML = "";
    setRequestPanelVisible(panel, !isClosedPeriod);
    if (isClosedPeriod) return;
    bodyEl.appendChild(createRequestListSection(
      "Incoming",
      [],
      period,
      "",
      "incoming",
      "No incoming requests.",
      ""
    ));
    bodyEl.appendChild(createRequestListSection(
      "Sent",
      [],
      period,
      "",
      "sent",
      "No sent invites.",
      "0 / 3 requests",
      { actionButton: createNewChallengeRequestButton(period, "", 0) }
    ));
  }

  async function loadRequestsForPeriod(period, panel) {
    const periodId = String(period?.id || "").trim();
    const requestGeneration = Number(panel?.dataset?.challengeRenderGeneration || renderGeneration);
    const requestAdminMode = adminMode;
    const requestIncludeRemovedItems = includeRemovedItems;
    if (!periodId) {
      setRequestsState(panel, "Challenge period is unavailable.", true);
      return;
    }
    if (!challengeAccess.bgaVerified) {
      renderLockedChallengeRequests(period, panel);
      return;
    }
    setRequestsState(panel, "Loading requests...", false);
    try {
      const params = new URLSearchParams();
      if (requestAdminMode) params.set("admin_mode", "1");
      if (requestAdminMode && requestIncludeRemovedItems) params.set("include_removed", "1");
      const requestsUrl = `${CHALLENGE_PERIODS_URL}/${encodeURIComponent(periodId)}/requests${params.size ? `?${params}` : ""}`;
      const data = await apiJson(requestsUrl, { method: "GET" });
      const [ratingsById, bgaPlayersById] = await Promise.all([
        fetchGgRatingsById(),
        fetchBgaPlayersById(),
      ]);
      if (requestGeneration !== renderGeneration) return;
      const bodyEl = panel.querySelector("[data-requests-body]");
      if (!bodyEl) return;
      const enrichRequestPlayer = (player, playerId) => mergeOpponentBgaPlayer(
        mergeOpponentRating({ player_id: playerId, ...(player || {}) }, ratingsById),
        bgaPlayersById
      );
      const enrichRequest = (request) => ({
        ...request,
        player_1: enrichRequestPlayer(request?.player_1, request?.player_1_id),
        player_2: enrichRequestPlayer(request?.player_2, request?.player_2_id),
      });
      const currentPlayerId = String(data?.player_id || "").trim();
      if (requestAdminMode) {
        const allRequests = (Array.isArray(data?.all_requests) ? data.all_requests : []).map(enrichRequest);
        const matches = (Array.isArray(data?.matches) ? data.matches : []).map(enrichRequest);
        renderChallengeMatchPanel(period, currentPlayerId, matches, { readOnly: true, adminView: true });
        setRequestPanelVisible(panel, !isClosedChallengePeriod(period) || allRequests.length > 0);
        bodyEl.innerHTML = "";
        if (!panel.hidden) {
          bodyEl.appendChild(createRequestListSection(
            "All requests",
            allRequests,
            period,
            currentPlayerId,
            "admin",
            requestIncludeRemovedItems ? "No requests, including removed items." : "No requests.",
            `${allRequests.length} total`
          ));
        }
        syncClosedPeriodDisclosure(period, {
          hasMatch: matchPanels.get(periodId)?.panel?.dataset.challengeHasContent === "true",
          hasRequests: allRequests.length > 0,
        });
        return;
      }
      const incoming = (Array.isArray(data?.incoming_requests) ? data.incoming_requests : [])
        .map(enrichRequest)
        .filter((request) => String(request?.created_by_player_id || "") !== currentPlayerId)
        .filter((request) => !isRemovedChallengeRequest(request));
      const sent = (Array.isArray(data?.sent_requests) ? data.sent_requests : [])
        .map(enrichRequest)
        .filter((request) => String(request?.created_by_player_id || "") === currentPlayerId)
        .filter((request) => !isRemovedChallengeRequest(request));
      const visibleRequests = incoming.concat(sent);
      const visibleChallengeDuelStatuses = new Set([
        "Draft",
        "Requested new time",
        "Planned",
        "In progress",
        "Done",
        "Error",
        "Cancelled",
      ]);
      const challengeDuelRequest = visibleRequests.find((request) => (
        hasVisibleChallengeMatch(request)
        && visibleChallengeDuelStatuses.has(String(request?.duel?.status || ""))
      )) || null;
      const isClosedPeriod = isClosedChallengePeriod(period);
      renderChallengeMatchPanel(period, currentPlayerId, challengeDuelRequest);
      setRequestPanelVisible(panel, !isClosedPeriod || visibleRequests.length > 0);
      const pendingSentCount = sent.filter((request) => String(request?.status || "") === "pending").length;
      const createRequestBtn = isClosedPeriod
        ? null
        : createNewChallengeRequestButton(period, currentPlayerId, pendingSentCount);
      bodyEl.innerHTML = "";
      if (panel.hidden) {
        syncClosedPeriodDisclosure(period, {
          hasMatch: matchPanels.get(periodId)?.panel?.dataset.challengeHasContent === "true",
          hasRequests: visibleRequests.length > 0,
        });
        return;
      }
      if (!isClosedPeriod) {
        bodyEl.appendChild(createRequestListSection(
          "Incoming",
          incoming,
          period,
          currentPlayerId,
          "incoming",
          "No incoming requests.",
          ""
        ));
        bodyEl.appendChild(createRequestListSection(
          "Sent",
          sent,
          period,
          currentPlayerId,
          "sent",
          "No sent invites.",
          `${pendingSentCount} / 3 requests`,
          createRequestBtn ? { actionButton: createRequestBtn } : {}
        ));
      } else if (visibleRequests.length > 0) {
        if (incoming.length) {
          bodyEl.appendChild(createRequestListSection("Incoming", incoming, period, currentPlayerId, "incoming", "No incoming requests.", ""));
        }
        if (sent.length) {
          bodyEl.appendChild(createRequestListSection(
            "Sent",
            sent,
            period,
            currentPlayerId,
            "sent",
            "No sent invites.",
            isClosedPeriod ? "" : `${pendingSentCount} / 3 requests`,
            createRequestBtn ? { actionButton: createRequestBtn } : {}
          ));
        }
      }
      syncClosedPeriodDisclosure(period, {
        hasMatch: matchPanels.get(periodId)?.panel?.dataset.challengeHasContent === "true",
        hasRequests: visibleRequests.length > 0,
      });
    } catch (error) {
      if (requestGeneration !== renderGeneration) return;
      renderChallengeMatchPanel(period, "", null);
      setRequestPanelVisible(panel, !isClosedChallengePeriod(period));
      syncClosedPeriodDisclosure(period, { hasMatch: false, hasRequests: false });
      setRequestsState(panel, error?.message || "Failed to load requests.", true);
    }
  }

  function refreshRequestPanel(periodId) {
    const item = requestPanels.get(String(periodId || ""));
    if (!item) return Promise.resolve();
    return loadRequestsForPeriod(item.period, item.panel);
  }

  async function periodHasOpenRequests(periodId) {
    const data = await apiJson(
      `${CHALLENGE_PERIODS_URL}/${encodeURIComponent(String(periodId || ""))}/requests`,
      { method: "GET" }
    );
    return [
      ...(Array.isArray(data?.incoming_requests) ? data.incoming_requests : []),
      ...(Array.isArray(data?.sent_requests) ? data.sent_requests : []),
    ].some((request) => String(request?.status || "").trim() === "pending");
  }

  function getChallengeLocalDateKey(value, timezone) {
    const date = value instanceof Date ? value : parseUtcDate(value);
    if (!date) return "";
    try {
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: timezone || "UTC",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
      }).formatToParts(date);
      const part = (type) => parts.find((item) => item.type === type)?.value || "";
      return `${part("year")}-${part("month")}-${part("day")}`;
    } catch (_error) {
      return "";
    }
  }

  function formatChallengeAvailabilityDay(value, timezone) {
    const date = value instanceof Date ? value : parseUtcDate(value);
    if (!date) return "";
    return new Intl.DateTimeFormat("en-US", {
      timeZone: timezone || "UTC",
      weekday: "short",
      month: "short",
      day: "numeric",
    }).format(date);
  }

  function formatChallengeAvailabilityClock(value, timezone) {
    const date = value instanceof Date ? value : parseUtcDate(value);
    if (!date) return "";
    const parts = new Intl.DateTimeFormat("en-GB", {
      timeZone: timezone || "UTC",
      hour: "2-digit",
      minute: "2-digit",
      hour12: false,
    }).formatToParts(date);
    const part = (type) => parts.find((item) => item.type === type)?.value || "";
    return `${part("hour")}:${part("minute")}`;
  }

  function getChallengeAvailabilityHour(value, timezone) {
    const clock = formatChallengeAvailabilityClock(value, timezone);
    const hour = Number.parseInt(clock.split(":")[0], 10);
    return Number.isInteger(hour) ? hour % 24 : 0;
  }

  function formatChallengeAvailabilityRange(startValue, endValue, timezone) {
    const start = startValue instanceof Date ? startValue : parseUtcDate(startValue);
    const end = endValue instanceof Date ? endValue : parseUtcDate(endValue);
    if (!start || !end) return "-";
    const dateFormatter = new Intl.DateTimeFormat("en-US", {
      timeZone: timezone || "UTC",
      weekday: "short",
      month: "short",
      day: "numeric",
    });
    const startText = `${dateFormatter.format(start)}, ${formatChallengeAvailabilityClock(start, timezone)}`;
    const endClock = formatChallengeAvailabilityClock(end, timezone);
    if (getChallengeLocalDateKey(start, timezone) === getChallengeLocalDateKey(end, timezone)) {
      return `${startText} – ${endClock}`;
    }
    return `${startText} – ${dateFormatter.format(end)}, ${endClock}`;
  }

  function buildChallengeAvailabilitySlots(period, timezone) {
    const start = parseUtcDate(period?.play_starts_at);
    const end = parseUtcDate(period?.play_ends_at);
    if (!start || !end) return [];
    const hourMs = 60 * 60 * 1000;
    const minuteMs = 60 * 1000;
    const slots = [];
    let firstWholeHour = Math.ceil(start.getTime() / minuteMs) * minuteMs;
    while (
      firstWholeHour < end.getTime()
      && !formatChallengeAvailabilityClock(new Date(firstWholeHour), timezone).endsWith(":00")
    ) {
      firstWholeHour += minuteMs;
    }
    for (let time = firstWholeHour; time + hourMs <= end.getTime(); time += hourMs) {
      const slotStart = new Date(time);
      const slotEnd = new Date(time + hourMs);
      const crossesDay = getChallengeLocalDateKey(slotStart, timezone) !== getChallengeLocalDateKey(slotEnd, timezone);
      slots.push({
        index: slots.length,
        start: slotStart,
        end: slotEnd,
        dayKey: getChallengeLocalDateKey(slotStart, timezone),
        dayLabel: formatChallengeAvailabilityDay(slotStart, timezone),
        label: `${formatChallengeAvailabilityClock(slotStart, timezone)}–${crossesDay ? "24:00" : formatChallengeAvailabilityClock(slotEnd, timezone)}`,
      });
    }
    return slots;
  }

  function openChallengeAvailabilityDialog(period, onSaved) {
    const timezone = getPlayerTimezone(period?.player_time_context);
    const slots = buildChallengeAvailabilitySlots(period, timezone);
    const hourHeight = 22;
    const calendarHeight = hourHeight * 24;
    const dayColumnWidth = window.matchMedia("(max-width: 720px)").matches ? 108 : 150;
    const minDayColumnWidth = Math.round(dayColumnWidth * 13 / 15);
    const dayGroups = [];
    slots.forEach((slot) => {
      let group = dayGroups[dayGroups.length - 1];
      if (!group || group.key !== slot.dayKey) {
        group = { key: slot.dayKey, label: slot.dayLabel, slots: [] };
        dayGroups.push(group);
      }
      group.slots.push(slot);
    });
    dayGroups.forEach((group) => {
      group.firstIndex = group.slots[0].index;
      group.endIndex = group.slots[group.slots.length - 1].index + 1;
      group.startHour = getChallengeAvailabilityHour(group.slots[0].start, timezone);
      const lastSlot = group.slots[group.slots.length - 1];
      group.endHour = getChallengeLocalDateKey(lastSlot.start, timezone) !== getChallengeLocalDateKey(lastSlot.end, timezone)
        ? 24
        : getChallengeAvailabilityHour(lastSlot.end, timezone);
      group.slotByHour = new Map(group.slots.map((slot) => [
        getChallengeAvailabilityHour(slot.start, timezone),
        slot,
      ]));
    });

    let ranges = (Array.isArray(period?.availability) ? period.availability : [])
      .map((range) => {
        const startMs = parseUtcDate(range?.start_utc)?.getTime();
        const endMs = parseUtcDate(range?.end_utc)?.getTime();
        const startIndex = slots.findIndex((slot) => slot.start.getTime() === startMs);
        const endSlotIndex = slots.findIndex((slot) => slot.end.getTime() === endMs);
        return startIndex >= 0 && endSlotIndex >= startIndex
          ? { start: startIndex, end: endSlotIndex + 1 }
          : null;
      })
      .filter(Boolean)
      .slice(0, 3);
    let selectedRangeIndex = null;
    let dragState = null;

    const overlay = document.createElement("div");
    overlay.className = "challenge-modal-overlay";
    const dialog = document.createElement("div");
    dialog.className = "challenge-modal challenge-availability-dialog";
    dialog.style.width = `min(calc(100vw - 32px), ${Math.min(1180, 92 + Math.max(dayGroups.length, 1) * dayColumnWidth)}px)`;
    dialog.tabIndex = -1;
    dialog.setAttribute("role", "dialog");
    dialog.setAttribute("aria-modal", "true");
    overlay.appendChild(dialog);

    const titleRow = document.createElement("div");
    titleRow.className = "challenge-availability-title-row";
    dialog.appendChild(titleRow);
    const title = document.createElement("div");
    title.className = "challenge-request-title";
    title.textContent = "When can you play?";
    titleRow.appendChild(title);
    const info = document.createElement("button");
    info.type = "button";
    info.className = "challenge-availability-info";
    info.setAttribute("aria-label", "How to select playing periods");
    info.textContent = "i";
    const infoTip = document.createElement("span");
    infoTip.className = "challenge-availability-info-tip";
    infoTip.textContent = "Choose the full period during which you can both start and finish a match. For example, if your period ends at 23:00, it means you plan to be unavailable after that — perhaps because it is bedtime. 🙂\nDrag up, down, or across days to create up to 3 playing periods.\nTo resize a period, drag its top or bottom edge.\nSelect a period, then press Delete or tap × to remove it.";
    info.appendChild(infoTip);
    titleRow.appendChild(info);

    const calendarShell = document.createElement("div");
    calendarShell.className = "challenge-calendar-shell";
    dialog.appendChild(calendarShell);
    const calendar = document.createElement("div");
    calendar.className = "challenge-availability-calendar";
    calendarShell.appendChild(calendar);
    const previousDaysBtn = document.createElement("button");
    previousDaysBtn.type = "button";
    previousDaysBtn.className = "challenge-calendar-scroll-btn is-prev";
    previousDaysBtn.setAttribute("aria-label", "Scroll to previous days");
    previousDaysBtn.textContent = "‹";
    calendarShell.appendChild(previousDaysBtn);
    const nextDaysBtn = document.createElement("button");
    nextDaysBtn.type = "button";
    nextDaysBtn.className = "challenge-calendar-scroll-btn is-next";
    nextDaysBtn.setAttribute("aria-label", "Scroll to next days");
    nextDaysBtn.textContent = "›";
    calendarShell.appendChild(nextDaysBtn);
    const updateCalendarScrollButtons = () => {
      const maxScrollLeft = Math.max(0, calendar.scrollWidth - calendar.clientWidth);
      previousDaysBtn.disabled = calendar.scrollLeft <= 1;
      nextDaysBtn.disabled = calendar.scrollLeft >= maxScrollLeft - 1;
    };
    previousDaysBtn.addEventListener("click", () => {
      calendar.scrollBy({ left: -dayColumnWidth, behavior: "smooth" });
    });
    nextDaysBtn.addEventListener("click", () => {
      calendar.scrollBy({ left: dayColumnWidth, behavior: "smooth" });
    });
    calendar.addEventListener("scroll", updateCalendarScrollButtons, { passive: true });
    const calendarInner = document.createElement("div");
    calendarInner.className = "challenge-calendar-inner";
    calendarInner.style.minWidth = `${56 + Math.max(dayGroups.length, 1) * dayColumnWidth}px`;
    calendar.appendChild(calendarInner);

    const header = document.createElement("div");
    header.className = "challenge-calendar-header";
    calendarInner.appendChild(header);
    const headerSpacer = document.createElement("div");
    headerSpacer.className = "challenge-calendar-header-spacer";
    header.appendChild(headerSpacer);
    const dayHeaders = document.createElement("div");
    dayHeaders.className = "challenge-calendar-day-headers";
    dayHeaders.style.gridTemplateColumns = `repeat(${Math.max(dayGroups.length, 1)}, minmax(${minDayColumnWidth}px, ${dayColumnWidth}px))`;
    header.appendChild(dayHeaders);
    dayGroups.forEach((group) => {
      const dayHeader = document.createElement("div");
      dayHeader.className = "challenge-calendar-day-header";
      dayHeader.textContent = group.label;
      dayHeaders.appendChild(dayHeader);
    });

    const body = document.createElement("div");
    body.className = "challenge-calendar-body";
    calendarInner.appendChild(body);
    const times = document.createElement("div");
    times.className = "challenge-calendar-times";
    body.appendChild(times);
    for (let hour = 1; hour < 24; hour += 1) {
      const label = document.createElement("div");
      label.className = "challenge-calendar-time-label";
      label.style.top = `${hour * hourHeight}px`;
      label.textContent = `${String(hour).padStart(2, "0")}:00`;
      times.appendChild(label);
    }

    const dayColumns = document.createElement("div");
    dayColumns.className = "challenge-calendar-day-columns";
    dayColumns.style.gridTemplateColumns = `repeat(${Math.max(dayGroups.length, 1)}, minmax(${minDayColumnWidth}px, ${dayColumnWidth}px))`;
    body.appendChild(dayColumns);
    const columns = [];
    const eventLayers = [];

    const calendarFooter = document.createElement("div");
    calendarFooter.className = "challenge-calendar-footer";
    dialog.appendChild(calendarFooter);
    const timezoneNote = document.createElement("div");
    timezoneNote.className = "challenge-calendar-timezone";
    timezoneNote.textContent = `Times in ${timezone}`;
    calendarFooter.appendChild(timezoneNote);
    const message = document.createElement("div");
    message.className = "challenge-request-message";
    calendarFooter.appendChild(message);

    const actions = document.createElement("div");
    actions.className = "challenge-info-actions";
    const cancelBtn = document.createElement("button");
    cancelBtn.type = "button";
    cancelBtn.className = "challenge-btn challenge-btn-secondary";
    cancelBtn.textContent = "Cancel";
    const saveBtn = document.createElement("button");
    saveBtn.type = "button";
    saveBtn.className = "challenge-btn challenge-btn-primary";
    saveBtn.textContent = "Save playing times";
    actions.appendChild(cancelBtn);
    actions.appendChild(saveBtn);
    dialog.appendChild(actions);

    const setMessage = (text, tone) => {
      message.className = `challenge-request-message${tone ? ` is-${tone}` : ""}`;
      message.textContent = text || "";
    };
    const rangesOverlap = (left, right) => left.start < right.end && right.start < left.end;
    const getPreviewRange = () => {
      if (!dragState) return null;
      if (dragState.type === "create") {
        if (dragState.anchor === dragState.current) {
          return { start: dragState.fallbackSlotIndex, end: dragState.fallbackSlotIndex + 1 };
        }
        return {
          start: Math.min(dragState.anchor, dragState.current),
          end: Math.max(dragState.anchor, dragState.current),
        };
      }
      const original = ranges[dragState.rangeIndex];
      if (!original) return null;
      if (dragState.type === "resize-start") {
        return { start: Math.min(dragState.current, original.end - 1), end: original.end };
      }
      return { start: original.start, end: Math.max(dragState.current, original.start + 1) };
    };
    const getBoundaryFromPoint = (clientX, clientY) => {
      if (!columns.length) return null;
      let dayIndex = columns.findIndex((column) => {
        const rect = column.getBoundingClientRect();
        return clientX >= rect.left && clientX <= rect.right;
      });
      if (dayIndex < 0) {
        const firstRect = columns[0].getBoundingClientRect();
        dayIndex = clientX < firstRect.left ? 0 : columns.length - 1;
      }
      const columnRect = columns[dayIndex].getBoundingClientRect();
      const group = dayGroups[dayIndex];
      const rawHour = Math.round(Math.max(0, Math.min(calendarHeight, clientY - columnRect.top)) / hourHeight);
      const hour = Math.max(group.startHour, Math.min(group.endHour, rawHour));
      return group.firstIndex + (hour - group.startHour);
    };
    const removeRange = (rangeIndex) => {
      if (!Number.isInteger(rangeIndex) || !ranges[rangeIndex]) return;
      ranges.splice(rangeIndex, 1);
      selectedRangeIndex = null;
      setMessage("", "");
      renderSelection();
    };
    const startResize = (event, rangeIndex, type) => {
      if (event.button !== undefined && event.button !== 0) return;
      event.preventDefault();
      event.stopPropagation();
      selectedRangeIndex = rangeIndex;
      const range = ranges[rangeIndex];
      dragState = {
        type,
        rangeIndex,
        current: type === "resize-start" ? range.start : range.end,
      };
      setMessage("", "");
      renderSelection();
    };

    const renderRange = (range, rangeIndex, options = {}) => {
      if (!range || range.start < 0 || range.end > slots.length || range.start >= range.end) return;
      dayGroups.forEach((group, dayIndex) => {
        const segmentStart = Math.max(range.start, group.firstIndex);
        const segmentEnd = Math.min(range.end, group.endIndex);
        if (segmentStart >= segmentEnd) return;
        const startHour = group.startHour + (segmentStart - group.firstIndex);
        const endHour = group.startHour + (segmentEnd - group.firstIndex);
        const eventEl = document.createElement("div");
        eventEl.className = `challenge-calendar-event is-range-${Math.min(rangeIndex + 1, 3)}${options.preview ? " is-preview" : ""}${!options.preview && selectedRangeIndex === rangeIndex ? " is-selected" : ""}`;
        eventEl.style.top = `${startHour * hourHeight}px`;
        eventEl.style.height = `${(endHour - startHour) * hourHeight}px`;
        const label = document.createElement("div");
        label.className = "challenge-calendar-event-label";
        label.textContent = `${String(startHour).padStart(2, "0")}:00–${String(endHour).padStart(2, "0")}:00`;
        eventEl.appendChild(label);

        if (!options.preview) {
          eventEl.addEventListener("click", (event) => {
            event.stopPropagation();
            selectedRangeIndex = rangeIndex;
            setMessage("", "");
            renderSelection();
          });
          if (selectedRangeIndex === rangeIndex) {
            const deleteBtn = document.createElement("button");
            deleteBtn.type = "button";
            deleteBtn.className = "challenge-calendar-delete";
            deleteBtn.setAttribute("aria-label", "Delete playing period");
            deleteBtn.textContent = "×";
            deleteBtn.addEventListener("click", (event) => {
              event.stopPropagation();
              removeRange(rangeIndex);
            });
            eventEl.appendChild(deleteBtn);
          }
          if (segmentStart === range.start) {
            const startHandle = document.createElement("div");
            startHandle.className = "challenge-calendar-resize-handle is-start";
            startHandle.addEventListener("pointerdown", (event) => startResize(event, rangeIndex, "resize-start"));
            eventEl.appendChild(startHandle);
          }
          if (segmentEnd === range.end) {
            const endHandle = document.createElement("div");
            endHandle.className = "challenge-calendar-resize-handle is-end";
            endHandle.addEventListener("pointerdown", (event) => startResize(event, rangeIndex, "resize-end"));
            eventEl.appendChild(endHandle);
          }
        }
        eventLayers[dayIndex].appendChild(eventEl);
      });
    };

    const renderSelection = () => {
      eventLayers.forEach((layer) => {
        layer.innerHTML = "";
      });
      const preview = getPreviewRange();
      ranges.forEach((range, rangeIndex) => {
        if (dragState?.type?.startsWith("resize") && dragState.rangeIndex === rangeIndex) return;
        renderRange(range, rangeIndex);
      });
      if (preview) {
        const previewIndex = dragState?.type === "create" ? ranges.length : dragState.rangeIndex;
        renderRange(preview, previewIndex, { preview: true });
      }
    };

    dayGroups.forEach((group) => {
      const column = document.createElement("div");
      column.className = "challenge-calendar-day-column";
      columns.push(column);
      for (let hour = 0; hour < 24; hour += 1) {
        const cell = document.createElement("div");
        const slot = group.slotByHour.get(hour) || null;
        cell.className = `challenge-calendar-hour-cell${slot ? "" : " is-blocked"}`;
        cell.style.top = `${hour * hourHeight}px`;
        if (slot) {
          cell.dataset.slotIndex = String(slot.index);
          cell.addEventListener("pointerdown", (event) => {
            if (event.button !== undefined && event.button !== 0) return;
            event.preventDefault();
            selectedRangeIndex = null;
            dragState = {
              type: "create",
              anchor: slot.index,
              current: slot.index,
              fallbackSlotIndex: slot.index,
            };
            setMessage("", "");
            renderSelection();
          });
        }
        column.appendChild(cell);
      }
      const eventLayer = document.createElement("div");
      eventLayer.className = "challenge-calendar-event-layer";
      eventLayers.push(eventLayer);
      column.appendChild(eventLayer);
      dayColumns.appendChild(column);
    });

    const onPointerMove = (event) => {
      if (!dragState) return;
      const boundary = getBoundaryFromPoint(event.clientX, event.clientY);
      if (boundary === null || boundary === dragState.current) return;
      dragState.current = boundary;
      renderSelection();
    };
    const onPointerUp = () => {
      if (!dragState) return;
      const completedDrag = dragState;
      const nextRange = getPreviewRange();
      dragState = null;
      if (!nextRange) {
        renderSelection();
        return;
      }
      const otherRanges = ranges.filter((_range, index) => index !== completedDrag.rangeIndex);
      if (completedDrag.type === "create" && ranges.length >= 3) {
        setMessage(
          window.matchMedia("(max-width: 720px)").matches
            ? "Up to 3 playing periods."
            : "You can select up to 3 playing periods.",
          "error"
        );
      } else if (otherRanges.some((range) => rangesOverlap(range, nextRange))) {
        setMessage("Playing periods cannot overlap.", "error");
      } else {
        if (completedDrag.type === "create") ranges.push(nextRange);
        else ranges[completedDrag.rangeIndex] = nextRange;
        ranges.sort((left, right) => left.start - right.start);
        selectedRangeIndex = ranges.findIndex((range) => range.start === nextRange.start && range.end === nextRange.end);
      }
      renderSelection();
    };
    const onKeyDown = (event) => {
      if ((event.key === "Delete" || event.key === "Backspace") && selectedRangeIndex !== null) {
        event.preventDefault();
        removeRange(selectedRangeIndex);
      }
    };
    document.addEventListener("pointermove", onPointerMove);
    document.addEventListener("pointerup", onPointerUp);
    document.addEventListener("keydown", onKeyDown);

    const closeModal = () => {
      document.removeEventListener("pointermove", onPointerMove);
      document.removeEventListener("pointerup", onPointerUp);
      document.removeEventListener("keydown", onKeyDown);
      overlay.remove();
    };
    cancelBtn.addEventListener("click", closeModal);
    overlay.addEventListener("click", (event) => {
      if (event.target === overlay) closeModal();
    });
    saveBtn.addEventListener("click", async () => {
      saveBtn.disabled = true;
      cancelBtn.disabled = true;
      setMessage("Saving...", "");
      try {
        const availability = ranges.map((range) => ({
          start_utc: slots[range.start].start.toISOString(),
          end_utc: slots[range.end - 1].end.toISOString(),
        }));
        const data = await apiJson(`${CHALLENGE_PERIODS_URL}/${encodeURIComponent(String(period?.id || ""))}/player-availability`, {
          method: "PATCH",
          body: JSON.stringify({ availability }),
        });
        period.availability = Array.isArray(data?.period_player?.availability)
          ? data.period_player.availability
          : availability;
        if (typeof onSaved === "function") onSaved(period.availability);
        refreshOpponentPanel(period?.id);
        closeModal();
      } catch (error) {
        saveBtn.disabled = false;
        cancelBtn.disabled = false;
        setMessage(error?.message || "Failed to save playing periods.", "error");
      }
    });

    if (!slots.length) {
      setMessage("This Challenge period has no complete hourly slots.", "error");
      saveBtn.disabled = true;
    }
    renderSelection();
    document.body.appendChild(overlay);
    window.requestAnimationFrame(updateCalendarScrollButtons);
    dialog.focus({ preventScroll: true });
  }

  function createStatusDropdown(period, initialStatus) {
    let currentStatus = normalizeStatus(initialStatus);
    const periodAllowsManualStatus = ["planning_open", "active"].includes(String(period?.status || "").trim());
    const labelId = `challengeStatusLabel-${String(period.id || "").replace(/[^A-Za-z0-9_-]/g, "-")}`;

    const card = document.createElement("div");
    card.className = "challenge-status-card";

    const label = document.createElement("div");
    label.className = "challenge-status-label";
    label.id = labelId;
    label.textContent = "Your period status";
    card.appendChild(label);

    const dropdownEl = document.createElement("div");
    dropdownEl.className = "challenge-status-dd";
    card.appendChild(dropdownEl);

    const btnEl = document.createElement("button");
    btnEl.className = "challenge-status-btn";
    btnEl.type = "button";
    btnEl.setAttribute("aria-haspopup", "listbox");
    btnEl.setAttribute("aria-expanded", "false");
    btnEl.setAttribute("aria-labelledby", labelId);
    dropdownEl.appendChild(btnEl);

    const textEl = document.createElement("span");
    textEl.className = "challenge-status-text";
    btnEl.appendChild(textEl);

    const chevronEl = document.createElement("span");
    chevronEl.className = "challenge-status-chevron";
    chevronEl.setAttribute("aria-hidden", "true");
    chevronEl.textContent = "▾";
    btnEl.appendChild(chevronEl);

    const menuEl = document.createElement("div");
    menuEl.className = "challenge-status-menu";
    menuEl.setAttribute("role", "listbox");
    menuEl.setAttribute("aria-labelledby", labelId);
    dropdownEl.appendChild(menuEl);

    const options = [
      { value: "not_selected", label: "Not selected" },
      { value: "available", label: "Open to match" },
      { value: "unavailable", label: "Not playing this period" },
    ];
    const optionEls = options.map((option) => {
      const optionEl = document.createElement("button");
      optionEl.className = `challenge-status-option is-${option.value}`;
      optionEl.type = "button";
      optionEl.setAttribute("role", "option");
      optionEl.dataset.value = option.value;
      optionEl.textContent = option.label;
      menuEl.appendChild(optionEl);
      return optionEl;
    });

    const noteEl = document.createElement("div");
    noteEl.className = "challenge-status-note";
    card.appendChild(noteEl);

    const availabilityBtn = document.createElement("button");
    availabilityBtn.type = "button";
    availabilityBtn.className = "challenge-btn challenge-btn-secondary challenge-availability-btn";
    card.appendChild(availabilityBtn);
    const updateAvailabilityButton = () => {
      const count = Array.isArray(period?.availability) ? period.availability.length : 0;
      availabilityBtn.textContent = count ? `Edit playing times (${count})` : "Set playing times";
    };
    availabilityBtn.addEventListener("click", () => {
      requireChallengeAccess(() => openChallengeAvailabilityDialog(period, updateAvailabilityButton));
    });

    const close = () => {
      btnEl.classList.remove("open");
      btnEl.setAttribute("aria-expanded", "false");
      menuEl.classList.remove("open");
    };
    const open = () => {
      const status = STATUS_COPY[currentStatus] || STATUS_COPY.not_selected;
      if (!status.editable || !periodAllowsManualStatus) return;
      closeAllDropdowns();
      btnEl.classList.add("open");
      btnEl.setAttribute("aria-expanded", "true");
      menuEl.classList.add("open");
    };
    const setStatus = (nextStatus, noteOverride) => {
      const statusValue = normalizeStatus(nextStatus);
      const status = STATUS_COPY[statusValue] || STATUS_COPY.not_selected;
      const editable = status.editable && periodAllowsManualStatus;
      currentStatus = statusValue;
      btnEl.classList.remove(
        "is-placeholder",
        "is-not_selected",
        "is-available",
        "is-unavailable",
        "is-scheduled",
        "is-played",
        "disabled"
      );
      btnEl.classList.add(`is-${status.tone}`);
      btnEl.classList.toggle("disabled", !editable);
      btnEl.disabled = !editable;
      btnEl.setAttribute("aria-disabled", editable ? "false" : "true");
      textEl.textContent = status.label;
      noteEl.textContent = noteOverride || (periodAllowsManualStatus
        ? status.note
        : String(period?.status || "") === "draft"
          ? "Status selection will open when the planning period starts."
          : "Status changes are closed for this period.");
      availabilityBtn.hidden = statusValue !== "available" || !periodAllowsManualStatus;
      updateAvailabilityButton();
      optionEls.forEach((optionEl) => {
        const active = String(optionEl.dataset.value || "") === statusValue;
        optionEl.classList.toggle("active", active);
        optionEl.setAttribute("aria-selected", active ? "true" : "false");
      });
      if (!editable) close();
    };

    btnEl.addEventListener("click", (event) => {
      event.stopPropagation();
      if (menuEl.classList.contains("open")) close();
      else open();
    });

    optionEls.forEach((optionEl) => {
      optionEl.addEventListener("click", async (event) => {
        event.stopPropagation();
        const previousStatus = currentStatus;
        const nextStatus = String(optionEl.dataset.value || "");
        if (nextStatus === previousStatus) {
          close();
          return;
        }
        close();
        if (!challengeAccess.bgaVerified) {
          requireChallengeAccess(() => optionEl.click());
          return;
        }
        if (nextStatus === "unavailable") {
          setStatus(previousStatus, "Checking open requests...");
          let hasOpenRequests = false;
          try {
            hasOpenRequests = await periodHasOpenRequests(period.id);
          } catch (error) {
            setStatus(previousStatus, error?.message || "Failed to check open requests.");
            return;
          }
          if (hasOpenRequests) {
            const confirmed = await showChallengeConfirmDialog(
              "Not playing this period",
              "You have open Challenge requests in this period. Changing your status will close all of them.",
              {
                note: "This includes both incoming and sent requests.",
                confirmText: "Change status",
                confirmClassName: "challenge-btn-danger",
                cancelText: "Back",
              }
            );
            if (!confirmed) {
              setStatus(previousStatus);
              return;
            }
          }
        }
        setStatus(nextStatus, "Saving...");
        try {
          const data = await apiJson(`${CHALLENGE_PERIODS_URL}/${encodeURIComponent(period.id)}/player-status`, {
            method: "PATCH",
            body: JSON.stringify({ status: nextStatus }),
          });
          const savedStatus = data?.period_player?.status || nextStatus;
          period.player_status = savedStatus;
          setStatus(savedStatus);
          await Promise.all([
            refreshRequestPanel(period.id),
            refreshOpponentPanel(period.id),
          ]);
        } catch (error) {
          setStatus(previousStatus, error?.message || "Failed to update status.");
        }
      });
    });

    setStatus(currentStatus);
    dropdowns.push({ close, setStatus });
    return card;
  }

  function createPeriodBand(period, timeContext) {
    const isClosedPeriod = isClosedChallengePeriod(period);
    const band = document.createElement("section");
    band.className = "challenge-period-band";
    band.classList.toggle("is-closed", isClosedPeriod);
    band.dataset.challengePeriodId = String(period?.id || "");
    band.dataset.playerStatus = normalizeStatus(period?.player_status);

    const main = document.createElement("div");
    main.className = "challenge-period-main";
    band.appendChild(main);

    const titleRow = document.createElement("div");
    titleRow.className = "challenge-period-title-row";
    main.appendChild(titleRow);

    const iconSrc = String(period?.logo || "").trim();
    if (iconSrc) {
      const icon = document.createElement("img");
      icon.className = "challenge-period-icon";
      icon.src = iconSrc;
      icon.alt = "";
      titleRow.appendChild(icon);
    }

    const title = document.createElement("div");
    title.className = "challenge-period-title";
    title.textContent = String(period?.name || period?.id || "Challenge period");
    titleRow.appendChild(title);

    const badge = document.createElement("span");
    badge.className = "challenge-period-badge";
    badge.classList.toggle("is-closed", isClosedPeriod);
    badge.textContent = PERIOD_STATUS_LABELS[period?.status] || String(period?.status || "");
    titleRow.appendChild(badge);

    if (isClosedPeriod) {
      const toggle = document.createElement("button");
      toggle.type = "button";
      toggle.className = "challenge-period-toggle";
      toggle.hidden = true;
      toggle.dataset.challengePeriodToggle = "true";
      toggle.setAttribute("aria-expanded", "false");
      toggle.setAttribute("aria-label", "Show Match and Requests");
      toggle.title = "Show Match and Requests";
      const toggleIcon = document.createElement("span");
      toggleIcon.className = "challenge-period-toggle-icon";
      toggleIcon.setAttribute("aria-hidden", "true");
      toggleIcon.textContent = "▾";
      toggle.appendChild(toggleIcon);
      toggle.addEventListener("click", (event) => {
        event.stopPropagation();
        toggleClosedPeriodDisclosure(period?.id);
      });
      titleRow.appendChild(toggle);
    }

    const descriptionText = String(period?.description || "").trim();
    if (descriptionText) {
      const description = document.createElement("div");
      description.className = "challenge-period-description";
      description.textContent = descriptionText;
      main.appendChild(description);
    }

    if (!isClosedPeriod) {
      const meta = document.createElement("div");
      meta.className = "challenge-period-meta";
      const timezone = getPlayerTimezone(timeContext);
      meta.appendChild(createMetaLine("Registration from:", createLocalDateNode(period?.planning_starts_at, "UTC")));
      meta.appendChild(createMetaLine(
        "Playing days:",
        createLocalDateTimeRangeNode(period?.play_starts_at, period?.play_ends_at, timezone),
        createTimeContextMeta(timeContext)
      ));
      main.appendChild(meta);

      band.appendChild(createStatusDropdown(period, period?.player_status));
    }
    return band;
  }

  function createOpponentsPanel(period) {
    const wrap = document.createElement("div");
    wrap.className = "challenge-panel-wrap";
    wrap.dataset.challengePeriodOpponents = String(period?.id || "");

    const head = document.createElement("div");
    head.className = "challenge-opponents-head";
    wrap.appendChild(head);

    const title = document.createElement("div");
    title.className = "challenge-opponents-title";
    title.textContent = "Open to match";
    head.appendChild(title);

    const count = document.createElement("div");
    count.className = "challenge-opponents-count";
    count.dataset.opponentsCount = "true";
    head.appendChild(count);

    const panel = document.createElement("section");
    panel.className = "challenge-opponents-panel";
    wrap.appendChild(panel);

    const body = document.createElement("div");
    body.className = "challenge-opponents-body";
    body.dataset.opponentsBody = "true";
    panel.appendChild(body);

    opponentPanels.set(String(period?.id || ""), { period, panel: wrap });
    loadOpponentsForPeriod(period, wrap);
    return wrap;
  }

  function createChallengeMatchPanel(period) {
    const wrap = document.createElement("div");
    wrap.className = "challenge-panel-wrap";
    wrap.dataset.challengePeriodMatch = String(period?.id || "");
    wrap.hidden = true;

    const head = document.createElement("div");
    head.className = "challenge-opponents-head";
    wrap.appendChild(head);

    const title = document.createElement("div");
    title.className = "challenge-opponents-title";
    title.dataset.matchTitle = "true";
    title.textContent = "Match";
    head.appendChild(title);

    const panel = document.createElement("section");
    panel.className = "challenge-requests-panel";
    wrap.appendChild(panel);

    const body = document.createElement("div");
    body.className = "challenge-requests-grid";
    body.dataset.matchBody = "true";
    panel.appendChild(body);

    matchPanels.set(String(period?.id || ""), { period, panel: wrap });
    return wrap;
  }

  function createRequestsPanel(period, options = {}) {
    const wrap = document.createElement("div");
    wrap.className = "challenge-panel-wrap";
    wrap.dataset.challengePeriodRequests = String(period?.id || "");
    wrap.dataset.challengeRenderGeneration = String(renderGeneration);
    wrap.hidden = !!options.hidden;

    const head = document.createElement("div");
    head.className = "challenge-opponents-head";
    wrap.appendChild(head);

    const title = document.createElement("div");
    title.className = "challenge-opponents-title";
    title.textContent = "Requests";
    head.appendChild(title);

    const panel = document.createElement("section");
    panel.className = "challenge-requests-panel";
    wrap.appendChild(panel);

    const body = document.createElement("div");
    body.className = "challenge-requests-grid";
    body.dataset.requestsBody = "true";
    panel.appendChild(body);

    requestPanels.set(String(period?.id || ""), { period, panel: wrap });
    loadRequestsForPeriod(period, wrap);
    return wrap;
  }

  async function renderChallenges() {
    const currentGeneration = ++renderGeneration;
    setAlert("Loading...", false);
    dropdowns.splice(0, dropdowns.length);
    opponentPanels.clear();
    matchPanels.clear();
    requestPanels.clear();

    try {
      const [data, currentUser] = await Promise.all([
        apiJson(PLAYER_CHALLENGE_PERIODS_URL, { method: "GET" }),
        fetchCurrentUser(),
      ]);
      if (currentGeneration !== renderGeneration) return;
      updateChallengeAccess(currentUser);
      isGlobalAdmin = currentUser?.isAdmin === true || Number(currentUser?.admin) === 1;
      if (!isGlobalAdmin) {
        adminMode = false;
        includeRemovedItems = false;
      }
      syncAdminControls();
      const periods = Array.isArray(data?.challenge_periods) ? data.challenge_periods : [];
      const timeContext = await enrichTimeContext(data?.player_time_context || { timezone: "UTC" });
      if (currentGeneration !== renderGeneration) return;
      if (!periods.length) {
        setAlert("No open Challenge periods right now.", false);
        return;
      }
      contentEl.className = "challenges-list";
      contentEl.innerHTML = "";
      periods.forEach((period) => {
        period.player_time_context = timeContext;
        const isClosedPeriod = isClosedChallengePeriod(period);
        const stack = document.createElement("div");
        stack.className = "challenge-period-stack";
        stack.dataset.challengePeriodStack = String(period?.id || "");
        if (isClosedPeriod) {
          stack.dataset.challengeClosedExpanded = "false";
          stack.dataset.challengeClosedHasMatch = "false";
          stack.dataset.challengeClosedHasRequests = "false";
        }
        stack.appendChild(createPeriodBand(period, timeContext));
        if (String(period?.status || "") !== "draft") {
          stack.appendChild(createChallengeMatchPanel(period));
          stack.appendChild(createRequestsPanel(period, { hidden: isClosedPeriod }));
          if (!isClosedPeriod) {
            stack.appendChild(createOpponentsPanel(period));
          }
        }
        contentEl.appendChild(stack);
      });
    } catch (error) {
      if (currentGeneration !== renderGeneration) return;
      setAlert(error?.message || "Failed to load Challenge periods.", true);
    }
  }

  document.addEventListener("click", closeAllDropdowns);

  adminModeInput.addEventListener("change", () => {
    adminMode = isGlobalAdmin && adminModeInput.checked;
    if (!adminMode) includeRemovedItems = false;
    syncAdminControls();
    renderChallenges();
  });

  removedItemsInput.addEventListener("change", () => {
    includeRemovedItems = adminMode && removedItemsInput.checked;
    renderChallenges();
  });

  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape") closeAllDropdowns();
  });

  window.setChallengePeriodStatus = function (status) {
    const firstDropdown = dropdowns[0];
    if (!firstDropdown) return;
    const firstBand = contentEl.querySelector("[data-challenge-period-id]");
    if (firstBand) firstBand.dataset.playerStatus = normalizeStatus(status);
    firstDropdown.setStatus(status);
  };

  renderChallenges();
})();
</script>
