<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  :root {
    --muted: #666;
    --border: #e0e0e0;
  }

  body {
    font-family: "Montserrat", sans-serif;
  }

  .captain-wrap {
    display: grid;
    gap: 10px;
    margin: 0 8px 12px;
  }

  .captain-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
  }

  .captain-title {
    font-size: 20px;
    font-weight: 700;
  }

  .captain-sub {
    font-size: 12px;
    color: var(--muted);
  }

  .captain-alert {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    font-size: 14px;
  }

  .captain-list {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .cp-match-row {
    display: flex;
    align-items: center;
    min-height: 48px;
    border-top: 1px solid #ccc;
    padding: 4px 8px;
    box-sizing: border-box;
  }

  .cp-match-row:first-child {
    border-top: none;
  }

  .cp-divider-vertical {
    width: 1px;
    background-color: #dfdfdf;
    margin: 0 6px;
    align-self: stretch;
    border-radius: 1px;
  }

  .cp-teams {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    font-size: 13px;
    line-height: 1.2;
    min-width: 0;
  }

  .cp-team-row {
    display: flex;
    align-items: center;
    font-size: 16px;
    gap: 6px;
  }

  .cp-team-row span {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  .cp-team-flag {
    width: 20px;
    height: 20px;
    object-fit: contain;
  }

  .cp-match-right {
    display: flex;
    align-items: center;
    gap: 0px;
  }

  .cp-edit-btn {
    border: 1px solid #c8ced8;
    background: #fff;
    color: #2f3947;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    line-height: 1;
    margin-left: 10px;
  }

  .cp-edit-btn:hover {
    border-color: #9ea7b3;
  }

  .cp-edit-form {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    display: grid;
    gap: 8px 12px;
  }

  .cp-edit-row {
    display: grid;
    gap: 1px;
  }

  .cp-edit-row label {
    font-size: 12px;
    font-weight: 600;
    color: #333;
  }

  .cp-edit-row input,
  .cp-edit-row select {
    width: 100%;
    border: 1px solid #c8ced8;
    border-radius: 4px;
    height: 30px;
    padding: 4px 8px;
    font: inherit;
    font-size: 14px;
    box-sizing: border-box;
  }

  .cp-edit-row input:disabled,
  .cp-edit-row select:disabled {
    background: #f3f4f6;
    color: #444;
    cursor: not-allowed;
  }

  .cp-dd-flag {
    width: 14px;
    height: 10px;
    border-radius: 2px;
    object-fit: cover;
    flex-shrink: 0;
  }

  .cp-edit-actions {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    grid-column: 1 / -1;
  }

  .cp-btn {
    border: 1px solid #c8ced8;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    line-height: 1;
  }

  .cp-btn-primary {
    background: #1a73b7;
    color: #fff;
    border-color: #1a73b7;
  }

  .cp-btn-secondary {
    background: #eef2f6;
    color: #333;
  }

  .cp-btn-danger {
    background: #fff3f3;
    border-color: #e6b4b4;
    color: #a12a2a;
    margin-left: auto;
  }

  .cp-btn:disabled {
    cursor: not-allowed;
    opacity: 0.72;
  }

  .cp-btn-danger:disabled {
    background: #f3f4f6;
    border-color: #d7dbe2;
    color: #8c96a4;
  }

  .cp-edit-error {
    color: #c62828;
    font-size: 12px;
    font-weight: 600;
    grid-column: 1 / -1;
  }

  .cp-edit-error-list {
    margin: 0;
    padding-left: 18px;
  }

  .cp-hidden {
    display: none !important;
  }

  .cp-friendly-row {
    gap: 6px;
    padding: 4px 10px;
  }

  .cp-friendly-team {
    min-width: 0;
    max-width: 190px;
    flex: 0 1 190px;
  }

  .cp-friendly-dates {
    display: flex;
    align-items: stretch;
    gap: 0;
    min-width: 0;
    flex: 1 1 auto;
    overflow-x: auto;
  }

  .cp-friendly-date {
    width: 44px;
    min-width: 44px;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
  }

  .cp-friendly-date-divider {
    margin: 0 3px;
  }

  .cp-friendly-date-main {
    font-size: 12px;
    font-weight: 600;
    line-height: 1.1;
    color: #333;
  }

  .cp-friendly-date-sub {
    font-size: 11px;
    line-height: 1.1;
    color: #666;
  }

  .cp-friendly-time,
  .cp-friendly-players {
    width: 38px;
    min-width: 38px;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
  }

  .cp-friendly-local-time {
    font-size: 11px;
    color: #666;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-height: 18px;
  }

  .cp-friendly-edit {
    margin-left: 4px;
  }

  .cp-friendly-edit .cp-edit-btn {
    margin-left: 0;
    padding: 4px 6px;
  }

  .cp-friendly-captains {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-left: 4px;
  }

  .cp-friendly-captain-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    text-decoration: none;
  }

  .cp-friendly-captain-link img {
    width: 22px;
    height: auto;
    object-fit: contain;
    display: block;
  }

  .cp-friendly-time-main,
  .cp-friendly-players-main {
    font-size: 12px;
    font-weight: 600;
    line-height: 1.1;
    color: #333;
  }

  .cp-friendly-players-sub {
    font-size: 11px;
    line-height: 1.1;
    color: #666;
  }

  .cp-friendly-empty {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    font-size: 14px;
    color: #666;
  }

  .cp-static-field {
    width: 100%;
    min-height: 30px;
    border: 1px solid #c8ced8;
    border-radius: 4px;
    padding: 4px 8px;
    box-sizing: border-box;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #f3f4f6;
    color: #444;
    font-size: 14px;
  }

  .cp-calendar {
    border: 1px solid #c8ced8;
    border-radius: 6px;
    background: #fff;
    padding: 10px;
    display: grid;
    gap: 8px;
  }

  .cp-calendar-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .cp-calendar-title {
    font-size: 13px;
    font-weight: 700;
    color: #333;
  }

  .cp-calendar-nav {
    border: 1px solid #c8ced8;
    background: #fff;
    border-radius: 4px;
    width: 28px;
    height: 28px;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
  }

  .cp-calendar-weekdays,
  .cp-calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 4px;
  }

  .cp-calendar-weekday {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: #777;
  }

  .cp-calendar-day {
    border: 1px solid #e0e0e0;
    background: #fff;
    border-radius: 4px;
    min-height: 34px;
    font-size: 12px;
    font-weight: 600;
    color: #333;
    cursor: pointer;
  }

  .cp-calendar-day:hover {
    border-color: #9ea7b3;
  }

  .cp-calendar-day.selected {
    background: #e4f0fb;
    border-color: #7eb0d8;
    color: #184e77;
  }

  .cp-calendar-day.disabled {
    color: #b8c0c8;
    background: #f6f7f9;
    cursor: default;
  }

  .cp-calendar-selected {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .cp-calendar-chip {
    display: inline-flex;
    align-items: center;
    border: 1px solid #d7e3ee;
    background: #f4f8fb;
    color: #345;
    border-radius: 999px;
    padding: 4px 8px;
    font-size: 12px;
    font-weight: 600;
  }

  .cp-calendar-help {
    font-size: 11px;
    color: #666;
  }

  .cp-friendly-timezone-note {
    font-size: 13px;
    color: #666;
  }

  @media (max-width: 600px) {
    .cp-team-row {
      font-size: 14px;
    }

    .cp-edit-row input:not([type="checkbox"]) {
      font-size: 16px;
    }

    .cp-edit-row select {
      font-size: 16px;
    }

    .cp-friendly-team {
      max-width: 28px;
      flex: 0 0 28px;
    }

    .cp-friendly-team .cp-team-row {
      justify-content: center;
      gap: 0;
    }

    .cp-friendly-team .cp-team-row span {
      display: none;
    }

    .cp-friendly-date {
      gap: 0;
    }

    .cp-friendly-dates {
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
      overflow-x: visible;
    }

    .cp-friendly-date-divider {
      display: none;
    }

    .cp-friendly-date-sub {
      display: none;
    }

    .cp-edit-row input:not([type="checkbox"]) {
      font-size: 16px !important;
    }
  }

  @media (min-width: 600px) {
    .cp-edit-form {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

  }
</style>

<div class="captain-wrap">
  <div class="captain-head">
    <div class="captain-title"></div>
    <div>
      <span id="captainCount" class="captain-sub"></span>
      <button id="captainAddButton" class="cp-edit-btn cp-hidden" type="button">Create</button>
    </div>
  </div>
  <div id="captainContent" class="captain-alert">Loading...</div>
  <div id="captainHint" class="captain-sub"></div>
</div>

<script>
(function () {
  const AUTH_BASE = window.AUTH_BASE_URL || "https://api.carcassonne.gg";
  const ME_URL = `${AUTH_BASE}/auth/me`;
  const TEAMS_URL = `${AUTH_BASE}/teams`;
  const FRIENDLY_FIND_URL = `${AUTH_BASE}/friendly-find`;
  const PROFILES_PUBLIC_URL = `${AUTH_BASE}/profiles/public`;
  const CAPTAIN_VIEWS = {
    FRIENDLY_FIND: "friendly-find",
  };
  const CAPTAIN_PROFILE_ICON_URL = "https://carcassonne.gg/gallery/captain-profile.png";

  const contentEl = document.getElementById("captainContent");
  const countEl = document.getElementById("captainCount");
  const addButtonEl = document.getElementById("captainAddButton");
  const hintEl = document.getElementById("captainHint");
  const titleEl = document.querySelector(".captain-title");
  let isCaptainPageInitializing = false;
  let captainPageRefreshQueued = false;

  function normalizeCode(value) {
    return String(value || "").trim().toUpperCase();
  }

  function getAssociationOverrideFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return normalizeCode(params.get("association") || "");
  }

  function buildCaptainUrl(options = {}) {
    const url = new URL(window.location.href);
    url.searchParams.delete("view");
    url.searchParams.delete("tournament");
    const nextAssociation = normalizeCode(options.association || "");
    if (nextAssociation) url.searchParams.set("association", nextAssociation);
    else url.searchParams.delete("association");
    url.searchParams.delete("edit");
    url.searchParams.delete("create");
    url.searchParams.delete("match_id");
    return url.toString();
  }

  function readLegacyCaptainSubviewFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const editRaw = String(params.get("edit") || "").trim().toLowerCase();
    const createRaw = String(params.get("create") || "").trim().toLowerCase();
    const isEdit = editRaw === "1" || editRaw === "true" || editRaw === "yes" || editRaw === "on";
    const isCreate = createRaw === "1" || createRaw === "true" || createRaw === "yes" || createRaw === "on";
    return {
      mode: isEdit ? "edit" : isCreate ? "create" : "list",
      matchId: String(params.get("match_id") || "").trim(),
    };
  }

  const legacySubviewState = readLegacyCaptainSubviewFromUrl();
  const captainPageState = {
    view: CAPTAIN_VIEWS.FRIENDLY_FIND,
    associationOverride: getAssociationOverrideFromUrl(),
    associationOverrideTouched: new URLSearchParams(window.location.search).has("association"),
    mode: legacySubviewState.mode,
    matchId: legacySubviewState.matchId,
  };

  function sanitizeCaptainPageState() {
    captainPageState.view = CAPTAIN_VIEWS.FRIENDLY_FIND;
    captainPageState.associationOverride = normalizeCode(captainPageState.associationOverride);
    captainPageState.mode = captainPageState.mode === "edit" || captainPageState.mode === "create"
      ? captainPageState.mode
      : "list";
    captainPageState.matchId = String(captainPageState.matchId || "").trim();
    if (captainPageState.mode !== "edit") {
      captainPageState.matchId = "";
    } else if (captainPageState.matchId) {
      // keep match id for editing friendly-find requests
    } else {
      captainPageState.mode = "list";
    }
    if (captainPageState.mode === "create") {
      captainPageState.matchId = "";
    }
  }

  function syncCaptainPageStateFromUrl() {
    captainPageState.view = CAPTAIN_VIEWS.FRIENDLY_FIND;
    captainPageState.associationOverride = getAssociationOverrideFromUrl();
    captainPageState.associationOverrideTouched = new URLSearchParams(window.location.search).has("association");
    captainPageState.mode = "list";
    captainPageState.matchId = "";
    sanitizeCaptainPageState();
  }

  function syncCaptainUrl(replace) {
    const nextUrl = buildCaptainUrl({
      view: captainPageState.view,
      association: captainPageState.associationOverride || null,
    });
    if (replace) window.history.replaceState({}, "", nextUrl);
    else window.history.pushState({}, "", nextUrl);
    window.dispatchEvent(new CustomEvent("captain-url-change", {
      detail: {
        view: captainPageState.view,
      },
    }));
  }

  function applyCaptainPageState(nextState = {}, options = {}) {
    if (Object.prototype.hasOwnProperty.call(nextState, "view")) {
      captainPageState.view = nextState.view;
    }
    if (Object.prototype.hasOwnProperty.call(nextState, "associationOverride")) {
      captainPageState.associationOverride = nextState.associationOverride;
      captainPageState.associationOverrideTouched = true;
    }
    if (Object.prototype.hasOwnProperty.call(nextState, "mode")) {
      captainPageState.mode = nextState.mode;
    }
    if (Object.prototype.hasOwnProperty.call(nextState, "matchId")) {
      captainPageState.matchId = nextState.matchId;
    }
    sanitizeCaptainPageState();
    if (options.syncUrl) {
      syncCaptainUrl(!!options.replaceUrl);
    }
    if (options.refresh !== false) {
      initCaptainPage();
    }
  }

  function openCaptainCreate(view) {
    applyCaptainPageState({
      view,
      mode: "create",
      matchId: "",
    });
  }

  function openCaptainEdit(view, target = {}) {
    applyCaptainPageState({
      view,
      mode: "edit",
      matchId: String(target.matchId || "").trim(),
    });
  }

  function resetCaptainSubview(view) {
    applyCaptainPageState({
      view: view || captainPageState.view,
      mode: "list",
      matchId: "",
    });
  }

  sanitizeCaptainPageState();
  syncCaptainUrl(true);

  function renderCaptainLoadingState() {
    hintEl.textContent = "";
    countEl.textContent = "";
    addButtonEl.classList.add("cp-hidden");
    addButtonEl.onclick = null;
    contentEl.className = "captain-alert";
    contentEl.textContent = "Loading...";
  }

  function playerLabel(profile) {
    const nick = String(profile?.bga_nickname || "").trim();
    const name = String(profile?.name || "").trim();
    const pid = String(profile?.id ?? profile?.player_id ?? "").trim();
    return nick || name || pid || "-";
  }

  function renderRestrictedSectionMessage(text) {
    contentEl.className = "captain-alert";
    contentEl.textContent = String(text || "You do not have access to this section.").trim();
    countEl.textContent = "";
    hintEl.textContent = "";
  }

  function setPageHeading(text) {
    const title = String(text || "").trim() || "Player Hub";
    if (titleEl) titleEl.textContent = title;
  }

  function renderSectionTitle(text) {
    const title = document.createElement("div");
    title.textContent = text;
    title.style.padding = "0 2px 0";
    title.style.fontSize = "14px";
    title.style.fontWeight = "600";
    title.style.color = "#222";
    title.style.background = "transparent";
    return title;
  }

  function getImmediatePageHeading() {
    return "Find an Opponent for a Friendly Match";
  }

  function isTruthyFlag(value) {
    if (typeof value === "number") return value === 1;
    if (typeof value === "boolean") return value;
    const raw = String(value || "").trim().toLowerCase();
    return raw === "1" || raw === "true" || raw === "yes" || raw === "on";
  }

  function parseFriendlyFindDates(raw) {
    if (Array.isArray(raw)) {
      return raw
        .map((item) => String(item || "").trim())
        .filter((item) => /^\d{4}-\d{2}-\d{2}$/.test(item))
        .sort();
    }
    const text = String(raw || "").trim();
    if (!text) return [];
    try {
      const parsed = JSON.parse(text);
      if (Array.isArray(parsed)) return parseFriendlyFindDates(parsed);
    } catch (_error) {
      // fallback below
    }
    return text
      .split(",")
      .map((item) => item.trim())
      .filter((item) => /^\d{4}-\d{2}-\d{2}$/.test(item))
      .sort();
  }

  function formatFriendlyFindDateParts(raw) {
    const text = String(raw || "").trim();
    if (!/^\d{4}-\d{2}-\d{2}$/.test(text)) {
      return { main: text || "-", sub: "" };
    }
    const date = new Date(`${text}T00:00:00Z`);
    if (!Number.isFinite(date.getTime())) {
      return { main: text, sub: "" };
    }
    const MONTHS_3 = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const WEEKDAYS_3 = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
    return {
      main: `${date.getUTCDate()} ${MONTHS_3[date.getUTCMonth()]}`,
      sub: WEEKDAYS_3[date.getUTCDay()],
    };
  }

  function formatFriendlyFindDateChip(raw) {
    const parts = formatFriendlyFindDateParts(raw);
    return parts.sub ? `${parts.main} ${parts.sub}` : parts.main;
  }

  function getFriendlyFindFirstDate(entry) {
    const dates = parseFriendlyFindDates(entry?.dates);
    return dates[0] || "";
  }

  function getViewerTimeZone() {
    try {
      return String(Intl.DateTimeFormat().resolvedOptions().timeZone || "").trim();
    } catch (_error) {
      return "";
    }
  }

  function formatFriendlyFindViewerTime(timeValue, dateValue) {
    const timeText = String(timeValue || "").trim();
    const dateText = String(dateValue || "").trim();
    if (!/^\d{2}:\d{2}$/.test(timeText) || !/^\d{4}-\d{2}-\d{2}$/.test(dateText)) return "";
    const utcDate = new Date(`${dateText}T${timeText}:00Z`);
    if (!Number.isFinite(utcDate.getTime())) return "";
    try {
      return new Intl.DateTimeFormat("en-GB", {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
      }).format(utcDate);
    } catch (_error) {
      return "";
    }
  }

  function createFriendlyFindRow(entry, teamsById, options = {}) {
    const row = document.createElement("div");
    row.className = "cp-match-row cp-friendly-row";

    const teamCode = normalizeCode(entry?.team);
    const teamMeta = teamsById.get(teamCode) || null;

    const teamWrap = document.createElement("div");
    teamWrap.className = "cp-teams cp-friendly-team";
    const teamRow = document.createElement("div");
    teamRow.className = "cp-team-row";
    if (teamMeta?.logo) {
      const flag = document.createElement("img");
      flag.className = "cp-team-flag";
      flag.src = teamMeta.logo;
      flag.alt = "";
      teamRow.appendChild(flag);
    }
    const teamText = document.createElement("span");
    teamText.textContent = teamMeta?.name || teamCode || "-";
    teamRow.appendChild(teamText);
    teamWrap.appendChild(teamRow);
    row.appendChild(teamWrap);

    const dates = parseFriendlyFindDates(entry?.dates);
    const localTimeDate = dates[0] || "";
    const addDivider = () => {
      const divider = document.createElement("div");
      divider.className = "cp-divider-vertical";
      row.appendChild(divider);
    };

    addDivider();

    const datesWrap = document.createElement("div");
    datesWrap.className = "cp-friendly-dates";
    if (dates.length) {
      dates.forEach((dateValue, index) => {
        const dateBox = document.createElement("div");
        dateBox.className = "cp-friendly-date";

        const main = document.createElement("div");
        main.className = "cp-friendly-date-main";
        const sub = document.createElement("div");
        sub.className = "cp-friendly-date-sub";
        const parts = formatFriendlyFindDateParts(dateValue);
        main.textContent = parts.main;
        sub.textContent = parts.sub;
        dateBox.appendChild(main);
        dateBox.appendChild(sub);
        datesWrap.appendChild(dateBox);

        if (index < dates.length - 1) {
          const innerDivider = document.createElement("div");
          innerDivider.className = "cp-divider-vertical cp-friendly-date-divider";
          datesWrap.appendChild(innerDivider);
        }
      });
    } else {
      const empty = document.createElement("div");
      empty.className = "cp-friendly-date";
      const main = document.createElement("div");
      main.className = "cp-friendly-date-main";
      main.textContent = "-";
      empty.appendChild(main);

  function renderFriendlyFindList(requests, teamsById, associationCode, captainsByTeam) {
    setPageHeading("Find an Opponent for a Friendly Match");
    contentEl.className = "";
    contentEl.innerHTML = "";
    contentEl.style.display = "grid";
    contentEl.style.gap = "20px";

    const ownAssociationCode = normalizeCode(associationCode);
    const sortByFirstDateAsc = (a, b) => {
      const dateA = getFriendlyFindFirstDate(a);
      const dateB = getFriendlyFindFirstDate(b);
      if (dateA && dateB && dateA !== dateB) return dateA.localeCompare(dateB);
      if (dateA && !dateB) return -1;
      if (!dateA && dateB) return 1;
      return String(a?.id || "").localeCompare(String(b?.id || ""));
    };
    const ownRequests = (Array.isArray(requests) ? requests : [])
      .filter((entry) => normalizeCode(entry?.team) === ownAssociationCode)
      .sort(sortByFirstDateAsc);
    const opponentRequests = (Array.isArray(requests) ? requests : [])
      .filter((entry) => normalizeCode(entry?.team) !== ownAssociationCode)
      .sort(sortByFirstDateAsc);

    countEl.textContent = "";
    contentEl.appendChild(
      renderFriendlyFindSection("My Match Requests", ownRequests, teamsById, "No match requests yet.", { canEdit: true })
    );
    contentEl.appendChild(
      renderFriendlyFindSection("Available Opponents", opponentRequests, teamsById, "No available opponents yet.", {
        showCaptains: true,
        captainsByTeam,
      })
    );

    const viewerTimeZone = getViewerTimeZone();

    timezoneNote.className = "cp-calendar-help cp-friendly-timezone-note";
    timezoneNote.textContent = viewerTimeZone
      ? `Times on this page are shown in your local time zone: ${viewerTimeZone}.`
      : "Times on this page are shown in your local time zone.";
    contentEl.appendChild(timezoneNote);
  }

        datesSelectedEl.appendChild(chip);
      });

    const syncFriendlyFindLocalTimes = () => {
      const referenceDate = selectedDates[0] || "";
      const earliestLocal = formatFriendlyFindViewerTime(time1Input.value, referenceDate);
      const latestLocal = formatFriendlyFindViewerTime(time2Input.value, referenceDate);
      const hasLocalTimes = !!referenceDate && !!earliestLocal && !!latestLocal;
      localTime1.classList.toggle("cp-hidden", !hasLocalTimes);
      localTime2.classList.toggle("cp-hidden", !hasLocalTimes);
      localTimeText1.textContent = hasLocalTimes ? `Your local time: ${earliestLocal}` : "";
      localTimeText2.textContent = hasLocalTimes ? `Your local time: ${latestLocal}` : "";
    };

    const renderCalendar = () => {
      const MONTHS = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
      title.textContent = `${MONTHS[calendarMonth.getUTCMonth()]} ${calendarMonth.getUTCFullYear()}`;
      grid.innerHTML = "";

      const year = calendarMonth.getUTCFullYear();
      const month = calendarMonth.getUTCMonth();
      const firstDay = new Date(Date.UTC(year, month, 1));
      const lastDay = new Date(Date.UTC(year, month + 1, 0));
      const offset = (firstDay.getUTCDay() + 6) % 7;
      const totalDays = lastDay.getUTCDate();
      const cells = Math.ceil((offset + totalDays) / 7) * 7;

      for (let index = 0; index < cells; index += 1) {
        const dayNumber = index - offset + 1;
        const cellBtn = document.createElement("button");
        cellBtn.type = "button";
        cellBtn.className = "cp-calendar-day";
        if (dayNumber < 1 || dayNumber > totalDays) {
          cellBtn.classList.add("disabled");
          cellBtn.disabled = true;
          cellBtn.textContent = "";
          grid.appendChild(cellBtn);
          continue;
        }
        const iso = `${year}-${String(month + 1).padStart(2, "0")}-${String(dayNumber).padStart(2, "0")}`;
        cellBtn.textContent = String(dayNumber);

        cellBtn.addEventListener("click", () => {

          if (exists) {
            selectedDates = selectedDates.filter((item) => item !== iso);
          } else {
            if (selectedDates.length >= 5) return;
            selectedDates = selectedDates.concat(iso).sort();
          }
          renderSelectedDates();
          syncFriendlyFindLocalTimes();
          renderCalendar();
        });
        grid.appendChild(cellBtn);
      }
      datesHelpEl.textContent = selectedDates.length >= 5
        ? "Maximum 5 dates selected."
        : "Select from 1 to 5 dates.";
    };

      dialog.style.border = "1px solid #d8dee8";

      dialog.style.boxShadow = "0 16px 36px rgba(15, 28, 48, 0.22)";
      dialog.style.padding = "16px";
      dialog.style.display = "grid";
      dialog.style.gap = "12px";

      const title = document.createElement("div");
      title.textContent = "Delete match request?";
      title.style.fontSize = "16px";
      title.style.fontWeight = "700";
      title.style.color = "#222";

      const text = document.createElement("div");
      text.textContent = "This action will remove the match request. This cannot be undone.";
      text.style.fontSize = "14px";
      text.style.lineHeight = "1.4";
      text.style.color = "#4b5563";

      const actions = document.createElement("div");
      actions.style.display = "flex";
      actions.style.justifyContent = "flex-end";
      actions.style.gap = "8px";

      const cancelModalBtn = document.createElement("button");
      cancelModalBtn.type = "button";
      cancelModalBtn.className = "cp-btn cp-btn-secondary";
      cancelModalBtn.textContent = "Cancel";

      const confirmDeleteBtn = document.createElement("button");
      confirmDeleteBtn.type = "button";
      confirmDeleteBtn.className = "cp-btn cp-btn-danger";
      confirmDeleteBtn.textContent = "Delete";
      confirmDeleteBtn.style.marginLeft = "0";

      const closeModal = () => {
        overlay.remove();
      };

      cancelModalBtn.addEventListener("click", closeModal);
      overlay.addEventListener("click", (event) => {
        if (event.target === overlay) closeModal();
      });
      confirmDeleteBtn.addEventListener("click", async () => {
        setError("");
        confirmDeleteBtn.disabled = true;
        cancelModalBtn.disabled = true;
        confirmDeleteBtn.textContent = "Deleting...";
        try {
          const response = await fetch(`${FRIENDLY_FIND_URL}/${encodeURIComponent(String(source?.id || ""))}`, {
            method: "DELETE",
            credentials: "include",
          });
          const result = await response.json().catch(() => ({}));
          if (!response.ok || !result?.ok) {
            setError(result?.message || "Failed to delete match request.");
            confirmDeleteBtn.disabled = false;
            cancelModalBtn.disabled = false;
            confirmDeleteBtn.textContent = "Delete";
            return;
          }
          closeModal();
          resetCaptainSubview(CAPTAIN_VIEWS.FRIENDLY_FIND);
        } catch (_error) {
          setError("Failed to delete match request.");
          confirmDeleteBtn.disabled = false;
          cancelModalBtn.disabled = false;
          confirmDeleteBtn.textContent = "Delete";
        }
      });

      actions.appendChild(cancelModalBtn);
      actions.appendChild(confirmDeleteBtn);
      dialog.appendChild(title);
      dialog.appendChild(text);
      dialog.appendChild(actions);
      overlay.appendChild(dialog);
      document.body.appendChild(overlay);
    };

    cancelBtn.addEventListener("click", () => {
      resetCaptainSubview(CAPTAIN_VIEWS.FRIENDLY_FIND);
    });

    if (deleteBtn) {
      deleteBtn.addEventListener("click", () => {

        showDeleteConfirmDialog();
      });

    time1Input.addEventListener("input", syncFriendlyFindLocalTimes);
    time1Input.addEventListener("change", syncFriendlyFindLocalTimes);
    time2Input.addEventListener("input", syncFriendlyFindLocalTimes);
    time2Input.addEventListener("change", syncFriendlyFindLocalTimes);

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      setError("");
      const validationErrors = [];
      if (!associationCode) validationErrors.push("Team is required.");
      if (selectedDates.length < 1) validationErrors.push("Select at least one date.");
      if (selectedDates.length > 5) validationErrors.push("Select no more than 5 dates.");
      if (String(time1Input.value || "") > String(time2Input.value || "")) {
        validationErrors.push("Earliest Start must be earlier than or equal to Latest Start.");
      }
      const playersAvailable = String(playersInput.value || "").trim();
      if (!playersAvailable) {
        validationErrors.push("Players Available is required.");
      } else if (playersAvailable.length > 10) {
        validationErrors.push("Players Available must be at most 10 characters.");
      }
      if (validationErrors.length) {
        setError(validationErrors);
        return;
      }

      setSaving(true);
      try {
        const url = isCreateMode
          ? FRIENDLY_FIND_URL
          : `${FRIENDLY_FIND_URL}/${encodeURIComponent(String(source?.id || ""))}`;
        const response = await fetch(url, {
          method: isCreateMode ? "POST" : "PATCH",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            team: associationCode,
            dates: selectedDates,
            time_1: String(time1Input.value || "19:00"),
            time_2: String(time2Input.value || "22:00"),
            number_of_players: playersAvailable,
          }),
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok || !result?.ok) {
          setError(result?.message || "Failed to save match request.");
          return;
        }
        resetCaptainSubview(CAPTAIN_VIEWS.FRIENDLY_FIND);
      } catch (_error) {
        setError("Failed to save match request.");
      } finally {
        setSaving(false);
      }
    });

    contentEl.className = "";
    contentEl.innerHTML = "";
    contentEl.appendChild(form);
  }

  async function initCaptainPage() {
    if (isCaptainPageInitializing) {
      captainPageRefreshQueued = true;
      return;
    }
    isCaptainPageInitializing = true;
    try {
      renderCaptainLoadingState();
      const isEditMode = captainPageState.mode === "edit";
      const isCreateMode = captainPageState.mode === "create";
      const editMatchId = String(captainPageState.matchId || "").trim();
      const associationOverride = captainPageState.associationOverride;
      let associationCode = associationOverride;
      let captainAssociationCode = "";
      let isCaptainUser = false;
      let isAdminUser = false;

      try {
        const meRes = await fetch(ME_URL, { method: "GET", credentials: "include" });
        if (meRes.ok) {
          const meData = await meRes.json();
          const meUser = meData?.authenticated ? meData?.user : null;
          const meAssociation = normalizeCode(
            meUser?.profile?.association ?? meUser?.association ?? ""
          );
          isAdminUser = meUser?.isAdmin === true;
          const meIsCaptain = Number(
            meUser?.profile?.team_captain ??
            meUser?.team_captain ??
            (meUser?.profile?.teamCaptain === true ? 1 : 0)
          ) === 1;
          captainAssociationCode = meAssociation;
          isCaptainUser = meIsCaptain;
        }
      } catch (_error) {
        // keep defaults; access rules below will handle unauthorized state
      }

      if (!isAdminUser && (!isCaptainUser || !captainAssociationCode)) {
        renderRestrictedSectionMessage("This section is available only for captains.");
        return;
      }

      if (!associationOverride) {
        associationCode = isAdminUser ? associationCode : captainAssociationCode;
      }

      const [teamsRes, profilesRes, friendlyFindRes] = await Promise.all([
        fetch(TEAMS_URL, { method: "GET" }),
        fetch(PROFILES_PUBLIC_URL, { method: "GET" }),
        fetch(FRIENDLY_FIND_URL, { method: "GET", credentials: "include" }),
      ]);

      const friendlyFindData = friendlyFindRes?.ok
        ? await friendlyFindRes.json().catch(() => ({}))
        : {};
      const friendlyFindRequests = Array.isArray(friendlyFindData?.requests) ? friendlyFindData.requests : [];

      const teamsById = new Map();
      if (teamsRes.ok) {
        const teamsData = await teamsRes.json();
        const teams = Array.isArray(teamsData?.teams) ? teamsData.teams : [];
        teams.forEach((team) => {
          const key = normalizeCode(team?.id);
          if (!key) return;
          teamsById.set(key, {
            id: key,
            name: String(team?.name || key).trim(),
            logo: String(team?.logo || "").trim(),
            timezone: String(team?.timezone || "").trim(),
          });
        });
      }

      const allProfiles = [];
      if (profilesRes.ok) {
        const profilesData = await profilesRes.json().catch(() => ({}));
        const profiles = Array.isArray(profilesData?.profiles) ? profilesData.profiles : [];
        profiles.forEach((profile) => {
          const playerId = String(profile?.id ?? profile?.player_id ?? "").trim();
          if (!playerId) return;
          const profileObj = {
            id: playerId,
            bga_nickname: String(profile?.bga_nickname || "").trim(),
            avatar: String(profile?.avatar || "").trim(),
            name: String(profile?.name || "").trim(),
            association: normalizeCode(profile?.association),
            team_captain: profile?.team_captain,
            status: String(profile?.status || "").trim(),
            created_by: String(profile?.created_by || "").trim(),
            master_title: profile?.master_title,
            master_title_date: String(profile?.master_title_date || "").trim(),
          };
          allProfiles.push(profileObj);
        });
      }

      setPageHeading(getImmediatePageHeading());

      addButtonEl.classList.remove("cp-hidden");
      addButtonEl.textContent = "Create";
      addButtonEl.onclick = () => {
        openCaptainCreate(CAPTAIN_VIEWS.FRIENDLY_FIND);
      };
      if (isCreateMode || isEditMode) {
        addButtonEl.classList.add("cp-hidden");
      }

      const friendlyFindAssociationCode = normalizeCode(associationCode || captainAssociationCode);
      const captainsByTeam = new Map();
      allProfiles.forEach((profile) => {
        const teamCode = normalizeCode(profile?.association);
        if (!teamCode || !isTruthyFlag(profile?.team_captain)) return;
        const current = Array.isArray(captainsByTeam.get(teamCode)) ? captainsByTeam.get(teamCode) : [];
        current.push(profile);
        current.sort((a, b) => playerLabel(a).localeCompare(playerLabel(b)));
        captainsByTeam.set(teamCode, current);
      });

      if (isCreateMode || isEditMode) {
        if (!friendlyFindAssociationCode) {
          contentEl.className = "captain-alert";
          contentEl.textContent = "Cannot detect your team association for creating a match request.";
          countEl.textContent = "";
          return;
        }
        const requestToEdit = isEditMode
          ? friendlyFindRequests.find((entry) => String(entry?.id || "") === editMatchId)
          : null;
        if (isEditMode && !requestToEdit) {
          contentEl.className = "captain-alert";
          contentEl.textContent = `Friendly find request not found: ${editMatchId}`;
          countEl.textContent = "";
          return;
        }
        renderFriendlyFindEditForm(
          teamsById,
          { associationCode: friendlyFindAssociationCode, request: requestToEdit },
          isEditMode ? "edit" : "create"
        );
        return;
      }

      renderFriendlyFindList(friendlyFindRequests, teamsById, friendlyFindAssociationCode, captainsByTeam);
      if (associationOverride) {
        hintEl.textContent = `association override: ${associationOverride}`;
      } else {
        hintEl.textContent = "";
      }
    } catch (_error) {
      contentEl.className = "captain-alert";
      contentEl.textContent = "Failed to load data.";
      countEl.textContent = "";
      hintEl.textContent = "";
    } finally {
      isCaptainPageInitializing = false;
      if (captainPageRefreshQueued) {
        captainPageRefreshQueued = false;
        initCaptainPage();
      }
    }
  }

  window.addEventListener("gg-auth-state-change", () => {
    initCaptainPage();
  });

  window.addEventListener("popstate", () => {
    syncCaptainPageStateFromUrl();
    initCaptainPage();
  });

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initCaptainPage);
  } else {
    initCaptainPage();
  }
})();
</script>
