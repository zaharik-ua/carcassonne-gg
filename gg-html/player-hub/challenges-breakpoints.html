<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  .cbp-wrap,
  .cbp-modal-overlay {
    --cbp-text: #222;
    --cbp-muted: #666;
    --cbp-border: #e0e0e0;
    --cbp-card: #fff;
    --cbp-blue: #1a73b7;
    --cbp-blue-hover: #165e93;
    --cbp-green: #21a366;
    --cbp-soft: #f6f8fb;
  }

  .cbp-wrap {
    font-family: "Montserrat", sans-serif;
    display: grid;
    gap: 10px;
  }

  .cbp-card {
    display: grid;
    gap: 12px;
    color: var(--cbp-text);
    font-size: 14px;
    line-height: 1.45;
  }

  .cbp-card p {
    margin: 0;
  }

  .cbp-status {
    color: var(--cbp-muted);
    font-size: 14px;
  }

  .cbp-checklist {
    display: grid;
    gap: 12px;
  }

  .cbp-step {
    display: grid;
    grid-template-columns: 18px minmax(0, 1fr);
    gap: 5px;
    align-items: start;
  }

  .cbp-check {
    width: 16px;
    height: 16px;
    border: 2px solid #b8c0cc;
    border-radius: 50%;
    box-sizing: border-box;
    margin-top: 1px;
    position: relative;
    flex: 0 0 auto;
  }

  .cbp-step.done .cbp-check {
    border-color: var(--cbp-green);
    background: var(--cbp-green);
  }

  .cbp-step.done .cbp-check::after {
    content: "";
    position: absolute;
    left: 4px;
    top: 1px;
    width: 5px;
    height: 9px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  .cbp-step-main {
    display: grid;
    gap: 7px;
    min-width: 0;
  }

  .cbp-step-line {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    min-width: 0;
  }

  .cbp-step-title {
    font-weight: 600;
    color: var(--cbp-text);
    overflow-wrap: anywhere;
  }

  .cbp-hint {
    color: var(--cbp-muted);
    font-size: 13px;
  }

  .cbp-email-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    max-width: 100%;
    padding: 4px 6px;
    border: 1px solid #d6e2f0;
    border-radius: 4px;
    background: #fff;
    color: #222;
    font-size: 13px;
    font-weight: 600;
  }

  .cbp-email-text {
    min-width: 0;
    overflow-wrap: anywhere;
  }

  .cbp-btn,
  .cbp-link-btn {
    appearance: none;
    border: 0;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0;
    text-decoration: none;
    white-space: nowrap;
  }

  .cbp-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 26px;
    padding: 5px 9px;
    background: var(--cbp-blue);
    color: #fff;
    text-transform: uppercase;
  }

  .cbp-btn:hover,
  .cbp-btn:focus-visible {
    background: var(--cbp-blue-hover);
    color: #fff;
    text-decoration: none;
  }

  .cbp-copy-btn {
    width: 26px;
    height: 24px;
    min-height: 24px;
    padding: 0;
    text-transform: none;
    position: relative;
  }

  .cbp-copy-btn::before,
  .cbp-copy-btn::after {
    content: "";
    position: absolute;
    width: 9px;
    height: 11px;
    border: 1.5px solid currentColor;
    border-radius: 2px;
    box-sizing: border-box;
  }

  .cbp-copy-btn::before {
    left: 8px;
    top: 5px;
    opacity: 0.75;
  }

  .cbp-copy-btn::after {
    left: 11px;
    top: 8px;
    background: var(--cbp-blue);
  }

  .cbp-copy-btn:hover::after {
    background: var(--cbp-blue-hover);
  }

  .cbp-copy-wrap {
    position: relative;
    display: inline-flex;
  }

  .cbp-copy-tip {
    position: absolute;
    left: 50%;
    bottom: calc(100% + 6px);
    transform: translateX(-50%) translateY(4px);
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    padding: 4px 7px;
    border-radius: 4px;
    background: #222;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    line-height: 1.2;
    white-space: nowrap;
    transition: opacity 0.15s ease, transform 0.15s ease, visibility 0s linear 0.15s;
    z-index: 2;
  }

  .cbp-copy-tip.show {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) translateY(0);
    transition-delay: 0s;
  }

  .cbp-link-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 0;
    background: transparent;
    color: var(--cbp-blue);
    font-size: 13px;
  }

  .cbp-link-btn:hover,
  .cbp-link-btn:focus-visible {
    color: var(--cbp-blue-hover);
    text-decoration: underline;
  }

  .cbp-modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 1100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background: rgba(24, 31, 41, 0.42);
    box-sizing: border-box;
    font-family: "Montserrat", sans-serif;
  }

  .cbp-modal {
    width: min(100%, 520px);
    max-height: calc(100vh - 32px);
    overflow: auto;
    padding: 16px;
    border: 1px solid #d8dee8;
    border-radius: 8px;
    background: #fff;
    box-shadow: 0 16px 36px rgba(15, 28, 48, 0.22);
    box-sizing: border-box;
  }

  .cbp-modal-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }

  .cbp-modal-title {
    color: #172232;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.25;
  }

  .cbp-modal-close {
    appearance: none;
    flex: 0 0 auto;
    width: 30px;
    height: 30px;
    margin: -5px -5px 0 0;
    padding: 0;
    border: 0;
    border-radius: 4px;
    background: transparent;
    color: #667085;
    font: inherit;
    font-size: 24px;
    line-height: 1;
    cursor: pointer;
  }

  .cbp-modal-close:hover,
  .cbp-modal-close:focus-visible {
    background: #f1f4f8;
    color: #172232;
  }

  .cbp-modal-content {
    display: grid;
    gap: 7px;
    color: #334155;
    font-size: 13px;
    line-height: 1.45;
  }

  .cbp-modal-content p {
    margin: 0;
  }

  .cbp-modal-content a {
    color: var(--cbp-blue);
    text-decoration: none;
    overflow-wrap: anywhere;
  }

  .cbp-modal-content a:hover {
    color: var(--cbp-blue-hover);
    text-decoration: underline;
  }

  .cbp-modal-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 16px;
  }

  .cbp-details-list {
    display: grid;
    gap: 5px;
    margin: 0;
    padding: 0;
    list-style: none;
  }

  .cbp-details-list li {
    padding-left: 13px;
    position: relative;
  }

  .cbp-details-list li::before {
    content: "";
    position: absolute;
    left: 1px;
    top: 9px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #334155;
  }

  .cbp-auth {
    position: relative;
    display: inline-flex;
  }

  .cbp-auth-dropdown {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    z-index: 1001;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transform: translateY(-6px);
    transition: opacity 0.2s ease, transform 0.2s ease, visibility 0s linear 0.2s;
  }

  .cbp-auth-dropdown.open {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    transform: translateY(0);
    transition-delay: 0s;
  }

  .cbp-auth-row {
    display: block;
    padding: 8px;
    border: 1px solid #d8d8d8;
    border-radius: 6px;
    background: #fff;
    box-shadow: 0 8px 20px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.08);
    min-width: 240px;
    box-sizing: border-box;
  }

  .cbp-google-btn {
    width: 100%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 10px 12px;
    background: #fff;
    border: 1px solid #dadce0;
    border-radius: 4px;
    font-weight: 600;
    font-size: 13px;
    color: #3c4043;
    cursor: pointer;
    transition: box-shadow 0.15s ease;
    text-decoration: none;
    white-space: nowrap;
    box-sizing: border-box;
  }

  .cbp-google-btn:hover {
    box-shadow: 0 1px 2px rgba(0,0,0,0.12);
  }

  .cbp-google-icon {
    width: 18px;
    height: 18px;
    display: inline-block;
  }

  .cbp-hidden {
    display: none !important;
  }

  @media (max-width: 520px) {
    .cbp-step-line {
      align-items: flex-start;
    }

    .cbp-email-chip {
      width: 100%;
      justify-content: space-between;
    }
  }
</style>

<div class="cbp-wrap">
  <div class="cbp-card">
    <p>Here you will be able to challenge other players to a rated Bo3 or Bo5 match.</p>
    <div id="challengeBreakpointsContent" class="cbp-status">Loading...</div>
  </div>
</div>

<script>
(function () {
  const AUTH_BASE = window.AUTH_BASE_URL || "https://api.carcassonne.gg";
  const ME_URL = `${AUTH_BASE}/auth/me`;
  const PROFILES_PUBLIC_URL = `${AUTH_BASE}/profiles/public`;
  const PLAYER_CHALLENGE_PERIODS_URL = `${AUTH_BASE}/challenge-periods/player`;
  const GOOGLE_ICON_URL = "https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg";
  const CHALLENGE_PROGRESS_EVENT = "gg-challenge-progress-change";
  const contentEl = document.getElementById("challengeBreakpointsContent");
  let authCleanup = null;
  let invitationCompletionNotified = false;
  let challengeProgressChannel = null;

  function markInvitationDone() {
    invitationCompletionNotified = true;
    contentEl.querySelector("[data-cbp-invitation-step]")?.classList.add("done");
  }

  function onChallengeProgress(event) {
    const detail = event?.detail || event?.data || {};
    if (detail?.invitation_done) {
      markInvitationDone();
    }
  }

  window.addEventListener(CHALLENGE_PROGRESS_EVENT, onChallengeProgress);
  try {
    if (window.parent && window.parent !== window) {
      window.parent.addEventListener(CHALLENGE_PROGRESS_EVENT, onChallengeProgress);
    }
  } catch (_error) {
    // BroadcastChannel still covers separate same-origin frames.
  }
  try {
    if (typeof BroadcastChannel === "function") {
      challengeProgressChannel = new BroadcastChannel(CHALLENGE_PROGRESS_EVENT);
      challengeProgressChannel.addEventListener("message", onChallengeProgress);
    }
  } catch (_error) {
    // The direct window event remains available as a fallback.
  }

  function getCurrentUserProfileId(user) {
    return String(
      user?.profile?.id ??
      user?.profile?.player_id ??
      user?.profile?.bga_id ??
      user?.bga_id ??
      user?.player_id ??
      user?.playerId ??
      ""
    ).trim();
  }

  function getLoginEmail(user) {
    return String(user?.email || user?.login_email || "").trim();
  }

  function getProfileEmail(user, profile) {
    return String(
      profile?.email ??
      profile?.login_email ??
      user?.profile?.email ??
      user?.profile?.login_email ??
      ""
    ).trim();
  }

  function getProfileName(profile, user) {
    return String(
      profile?.name ??
      profile?.full_name ??
      user?.profile?.name ??
      user?.profile?.full_name ??
      ""
    ).trim();
  }

  function getPhotoCount(profile, user) {
    const raw = profile?.photo_count ?? user?.profile?.photo_count ?? "";
    const count = Number(String(raw).trim());
    return Number.isFinite(count) ? count : 0;
  }

  function cleanupAuth() {
    if (typeof authCleanup === "function") {
      authCleanup();
    }
    authCleanup = null;
  }

  async function fetchSession() {
    try {
      const response = await fetch(ME_URL, {
        method: "GET",
        credentials: "include",
      });
      if (!response.ok) return { authenticated: false, user: null };
      const data = await response.json().catch(() => ({}));
      return {
        authenticated: !!data?.authenticated,
        user: data?.authenticated ? data?.user || null : null,
      };
    } catch (_error) {
      return { authenticated: false, user: null };
    }
  }

  async function fetchProfiles() {
    try {
      const response = await fetch(PROFILES_PUBLIC_URL, {
        method: "GET",
        credentials: "include",
      });
      if (!response.ok) return [];
      const data = await response.json().catch(() => ({}));
      return Array.isArray(data?.profiles) ? data.profiles : [];
    } catch (_error) {
      return [];
    }
  }

  async function fetchChallengePeriods() {
    try {
      const response = await fetch(PLAYER_CHALLENGE_PERIODS_URL, {
        method: "GET",
        credentials: "include",
      });
      if (!response.ok) return [];
      const data = await response.json().catch(() => ({}));
      return Array.isArray(data?.challenge_periods) ? data.challenge_periods : [];
    } catch (_error) {
      return [];
    }
  }

  function findProfileById(profiles, playerId) {
    const normalizedId = String(playerId || "").trim();
    if (!normalizedId) return null;
    return (Array.isArray(profiles) ? profiles : []).find((profile) => {
      const profileId = String(profile?.id ?? profile?.player_id ?? profile?.profile_id ?? "").trim();
      return profileId === normalizedId;
    }) || null;
  }

  function buildStep(title, done) {
    const step = document.createElement("div");
    step.className = `cbp-step${done ? " done" : ""}`;

    const check = document.createElement("div");
    check.className = "cbp-check";
    check.setAttribute("aria-hidden", "true");
    step.appendChild(check);

    const main = document.createElement("div");
    main.className = "cbp-step-main";
    step.appendChild(main);

    const line = document.createElement("div");
    line.className = "cbp-step-line";
    main.appendChild(line);

    const titleEl = document.createElement("div");
    titleEl.className = "cbp-step-title";
    titleEl.textContent = title;
    line.appendChild(titleEl);

    return { step, main, line };
  }

  function createHint(text) {
    const hint = document.createElement("div");
    hint.className = "cbp-hint";
    hint.textContent = text;
    return hint;
  }

  function createPrimaryLink(text, href) {
    const link = document.createElement("a");
    link.className = "cbp-btn";
    link.href = href;
    link.textContent = text;
    return link;
  }

  function setupAuth(authRoot, onAuthSuccess) {
    const portalState = {
      container: null,
      cleanup: [],
    };
    const signInButton = authRoot.querySelector("[data-cbp-auth-sign-in]");
    const dropdown = authRoot.querySelector("[data-cbp-auth-dropdown]");
    const googleLink = authRoot.querySelector("[data-cbp-auth-google]");
    if (!signInButton || !dropdown || !googleLink) return () => {};
    googleLink.href = `${AUTH_BASE}/auth/google`;

    function canUseParentDocument() {
      try {
        return !!(window.parent && window.parent !== window && window.parent.document && window.frameElement);
      } catch (_error) {
        return false;
      }
    }

    function ensurePortalStyles(parentDocument) {
      if (parentDocument.getElementById("cbpAuthPortalStyles")) return;
      const style = parentDocument.createElement("style");
      style.id = "cbpAuthPortalStyles";
      style.textContent = `
        .cbp-auth-portal {
          position: fixed;
          z-index: 2147483647;
          opacity: 0;
          visibility: hidden;
          pointer-events: none;
          transform: translateY(-6px);
          transition: opacity 0.2s ease, transform 0.2s ease, visibility 0s linear 0.2s;
          font-family: "Montserrat", sans-serif;
        }
        .cbp-auth-portal.open {
          opacity: 1;
          visibility: visible;
          pointer-events: auto;
          transform: translateY(0);
          transition-delay: 0s;
        }
        .cbp-auth-portal-row {
          padding: 8px;
          border: 1px solid #d8d8d8;
          border-radius: 6px;
          background: #fff;
          box-shadow: 0 8px 20px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.08);
          min-width: 240px;
        }
        .cbp-auth-portal-link {
          width: 100%;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          gap: 10px;
          padding: 10px 12px;
          background: #fff;
          border: 1px solid #dadce0;
          border-radius: 4px;
          font-weight: 600;
          font-size: 13px;
          color: #3c4043;
          cursor: pointer;
          transition: box-shadow 0.15s ease;
          text-decoration: none;
          white-space: nowrap;
          box-sizing: border-box;
        }
        .cbp-auth-portal-link:hover {
          box-shadow: 0 1px 2px rgba(0,0,0,0.12);
        }
        .cbp-auth-portal-icon {
          width: 18px;
          height: 18px;
          display: inline-block;
        }
      `;
      parentDocument.head.appendChild(style);
    }

    function positionPortal(container) {
      const iframeRect = window.frameElement.getBoundingClientRect();
      const buttonRect = signInButton.getBoundingClientRect();
      const containerRect = container.getBoundingClientRect();
      const top = iframeRect.top + buttonRect.bottom + 8;
      const leftEdge = iframeRect.left + buttonRect.left;
      const left = Math.max(8, leftEdge);
      const maxLeft = Math.max(8, window.parent.innerWidth - containerRect.width - 8);
      container.style.top = `${Math.max(8, top)}px`;
      container.style.left = `${Math.min(left, maxLeft)}px`;
    }

    function teardownPortal() {
      while (portalState.cleanup.length) {
        const dispose = portalState.cleanup.pop();
        dispose();
      }
      if (portalState.container) {
        portalState.container.remove();
        portalState.container = null;
      }
    }

    function closeDropdown() {
      dropdown.classList.remove("open");
      dropdown.setAttribute("aria-hidden", "true");
      dropdown.setAttribute("inert", "");
      signInButton.setAttribute("aria-expanded", "false");
      teardownPortal();
    }

    function openGoogleAuthPopup() {
      const popup = window.open(
        `${AUTH_BASE}/auth/google`,
        "googleAuth",
        "width=520,height=640,left=100,top=100"
      );
      if (!popup) {
        window.location.href = `${AUTH_BASE}/auth/google`;
        return;
      }
      closeDropdown();
    }

    function openPortalDropdown() {
      const parentDocument = window.parent.document;
      ensurePortalStyles(parentDocument);
      teardownPortal();

      const container = parentDocument.createElement("div");
      container.className = "cbp-auth-portal";
      container.setAttribute("role", "dialog");
      container.setAttribute("aria-label", "Sign in");
      container.innerHTML = `
        <div class="cbp-auth-portal-row">
          <a class="cbp-auth-portal-link" href="${AUTH_BASE}/auth/google">
            <img class="cbp-auth-portal-icon" alt="Google" src="${GOOGLE_ICON_URL}" />
            Sign in with Google
          </a>
        </div>
      `;

      parentDocument.body.appendChild(container);
      positionPortal(container);
      container.classList.add("open");

      const portalLink = container.querySelector(".cbp-auth-portal-link");
      const closeOnOutside = (event) => {
        if (!container.contains(event.target)) {
          closeDropdown();
        }
      };
      const closeOnEscape = (event) => {
        if (event.key === "Escape") {
          closeDropdown();
        }
      };
      const reposition = () => {
        if (portalState.container) {
          positionPortal(portalState.container);
        }
      };

      portalLink.addEventListener("click", (event) => {
        event.preventDefault();
        openGoogleAuthPopup();
      });
      parentDocument.addEventListener("mousedown", closeOnOutside);
      parentDocument.addEventListener("keydown", closeOnEscape);
      window.parent.addEventListener("scroll", reposition, true);
      window.addEventListener("resize", reposition);
      window.parent.addEventListener("resize", reposition);

      portalState.container = container;
      portalState.cleanup.push(() => parentDocument.removeEventListener("mousedown", closeOnOutside));
      portalState.cleanup.push(() => parentDocument.removeEventListener("keydown", closeOnEscape));
      portalState.cleanup.push(() => window.parent.removeEventListener("scroll", reposition, true));
      portalState.cleanup.push(() => window.removeEventListener("resize", reposition));
      portalState.cleanup.push(() => window.parent.removeEventListener("resize", reposition));
    }

    function openDropdown() {
      dropdown.classList.add("open");
      dropdown.setAttribute("aria-hidden", "false");
      dropdown.removeAttribute("inert");
      signInButton.setAttribute("aria-expanded", "true");
      if (canUseParentDocument()) {
        dropdown.classList.remove("open");
        dropdown.setAttribute("aria-hidden", "true");
        dropdown.setAttribute("inert", "");
        openPortalDropdown();
      }
    }

    function toggleDropdown() {
      if (portalState.container || dropdown.classList.contains("open")) {
        closeDropdown();
      } else {
        openDropdown();
      }
    }

    const onDocumentClick = (event) => {
      if (!dropdown.contains(event.target) && !signInButton.contains(event.target)) {
        closeDropdown();
      }
    };
    const onDocumentKeydown = (event) => {
      if (event.key === "Escape") {
        closeDropdown();
      }
    };
    const onMessage = (event) => {
      if (event.origin !== new URL(AUTH_BASE).origin) return;
      if (event.data && event.data.type === "google-auth-success") {
        onAuthSuccess();
      }
    };
    const onGoogleAuthClick = (event) => {
      event.preventDefault();
      openGoogleAuthPopup();
    };

    signInButton.addEventListener("click", toggleDropdown);
    googleLink.addEventListener("click", onGoogleAuthClick);
    document.addEventListener("click", onDocumentClick);
    document.addEventListener("keydown", onDocumentKeydown);
    window.addEventListener("message", onMessage);

    return () => {
      signInButton.removeEventListener("click", toggleDropdown);
      googleLink.removeEventListener("click", onGoogleAuthClick);
      document.removeEventListener("click", onDocumentClick);
      document.removeEventListener("keydown", onDocumentKeydown);
      window.removeEventListener("message", onMessage);
      teardownPortal();
    };
  }

  function appendSignInControl(line) {
    const authRoot = document.createElement("span");
    authRoot.className = "cbp-auth";
    authRoot.innerHTML = `
      <button class="cbp-btn" type="button" aria-expanded="false" data-cbp-auth-sign-in>Sign in</button>
      <span class="cbp-auth-dropdown" aria-hidden="true" inert data-cbp-auth-dropdown>
        <span class="cbp-auth-row">
          <a class="cbp-google-btn" href="/auth/google" data-cbp-auth-google>
            <img class="cbp-google-icon" alt="Google" src="${GOOGLE_ICON_URL}" />
            Sign in with Google
          </a>
        </span>
      </span>
    `;
    line.appendChild(authRoot);
    authCleanup = setupAuth(authRoot, renderChallenges);
  }

  function appendEmailCopy(main, email) {
    const hint = document.createElement("div");
    hint.className = "cbp-hint";
    hint.appendChild(document.createTextNode("Send your email "));

    const chip = document.createElement("span");
    chip.className = "cbp-email-chip";
    const emailText = document.createElement("span");
    emailText.className = "cbp-email-text";
    emailText.textContent = email;
    chip.appendChild(emailText);

    const copyWrap = document.createElement("span");
    copyWrap.className = "cbp-copy-wrap";

    const copyBtn = document.createElement("button");
    copyBtn.className = "cbp-btn cbp-copy-btn";
    copyBtn.type = "button";
    copyBtn.setAttribute("aria-label", "Copy email");
    copyBtn.title = "Copy email";
    const copyTip = document.createElement("span");
    copyTip.className = "cbp-copy-tip";
    copyTip.textContent = "Copied";
    let copyTipTimer = null;
    const showCopyTip = () => {
      copyTip.classList.add("show");
      if (copyTipTimer) {
        window.clearTimeout(copyTipTimer);
      }
      copyTipTimer = window.setTimeout(() => {
        copyTip.classList.remove("show");
        copyTipTimer = null;
      }, 2000);
    };
    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(email);
        copyBtn.title = "Copied";
        showCopyTip();
        window.setTimeout(() => {
          copyBtn.title = "Copy email";
        }, 1400);
      } catch (_error) {
        copyBtn.title = "Select and copy email";
        window.setTimeout(() => {
          copyBtn.title = "Copy email";
        }, 1400);
      }
    });
    copyWrap.appendChild(copyBtn);
    copyWrap.appendChild(copyTip);
    chip.appendChild(copyWrap);
    hint.appendChild(chip);
    hint.appendChild(document.createTextNode(" to your association captain."));
    main.appendChild(hint);
  }

  function appendDetails(main) {
    const toggle = document.createElement("button");
    toggle.className = "cbp-link-btn";
    toggle.type = "button";
    toggle.textContent = "Details";
    main.appendChild(toggle);

    toggle.addEventListener("click", () => {
      const previouslyFocused = document.activeElement;
      const overlay = document.createElement("div");
      overlay.className = "cbp-modal-overlay";

      const dialog = document.createElement("div");
      dialog.className = "cbp-modal";
      dialog.setAttribute("role", "dialog");
      dialog.setAttribute("aria-modal", "true");
      dialog.setAttribute("aria-labelledby", "cbpDetailsModalTitle");

      const header = document.createElement("div");
      header.className = "cbp-modal-header";

      const title = document.createElement("div");
      title.id = "cbpDetailsModalTitle";
      title.className = "cbp-modal-title";
      title.textContent = "How to verify your BGA account";
      header.appendChild(title);

      const closeIcon = document.createElement("button");
      closeIcon.type = "button";
      closeIcon.className = "cbp-modal-close";
      closeIcon.setAttribute("aria-label", "Close");
      closeIcon.textContent = "×";
      header.appendChild(closeIcon);
      dialog.appendChild(header);

      const content = document.createElement("div");
      content.className = "cbp-modal-content";

      const captainsText = document.createElement("p");
      captainsText.appendChild(document.createTextNode("If you don't know who your captain is, check here: "));
      const captainsLink = document.createElement("a");
      captainsLink.href = "https://carcassonne.gg/players/?captains=1";
      captainsLink.target = "_blank";
      captainsLink.rel = "noopener noreferrer";
      captainsLink.textContent = "https://carcassonne.gg/players/?captains=1";
      captainsText.appendChild(captainsLink);
      content.appendChild(captainsText);

      const captainIntro = document.createElement("p");
      captainIntro.textContent = "Your captain needs to do the following:";
      content.appendChild(captainIntro);

      const list = document.createElement("ul");
      list.className = "cbp-details-list";

      const openPlayersItem = document.createElement("li");
      openPlayersItem.appendChild(document.createTextNode("Open User Menu -> Player Hub -> Players "));
      const playersLink = document.createElement("a");
      playersLink.href = "https://carcassonne.gg/player-hub/players/";
      playersLink.target = "_blank";
      playersLink.rel = "noopener noreferrer";
      playersLink.textContent = "https://carcassonne.gg/player-hub/players/";
      openPlayersItem.appendChild(playersLink);
      list.appendChild(openPlayersItem);

      const editProfileItem = document.createElement("li");
      editProfileItem.textContent = "Edit your profile (or create one if needed)";
      list.appendChild(editProfileItem);

      const addEmailItem = document.createElement("li");
      addEmailItem.textContent = "Add your email to Login Email";
      list.appendChild(addEmailItem);

      content.appendChild(list);

      const contactText = document.createElement("p");
      contactText.textContent = "If you cannot find a captain, contact us at carcassonne.gg@gmail.com.";
      content.appendChild(contactText);
      dialog.appendChild(content);

      const actions = document.createElement("div");
      actions.className = "cbp-modal-actions";
      const closeButton = document.createElement("button");
      closeButton.type = "button";
      closeButton.className = "cbp-btn";
      closeButton.textContent = "Close";
      actions.appendChild(closeButton);
      dialog.appendChild(actions);

      function closeModal() {
        document.removeEventListener("keydown", onKeydown);
        overlay.remove();
        if (previouslyFocused instanceof HTMLElement) {
          previouslyFocused.focus();
        }
      }

      function onKeydown(event) {
        if (event.key === "Escape") closeModal();
      }

      closeIcon.addEventListener("click", closeModal);
      closeButton.addEventListener("click", closeModal);
      overlay.addEventListener("click", (event) => {
        if (event.target === overlay) closeModal();
      });
      document.addEventListener("keydown", onKeydown);

      overlay.appendChild(dialog);
      document.body.appendChild(overlay);
      closeIcon.focus();
    });
  }

  function renderChecklist(session, profile, challengePeriods) {
    cleanupAuth();

    const user = session.user || null;
    const authenticated = !!session.authenticated;
    const profileId = getCurrentUserProfileId(user);
    const loginEmail = getLoginEmail(user);
    const profileEmail = getProfileEmail(user, profile);
    const bgaVerified = authenticated && !!profileId && !!profileEmail;
    const hasRealName = !!getProfileName(profile, user);
    const hasPhoto = getPhotoCount(profile, user) > 0;
    const profileReady = authenticated && !!profileId && hasRealName && hasPhoto;
    const invitationDone = invitationCompletionNotified || (
      authenticated && (Array.isArray(challengePeriods) ? challengePeriods : []).some((period) => (
        period?.has_sent_request === true
        || Number(period?.has_sent_request) === 1
        || !!String(period?.challenge_duel_id || "").trim()
        || ["match_scheduled", "played"].includes(String(period?.player_status || "").trim())
      ))
    );

    const checklist = document.createElement("div");
    checklist.className = "cbp-checklist";

    const signInStep = buildStep("Sign in to the site", authenticated);
    if (!authenticated) {
      appendSignInControl(signInStep.line);
    }
    checklist.appendChild(signInStep.step);

    const bgaStep = buildStep("Verify your BGA account", bgaVerified);
    if (!authenticated) {
      bgaStep.main.appendChild(createHint("Sign in first to verify your BGA account."));
    } else if (!bgaVerified) {
      if (loginEmail) {
        appendEmailCopy(bgaStep.main, loginEmail);
      } else {
        bgaStep.main.appendChild(createHint("Send the email you used to log in to carcassonne.gg to your association captain."));
      }
      appendDetails(bgaStep.main);
    }
    checklist.appendChild(bgaStep.step);

    const photoStep = buildStep("Add your real name and photo (optional)", profileReady);
    if (!authenticated) {
      photoStep.main.appendChild(createHint("Sign in first to edit your player profile."));
    } else if (!profileId) {
      photoStep.main.appendChild(createHint("Verify your BGA account first to edit your player profile."));
    } else if (!profileReady) {
      photoStep.line.appendChild(createPrimaryLink("Edit profile", `https://carcassonne.gg/player/?id=${encodeURIComponent(profileId)}&edit=1`));
    }
    checklist.appendChild(photoStep.step);

    const inviteStep = buildStep("Send an invitation to your opponent", invitationDone);
    inviteStep.step.setAttribute("data-cbp-invitation-step", "");
    checklist.appendChild(inviteStep.step);

    contentEl.className = "";
    contentEl.innerHTML = "";
    contentEl.appendChild(checklist);
  }

  async function renderChallenges() {
    cleanupAuth();
    contentEl.className = "cbp-status";
    contentEl.textContent = "Loading...";

    const session = await fetchSession();
    let profile = null;
    let challengePeriods = [];
    if (session.authenticated && session.user) {
      const profileId = getCurrentUserProfileId(session.user);
      if (profileId) {
        const [profiles, periods] = await Promise.all([
          fetchProfiles(),
          fetchChallengePeriods(),
        ]);
        profile = findProfileById(profiles, profileId);
        challengePeriods = periods;
      }
    }

    renderChecklist(session, profile, challengePeriods);
  }

  renderChallenges();
})();
</script>
