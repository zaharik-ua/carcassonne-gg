<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --text: #222;
    --border: #e0e0e0;
    --card: #fff;
    --primary: #1a73b7;
  }

  body {
    font-family: "Montserrat", sans-serif;
  }

  .nationals-wrap {
    display: grid;
    gap: 10px;
    margin: 0 8px 12px;
  }

  .nationals-title {
    color: var(--text);
    font-size: 20px;
    font-weight: 700;
  }

  .nationals-card {
    display: grid;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    color: var(--text);
    font-size: 14px;
    line-height: 1.45;
  }

  .nationals-card p {
    margin: 0;
  }

  .nationals-card a {
    color: var(--primary);
    font-weight: 600;
    text-decoration: none;
  }

  .nationals-card a:hover {
    text-decoration: underline;
  }
</style>

<div class="nationals-wrap">
  <div class="nationals-title">Nationals</div>
  <div class="nationals-card">
    <p>Your online national tournament matches will appear here.</p>
    <p>
      For now, please find your local tournaments here:
      <a href="https://carcassonne.gg/nationals" target="_self" rel="noopener noreferrer">Nationals</a>
    </p>
  </div>
</div>
