<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  :root {
    --text: #222;
    --muted: #666;
    --border: #e0e0e0;
  }

  body {
    font-family: "Montserrat", sans-serif;
  }

  .captain-wrap {
    display: grid;
    gap: 10px;
    margin: 0 8px 12px;
  }

  .captain-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
  }

  .captain-title {
    font-size: 20px;
    font-weight: 700;
  }

  .captain-sub {
    font-size: 12px;
    color: var(--muted);
  }

  .captain-alert {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    font-size: 14px;
  }

  .captain-list {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .cp-match-row {
    display: flex;
    align-items: center;
    min-height: 48px;
    border-top: 1px solid #ccc;
    padding: 4px 8px;
    box-sizing: border-box;
  }

  .cp-match-row:first-child {
    border-top: none;
  }

  .cp-match-time {
    width: 46px;
    min-width: 46px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .cp-match-time-text {
    font-size: 12px;
    line-height: 14px;
    color: #333;
    font-weight: 600;
  }

  .cp-divider-vertical {
    width: 1px;
    background-color: #dfdfdf;
    margin: 0 6px;
    align-self: stretch;
    border-radius: 1px;
  }

  .cp-teams {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    font-size: 13px;
    line-height: 1.2;
    min-width: 0;
  }

  .cp-team-row {
    display: flex;
    align-items: center;
    font-size: 16px;
    gap: 6px;
  }

  .cp-team-row span {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  .cp-team-flag {
    width: 20px;
    height: 20px;
    object-fit: contain;
  }

  .cp-match-right {
    display: flex;
    align-items: center;
    gap: 0px;
  }

  .cp-edit-btn {
    border: 1px solid #c8ced8;
    background: #fff;
    color: #2f3947;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    line-height: 1;
    margin-left: 10px;
  }

  .cp-edit-btn:hover {
    border-color: #9ea7b3;
  }

  .cp-edit-form {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    display: grid;
    gap: 8px 12px;
  }

  .cp-edit-row {
    display: grid;
    gap: 1px;
  }

  .cp-edit-row label {
    font-size: 12px;
    font-weight: 600;
    color: #333;
  }

  .cp-edit-row input,
  .cp-edit-row select {
    width: 100%;
    border: 1px solid #c8ced8;
    border-radius: 4px;
    height: 30px;
    padding: 4px 8px;
    font: inherit;
    font-size: 14px;
    box-sizing: border-box;
  }

  .cp-edit-row input:disabled,
  .cp-edit-row select:disabled {
    background: #f3f4f6;
    color: #444;
    cursor: not-allowed;
  }

  .cp-edit-actions {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    grid-column: 1 / -1;
  }

  .cp-btn {
    border: 1px solid #c8ced8;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    line-height: 1;
  }

  .cp-btn-primary {
    background: #1a73b7;
    color: #fff;
    border-color: #1a73b7;
  }

  .cp-btn-secondary {
    background: #eef2f6;
    color: #333;
  }

  .cp-btn-danger {
    background: #fff3f3;
    border-color: #e6b4b4;
    color: #a12a2a;
    margin-left: auto;
  }

  .cp-btn:disabled {
    cursor: not-allowed;
    opacity: 0.72;
  }

  .cp-btn-danger:disabled {
    background: #f3f4f6;
    border-color: #d7dbe2;
    color: #8c96a4;
  }

  .cp-edit-error {
    color: #c62828;
    font-size: 12px;
    font-weight: 600;
    grid-column: 1 / -1;
  }

  .cp-hidden {
    display: none !important;
  }

  .cp-static-field {
    width: 100%;
    min-height: 30px;
    border: 1px solid #c8ced8;
    border-radius: 4px;
    padding: 4px 8px;
    box-sizing: border-box;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #f3f4f6;
    color: #444;
    font-size: 14px;
  }

  .cp-streamer-field {
    justify-content: flex-start;
  }

  .cp-streamer-field img {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
  }

  .cp-stream-match-picker {
    display: grid;
    gap: 4px;
  }

  .cp-stream-match-option {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 10px;
    align-items: center;
    padding: 4px 8px;
    border: 1px solid #d6dbe3;
    border-radius: 6px;
    background: #fff;
    transition: background-color 0.16s ease, border-color 0.16s ease;
  }

  .cp-stream-match-option input[type="checkbox"] {
    width: 16px;
    height: 16px;
    margin: 0;
  }

  .cp-stream-match-option.is-selected {
    background: #edf4f8;
    border-color: #c7d8e3;
  }

  .cp-stream-match-option .cp-match-row {
    min-height: 0;
    border-top: none;
    padding: 0;
    width: 100%;
  }

  .cp-stream-match-option .cp-match-right {
    display: none;
  }

  .cp-stream-row .cp-team-row {
    font-size: 14px;
    font-weight: 400;
  }

  .cp-stream-row .cp-team-row span {
    font-weight: 400;
  }

  .cp-stream-row .cp-match-time {
    width: 42px;
    min-width: 42px;
  }

  .cp-stream-row .cp-match-time-text {
    font-weight: 500;
  }

  .cp-stream-row .cp-divider-vertical {
    margin: 0 4px;
  }

  .cp-stream-row .cp-team-flag {
    width: 18px;
    height: 18px;
  }

  .cp-stream-row .cp-match-right {
    margin-left: 8px;
  }

  .cp-stream-row__streamer {
    width: 28px;
    min-width: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cp-stream-row__streamer img {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    object-fit: cover;
  }

  .cp-stream-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    margin-left: 8px;
    color: #5b6573;
    text-decoration: none;
    border-radius: 4px;
    transition: color 0.16s ease, background-color 0.16s ease;
  }

  .cp-stream-link:hover {
    color: #1a73b7;
    background: #eef5fb;
  }

  .cp-stream-link i {
    font-size: 12px;
    line-height: 1;
  }

  .cp-stream-empty {
    border: 1px dashed #c8ced8;
    border-radius: 6px;
    padding: 12px;
    font-size: 13px;
    color: #667286;
    background: #fafbfc;
  }

  .cp-stream-form {
    grid-template-columns: minmax(0, 1fr);
  }

  @media (max-width: 600px) {
    .cp-team-row {
      font-size: 14px;
    }

    .cp-edit-row select {
      font-size: 16px;
    }

    .cp-edit-row input:not([type="checkbox"]) {
      font-size: 16px !important;
    }
  }

</style>

<div class="captain-wrap">
  <div class="captain-head">
    <div class="captain-title"></div>
    <div>
      <span id="captainCount" class="captain-sub"></span>
      <button id="captainAddButton" class="cp-edit-btn cp-hidden" type="button">Create</button>
    </div>
  </div>
  <div id="captainFilters" class="captain-filters cp-hidden"></div>
  <div id="captainContent" class="captain-alert">Loading...</div>
  <div id="captainHint" class="captain-sub"></div>
</div>

<script>
(function () {
  const AUTH_BASE = window.AUTH_BASE_URL || "https://api.carcassonne.gg";
  const ME_URL = `${AUTH_BASE}/auth/me`;
  const PUBLIC_MAIN_PAGE_MATCHES_URL = `${AUTH_BASE}/public/main-page-matches`;
  const TEAMS_URL = `${AUTH_BASE}/teams`;
  const TOURNAMENTS_URL = `${AUTH_BASE}/tournaments`;
  const STREAMERS_URL = `${AUTH_BASE}/streamers`;
  const STREAMS_URL = `${AUTH_BASE}/streams`;

  const contentEl = document.getElementById("captainContent");
  const countEl = document.getElementById("captainCount");
  const addButtonEl = document.getElementById("captainAddButton");
  const filtersEl = document.getElementById("captainFilters");
  const hintEl = document.getElementById("captainHint");
  const titleEl = document.querySelector(".captain-title");
  let isCaptainPageInitializing = false;
  let captainPageRefreshQueued = false;

  function normalizeCode(value) {
    return String(value || "").trim().toUpperCase();
  }

  function readMatchTeam1(match) {
    return normalizeCode(match?.team_1 ?? match?.team1_id ?? match?.team1);
  }

  function readMatchTeam2(match) {
    return normalizeCode(match?.team_2 ?? match?.team2_id ?? match?.team2);
  }

  function formatMatchTime(value) {
    const raw = String(value || "").trim();
    if (!raw) return "-";
    const d = new Date(raw);
    if (!Number.isFinite(d.getTime())) return raw;
    const MONTHS_3 = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const dd = String(d.getDate()).padStart(2, "0");
    const mon = MONTHS_3[d.getMonth()];
    const hh = String(d.getHours()).padStart(2, "0");
    const mm = String(d.getMinutes()).padStart(2, "0");
    const now = new Date();
    const isPrevYear = d.getFullYear() < now.getFullYear();
    if (isPrevYear) return `${dd} ${mon}\n${d.getFullYear()}\n${hh}:${mm}`;
    return `${dd} ${mon} ${hh}:${mm}`;
  }

  function esc(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function readLegacyCaptainSubviewFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const editRaw = String(params.get("edit") || "").trim().toLowerCase();
    const createRaw = String(params.get("create") || "").trim().toLowerCase();
    const isEdit = editRaw === "1" || editRaw === "true" || editRaw === "yes" || editRaw === "on";
    const isCreate = createRaw === "1" || createRaw === "true" || createRaw === "yes" || createRaw === "on";
    return {
      mode: isEdit ? "edit" : isCreate ? "create" : "list",
      streamId: String(params.get("stream_id") || "").trim(),
    };
  }

  const legacySubviewState = readLegacyCaptainSubviewFromUrl();
  const captainPageState = {
    mode: legacySubviewState.mode,
    streamId: legacySubviewState.streamId,
  };

  function sanitizeCaptainPageState() {
    captainPageState.mode = captainPageState.mode === "edit" || captainPageState.mode === "create"
      ? captainPageState.mode
      : "list";
    captainPageState.streamId = String(captainPageState.streamId || "").trim();
    if (captainPageState.mode !== "edit") {
      captainPageState.streamId = "";
    } else if (captainPageState.streamId) {
      // keep stream edit mode
    } else {
      captainPageState.mode = "list";
    }
    if (captainPageState.mode === "create") {
      captainPageState.streamId = "";
    }
  }

  function syncCaptainPageStateFromUrl() {
    const legacySubviewState = readLegacyCaptainSubviewFromUrl();
    captainPageState.mode = "list";
    captainPageState.streamId = legacySubviewState.streamId;
    sanitizeCaptainPageState();
  }

  function applyCaptainPageState(nextState = {}, options = {}) {
    if (Object.prototype.hasOwnProperty.call(nextState, "mode")) {
      captainPageState.mode = nextState.mode;
    }
    if (Object.prototype.hasOwnProperty.call(nextState, "streamId")) {
      captainPageState.streamId = nextState.streamId;
    }
    sanitizeCaptainPageState();
    if (options.refresh !== false) {
      initCaptainPage();
    }
  }

  function openCaptainCreate() {
    applyCaptainPageState({
      mode: "create",
      streamId: "",
    });
  }

  function openCaptainEdit(target = {}) {
    applyCaptainPageState({
      mode: "edit",
      streamId: String(target.streamId || "").trim(),
    });
  }

  function resetCaptainSubview() {
    applyCaptainPageState({
      mode: "list",
      streamId: "",
    });
  }

  sanitizeCaptainPageState();

  function clearFilters() {
    if (!filtersEl) return;
    filtersEl.innerHTML = "";
    filtersEl.classList.add("cp-hidden");
  }

  function renderCaptainLoadingState() {
    clearFilters();
    hintEl.textContent = "";
    countEl.textContent = "";
    addButtonEl.classList.add("cp-hidden");
    addButtonEl.onclick = null;
    contentEl.className = "captain-alert";
    contentEl.textContent = "Loading...";
  }

  function renderAccessMessage() {
    contentEl.className = "captain-alert";
    contentEl.textContent = "Please sign in to view this page.";
    countEl.textContent = "";
    hintEl.textContent = "";
  }

  function renderRestrictedSectionMessage(text) {
    contentEl.className = "captain-alert";
    contentEl.textContent = String(text || "You do not have access to this section.").trim();
    countEl.textContent = "";
    hintEl.textContent = "";
  }

  function getCurrentUserProfileId(user) {
    return String(
      user?.profile?.id ??
      user?.profile?.player_id ??
      user?.profile?.bga_id ??
      user?.bga_id ??
      user?.player_id ??
      user?.playerId ??
      ""
    ).trim();
  }

  function setPageHeading(text) {
    const title = String(text || "").trim() || "Player Hub";
    if (titleEl) titleEl.textContent = title;
  }

  function parseMatchTimeUtc(match) {
    return Date.parse(String(match?.time_utc || match?.time || "")) || 0;
  }

  function getStartOfTodayLocal() {
    const now = new Date();
    return new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  }

  function isPastMatch(match) {
    const matchTime = parseMatchTimeUtc(match);
    if (!matchTime) return false;
    return matchTime < getStartOfTodayLocal();
  }

  function renderSectionTitle(text) {
    const title = document.createElement("div");
    title.textContent = text;
    title.style.padding = "0 2px 0";
    title.style.fontSize = "14px";
    title.style.fontWeight = "600";
    title.style.color = "#222";
    title.style.background = "transparent";
    return title;
  }

  function getStreamerForCurrentUser(streamers, currentUserPlayerId) {
    const profileId = String(currentUserPlayerId || "").trim();
    if (!profileId) return null;
    return (Array.isArray(streamers) ? streamers : []).find((entry) => (
      String(entry?.profile_id ?? entry?.player_id ?? "").trim() === profileId
    )) || null;
  }

  function getStreamerDisplayName(streamer) {
    return String(
      streamer?.name
      || streamer?.profile_bga_nickname
      || streamer?.profile_name
      || streamer?.profile_id
      || "-"
    ).trim() || "-";
  }

  function createStreamerStaticField(streamer) {
    const field = document.createElement("div");
    field.className = "cp-static-field cp-streamer-field";
    const avatarUrl = String(streamer?.avatar || "").trim() || buildBgaAvatarUrl(streamer?.profile_id, streamer?.avatar);
    if (avatarUrl) {
      const img = document.createElement("img");
      img.src = avatarUrl;
      img.alt = "";
      field.appendChild(img);
    }
    const text = document.createElement("span");
    text.textContent = getStreamerDisplayName(streamer);
    field.appendChild(text);
    return field;
  }

  function createStreamMatchRow(match, teamsById, tournamentsById, options = {}) {
    const row = document.createElement("div");
    row.className = "cp-match-row cp-stream-row";

    const streamerAvatar = String(options.streamerAvatar || "").trim();
    if (streamerAvatar) {
      const streamerWrap = document.createElement("div");
      streamerWrap.className = "cp-stream-row__streamer";
      const streamerImg = document.createElement("img");
      streamerImg.src = streamerAvatar;
      streamerImg.alt = "";
      streamerWrap.appendChild(streamerImg);
      row.appendChild(streamerWrap);

      const streamerDivider = document.createElement("div");
      streamerDivider.className = "cp-divider-vertical";
      row.appendChild(streamerDivider);
    }

    const tournamentId = String(match?.tournament_id || "").trim();
    const tournament = tournamentsById?.get(tournamentId) || null;
    const tournamentLogo = String(tournament?.logo || match?.tournament_logo || "").trim();
    if (tournamentLogo) {
      const logoWrap = document.createElement("div");
      logoWrap.className = "cp-match-time";
      const logo = document.createElement("img");
      logo.className = "cp-team-flag";
      logo.src = tournamentLogo;
      logo.alt = "";
      logo.style.width = "28px";
      logo.style.height = "28px";
      logoWrap.appendChild(logo);
      row.appendChild(logoWrap);

      const divider = document.createElement("div");
      divider.className = "cp-divider-vertical";
      row.appendChild(divider);
    }

    const timeWrap = document.createElement("div");
    timeWrap.className = "cp-match-time";
    const timeText = document.createElement("div");
    timeText.className = "cp-match-time-text";
    timeText.innerHTML = esc(formatMatchTime(match?.time_utc ?? match?.time)).replaceAll("\n", "<br>");
    timeWrap.appendChild(timeText);
    row.appendChild(timeWrap);

    const timeDivider = document.createElement("div");
    timeDivider.className = "cp-divider-vertical";
    row.appendChild(timeDivider);

    const teamsWrap = document.createElement("div");
    teamsWrap.className = "cp-teams";
    const team1Id = readMatchTeam1(match);
    const team2Id = readMatchTeam2(match);
    const team1 = teamsById.get(team1Id) || null;
    const team2 = teamsById.get(team2Id) || null;

    [
      { team: team1, name: team1?.name || team1Id || "-", key: "team1" },
      { team: team2, name: team2?.name || team2Id || "-", key: "team2" },
    ].forEach((entry) => {
      const teamRow = document.createElement("div");
      teamRow.className = "cp-team-row";
      if (entry.team?.logo) {
        const img = document.createElement("img");
        img.className = "cp-team-flag";
        img.src = entry.team.logo;
        img.alt = "";
        teamRow.appendChild(img);
      }
      const nameEl = document.createElement("span");
      nameEl.textContent = entry.name;
      teamRow.appendChild(nameEl);
      teamsWrap.appendChild(teamRow);
    });
    row.appendChild(teamsWrap);

    const right = document.createElement("div");
    right.className = "cp-match-right";
    const scoreboardLink = String(options.scoreboardLink || "").trim();
    if (scoreboardLink) {
      const scoreboardBtn = document.createElement("a");
      scoreboardBtn.className = "cp-stream-link";
      scoreboardBtn.href = scoreboardLink;
      scoreboardBtn.target = "_blank";
      scoreboardBtn.rel = "noopener noreferrer";
      scoreboardBtn.title = "Open scoreboard";
      const icon = document.createElement("i");
      icon.className = "fa-solid fa-table-cells-large";
      scoreboardBtn.appendChild(icon);
      right.appendChild(scoreboardBtn);
    }
    const streamLink = String(options.streamLink || "").trim();
    if (streamLink) {
      const linkBtn = document.createElement("a");
      linkBtn.className = "cp-stream-link";
      linkBtn.href = streamLink;
      linkBtn.target = "_blank";
      linkBtn.rel = "noopener noreferrer";
      linkBtn.title = "Open stream link";
      const icon = document.createElement("i");
      icon.className = "fa-solid fa-arrow-up-right-from-square";
      linkBtn.appendChild(icon);
      right.appendChild(linkBtn);
    }
    if (options.showEdit) {
      const editBtn = document.createElement("button");
      editBtn.type = "button";
      editBtn.className = "cp-edit-btn";
      editBtn.textContent = "Edit";
      editBtn.addEventListener("click", () => {
        openCaptainEdit({ streamId: String(options.streamId || "") });
      });
      right.appendChild(editBtn);
    }
    row.appendChild(right);

    return row;
  }

  function renderStreams(streams, teamsById, tournamentsById, options = {}) {
    const showStreamerAvatar = options.showStreamerAvatar === true;
    setPageHeading("My Streams");
    countEl.textContent = `${streams.length} streams`;
    hintEl.textContent = "";
    contentEl.className = "";
    contentEl.innerHTML = "";
    contentEl.style.display = "grid";
    contentEl.style.gap = "20px";

    const ongoing = streams
      .filter((item) => item?.match_id && !isPastMatch(item))
      .sort((a, b) => parseMatchTimeUtc(a) - parseMatchTimeUtc(b));
    const finished = streams
      .filter((item) => item?.match_id && isPastMatch(item))
      .sort((a, b) => parseMatchTimeUtc(b) - parseMatchTimeUtc(a));

    const addSection = (title, rows) => {
      if (!rows.length) return;
      const wrap = document.createElement("div");
      wrap.style.display = "grid";
      wrap.style.gap = "6px";
      wrap.appendChild(renderSectionTitle(title));
      const list = document.createElement("div");
      list.className = "captain-list";
      rows.forEach((stream) => {
        const streamerAvatar = String(stream?.streamer_avatar || "").trim();
        list.appendChild(createStreamMatchRow(stream, teamsById, tournamentsById, {
          showEdit: true,
          streamId: String(stream?.id || ""),
          scoreboardLink: (() => {
            const matchId = String(stream?.match_id || "").trim();
            if (!matchId) return "";
            const scoreboardStyle = String(stream?.streamer_scoreboard_style || "").trim() || "Default";
            return `https://carcassonne.gg/stream/?selected=${encodeURIComponent(matchId)}&style=${encodeURIComponent(scoreboardStyle)}`;
          })(),
          streamLink: String(stream?.link || "").trim(),
          streamerAvatar: showStreamerAvatar === true ? streamerAvatar : "",
        }));
      });
      wrap.appendChild(list);
      contentEl.appendChild(wrap);
    };

    addSection("Ongoing", ongoing);
    addSection("Finished", finished);

    if (!ongoing.length && !finished.length) {
      contentEl.className = "captain-alert";
      contentEl.textContent = "No streams found.";
    }
  }

  function renderStreamEditForm(streamer, teamsById, tournamentsById, formContext = {}, formMode = "create") {
    const isCreateMode = formMode === "create";
    const source = formContext?.stream && typeof formContext.stream === "object" ? formContext.stream : {};
    const ongoingMatches = Array.isArray(formContext?.ongoingMatches) ? formContext.ongoingMatches : [];
    const availableStreamers = Array.isArray(formContext?.availableStreamers) ? formContext.availableStreamers : [];
    const allowStreamerSelect = isCreateMode && formContext?.allowStreamerSelect === true;
    let selectedStreamer = streamer || null;
    setPageHeading(isCreateMode ? "Create stream" : "Edit stream");
    countEl.textContent = isCreateMode ? "Creating stream entries" : `Editing stream: ${String(source?.id || "")}`;
    hintEl.textContent = "";
    contentEl.className = "";
    contentEl.innerHTML = "";
    contentEl.style.display = "";
    contentEl.style.gap = "";

    const form = document.createElement("form");
    form.className = "cp-edit-form cp-stream-form";
    form.noValidate = true;

    const topActions = document.createElement("div");
    topActions.className = "cp-edit-actions";
    const saveBtn = document.createElement("button");
    saveBtn.type = "submit";
    saveBtn.className = "cp-btn cp-btn-primary";
    saveBtn.textContent = "Save";
    const cancelBtn = document.createElement("button");
    cancelBtn.type = "button";
    cancelBtn.className = "cp-btn cp-btn-secondary";
    cancelBtn.textContent = "Cancel";
    topActions.appendChild(saveBtn);
    topActions.appendChild(cancelBtn);
    let deleteBtn = null;
    if (!isCreateMode) {
      deleteBtn = document.createElement("button");
      deleteBtn.type = "button";
      deleteBtn.className = "cp-btn cp-btn-danger";
      deleteBtn.textContent = "Delete";
      topActions.appendChild(deleteBtn);
    }
    form.appendChild(topActions);

    const errorEl = document.createElement("div");
    errorEl.className = "cp-edit-error cp-hidden";
    form.appendChild(errorEl);

    const addRow = (labelText, control) => {
      const row = document.createElement("div");
      row.className = "cp-edit-row";
      const label = document.createElement("label");
      label.textContent = labelText;
      row.appendChild(label);
      row.appendChild(control);
      form.appendChild(row);
      return row;
    };

    const setError = (message) => {
      const text = String(message || "").trim();
      if (!text) {
        errorEl.textContent = "";
        errorEl.classList.add("cp-hidden");
        return;
      }
      errorEl.textContent = text;
      errorEl.classList.remove("cp-hidden");
    };

    const setSaving = (isSaving) => {
      saveBtn.disabled = isSaving;
      cancelBtn.disabled = isSaving;
      if (deleteBtn) deleteBtn.disabled = isSaving;
      saveBtn.textContent = isSaving ? "Saving..." : "Save";
    };

    if (allowStreamerSelect) {
      const streamerField = document.createElement("div");
      streamerField.style.display = "grid";
      streamerField.style.gap = "8px";

      const streamerSelect = document.createElement("select");
      streamerSelect.required = true;

      availableStreamers.forEach((entry) => {
        const option = document.createElement("option");
        option.value = String(entry?.id || "").trim();
        option.textContent = getStreamerDisplayName(entry);
        streamerSelect.appendChild(option);
      });

      const syncSelectedStreamer = () => {
        const selectedId = String(streamerSelect.value || "").trim();
        selectedStreamer = availableStreamers.find((entry) => String(entry?.id || "").trim() === selectedId) || null;
        previewWrap.innerHTML = "";
        previewWrap.appendChild(createStreamerStaticField(selectedStreamer));
      };

      const initialStreamerId = String(selectedStreamer?.id || availableStreamers[0]?.id || "").trim();
      streamerSelect.value = initialStreamerId;

      const previewWrap = document.createElement("div");
      syncSelectedStreamer();
      streamerSelect.addEventListener("change", syncSelectedStreamer);

      streamerField.appendChild(streamerSelect);
      streamerField.appendChild(previewWrap);
      addRow("Streamer", streamerField);
    } else {
      addRow("Streamer", createStreamerStaticField(streamer));
    }

    const linkInput = document.createElement("input");
    linkInput.type = "url";
    linkInput.value = String(source?.link || "");
    linkInput.required = true;
    addRow("Stream link", linkInput);

    if (isCreateMode) {
      const matchesWrap = document.createElement("div");
      matchesWrap.className = "cp-stream-match-picker";
      const checkboxes = [];
      ongoingMatches.forEach((match) => {
        const option = document.createElement("label");
        option.className = "cp-stream-match-option";
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.value = String(match?.id || "");
        const syncSelectedState = () => {
          option.classList.toggle("is-selected", checkbox.checked);
        };
        checkbox.addEventListener("change", syncSelectedState);
        syncSelectedState();
        option.appendChild(checkbox);
        option.appendChild(createStreamMatchRow(match, teamsById, tournamentsById));
        matchesWrap.appendChild(option);
        checkboxes.push(checkbox);
      });
      if (!ongoingMatches.length) {
        const empty = document.createElement("div");
        empty.className = "cp-stream-empty";
        empty.textContent = "No ongoing matches available.";
        matchesWrap.appendChild(empty);
      }
      addRow("Matches", matchesWrap);

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        setError("");
        const link = String(linkInput.value || "").trim();
        const entityIds = checkboxes.map((input) => input.checked ? input.value : "").filter(Boolean);
        if (!link) {
          setError("Link is required.");
          return;
        }
        const selectedStreamerId = String((allowStreamerSelect ? selectedStreamer?.id : streamer?.id) || "").trim();
        if (!selectedStreamerId) {
          setError("Streamer is required.");
          return;
        }
        if (!entityIds.length) {
          setError("Select at least one match.");
          return;
        }

        setSaving(true);
        try {
          const response = await fetch(STREAMS_URL, {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              entity_type: "matches",
              entity_ids: entityIds,
              streamer_id: selectedStreamerId,
              link,
            }),
          });
          const result = await response.json().catch(() => ({}));
          if (!response.ok || !result?.ok) {
            setError(result?.message || "Failed to create streams.");
            return;
          }
          resetCaptainSubview();
        } catch (_error) {
          setError("Failed to create streams.");
        } finally {
          setSaving(false);
        }
      });
    } else {
      const matchField = document.createElement("div");
      matchField.className = "cp-static-field";
      matchField.style.padding = "8px";
      matchField.style.background = "#fff";
      matchField.style.borderColor = "#d6dbe3";
      matchField.appendChild(createStreamMatchRow(source, teamsById, tournamentsById));
      addRow("Match", matchField);

      const showDeleteConfirmDialog = () => {
        const overlay = document.createElement("div");
        overlay.style.position = "fixed";
        overlay.style.inset = "0";
        overlay.style.background = "rgba(24, 31, 41, 0.42)";
        overlay.style.display = "flex";
        overlay.style.alignItems = "center";
        overlay.style.justifyContent = "center";
        overlay.style.padding = "16px";
        overlay.style.zIndex = "1000";

        const dialog = document.createElement("div");
        dialog.style.width = "100%";
        dialog.style.maxWidth = "420px";
        dialog.style.background = "#fff";
        dialog.style.border = "1px solid #d8dee8";
        dialog.style.borderRadius = "8px";
        dialog.style.boxShadow = "0 16px 36px rgba(15, 28, 48, 0.22)";
        dialog.style.padding = "16px";
        dialog.style.display = "grid";
        dialog.style.gap = "12px";

        const title = document.createElement("div");
        title.textContent = "Delete stream?";
        title.style.fontSize = "16px";
        title.style.fontWeight = "700";
        title.style.color = "#222";

        const text = document.createElement("div");
        text.textContent = "This action will soft delete the stream entry.";
        text.style.fontSize = "14px";
        text.style.lineHeight = "1.4";
        text.style.color = "#4b5563";

        const actions = document.createElement("div");
        actions.style.display = "flex";
        actions.style.justifyContent = "flex-end";
        actions.style.gap = "8px";

        const cancelModalBtn = document.createElement("button");
        cancelModalBtn.type = "button";
        cancelModalBtn.className = "cp-btn cp-btn-secondary";
        cancelModalBtn.textContent = "Cancel";

        const confirmDeleteBtn = document.createElement("button");
        confirmDeleteBtn.type = "button";
        confirmDeleteBtn.className = "cp-btn cp-btn-danger";
        confirmDeleteBtn.textContent = "Delete";
        confirmDeleteBtn.style.marginLeft = "0";

        const closeModal = () => overlay.remove();
        cancelModalBtn.addEventListener("click", closeModal);
        overlay.addEventListener("click", (event) => {
          if (event.target === overlay) closeModal();
        });
        confirmDeleteBtn.addEventListener("click", async () => {
          confirmDeleteBtn.disabled = true;
          cancelModalBtn.disabled = true;
          confirmDeleteBtn.textContent = "Deleting...";
          try {
            const response = await fetch(`${STREAMS_URL}/${encodeURIComponent(String(source?.id || ""))}`, {
              method: "DELETE",
              credentials: "include",
            });
            const result = await response.json().catch(() => ({}));
            if (!response.ok || !result?.ok) {
              setError(result?.message || "Failed to delete stream.");
              confirmDeleteBtn.disabled = false;
              cancelModalBtn.disabled = false;
              confirmDeleteBtn.textContent = "Delete";
              return;
            }
            closeModal();
            resetCaptainSubview();
          } catch (_error) {
            setError("Failed to delete stream.");
            confirmDeleteBtn.disabled = false;
            cancelModalBtn.disabled = false;
            confirmDeleteBtn.textContent = "Delete";
          }
        });

        actions.appendChild(cancelModalBtn);
        actions.appendChild(confirmDeleteBtn);
        dialog.appendChild(title);
        dialog.appendChild(text);
        dialog.appendChild(actions);
        overlay.appendChild(dialog);
        document.body.appendChild(overlay);
      };

      if (deleteBtn) {
        deleteBtn.addEventListener("click", () => {
          setError("");
          showDeleteConfirmDialog();
        });
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        setError("");
        const link = String(linkInput.value || "").trim();
        if (!link) {
          setError("Link is required.");
          return;
        }
        setSaving(true);
        try {
          const response = await fetch(`${STREAMS_URL}/${encodeURIComponent(String(source?.id || ""))}`, {
            method: "PATCH",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              id: source?.id,
              link,
            }),
          });
          const result = await response.json().catch(() => ({}));
          if (!response.ok || !result?.ok) {
            setError(result?.message || "Failed to update stream.");
            return;
          }
          resetCaptainSubview();
        } catch (_error) {
          setError("Failed to update stream.");
        } finally {
          setSaving(false);
        }
      });
    }

    cancelBtn.addEventListener("click", () => {
      resetCaptainSubview();
    });

    contentEl.appendChild(form);
  }

  function buildBgaAvatarUrl(playerId, avatar) {
    const playerIdText = String(playerId || "").trim();
    const avatarText = String(avatar || "").trim();
    if (!avatarText) return "";

    if (/^https?:\/\//i.test(avatarText)) {
      return avatarText;
    }

    if (avatarText === "x00000") {
      return "https://x.boardgamearena.net/data/avatar/default_184.jpg";
    }

    const defaultMatch = avatarText.match(/^_def_(\d+)$/);
    if (defaultMatch) {
      const defaultAvatarId = defaultMatch[1].padStart(4, "0");
      return `https://x.boardgamearena.net/data/avatar/defaults/default-${defaultAvatarId}.jpg`;
    }

    if (!playerIdText) return "";
    if (!/^\d+$/.test(playerIdText)) return "";

    const playerIdNumber = Number(playerIdText);
    if (!Number.isFinite(playerIdNumber)) return "";

    const firstFolder = String(Math.floor(playerIdNumber / 100000000));
    const secondFolder = String(Math.floor(playerIdNumber / 1000000));
    const thirdFolder = String(Math.floor(playerIdNumber / 1000));

    return `https://x.boardgamearena.net/data/avatar/${firstFolder}/${secondFolder}/${thirdFolder}/${playerIdText}_184.jpg?h=${encodeURIComponent(avatarText)}`;
  }

  async function initCaptainPage() {
    if (isCaptainPageInitializing) {
      captainPageRefreshQueued = true;
      return;
    }
    isCaptainPageInitializing = true;
    try {
      renderCaptainLoadingState();
      const isEditMode = captainPageState.mode === "edit";
      const isCreateMode = captainPageState.mode === "create";
      const editStreamId = String(captainPageState.streamId || "").trim();
      let isAdminUser = false;
      let isAuthenticatedUser = false;
      let currentUserPlayerId = "";

      try {
        const meRes = await fetch(ME_URL, { method: "GET", credentials: "include" });
        if (meRes.ok) {
          const meData = await meRes.json();
          const meUser = meData?.authenticated ? meData?.user : null;
          isAuthenticatedUser = !!meData?.authenticated;
          isAdminUser = meUser?.isAdmin === true;
          currentUserPlayerId = getCurrentUserProfileId(meUser);
        }
      } catch (_error) {
        // keep defaults; access rules below will handle unauthorized state
      }

      if (!isAuthenticatedUser) {
        renderAccessMessage();
        return;
      }

      const [matchesRes, teamsRes, tournamentsRes, streamersRes, streamsRes] = await Promise.all([
        fetch(PUBLIC_MAIN_PAGE_MATCHES_URL, { method: "GET" }),
        fetch(TEAMS_URL, { method: "GET" }),
        fetch(TOURNAMENTS_URL, { method: "GET", credentials: "include" }),
        fetch(STREAMERS_URL, { method: "GET", credentials: "include" }),
        fetch(STREAMS_URL, { method: "GET", credentials: "include" }),
      ]);

      if (!matchesRes.ok) {
        contentEl.className = "captain-alert";
        contentEl.textContent = "Failed to load matches.";
        countEl.textContent = "";
        return;
      }

      const matchesData = await matchesRes.json().catch(() => ({}));
      const matches = Array.isArray(matchesData?.matches) ? matchesData.matches : [];
      let tournaments = [];
      if (tournamentsRes?.ok) {
        const tournamentsData = await tournamentsRes.json().catch(() => ({}));
        tournaments = Array.isArray(tournamentsData?.tournaments) ? tournamentsData.tournaments : [];
      }
      const streamersData = streamersRes?.ok
        ? await streamersRes.json().catch(() => ({}))
        : {};
      const streamers = Array.isArray(streamersData?.streamers) ? streamersData.streamers : [];
      const streamsData = streamsRes?.ok
        ? await streamsRes.json().catch(() => ({}))
        : {};
      const streams = Array.isArray(streamsData?.streams) ? streamsData.streams : [];
      const isStreamerUser = !!currentUserPlayerId && streamers.some((entry) => (
        String(entry?.profile_id ?? entry?.player_id ?? "").trim() === currentUserPlayerId
      ));
      const currentStreamer = getStreamerForCurrentUser(streamers, currentUserPlayerId);

      const teamsById = new Map();
      if (teamsRes.ok) {
        const teamsData = await teamsRes.json();
        const teams = Array.isArray(teamsData?.teams) ? teamsData.teams : [];
        teams.forEach((team) => {
          const key = normalizeCode(team?.id);
          if (!key) return;
          teamsById.set(key, {
            id: key,
            name: String(team?.name || key).trim(),
            logo: String(team?.logo || "").trim(),
            timezone: String(team?.timezone || "").trim(),
          });
        });
      }

      const tournamentsById = new Map();
      tournaments.forEach((tournament) => {
        const tournamentId = String(tournament?.id || "").trim();
        if (!tournamentId) return;
        tournamentsById.set(tournamentId, tournament);
      });
      setPageHeading("My Streams");

      if (!isAdminUser && !isStreamerUser) {
        renderRestrictedSectionMessage("This section is available only to users added to streamers.");
        return;
      }

      addButtonEl.classList.remove("cp-hidden");
      addButtonEl.textContent = "Create";
      addButtonEl.onclick = () => {
        openCaptainCreate();
      };
      if (isCreateMode || isEditMode) {
        addButtonEl.classList.add("cp-hidden");
      }

      const ongoingMatches = matches
        .filter((match) => String(match?.time_utc || match?.time || "").trim())
        .filter((match) => !isPastMatch(match))
        .sort((a, b) => parseMatchTimeUtc(a) - parseMatchTimeUtc(b));
      const streamMatchIds = new Set(matches.map((match) => String(match?.id || "").trim()).filter(Boolean));
      const visibleStreams = streams.filter((stream) => (
        String(stream?.entity_type || "").trim().toLowerCase() === "match"
        && streamMatchIds.has(String(stream?.entity_id || stream?.match_id || "").trim())
      ));

      if (isCreateMode) {
        if (!isAdminUser && !currentStreamer) {
          contentEl.className = "captain-alert";
          contentEl.textContent = "Current user is not linked to a streamer.";
          countEl.textContent = "";
          return;
        }
        if (isAdminUser && !streamers.length) {
          contentEl.className = "captain-alert";
          contentEl.textContent = "No streamers available.";
          countEl.textContent = "";
          return;
        }
        renderStreamEditForm(
          currentStreamer || streamers[0] || null,
          teamsById,
          tournamentsById,
          {
            ongoingMatches,
            availableStreamers: streamers,
            allowStreamerSelect: isAdminUser,
          },
          "create"
        );
        return;
      }

      if (isEditMode) {
        const streamToEdit = visibleStreams.find((item) => String(item?.id || "") === editStreamId);
        if (!streamToEdit) {
          contentEl.className = "captain-alert";
          contentEl.textContent = `Stream not found: ${editStreamId}`;
          countEl.textContent = "";
          return;
        }
        const streamerForForm = streamers.find((entry) => Number(entry?.id) === Number(streamToEdit?.streamer_id)) || currentStreamer;
        renderStreamEditForm(streamerForForm, teamsById, tournamentsById, { stream: streamToEdit }, "edit");
        return;
      }

      renderStreams(visibleStreams, teamsById, tournamentsById, {
        showStreamerAvatar: isAdminUser,
      });
    } catch (_error) {
      contentEl.className = "captain-alert";
      contentEl.textContent = "Failed to load data.";
      countEl.textContent = "";
      hintEl.textContent = "";
    } finally {
      isCaptainPageInitializing = false;
      if (captainPageRefreshQueued) {
        captainPageRefreshQueued = false;
        initCaptainPage();
      }
    }
  }

  window.addEventListener("gg-auth-state-change", () => {
    initCaptainPage();
  });

  window.addEventListener("popstate", () => {
    syncCaptainPageStateFromUrl();
    initCaptainPage();
  });

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initCaptainPage);
  } else {
    initCaptainPage();
  }
})();
</script>
