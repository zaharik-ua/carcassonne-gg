<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --muted: #666;
    --border: #e0e0e0;
  }

  body {
    font-family: "Montserrat", sans-serif;
  }

  .captain-wrap {
    display: grid;
    gap: 10px;
    margin: 0 8px 12px;
  }

  .captain-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
  }

  .captain-filters {
    display: grid;
    gap: 6px;
  }

  .captain-filter-label {
    font-size: 12px;
    font-weight: 600;
    color: #333;
  }

  .captain-title {
    font-size: 20px;
    font-weight: 700;
  }

  .captain-sub {
    font-size: 12px;
    color: var(--muted);
  }

  .captain-alert {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    font-size: 14px;
  }

  .captain-list {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .cp-match-row {
    display: flex;
    align-items: center;
    min-height: 48px;
    border-top: 1px solid #ccc;
    padding: 4px 8px;
    box-sizing: border-box;
  }

  .cp-match-row:first-child {
    border-top: none;
  }

  .cp-divider-vertical {
    width: 1px;
    background-color: #dfdfdf;
    margin: 0 6px;
    align-self: stretch;
    border-radius: 1px;
  }

  .cp-player-main {
    flex-grow: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
  }

  .cp-player-avatar {
    width: 30px;
    height: 30px;
    min-width: 30px;
    border-radius: 5px;
    object-fit: cover;
    flex-shrink: 0;
    background: #eef2f6;
  }

  .cp-player-nick {
    font-size: 16px;
    line-height: 1.1;
    color: #222;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cp-player-name {
    font-size: 13px;
    line-height: 1.1;
    color: #666;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cp-player-icons {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }

  .cp-player-icons.cp-player-icons--single {
    justify-content: center;
    min-width: 20px;
  }

  .cp-player-icons img {
    width: 18px;
    height: 18px;
    object-fit: contain;
    display: block;
    flex-shrink: 0;
  }

  .cp-player-icons.cp-player-icons--contacts {
    gap: 7px;
  }

  .cp-player-icons.cp-player-icons--contacts img {
    width: 16px;
    height: auto;
  }

  .cp-player-icons.cp-player-icons--status img {
    width: 14px;
    height: 14px;
  }

  .cp-player-actions {
    display: flex;
    align-items: center;
    gap: 0;
  }

  .cp-edit-btn {
    border: 1px solid #c8ced8;
    background: #fff;
    color: #2f3947;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    line-height: 1;
    margin-left: 10px;
  }

  .cp-edit-btn:hover {
    border-color: #9ea7b3;
  }

  .cp-edit-form {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    display: grid;
    gap: 8px 12px;
  }

  .cp-edit-row {
    display: grid;
    gap: 1px;
  }

  .cp-edit-row label {
    font-size: 12px;
    font-weight: 600;
    color: #333;
  }

  .cp-edit-row input {
    width: 100%;
    border: 1px solid #c8ced8;
    border-radius: 4px;
    height: 30px;
    padding: 4px 8px;
    font: inherit;
    font-size: 14px;
    box-sizing: border-box;
  }

  .cp-edit-row input[type="date"] {
    appearance: none;
    -webkit-appearance: none;
    min-width: 0;
    text-align: left;
    line-height: normal;
    background: #fff;
  }

  .cp-edit-row input[type="date"]::-webkit-date-and-time-value {
    text-align: left;
  }

  .cp-edit-row input[type="date"]::-webkit-datetime-edit {
    padding: 0;
  }

  .cp-edit-row input[type="date"]::-webkit-calendar-picker-indicator {
    opacity: 1;
    cursor: pointer;
  }

  .cp-edit-row input:disabled {
    background: #f3f4f6;
    color: #444;
    cursor: not-allowed;
  }

  .cp-edit-row input.cp-readonly-input {
    background: #f3f4f6;
    color: #444;
  }

  .cp-edit-note {
    display: grid;
    gap: 6px;
    padding: 10px 12px;
    border-radius: 4px;
    background: #f5f8fc;
    border: 1px solid #d6e2f0;
    font-size: 12px;
    color: #334155;
    line-height: 1.45;
  }

  .cp-edit-note-title {
    font-size: 12px;
    font-weight: 700;
    color: #1f2937;
  }

  .cp-edit-note-icons {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .cp-edit-note-icons img {
    width: 14px;
    height: 14px;
    object-fit: contain;
  }

  .cp-edit-row.cp-edit-row-checkbox {
    align-items: center;
  }

  .cp-edit-checkbox {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    color: #333;
    cursor: pointer;
  }

  .cp-edit-checkbox input {
    width: auto;
    height: auto;
    margin: 0;
  }

  .cp-dd {
    position: relative;
    display: inline-flex;
    flex-direction: column;
    width: 100%;
  }

  .cp-dd-btn {
    all: unset;
    box-sizing: border-box;
    width: 100%;
    height: 30px;
    border: 1px solid #c8ced8;
    border-radius: 4px;
    background: #fff;
    color: #2f3947;
    font-size: 14px;
    padding: 4px 8px;
    display: inline-flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    cursor: pointer;
  }

  .cp-dd-btn:hover,
  .cp-dd-btn:focus-visible,
  .cp-dd-btn.open {
    border-color: #9ea7b3;
  }

  .cp-dd-btn.disabled {
    background: #f3f4f6;
    color: #444;
    cursor: not-allowed;
  }

  .cp-dd-btn-content {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cp-dd-btn-content span {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .cp-dd-flag {
    width: 14px;
    height: 10px;
    border-radius: 2px;
    object-fit: cover;
    flex-shrink: 0;
  }

  .cp-dd-chevron {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #6f7785;
    font-size: 10px;
    transition: transform 0.18s ease;
  }

  .cp-dd-btn.open .cp-dd-chevron {
    transform: rotate(180deg);
  }

  .cp-dd-menu {
    position: absolute;
    left: 0;
    top: calc(100% + 4px);
    min-width: 100%;
    width: max-content;
    max-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: #fff;
    border: 1px solid #d5dbe4;
    border-radius: 4px;
    box-shadow: 0 8px 18px rgba(15, 28, 48, 0.14);
    opacity: 0;
    pointer-events: none;
    transform: translateY(4px);
    transition: opacity 0.16s ease, transform 0.16s ease, max-height 0.16s ease;
    z-index: 20;
  }

  .cp-dd-menu.open {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
    overflow-y: auto;
    overflow-x: hidden;
  }

  .cp-dd-option {
    all: unset;
    box-sizing: border-box;
    padding: 5px 8px;
    border-top: 1px solid #edf1f6;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #2f3947;
    line-height: 1.2;
    white-space: nowrap;
    cursor: pointer;
  }

  .cp-dd-option:first-child {
    border-top: none;
  }

  .cp-dd-option:hover {
    background: #f5f5f5;
  }

  .cp-dd-option.active {
    background: #e4f0fb;
  }

  .cp-dd-option.disabled {
    color: #9aa3af;
    cursor: not-allowed;
    background: #fff;
  }

  .cp-edit-actions {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    grid-column: 1 / -1;
  }

  .cp-btn {
    border: 1px solid #c8ced8;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    line-height: 1;
  }

  .cp-btn-primary {
    background: #1a73b7;
    color: #fff;
    border-color: #1a73b7;
  }

  .cp-btn-secondary {
    background: #eef2f6;
    color: #333;
  }

  .cp-btn-danger {
    background: #fff3f3;
    border-color: #e6b4b4;
    color: #a12a2a;
    margin-left: auto;
  }

  .cp-btn:disabled {
    cursor: not-allowed;
    opacity: 0.72;
  }

  .cp-btn-danger:disabled {
    background: #f3f4f6;
    border-color: #d7dbe2;
    color: #8c96a4;
  }

  .cp-edit-error {
    color: #c62828;
    font-size: 12px;
    font-weight: 600;
    grid-column: 1 / -1;
  }

  .cp-action-status {
    grid-column: 1 / -1;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 20px;
    font-size: 12px;
    font-weight: 600;
    color: #334155;
  }

  .cp-action-status img {
    width: 16px;
    height: 16px;
    object-fit: contain;
    flex-shrink: 0;
  }

  .cp-action-status.cp-action-status--success {
    color: #166534;
  }

  .cp-action-status.cp-action-status--error {
    color: #b91c1c;
  }

  .cp-hidden {
    display: none !important;
  }

  @media (max-width: 600px) {
    .cp-edit-row input[type="date"] {
      max-width: 100%;
      padding-right: 36px;
      background: #fff;
      color: #2f3947;
      -webkit-text-fill-color: #2f3947;
      opacity: 1;
    }

    .cp-edit-row input.cp-readonly-input[type="date"] {
      background: #f3f4f6;
      color: #444;
      -webkit-text-fill-color: #444;
    }

    .cp-edit-row input:not([type="checkbox"]) {
      font-size: 16px;
    }

    .cp-edit-row input:not([type="checkbox"]) {
      font-size: 16px !important;
    }
  }

  @media (min-width: 600px) {
    .cp-edit-form {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

  }
</style>

<div class="captain-wrap">
  <div class="captain-head">
    <div class="captain-title"></div>
    <div>
      <span id="captainCount" class="captain-sub"></span>
      <button id="captainAddButton" class="cp-edit-btn cp-hidden" type="button">Create</button>
    </div>
  </div>
  <div id="captainFilters" class="captain-filters cp-hidden"></div>
  <div id="captainContent" class="captain-alert">Loading...</div>
  <div id="captainHint" class="captain-sub"></div>
</div>

<script>
(function () {
  const AUTH_BASE = window.AUTH_BASE_URL || "https://api.carcassonne.gg";
  const ME_URL = `${AUTH_BASE}/auth/me`;
  const TEAMS_URL = `${AUTH_BASE}/teams`;
  const PROFILES_PUBLIC_URL = `${AUTH_BASE}/profiles/public`;
  const PROFILES_URL = `${AUTH_BASE}/profiles`;
  const PROFILE_CONTACTS_URL = `${AUTH_BASE}/profiles/contacts`;
  const PROFILE_GET_BGA_DATA_URL = (playerId) => `${PROFILES_URL}/${encodeURIComponent(playerId)}/get-bga-data`;
  const CAPTAIN_VIEWS = {
    PLAYERS: "players",
  };
  const CONTACT_ICONS = {
    telegram: "https://carcassonne.gg/gallery/telegram.png",
    whatsapp: "https://carcassonne.gg/gallery/whatsapp.png",
    discord: "https://carcassonne.gg/gallery/discord.png",
    instagram: "https://carcassonne.gg/gallery/instagram.png",
    contact_email: "https://carcassonne.gg/gallery/mail.png",
  };
  const GG_LOGO_URL = "https://carcassonne.gg/gallery/GG-logo.svg";
  const MASTER_TITLE_LOGO_URL = "https://carcassonne.gg/gallery/master-title-logo.png";
  const ACTIVE_STATUS_LOGO_URL = "https://carcassonne.gg/gallery/active.png";
  const INACTIVE_STATUS_LOGO_URL = "https://carcassonne.gg/gallery/inactive.png";
  const REMOVED_STATUS_LOGO_URL = "https://carcassonne.gg/gallery/profile-removed.png";
  const contentEl = document.getElementById("captainContent");
  const countEl = document.getElementById("captainCount");
  const addButtonEl = document.getElementById("captainAddButton");
  const filtersEl = document.getElementById("captainFilters");
  const hintEl = document.getElementById("captainHint");
  const titleEl = document.querySelector(".captain-title");
  let isCaptainPageInitializing = false;
  let captainPageRefreshQueued = false;

  function normalizeCode(value) {
    return String(value || "").trim().toUpperCase();
  }

  function getAssociationOverrideFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return normalizeCode(params.get("association") || "");
  }

  function buildCaptainUrl(options = {}) {
    const url = new URL(window.location.href);
    url.searchParams.delete("view");
    const nextAssociation = normalizeCode(options.association || "");
    if (nextAssociation) url.searchParams.set("association", nextAssociation);
    else url.searchParams.delete("association");
    url.searchParams.delete("edit");
    url.searchParams.delete("create");
    url.searchParams.delete("player_id");
    return url.toString();
  }

  function readLegacyCaptainSubviewFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const editRaw = String(params.get("edit") || "").trim().toLowerCase();
    const createRaw = String(params.get("create") || "").trim().toLowerCase();
    const isEdit = editRaw === "1" || editRaw === "true" || editRaw === "yes" || editRaw === "on";
    const isCreate = createRaw === "1" || createRaw === "true" || createRaw === "yes" || createRaw === "on";
    return {
      mode: isEdit ? "edit" : isCreate ? "create" : "list",
      playerId: String(params.get("player_id") || "").trim(),
    };
  }

  const legacySubviewState = readLegacyCaptainSubviewFromUrl();
  const captainPageState = {
    view: CAPTAIN_VIEWS.PLAYERS,
    associationOverride: getAssociationOverrideFromUrl(),
    associationOverrideTouched: new URLSearchParams(window.location.search).has("association"),
    mode: legacySubviewState.mode,
    playerId: legacySubviewState.playerId,
  };

  function sanitizeCaptainPageState() {
    captainPageState.view = CAPTAIN_VIEWS.PLAYERS;
    captainPageState.associationOverride = normalizeCode(captainPageState.associationOverride);
    captainPageState.mode = captainPageState.mode === "edit" || captainPageState.mode === "create"
      ? captainPageState.mode
      : "list";
    captainPageState.playerId = String(captainPageState.playerId || "").trim();
    if (captainPageState.mode !== "edit") {
      captainPageState.playerId = "";
    } else {
      captainPageState.playerId = String(captainPageState.playerId || "").trim();
      if (!captainPageState.playerId) {
        captainPageState.mode = "list";
      }
    }
    if (captainPageState.mode === "create") {
      captainPageState.playerId = "";
    }
  }

  function syncCaptainPageStateFromUrl() {
    captainPageState.view = CAPTAIN_VIEWS.PLAYERS;
    captainPageState.associationOverride = getAssociationOverrideFromUrl();
    captainPageState.associationOverrideTouched = new URLSearchParams(window.location.search).has("association");
    captainPageState.mode = "list";
    captainPageState.playerId = "";
    sanitizeCaptainPageState();
  }

  function syncCaptainUrl(replace) {
    const nextUrl = buildCaptainUrl({
      view: captainPageState.view,
      association: captainPageState.associationOverride || null,
    });
    if (replace) window.history.replaceState({}, "", nextUrl);
    else window.history.pushState({}, "", nextUrl);
    window.dispatchEvent(new CustomEvent("captain-url-change", {
      detail: {
        view: captainPageState.view,
        },
    }));
  }

  function applyCaptainPageState(nextState = {}, options = {}) {
    if (Object.prototype.hasOwnProperty.call(nextState, "view")) {
      captainPageState.view = nextState.view;
    }
    if (Object.prototype.hasOwnProperty.call(nextState, "associationOverride")) {
      captainPageState.associationOverride = nextState.associationOverride;
      captainPageState.associationOverrideTouched = true;
    }
    if (Object.prototype.hasOwnProperty.call(nextState, "mode")) {
      captainPageState.mode = nextState.mode;
    }
    if (Object.prototype.hasOwnProperty.call(nextState, "playerId")) {
      captainPageState.playerId = nextState.playerId;
    }
    sanitizeCaptainPageState();
    if (options.syncUrl) {
      syncCaptainUrl(!!options.replaceUrl);
    }
    if (options.refresh !== false) {
      initCaptainPage();
    }
  }

  function openCaptainCreate(view) {
    applyCaptainPageState({
      view,
      mode: "create",
      playerId: "",
    });
  }

  function openCaptainEdit(view, target = {}) {
    applyCaptainPageState({
      view,
      mode: "edit",
      playerId: String(target.playerId || "").trim(),
    });
  }

  function resetCaptainSubview(view) {
    applyCaptainPageState({
      view: view || captainPageState.view,
      mode: "list",
      playerId: "",
    });
  }

  sanitizeCaptainPageState();
  syncCaptainUrl(true);

  function clearFilters() {
    if (!filtersEl) return;
    filtersEl.innerHTML = "";
    filtersEl.classList.add("cp-hidden");
  }

  function renderCaptainLoadingState() {
    clearFilters();
    hintEl.textContent = "";
    countEl.textContent = "";
    addButtonEl.classList.add("cp-hidden");
    addButtonEl.onclick = null;
    contentEl.className = "captain-alert";
    contentEl.textContent = "Loading...";
  }

  function renderAdminAssociationFilter(optionsList, selectedValue, onSelect) {
    if (!filtersEl) return;
    const options = (Array.isArray(optionsList) ? optionsList : [])
      .map((option) => ({
        value: normalizeCode(option?.value || ""),
        label: String(option?.label || option?.value || "").trim(),
        logo: String(option?.logo || "").trim(),
      }))
      .filter((option) => option.label);
    if (!options.length) {
      clearFilters();
      return;
    }

    let value = normalizeCode(selectedValue);
    if (!options.some((option) => option.value === value)) {
      value = String(options[0]?.value || "").trim();
    }

    filtersEl.innerHTML = "";
    filtersEl.classList.remove("cp-hidden");

    const label = document.createElement("div");
    label.className = "captain-filter-label";
    label.textContent = "Filter";
    filtersEl.appendChild(label);

    const root = document.createElement("div");
    root.className = "cp-dd";

    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "cp-dd-btn";
    const btnContent = document.createElement("span");
    btnContent.className = "cp-dd-btn-content";
    const chevron = document.createElement("span");
    chevron.className = "cp-dd-chevron";
    chevron.textContent = "▾";
    btn.appendChild(btnContent);
    btn.appendChild(chevron);

    const menu = document.createElement("div");
    menu.className = "cp-dd-menu";

    const findOption = (optionValue) => {
      const normalizedValue = normalizeCode(optionValue);
      return options.find((option) => option.value === normalizedValue) || null;
    };

    const renderButtonContent = () => {
      btnContent.innerHTML = "";
      const selected = findOption(value);
      if (!selected) return;
      if (selected.logo) {
        const img = document.createElement("img");
        img.className = "cp-dd-flag";
        img.src = selected.logo;
        img.alt = "";
        btnContent.appendChild(img);
      }
      const text = document.createElement("span");
      text.textContent = selected.label || selected.value;
      btnContent.appendChild(text);
    };

    const close = () => {
      menu.classList.remove("open");
      menu.style.maxHeight = "0px";
      btn.classList.remove("open");
    };

    const open = () => {
      renderMenuOptions();
      menu.classList.add("open");
      menu.style.maxHeight = `${menu.scrollHeight}px`;
      btn.classList.add("open");
    };

    const setValue = (nextValue) => {
      const next = findOption(nextValue);
      if (!next || next.value === value) return;
      value = next.value;
      if (typeof onSelect === "function") onSelect(value);
    };

    const createOptionButton = (option) => {
      const optionBtn = document.createElement("button");
      optionBtn.type = "button";
      optionBtn.className = "cp-dd-option";
      optionBtn.dataset.value = option.value;
      if (option.logo) {
        const img = document.createElement("img");
        img.className = "cp-dd-flag";
        img.src = option.logo;
        img.alt = "";
        optionBtn.appendChild(img);
      }
      optionBtn.appendChild(document.createTextNode(option.label || option.value));
      optionBtn.classList.toggle("active", option.value === value);
      optionBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        close();
        setValue(option.value);
      });
      return optionBtn;
    };

    const renderMenuOptions = () => {
      menu.querySelectorAll(".cp-dd-option").forEach((node) => node.remove());
      options
        .forEach((option) => {
          menu.appendChild(createOptionButton(option));
        });
    };

    btn.addEventListener("click", (event) => {
      event.stopPropagation();
      if (menu.classList.contains("open")) {
        close();
      } else {
        open();
      }
    });

    document.addEventListener("click", (event) => {
      if (!root.contains(event.target)) close();
    });

    renderButtonContent();
    renderMenuOptions();
    root.appendChild(btn);
    root.appendChild(menu);
    filtersEl.appendChild(root);
  }

  function renderRestrictedSectionMessage(text) {
    contentEl.className = "captain-alert";
    contentEl.textContent = String(text || "You do not have access to this section.").trim();
    countEl.textContent = "";
    hintEl.textContent = "";
  }

  function renderNoPlayersMessage(associationCode) {
    contentEl.className = "captain-alert";
    contentEl.textContent = `No players found for association ${associationCode}.`;
    countEl.textContent = "";

  async function loadProfileContactsByIds(playerIds) {
    const ids = Array.from(new Set(
      (Array.isArray(playerIds) ? playerIds : [])
        .map((id) => String(id || "").trim())
        .filter(Boolean)
    ));
    const map = new Map();
    await Promise.all(ids.map(async (playerId) => {
      try {
        const res = await fetch(`${PROFILE_CONTACTS_URL}/${encodeURIComponent(playerId)}`, {
          method: "GET",
          credentials: "include",
        });
        if (!res.ok) {
          map.set(playerId, {});
          return;
        }
        const data = await res.json().catch(() => ({}));
        map.set(playerId, data?.contacts && typeof data.contacts === "object" ? data.contacts : {});
      } catch (_error) {
        map.set(playerId, {});
      }
    }));
    return map;
  }

  function isTruthyFlag(value) {
    if (typeof value === "number") return value === 1;
    if (typeof value === "boolean") return value;
    const raw = String(value || "").trim().toLowerCase();
    return raw === "1" || raw === "true" || raw === "yes" || raw === "on";
  }

  function buildBgaAvatarUrl(playerId, avatar) {
    const playerIdText = String(playerId || "").trim();
    const avatarText = String(avatar || "").trim();
    if (!avatarText) return "";

    if (/^https?:\/\//i.test(avatarText)) {
      return avatarText;
    }

    if (avatarText === "x00000") {
      return "https://x.boardgamearena.net/data/avatar/default_184.jpg";
    }

    const defaultMatch = avatarText.match(/^_def_(\d+)$/);
    if (defaultMatch) {
      const defaultAvatarId = defaultMatch[1].padStart(4, "0");
      return `https://x.boardgamearena.net/data/avatar/defaults/default-${defaultAvatarId}.jpg`;
    }

    if (!playerIdText) return "";
    if (!/^\d+$/.test(playerIdText)) return "";

    const playerIdNumber = Number(playerIdText);
    if (!Number.isFinite(playerIdNumber)) return "";

    const firstFolder = String(Math.floor(playerIdNumber / 100000000));
    const secondFolder = String(Math.floor(playerIdNumber / 1000000));
    const thirdFolder = String(Math.floor(playerIdNumber / 1000));

    return `https://x.boardgamearena.net/data/avatar/${firstFolder}/${secondFolder}/${thirdFolder}/${playerIdText}_184.jpg?h=${encodeURIComponent(avatarText)}`;
  }

  function applyProfileBgaPayload(targetProfile, profilePayload) {
    if (!targetProfile || !profilePayload || typeof profilePayload !== "object") return targetProfile || null;
    const nextNickname = String(profilePayload?.bga_nickname || "").trim();
    if (nextNickname) {
      targetProfile.bga_nickname = nextNickname;
    }
    if (Object.prototype.hasOwnProperty.call(profilePayload, "avatar")) {
      targetProfile.avatar = String(profilePayload.avatar || "").trim();
    }
    if (Object.prototype.hasOwnProperty.call(profilePayload, "status")) {
      targetProfile.status = String(profilePayload.status || "").trim() || "Active";
    }
    return targetProfile;
  }

  async function triggerPlayerBgaDataRefresh(playerId, options = {}) {
    const normalizedPlayerId = String(playerId || "").trim();
    if (!normalizedPlayerId) return { ok: false, message: "Missing player id." };

    try {
      const response = await fetch(PROFILE_GET_BGA_DATA_URL(normalizedPlayerId), {
        method: "POST",
        credentials: "include",
      });
      const rawText = await response.text().catch(() => "");
      let result = {};
      try {
        result = rawText ? JSON.parse(rawText) : {};
      } catch (_error) {
        result = {};
      }
      if (!response.ok || !result?.ok) {
        const failure = {
          ok: false,
          message: String(result?.message || rawText || "Failed to get BGA data.").trim() || "Failed to get BGA data.",
          result,
        };
        if (typeof options.onError === "function") {
          options.onError(failure);
        }
        return failure;
      }

      if (typeof options.onProfile === "function") {
        options.onProfile(result?.profile || {}, result);
      }
      if (typeof options.onSuccess === "function") {
        options.onSuccess(result);
      }
      return { ok: true, result };
    } catch (_error) {
      const failure = { ok: false, message: "Failed to get BGA data." };
      if (typeof options.onError === "function") {
        options.onError(failure);
      }
      return failure;
    }
  }

          value: String(opt?.value || "").trim(),
          label: String(opt?.label || opt?.value || "").trim(),
          disabled: !!opt?.disabled,
        }))
        .filter((opt) => cfg.allowEmpty ? true : !!opt.value);

      let value = String(initialValue || "").trim();
      const allowBlankValue = !!cfg.allowEmpty;
      if (!normalizedOptions.some((opt) => opt.value === value) && !(allowBlankValue && value === "") && normalizedOptions[0]) {
        value = normalizedOptions[0].value;

      const root = document.createElement("div");

      const btn = document.createElement("button");

      const menu = document.createElement("div");
      menu.className = "cp-dd-menu";

      const findOption = (v) => normalizedOptions.find((opt) => opt.value === String(v || "").trim()) || null;

      const renderButtonContent = () => {
        btnContent.innerHTML = "";
        const selected = findOption(value);
        if (!selected) return;
        const text = document.createElement("span");
        text.textContent = selected.label || selected.value;
        btnContent.appendChild(text);
      };

      const close = () => {
        menu.classList.remove("open");
        menu.style.maxHeight = "0px";
        btn.classList.remove("open");
      };

      const open = () => {
        if (btn.disabled) return;
        menu.classList.add("open");
        menu.style.maxHeight = `${menu.scrollHeight}px`;
        btn.classList.add("open");
      };

      const setValue = (newValue, trigger) => {
        const next = findOption(newValue);
        if (!next) return;
        value = next.value;
        menu.querySelectorAll(".cp-dd-option").forEach((optEl) => {
          optEl.classList.toggle("active", String(optEl.dataset.value) === value);
        });
        renderButtonContent();
        if (trigger && typeof cfg.onChange === "function") cfg.onChange(value);
      };

      normalizedOptions.forEach((opt) => {
        const optionBtn = document.createElement("button");
        optionBtn.type = "button";
        optionBtn.className = "cp-dd-option";
        optionBtn.dataset.value = opt.value;
        if (opt.disabled) optionBtn.classList.add("disabled");
        optionBtn.appendChild(document.createTextNode(opt.label || opt.value));
        if (opt.value === value) optionBtn.classList.add("active");
        optionBtn.addEventListener("click", (event) => {
          event.stopPropagation();
          if (opt.disabled) return;
          setValue(opt.value, true);
          close();
        });
        menu.appendChild(optionBtn);
      });

      btn.addEventListener("click", (event) => {
        event.stopPropagation();
        const isOpen = menu.classList.contains("open");
        dropdowns.forEach((dd) => dd.close());
        if (!isOpen) open();
      });

      renderButtonContent();
      root.appendChild(btn);
      root.appendChild(menu);

      const api = {
        root,
        close,
        getValue: () => value,
      };
      dropdowns.push(api);
      return api;
    };

    const createDropdown = (initialValue, options, cfg = {}) => {
      const normalizedOptions = (Array.isArray(options) ? options : [])
        .map((opt) => ({
          value: String(opt?.value || "").trim(),
          label: String(opt?.label || opt?.value || "").trim(),
          disabled: !!opt?.disabled,
        }))
        .filter((opt) => cfg.allowEmpty ? true : !!opt.value);

      let value = String(initialValue || "").trim();
      const allowBlankValue = !!cfg.allowEmpty;
      if (!normalizedOptions.some((opt) => opt.value === value) && !(allowBlankValue && value === "") && normalizedOptions[0]) {
        value = normalizedOptions[0].value;
      }

      const root = document.createElement("div");
      root.className = "cp-dd";

      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "cp-dd-btn";
      const btnContent = document.createElement("span");
      btnContent.className = "cp-dd-btn-content";
      const chevron = document.createElement("span");
      chevron.className = "cp-dd-chevron";
      chevron.textContent = "▾";
      btn.appendChild(btnContent);
      btn.appendChild(chevron);

      const menu = document.createElement("div");
      menu.className = "cp-dd-menu";

      const findOption = (v) => normalizedOptions.find((opt) => opt.value === String(v || "").trim()) || null;

      const renderButtonContent = () => {
        btnContent.innerHTML = "";
        const selected = findOption(value);
        if (!selected) return;
        const text = document.createElement("span");
        text.textContent = selected.label || selected.value;
        btnContent.appendChild(text);
      };

      const close = () => {
        menu.classList.remove("open");
        menu.style.maxHeight = "0px";
        btn.classList.remove("open");
      };

      const open = () => {
        if (btn.disabled) return;
        menu.classList.add("open");
        menu.style.maxHeight = `${menu.scrollHeight}px`;
        btn.classList.add("open");
      };

      const setValue = (newValue, trigger) => {
        const next = findOption(newValue);
        if (!next) return;
        value = next.value;
        menu.querySelectorAll(".cp-dd-option").forEach((optEl) => {
          optEl.classList.toggle("active", String(optEl.dataset.value) === value);
        });
        renderButtonContent();
        if (trigger && typeof cfg.onChange === "function") cfg.onChange(value);
      };

      normalizedOptions.forEach((opt) => {
        const optionBtn = document.createElement("button");
        optionBtn.type = "button";
        optionBtn.className = "cp-dd-option";
        optionBtn.dataset.value = opt.value;
        if (opt.disabled) optionBtn.classList.add("disabled");
        optionBtn.appendChild(document.createTextNode(opt.label || opt.value));
        if (opt.value === value) optionBtn.classList.add("active");
        optionBtn.addEventListener("click", (event) => {
          event.stopPropagation();
          if (opt.disabled) return;
          setValue(opt.value, true);
          close();
        });
        menu.appendChild(optionBtn);
      });

      btn.addEventListener("click", (event) => {
        event.stopPropagation();
        const isOpen = menu.classList.contains("open");
        dropdowns.forEach((dd) => dd.close());
        if (!isOpen) open();
      });

      renderButtonContent();
      root.appendChild(btn);
      root.appendChild(menu);

      const api = {
        root,
        close,
        getValue: () => value,
        setOnChange: (handler) => {
          cfg.onChange = typeof handler === "function" ? handler : null;
        },
      };
      dropdowns.push(api);
      return api;
    };

  async function initCaptainPage() {
    if (isCaptainPageInitializing) {
      captainPageRefreshQueued = true;
      return;
    }
    isCaptainPageInitializing = true;
    try {
      renderCaptainLoadingState();
      const isEditMode = captainPageState.mode === "edit";
      const isCreateMode = captainPageState.mode === "create";
      const editPlayerId = String(captainPageState.playerId || "").trim();
      const associationOverride = captainPageState.associationOverride;
      let associationCode = associationOverride;
      let captainAssociationCode = "";
      let isCaptainUser = false;
      let isAdminUser = false;
      let currentUserPlayerId = "";

      try {
        const meRes = await fetch(ME_URL, { method: "GET", credentials: "include" });
        if (meRes.ok) {
          const meData = await meRes.json();
          const meUser = meData?.authenticated ? meData?.user : null;
          const meAssociation = normalizeCode(
            meUser?.profile?.association ?? meUser?.association ?? ""
          );
          isAdminUser = meUser?.isAdmin === true;
          isCaptainUser = Number(
            meUser?.profile?.team_captain ??
            meUser?.team_captain ??
            (meUser?.profile?.teamCaptain === true ? 1 : 0)
          ) === 1;
          currentUserPlayerId = getCurrentUserProfileId(meUser);
          captainAssociationCode = meAssociation;
        }
      } catch (_error) {
        // keep defaults; access rules below will handle unauthorized state
      }

      if (!isAdminUser && (!isCaptainUser || !captainAssociationCode)) {
        renderRestrictedSectionMessage("This section is available only for captains.");
        return;
      }

      if (!associationOverride) {
        associationCode = isAdminUser ? associationCode : captainAssociationCode;
      }

      const [teamsRes, profilesRes] = await Promise.all([
        fetch(TEAMS_URL, { method: "GET" }),
        fetch(PROFILES_PUBLIC_URL, { method: "GET" }),
      ]);

      const teamsById = new Map();
      if (teamsRes.ok) {
        const teamsData = await teamsRes.json();
        const teams = Array.isArray(teamsData?.teams) ? teamsData.teams : [];
        teams.forEach((team) => {
          const key = normalizeCode(team?.id);
          if (!key) return;
          teamsById.set(key, {
            id: key,
            name: String(team?.name || key).trim(),
            logo: String(team?.logo || "").trim(),
            timezone: String(team?.timezone || "").trim(),
          });
        });
      }

      const allProfiles = [];
      if (profilesRes.ok) {
        const profilesData = await profilesRes.json().catch(() => ({}));
        const profiles = Array.isArray(profilesData?.profiles) ? profilesData.profiles : [];
        profiles.forEach((profile) => {
          const playerId = String(profile?.id ?? profile?.player_id ?? "").trim();
          if (!playerId) return;
          allProfiles.push({
            id: playerId,
            bga_nickname: String(profile?.bga_nickname || "").trim(),
            avatar: String(profile?.avatar || "").trim(),
            name: String(profile?.name || "").trim(),
            association: normalizeCode(profile?.association),
            team_captain: profile?.team_captain,
            status: String(profile?.status || "").trim(),
            created_by: String(profile?.created_by || "").trim(),
            master_title: profile?.master_title,
            master_title_date: String(profile?.master_title_date || "").trim(),
          });
        });
      }

      addButtonEl.classList.remove("cp-hidden");
      addButtonEl.textContent = "Create";
      addButtonEl.onclick = () => {
        openCaptainCreate(CAPTAIN_VIEWS.PLAYERS);
      };
      if (isCreateMode || isEditMode) {
        addButtonEl.classList.add("cp-hidden");
      }

      const defaultAdminAssociationCode = normalizeCode(
        associationOverride || captainAssociationCode || Array.from(teamsById.keys())[0] || ""
      );
      const playersAssociationCode = isAdminUser
        ? defaultAdminAssociationCode
        : normalizeCode(associationCode || captainAssociationCode);
      const playersAssociationName = String(
        teamsById.get(playersAssociationCode)?.name || playersAssociationCode || "Players"
      ).trim();

      if (isAdminUser && !isCreateMode && !isEditMode) {
        const playerFilterOptions = Array.from(teamsById.values())
          .sort((a, b) => String(a?.name || "").localeCompare(String(b?.name || "")))
          .map((team) => ({
            value: team.id,
            label: team.name,
            logo: team.logo,
          }));
        renderAdminAssociationFilter(playerFilterOptions, playersAssociationCode, (nextAssociation) => {
          applyCaptainPageState({
            view: CAPTAIN_VIEWS.PLAYERS,
            associationOverride: normalizeCode(nextAssociation),
            mode: "list",
            playerId: "",
          }, { syncUrl: true });
        });
      }

      const players = allProfiles
        .filter((profile) => normalizeCode(profile?.association) === playersAssociationCode)
        .sort((a, b) => String(a?.bga_nickname || "").localeCompare(String(b?.bga_nickname || "")));

      if (!players.length) {
        renderNoPlayersMessage(playersAssociationCode || associationCode);
        return;
      }

      const contactsByPlayerId = await loadProfileContactsByIds(players.map((player) => player?.id));
      const playersWithContacts = players.map((player) => ({
        ...player,
        ...(contactsByPlayerId.get(String(player?.id || "").trim()) || {}),
      }));

      if (isCreateMode) {
        setPageHeading("Players");
        renderPlayerCreateForm({
          associationCode: playersAssociationCode,
          canEditAssociation: isAdminUser,
        });
      } else if (isEditMode && editPlayerId) {
        const playerToEdit = playersWithContacts.find((p) => String(p?.id || "") === editPlayerId);
        if (!playerToEdit) {
          contentEl.className = "captain-alert";
          contentEl.textContent = `Player not found: ${editPlayerId}`;
          countEl.textContent = "";
          return;
        }
        setPageHeading(String(playerToEdit?.bga_nickname || playerToEdit?.id || editPlayerId));
        renderPlayerEditForm(playerToEdit, { currentUserPlayerId, isGlobalAdmin: isAdminUser });
      } else {
        setPageHeading(`Players: ${playersAssociationName}`);
        renderPlayers(playersWithContacts);
      }

      if (associationOverride) {
        hintEl.textContent = `association override: ${associationOverride}`;
      } else {
        hintEl.textContent = "";
      }
    } catch (_error) {
      contentEl.className = "captain-alert";
      contentEl.textContent = "Failed to load data.";
      countEl.textContent = "";
      hintEl.textContent = "";
    } finally {
      isCaptainPageInitializing = false;
      if (captainPageRefreshQueued) {
        captainPageRefreshQueued = false;
        initCaptainPage();
      }
    }
  }

  window.addEventListener("gg-auth-state-change", () => {
    initCaptainPage();
  });

  window.addEventListener("popstate", () => {
    syncCaptainPageStateFromUrl();
    initCaptainPage();
  });

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initCaptainPage);
  } else {
    initCaptainPage();
  }
})();
</script>
