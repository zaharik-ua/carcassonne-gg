          parent.insertBefore(afterParagraph, blockNode.nextSibling);
        }
      } else {
        marker.replaceWith(blockNode);
      }
    };

    const removeQuoteBlock = (quoteBlock) => {
      const targetBlock = quoteBlock && editor.contains(quoteBlock) ? quoteBlock : null;
      if (!targetBlock) return;
      targetBlock.remove();
      normalizeEditorHtml();
      placeCaretAtEnd();
      updateToolbarState();
      setEditorStatus("Quote removed.");
    };

    const convertQuoteBlockToText = (quoteBlock) => {
      const targetBlock = quoteBlock && editor.contains(quoteBlock) ? quoteBlock : null;
      if (!targetBlock) return;

      const authorText = getTextWithLineBreaksFromNode(targetBlock.querySelector(".news-quote-author"))
        .replace(/\s+/g, " ")
        .replace(/:+$/g, "")
        .trim();
      const quoteText = getTextWithLineBreaksFromNode(targetBlock.querySelector(".news-quote-text"));
      const fragment = document.createDocumentFragment();
      let focusTarget = null;

      if (authorText) {
        focusTarget = createParagraphFromText(authorText);
        fragment.appendChild(focusTarget);
      }
      if (quoteText) {
        focusTarget = createParagraphFromText(quoteText);
        fragment.appendChild(focusTarget);
      }
      if (!focusTarget) {
        focusTarget = createParagraphFromText("");
        fragment.appendChild(focusTarget);
      }

      targetBlock.replaceWith(fragment);
      focusBlockEnd(focusTarget);
      setSelectedImage(null);
      updateToolbarState();
      setEditorStatus("Quote converted to text.");
    };

    const insertDescriptionQuote = () => {
      const targetRange = rememberEditorSelection()
        || (savedEditorRange ? savedEditorRange.cloneRange() : null);
      const activeQuoteBlock = getQuoteBlockFromRange(targetRange);
      if (activeQuoteBlock) {
        preserveEditorScroll(() => convertQuoteBlockToText(activeQuoteBlock));
        return;
      }
      const selectedQuoteText = targetRange && !targetRange.collapsed
        ? getSelectedTextFromRange(targetRange)
        : "";
      const quoteBlock = createEditableQuoteBlock(selectedQuoteText);
      insertBlockAtCurrentSelection(quoteBlock);
      focusQuoteField(quoteBlock, selectedQuoteText ? ".news-quote-text" : ".news-quote-author");
      setSelectedImage(null);
      updateToolbarState();
      setEditorStatus("Quote added.");
    };

    const isSectionTitleElement = (node) => (
      node?.nodeType === Node.ELEMENT_NODE
      && (
        node.classList?.contains("news-section-title")
        || /^H[1-6]$/i.test(node.tagName || "")
      )
    );

    const getSectionTitleFromNode = (node) => {
      const element = node?.nodeType === Node.ELEMENT_NODE ? node : node?.parentElement;
      const sectionTitle = element?.closest?.(".news-section-title,h1,h2,h3,h4,h5,h6") || null;
      return sectionTitle && editor.contains(sectionTitle) ? sectionTitle : null;
    };

    const getSectionTitleFromRange = (range) => {
      if (!range) return null;
      const nodes = [
        range.startContainer,
        range.endContainer,
        range.commonAncestorContainer,
      ];
      for (const node of nodes) {
        const sectionTitle = getSectionTitleFromNode(node);
        if (sectionTitle) return sectionTitle;
      }
      return null;
    };

    const getEditableTextBlockFromRange = (range) => {
      if (!range) return null;
      const element = range.startContainer.nodeType === Node.ELEMENT_NODE
        ? range.startContainer
        : range.startContainer.parentElement;
      const block = element?.closest?.(".news-section-title,h1,h2,h3,h4,h5,h6,p,div") || null;
      if (!block || block === editor || !editor.contains(block)) return null;
      if (getQuoteBlockFromNode(block)) return null;
      if (block.querySelector?.("img")) return null;
      return block;
    };

    const focusBlockEnd = (block) => {
      if (!block || !editor.contains(block)) return;
      const range = document.createRange();
      range.selectNodeContents(block);
      range.collapse(false);
      restoreSelectionRange(range);
      savedEditorRange = range.cloneRange();
    };

    const replaceEditableBlock = (block, useSectionTitle) => {
      const replacement = document.createElement(useSectionTitle ? "h2" : "p");
      if (useSectionTitle) replacement.className = "news-section-title";
      while (block.firstChild) replacement.appendChild(block.firstChild);
      if (!replacement.childNodes.length) replacement.appendChild(document.createElement("br"));
      block.replaceWith(replacement);
      return replacement;
    };

    const toggleDescriptionSectionTitle = () => {
      const targetRange = rememberEditorSelection()
        || (savedEditorRange ? savedEditorRange.cloneRange() : null);
      const block = getEditableTextBlockFromRange(targetRange);
      if (!block) {
        setEditorStatus("Place the cursor in a text row.");
        return;
      }

      const shouldUseSectionTitle = !isSectionTitleElement(block);
      const replacement = replaceEditableBlock(block, shouldUseSectionTitle);
      focusBlockEnd(replacement);
      setSelectedImage(null);
      updateToolbarState();
      setEditorStatus(shouldUseSectionTitle ? "Section title applied." : "Section title removed.");
    };

    const insertParagraphAfterSectionTitle = (sectionTitle) => {
      if (!sectionTitle || !editor.contains(sectionTitle)) return;
      const paragraph = document.createElement("p");
      paragraph.appendChild(document.createElement("br"));
      sectionTitle.insertAdjacentElement("afterend", paragraph);
      focusBlockEnd(paragraph);
      updateToolbarState();
    };

    const applyLinkToRange = (range, href) => {
      let targetRange = range ? range.cloneRange() : null;
      if (!targetRange || !editor.contains(targetRange.commonAncestorContainer)) {
        targetRange = document.createRange();
        targetRange.selectNodeContents(editor);
        targetRange.collapse(false);
      }
      const link = createLinkNode(href);
      if (targetRange.collapsed) {
        link.textContent = href;
        targetRange.insertNode(link);
        placeCaretAfter(link);
        updateToolbarState();
        return;
      }
      const contents = targetRange.extractContents();
      link.appendChild(contents);
      targetRange.insertNode(link);
      placeCaretAfter(link);
      updateToolbarState();
    };

    const removeLinkNode = (link) => {
      if (!link || !editor.contains(link)) return;
      const fragment = document.createDocumentFragment();
      while (link.firstChild) fragment.appendChild(link.firstChild);
      const marker = fragment.lastChild || link.previousSibling || link.parentNode;
      link.replaceWith(fragment);
      if (marker?.parentNode) placeCaretAfter(marker);
      updateToolbarState();
    };

    const showLinkDialog = () => {
      const savedRange = rememberEditorSelection() || (savedEditorRange ? savedEditorRange.cloneRange() : null);
      const selectedLink = getLinkFromRange(savedRange);
      isLinkDialogOpen = true;
      hideFloatingToolbar();

      const overlay = document.createElement("div");
      overlay.style.position = "fixed";
      overlay.style.inset = "0";
      overlay.style.background = "rgba(24, 31, 41, 0.42)";
      overlay.style.display = "flex";
      overlay.style.alignItems = "center";
      overlay.style.justifyContent = "center";
      overlay.style.padding = "16px";
      overlay.style.zIndex = "1000";

      const dialog = document.createElement("div");
      dialog.style.width = "100%";
      dialog.style.maxWidth = "420px";
      dialog.style.background = "#fff";
      dialog.style.border = "1px solid #d8dee8";
      dialog.style.borderRadius = "8px";
      dialog.style.boxShadow = "0 16px 36px rgba(15, 28, 48, 0.22)";
      dialog.style.padding = "16px";
      dialog.style.display = "grid";
      dialog.style.gap = "12px";

      const title = document.createElement("div");
      title.textContent = selectedLink ? "Edit link" : "Add link";
      title.style.fontSize = "16px";
      title.style.fontWeight = "700";
      title.style.color = "#222";

      const row = document.createElement("div");
      row.className = "cp-news-link-dialog-row";
      const label = document.createElement("label");
      label.textContent = "URL";
      const input = document.createElement("input");
      input.type = "url";
      input.value = selectedLink ? String(selectedLink.getAttribute("href") || "") : "";
      input.placeholder = "https://";
      row.appendChild(label);
      row.appendChild(input);

      const error = document.createElement("div");
      error.className = "cp-news-link-dialog-error";

      const actions = document.createElement("div");
      actions.style.display = "flex";
      actions.style.justifyContent = "flex-end";
      actions.style.gap = "8px";

      const removeBtn = document.createElement("button");
      removeBtn.type = "button";
      removeBtn.className = "cp-btn cp-btn-danger";
      removeBtn.textContent = "Remove link";
      removeBtn.style.marginLeft = "0";

      const cancelBtn = document.createElement("button");
      cancelBtn.type = "button";
      cancelBtn.className = "cp-btn cp-btn-secondary";
      cancelBtn.textContent = "Cancel";

      const saveBtn = document.createElement("button");
      saveBtn.type = "button";
      saveBtn.className = "cp-btn cp-btn-primary";
      saveBtn.textContent = "Save";

      const closeModal = () => {
        isLinkDialogOpen = false;
        overlay.remove();
        focusEditor();
      };

      cancelBtn.addEventListener("click", closeModal);
      overlay.addEventListener("click", (event) => {
        if (event.target === overlay) closeModal();
      });
      input.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeModal();
        if (event.key === "Enter") {
          event.preventDefault();
          saveBtn.click();
        }
      });

      removeBtn.addEventListener("click", () => {
        preserveEditorScroll(() => removeLinkNode(selectedLink));
        closeModal();
      });

      saveBtn.addEventListener("click", () => {
        error.textContent = "";
        const href = normalizeLinkHref(input.value);
        if (!href) {
          error.textContent = "Use an https://, http://, or mailto: link.";
          input.focus();
          return;
        }

        preserveEditorScroll(() => {
          if (selectedLink) {
            selectedLink.href = href;
            selectedLink.target = "_blank";
            selectedLink.rel = "noopener noreferrer";
            updateToolbarState();
            return;
          }

          applyLinkToRange(savedRange, href);
        });
        closeModal();
      });

      if (selectedLink) actions.appendChild(removeBtn);
      actions.appendChild(cancelBtn);
      actions.appendChild(saveBtn);
      dialog.appendChild(title);
      dialog.appendChild(row);
      dialog.appendChild(error);
      dialog.appendChild(actions);
      overlay.appendChild(dialog);
      document.body.appendChild(overlay);
      input.focus();
      input.select();
    };

    const uploadDescriptionImageFile = async (file, preserveSource = false) => {
      const sizeError = getImageUploadSizeError(file);
      if (sizeError) throw new Error(sizeError);
      if (!String(file?.type || "").startsWith("image/")) {
        throw new Error("Select an image file.");
      }

      const formData = new FormData();
      formData.append("image", file);
      formData.append("visibility", "public");
      if (preserveSource === true) {
        formData.append("preserve_original", "true");
      }

      const response = await fetch(IMAGE_UPLOAD_URL, {
        method: "POST",
        credentials: "include",
        body: formData,
      });
      const result = await response.json().catch(() => ({}));
      if (!response.ok || !result?.ok) {
        if (response.status === 413) {
          throw new Error(result?.message || `Uploaded image is too large. Maximum allowed size is ${formatFileSize(IMAGE_UPLOAD_MAX_BYTES)}.`);
        }
        throw new Error(result?.message || "Failed to upload image.");
      }

      const variants = Array.isArray(result?.variants) ? result.variants : [];
      const preferredVariant = variants.find((variant) => String(variant?.variant || "") === "large")
        || variants.find((variant) => String(variant?.variant || "") === "medium")
        || variants.find((variant) => String(variant?.variant || "") === "original")
        || variants[0]
        || null;
      const uploadedUrl = toApiAbsoluteUrl(preferredVariant?.public_url || preferredVariant?.storage_path || "");
      if (!uploadedUrl) {
        throw new Error("Image uploaded, but no public URL was returned.");
      }
      return uploadedUrl;
    };

    const insertDescriptionImage = (src, alt = "") => {
      const imageRow = document.createElement("p");
      const image = document.createElement("img");
      image.src = src;
      image.alt = alt;
      image.loading = "lazy";
      imageRow.appendChild(image);
      const fragment = document.createDocumentFragment();
      fragment.appendChild(imageRow);

      if (!pendingImageInsertMarkerId && pendingImageInsertRange) {
        insertPendingImageMarker();
      }

      const marker = pendingImageInsertMarkerId
        ? editor.querySelector(`[data-news-image-marker="${pendingImageInsertMarkerId}"]`)
        : null;
      pendingImageInsertMarkerId = "";
      pendingImageInsertRange = null;

      if (marker) {
        const paragraph = marker.closest("p");
        if (paragraph && editor.contains(paragraph)) {
          const parent = paragraph.parentNode;
          const beforeHasContent = hasMeaningfulContent(paragraph);
          const afterParagraph = paragraph.cloneNode(false);
          while (marker.nextSibling) afterParagraph.appendChild(marker.nextSibling);
          const afterHasContent = hasMeaningfulContent(afterParagraph);
          marker.remove();

          if (beforeHasContent) {
            parent.insertBefore(fragment, paragraph.nextSibling);
          } else {
            parent.insertBefore(fragment, paragraph);
            paragraph.remove();
          }
          if (afterHasContent) {
            parent.insertBefore(afterParagraph, imageRow.nextSibling);
          }
        } else {
          marker.replaceWith(fragment);
        }
      } else {
        editor.appendChild(fragment);
      }

      placeCaretAfter(imageRow);
      setSelectedImage(null);
      updateToolbarState();
      setEditorStatus("Image added.");
    };

    const openDescriptionImageFilePicker = (preserveSource = false) => {
      isImagePickerOpen = true;
      pendingImageUploadPreserveSource = preserveSource === true;
      window.addEventListener("focus", () => {
        setTimeout(() => {
          if (pendingImageUploads === 0) {
            removePendingImageMarker();
            isImagePickerOpen = false;
            pendingImageUploadPreserveSource = false;
          }
        }, 3000);
      }, { once: true });
      imageFileInput.value = "";
      imageFileInput.click();
    };

    const insertExistingDescriptionImage = (image) => {
      const imageUrl = getImagePickerUrl(image, "large")
        || getImagePickerUrl(image, "medium")
        || getImagePickerUrl(image, "original");
      if (!imageUrl) {
        throw new Error("Selected image has no public URL.");
      }
      insertDescriptionImage(imageUrl, getImageDisplayName(image));
      isImagePickerOpen = false;
    };

    const removeSelectedImage = () => {
      const image = selectedImageNode && editor.contains(selectedImageNode) ? selectedImageNode : null;
      if (!image) return;
      const parent = image.parentElement;
      const isImageOnlyParagraph = parent?.tagName?.toUpperCase() === "P"
        && Array.from(parent.childNodes).every((child) => (
          child === image
          || (child.nodeType === Node.TEXT_NODE && !child.textContent.trim())
          || (child.nodeType === Node.ELEMENT_NODE && child.tagName.toUpperCase() === "BR")
        ));
      if (isImageOnlyParagraph) {
        parent.remove();
      } else {
        image.remove();
      }
      selectedImageNode = null;
      normalizeEditorHtml();
      placeCaretAtEnd();
      updateToolbarState();
      setEditorStatus("Image removed.");
    };

    const showDescriptionImagePicker = () => {
      placeImageInsertMarker();
      isImagePickerOpen = true;
      hideFloatingToolbar();
      showImagePickerDialog({
        title: "Add image",
        chooseLabel: "Choose",
        uploadLabel: "Upload new image",
        canUploadSource: options.canUploadSource === true,
        currentUserId: options.currentUserAuthId,
        isAdmin: options.isAdmin === true,
        sourceUploadLabel: "Upload source",
        onChoose: insertExistingDescriptionImage,
        onUploadNew: openDescriptionImageFilePicker,
        onUploadSourceNew: () => openDescriptionImageFilePicker(true),
        onCancel: () => {
          removePendingImageMarker();
          isImagePickerOpen = false;
          pendingImageUploadPreserveSource = false;
          focusEditor();
        },
      });
    };

    const makeButton = (label, iconClass, title, onClick, parent) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "cp-news-editor-btn";
      btn.title = title;
      btn.setAttribute("aria-label", label);
      const icon = document.createElement("i");
      icon.className = iconClass;
      btn.appendChild(icon);
      btn.addEventListener("mousedown", (event) => {
        rememberEditorSelection();
        event.preventDefault();
      });
      btn.addEventListener("click", onClick);
      parent.appendChild(btn);
      return btn;
    };

    const buttonConfigs = [
      {
        key: "sectionTitle",
        label: "Section title",
        iconClass: "fa-solid fa-heading",
        title: "Section title",
        onClick: () => toggleDescriptionSectionTitle(),
      },
      {
        key: "bold",
        label: "Bold",
        iconClass: "fa-solid fa-bold",
        title: "Bold (Ctrl/Cmd+B)",
        onClick: () => runCommand("bold"),
      },
      {
        key: "italic",
        label: "Italic",
        iconClass: "fa-solid fa-italic",
        title: "Italic (Ctrl/Cmd+I)",
        onClick: () => runCommand("italic"),
      },
      {
        key: "ordered",
        label: "Numbered list",
        iconClass: "fa-solid fa-list-ol",
        title: "Numbered list (Ctrl/Cmd+Shift+7)",
        onClick: () => runCommand("insertOrderedList"),
      },
      {
        key: "unordered",
        label: "Bullet list",
        iconClass: "fa-solid fa-list-ul",
        title: "Bullet list (Ctrl/Cmd+Shift+8)",
        onClick: () => runCommand("insertUnorderedList"),
      },
      {
        key: "link",
        label: "Link",
        iconClass: "fa-solid fa-link",
        title: "Add or edit link",
        onClick: () => showLinkDialog(),
      },
      {
        key: "quote",
        label: "Quote",
        iconClass: "fa-solid fa-quote-left",
        title: "Add quote",
        onClick: () => insertDescriptionQuote(),
      },
      {
        key: "image",
        label: "Image",
        iconClass: "fa-solid fa-image",
        title: "Add image",
        onClick: () => showDescriptionImagePicker(),
      },
    ];
    const buttons = {};
    const floatingButtons = {};
    buttonConfigs.forEach((config) => {
      buttons[config.key] = makeButton(config.label, config.iconClass, config.title, config.onClick, toolbar);
      floatingButtons[config.key] = makeButton(config.label, config.iconClass, config.title, config.onClick, floatingToolbar);
    });

    imageFileInput.addEventListener("change", async () => {
      const file = imageFileInput.files && imageFileInput.files[0] ? imageFileInput.files[0] : null;
      imageFileInput.value = "";
      if (!file) {
        removePendingImageMarker();
        isImagePickerOpen = false;
        pendingImageUploadPreserveSource = false;
        return;
      }

      pendingImageUploads += 1;
      const preserveSource = pendingImageUploadPreserveSource;
      pendingImageUploadPreserveSource = false;
      setEditorStatus(preserveSource ? "Uploading image with source..." : "Uploading image...");
      updateToolbarState();
      let uploadedUrl = "";
      try {
        uploadedUrl = await uploadDescriptionImageFile(file, preserveSource);
      } catch (error) {
        removePendingImageMarker();
        setEditorStatus(error?.message || "Failed to upload image.", true);
      } finally {
        pendingImageUploads = Math.max(0, pendingImageUploads - 1);
        isImagePickerOpen = false;
        updateToolbarState();
      }
      if (uploadedUrl) {
        insertDescriptionImage(uploadedUrl, file.name || "News image");
      }
    });

    const normalizeEditorHtml = () => {
      editor.innerHTML = sanitizeNewsDescriptionHtml(editor.innerHTML, { preserveEmptyQuotes: true }) || "<p><br></p>";
      selectedImageNode = null;
      enhanceQuoteBlocksInEditor();
    };

    const forButtonPair = (key, callback) => {
      [buttons[key], floatingButtons[key]].filter(Boolean).forEach(callback);
    };

    const hideFloatingToolbar = () => {
      floatingToolbar.hidden = true;
    };

    const updateFloatingToolbarPosition = (range) => {
      if (!range || range.collapsed || !getSelectedTextFromRange(range)) {
        hideFloatingToolbar();
        return;
      }

      const rect = Array.from(range.getClientRects()).find((item) => item.width > 0 || item.height > 0)
        || range.getBoundingClientRect();
      if (!rect || (!rect.width && !rect.height)) {
        hideFloatingToolbar();
        return;
      }

      floatingToolbar.hidden = false;
      const rootRect = root.getBoundingClientRect();
      const toolbarWidth = floatingToolbar.offsetWidth || 0;
      const toolbarHeight = floatingToolbar.offsetHeight || 0;
      const maxLeft = Math.max(6, root.clientWidth - toolbarWidth - 6);
      const maxTop = Math.max(6, root.clientHeight - toolbarHeight - 6);
      let left = rect.left - rootRect.left + (rect.width / 2) - (toolbarWidth / 2);
      let top = rect.top - rootRect.top - toolbarHeight - 8;

      if (top < 6) top = rect.bottom - rootRect.top + 8;
      left = Math.min(Math.max(6, left), maxLeft);
      top = Math.min(Math.max(6, top), maxTop);

      floatingToolbar.style.left = `${Math.round(left)}px`;
      floatingToolbar.style.top = `${Math.round(top)}px`;
    };

    const updateFloatingToolbarState = (range) => {
      const isBusy = externallyDisabled || pendingImageUploads > 0;
      if (isBusy || isLinkDialogOpen || isImagePickerOpen) {
        hideFloatingToolbar();
        return;
      }
      updateFloatingToolbarPosition(range);
    };

    const updateToolbarState = () => {
      const activeRange = getSelectionRange() || (savedEditorRange ? savedEditorRange.cloneRange() : null);
      forButtonPair("bold", (button) => button.classList.toggle("active", document.queryCommandState("bold")));
      forButtonPair("italic", (button) => button.classList.toggle("active", document.queryCommandState("italic")));
      forButtonPair("sectionTitle", (button) => button.classList.toggle("active", !!getSectionTitleFromRange(activeRange)));
      forButtonPair("ordered", (button) => button.classList.toggle("active", document.queryCommandState("insertOrderedList")));
      forButtonPair("unordered", (button) => button.classList.toggle("active", document.queryCommandState("insertUnorderedList")));
      const isBusy = externallyDisabled || pendingImageUploads > 0;
      buttonConfigs.forEach((config) => {
        forButtonPair(config.key, (button) => {
          button.disabled = isBusy;
        });
      });
      editor.querySelectorAll(".cp-news-quote-remove").forEach((button) => {
        button.disabled = isBusy;
      });
      imageFileInput.disabled = isBusy;
      editor.contentEditable = isBusy ? "false" : "true";
      updateFloatingToolbarState(activeRange);
    };

    try {
      document.execCommand("defaultParagraphSeparator", false, "p");
    } catch (_error) {}

    editor.addEventListener("keydown", (event) => {
      if ((event.key === "Backspace" || event.key === "Delete") && selectedImageNode && editor.contains(selectedImageNode)) {
        event.preventDefault();
        removeSelectedImage();
        return;
      }
      const activeRange = getSelectionRange();
      const activeQuoteAuthor = getQuoteFieldFromRange(activeRange, ".news-quote-author");
      const activeQuoteText = getQuoteFieldFromRange(activeRange, ".news-quote-text");
      if (event.key === "Enter" && activeQuoteAuthor) {
        event.preventDefault();
        focusQuoteField(getQuoteBlockFromNode(activeQuoteAuthor), ".news-quote-text");
        return;
      }
      if (event.key === "Enter" && activeQuoteText) {
        event.preventDefault();
        runCommand("insertLineBreak", null, false);
        return;
      }
      const activeSectionTitle = getSectionTitleFromRange(activeRange);
      if (event.key === "Enter" && activeSectionTitle) {
        event.preventDefault();
        insertParagraphAfterSectionTitle(activeSectionTitle);
        return;
      }
      const modifier = event.ctrlKey || event.metaKey;
      if (event.key === "Enter" && event.shiftKey) {
        event.preventDefault();
        runCommand("insertLineBreak", null, false);
        return;
      }
      if (event.key === "Enter") {
        event.preventDefault();
        runCommand("insertParagraph", null, false);
        return;
      }
      if (!modifier) return;
      const key = String(event.key || "").toLowerCase();
      if (key === "b") {
        event.preventDefault();
        runCommand("bold");
      } else if (key === "i") {
        event.preventDefault();
        runCommand("italic");
      } else if (event.shiftKey && event.key === "7") {
        event.preventDefault();
        runCommand("insertOrderedList");
      } else if (event.shiftKey && event.key === "8") {
        event.preventDefault();
        runCommand("insertUnorderedList");
      }
    });

    editor.addEventListener("paste", (event) => {
      event.preventDefault();
      const html = event.clipboardData?.getData("text/html") || "";
      const text = event.clipboardData?.getData("text/plain") || "";
      const safeHtml = html
        ? sanitizeNewsDescriptionHtml(html)
        : String(text || "")
          .split(/\n{2,}/)
          .map((paragraph) => `<p>${paragraph.split(/\n/).map(escapeHtml).join("<br>")}</p>`)
          .join("");
      runCommand("insertHTML", safeHtml);
    });

    editor.addEventListener("keyup", () => {
      const range = rememberEditorSelection();
      setSelectedImage(getImageFromRange(range));
      updateToolbarState();
    });
    editor.addEventListener("mouseup", () => {
      const range = rememberEditorSelection();
      setSelectedImage(getImageFromRange(range));
      updateToolbarState();
    });
    editor.addEventListener("input", () => {
      rememberEditorSelection();
      if (selectedImageNode && !editor.contains(selectedImageNode)) {
        selectedImageNode = null;
      }
      updateToolbarState();
    });
    editor.addEventListener("mousedown", (event) => {
      const quoteRemoveButton = event.target?.closest?.(".cp-news-quote-remove") || null;
      if (quoteRemoveButton && editor.contains(quoteRemoveButton)) {
        event.preventDefault();
        removeQuoteBlock(getQuoteBlockFromNode(quoteRemoveButton));

  function formatNewsDateTime(value) {
    const raw = String(value || "").trim();
    if (!raw) return "No time";
    const date = new Date(raw);
    if (!Number.isFinite(date.getTime())) return raw;
    const dd = String(date.getUTCDate()).padStart(2, "0");
    const mm = String(date.getUTCMonth() + 1).padStart(2, "0");
    const yyyy = date.getUTCFullYear();
    const hh = String(date.getUTCHours()).padStart(2, "0");
    const mi = String(date.getUTCMinutes()).padStart(2, "0");
    return `${dd}.${mm}.${yyyy} ${hh}:${mi} UTC`;
  }

      .map((item) => ({
        value: String(item?.id || "").trim(),
        label: String(item?.short_title || item?.name || item?.id || "").trim(),
        logo: String(item?.logo || "").trim(),
        category: normalizeCategoryKey(item?.category),
      }))
      .filter((item) => item.value && item.label);
    const streamerRows = (Array.isArray(streamersList) ? streamersList : [])
      .map((item) => ({
        value: String(item?.id || "").trim(),
        label: String(item?.name || item?.short_name || (item?.id ? `Streamer #${item.id}` : "")).trim(),
        logo: toApiAbsoluteUrl(item?.avatar || ""),
      }))
      .filter((item) => item.value && item.label)
      .sort((left, right) => left.label.localeCompare(right.label));
    const emptyStreamerOption = { value: "", label: "Not selected", logo: "" };
    const youtubeStreamerOptions = [emptyStreamerOption].concat(streamerRows
      .filter((item) => isAdminNewsUser || allowedYoutubeStreamerIds.has(String(item.value || "").trim())));
    const allowedTournamentCategoryKeys = new Set(tournamentRows
      .filter((item) => allowedTournamentIds.has(normalizeTournamentAccessKey(item.value)))
      .map((item) => item.category)
      .filter(Boolean));
    const categoryHasTournaments = new Set(tournamentRows
      .map((item) => item.category)
      .filter(Boolean));
    const categoriesByName = new Map((Array.isArray(categoriesList) ? categoriesList : [])
      .map((item) => [normalizeCategoryKey(item?.name), item]));
    const getCategoryKindForName = (categoryName) => {
      const selectedCategory = String(categoryName || "").trim();
      if (normalizeCategoryKey(selectedCategory) === "local") return "local";
      if (normalizeCategoryKey(selectedCategory) === "youtube") return "youtube";
      const category = categoriesByName.get(normalizeCategoryKey(selectedCategory)) || null;
      if (Number(category?.is_tournament) === 1 || categoryHasTournaments.has(normalizeCategoryKey(selectedCategory))) return "tournament";
      return "other";
    };
    const getCategoryKind = () => getCategoryKindForName(categoryInput?.getValue?.() || "");
    const isCategoryAllowedForCurrentUser = (categoryName) => {
      const categoryKey = normalizeCategoryKey(categoryName);
      if (!categoryKey) return false;
      if (categoryKey === "youtube") return isAdminNewsUser || allowedYoutubeStreamerIds.size > 0;
      if (!restrictNewsEditorAccess) return true;
      if (categoryKey === "local") return allowedLocalAssociationIds.size > 0;
      return allowedTournamentCategoryKeys.has(categoryKey);
    };
    const emptyIconOption = { value: "", label: "Not selected", logo: "" };
    const allIconOptions = (Array.isArray(iconsList) ? iconsList : [])
      .map((item) => ({
        value: toApiAbsoluteUrl(item?.icon_link || ""),
        label: String(item?.name || item?.id || "").trim(),
        logo: toApiAbsoluteUrl(item?.icon_link || ""),
        category: normalizeCategoryKey(item?.category || item?.category_id || item?.categoryId),
        associationId: normalizeCode(item?.association_id ?? item?.associationId),
      }))
      .filter((item) => item.value && item.label);
    const getIconOptionsForCategory = (categoryName, associationId = "") => {
      const categoryKey = normalizeCategoryKey(categoryName);
      const selectedAssociationId = normalizeCode(associationId);
      const rows = allIconOptions.filter((item) => {
        if (!categoryKey || item.category !== categoryKey) return false;
        if (categoryKey === "local") {
          return !!selectedAssociationId && item.associationId === selectedAssociationId;
        }
        return true;
      });
      return [emptyIconOption].concat(rows);
    };
    const getIconValueFromImageUrl = (imageUrl, options = allIconOptions) => {
      const normalizedImageUrl = toApiAbsoluteUrl(imageUrl);
      if (!normalizedImageUrl) return "";
      return (Array.isArray(options) ? options : []).some((item) => item.value === normalizedImageUrl) ? normalizedImageUrl : "";
    };

    const associationOptionRows = (Array.isArray(associationsList) ? associationsList : [])
      .map((item) => ({
        value: normalizeCode(item?.id || item?.code),
        label: String(item?.name || item?.id || item?.code || "").trim(),
        logo: String(item?.flag || "").trim(),
      }))
      .filter((item) => item.value && item.label);
    const associationOptions = [{ value: "", label: "Not selected", logo: "" }].concat(associationOptionRows);
    const localAssociationOptions = [{ value: "", label: "Not selected", logo: "" }].concat(associationOptionRows
      .filter((item) => !restrictNewsEditorAccess || allowedLocalAssociationIds.has(normalizeCode(item.value))));
    const emptyTournamentOption = { value: "", label: "Not selected", logo: "" };
    const getTournamentOptionsForCategory = (categoryName) => {
      const categoryKey = normalizeCategoryKey(categoryName);
      const rows = tournamentRows
        .filter((item) => categoryKey && item.category === categoryKey)
        .filter((item) => !restrictNewsEditorAccess || allowedTournamentIds.has(normalizeTournamentAccessKey(item.value)));
      return [emptyTournamentOption].concat(rows);
    };
    const getSelectableTournamentOptionsForCategory = (categoryName) => getTournamentOptionsForCategory(categoryName)
      .filter((item) => String(item?.value || "").trim());
    const rawCategoryOptions = (Array.isArray(categoriesList) ? categoriesList : [])
      .slice()
      .sort((left, right) => {
        const leftOrder = Number(left?.sort_order) || 0;
        const rightOrder = Number(right?.sort_order) || 0;
        if (leftOrder !== rightOrder) return leftOrder - rightOrder;
        return String(left?.name || "").localeCompare(String(right?.name || ""));
      })
      .map((item) => {
        const name = String(item?.name || "").trim();
        return { value: name, label: name };
      })
      .filter((item) => item.value && isCategoryAllowedForCurrentUser(item.value));
    const categoryOptions = [{ value: "", label: "Not selected" }].concat(rawCategoryOptions);
    const selectableCategoryOptions = categoryOptions.filter((item) => String(item?.value || "").trim());
    const requestedInitialCategory = String(source?.category || "").trim();
    const sourceCategoryValue = categoryOptions.some((item) => item.value === requestedInitialCategory)
      ? requestedInitialCategory
      : "";
    const initialCategoryValue = isCreateMode && !sourceCategoryValue && selectableCategoryOptions.length === 1
      ? selectableCategoryOptions[0].value
      : sourceCategoryValue;
    const initialCategoryKind = getCategoryKindForName(initialCategoryValue || source?.category || "");
    const tournamentOptions = getTournamentOptionsForCategory(initialCategoryValue || source?.category || "");
    const significanceOptions = (hasGlobalNewsEditorAccess
      ? NEWS_SIGNIFICANCE_OPTIONS
      : NEWS_SIGNIFICANCE_OPTIONS.filter((value) => value !== "Major"))
      .map((value) => ({ value, label: value }));
    const requestedInitialSignificance = String(source?.significance || "Regular").trim() || "Regular";
    const initialSignificance = initialCategoryKind === "youtube"
      ? "Regular"
      : (
        significanceOptions.some((item) => item.value === requestedInitialSignificance)
          ? requestedInitialSignificance
          : "Regular"
      );

    const significanceInput = createSingleSelect(
      initialSignificance,
      significanceOptions,
      {
        placeholderLabel: "Select significance",
        searchable: false,
        onChange: () => updateConditionalNewsFields(),
      }
    );
    const statusInput = createSingleSelect(
      String(source?.status || "Draft").trim() || "Draft",
      NEWS_STATUS_OPTIONS.map((value) => ({ value, label: value })),
      {
        placeholderLabel: "Select status",
        searchable: false,
      }
    );
    addRow("Status", statusInput.root);
    addRow("Significance", significanceInput.root);

    const categoryInput = createSingleSelect(
      initialCategoryValue,
      categoryOptions,
      {
        placeholderLabel: "Select category",
        searchable: false,
        onChange: () => updateConditionalNewsFields(),
      }
    );
    addRow("Category", categoryInput.root);

    const selectableYoutubeStreamerOptions = youtubeStreamerOptions
      .filter((item) => String(item?.value || "").trim());
    const requestedInitialStreamerId = String(source?.streamer_id || source?.streamerId || "").trim();
    const initialYoutubeStreamerId = youtubeStreamerOptions.some((item) => item.value === requestedInitialStreamerId)
      ? requestedInitialStreamerId
      : !isAdminNewsUser && selectableYoutubeStreamerOptions.length === 1
        ? selectableYoutubeStreamerOptions[0].value
        : "";
    const youtubeStreamerInput = createSingleSelect(
      initialYoutubeStreamerId,
      youtubeStreamerOptions,
      {
        placeholderLabel: "Select YouTube channel",
        searchable: false,
        disabled: !isAdminNewsUser,
      }
    );
    const youtubeStreamerRow = addRow("YouTube Channel", youtubeStreamerInput.root);

    const associationInput = createSingleSelect(
      normalizeCode(source?.association_id),
      localAssociationOptions,
      {
        placeholderLabel: "Select association",
        onChange: () => updateConditionalNewsFields(),
      }
    );

    const tournamentInput = createSingleSelect(
      String(source?.tournament_id || "").trim(),
      tournamentOptions,
      { placeholderLabel: "Select tournament", searchable: false }
    );
    const tournamentRow = addRow("Tournament", tournamentInput.root);

    const associationRow = addRow("Association", associationInput.root);

    const timeInput = document.createElement("input");
    timeInput.type = "datetime-local";
    timeInput.required = true;
    timeInput.value = isCreateMode
      ? getCurrentUtcHourDatetimeLocal()
      : toDatetimeLocalFromUtc(source?.time_utc);
    addRow("Time, UTC", timeInput, "cp-edit-row--line-start");

    const associationsInput = createMultiSelect(
      (Array.isArray(source?.associations) ? source.associations : [])
        .map((item) => normalizeCode(item?.id || item))
        .filter(Boolean),
      associationOptions,
      { placeholderLabel: "Select associations" }
    );
    const associationsRow = addRow("Associations (for filtering)", associationsInput.root);

    let selectedImageFile = null;
    let previewObjectUrl = "";
    const getInitialNewsMediaMode = () => {
      if (initialSignificance === "Major") return "image";
      if (initialSignificance !== "Important") return "icon";
      const storedMediaType = String(source?.media_type ?? source?.mediaType ?? "").trim().toLowerCase();
      if (storedMediaType === "image" || storedMediaType === "icon") return normalizeNewsMediaType(storedMediaType);
      const hasImage = !!currentImageUrl;
      const hasKnownIcon = !!getIconValueFromImageUrl(currentImageUrl);
      const hasShortDescription = !!String(source?.short_description || "").trim();
      return hasShortDescription || (hasImage && !hasKnownIcon) ? "image" : "icon";
    };
    let newsMediaMode = getInitialNewsMediaMode();

    const mediaTypeInput = createSingleSelect(
      newsMediaMode,
      [
        { value: "icon", label: "Icon" },
        { value: "image", label: "Image" },
      ],
      {
        placeholderLabel: "Select type",
        searchable: false,
        onChange: (value) => {
          const previousMode = newsMediaMode;
          newsMediaMode = value === "image" ? "image" : "icon";
          if (previousMode === "icon" && newsMediaMode === "image") {
            const selectedIconValue = iconInput?.getValue?.() || getIconValueFromImageUrl(currentImageUrl);
            if (selectedIconValue && currentImageUrl === selectedIconValue) {
              currentImageUrl = "";
              selectedImageFile = null;
              selectedImagePreserveSource = false;
              if (imageFileInput) imageFileInput.value = "";
              if (previewObjectUrl) {
                URL.revokeObjectURL(previewObjectUrl);
                previewObjectUrl = "";
              }
              if (imagePreview) {
                imagePreview.src = "";
                imagePreview.hidden = true;
              }
              if (imageChooseBtn) imageChooseBtn.textContent = "Select image";
              if (imageUploadStatus) imageUploadStatus.textContent = "";
            }
          }
          updateConditionalNewsFields();
        },
      }
    );
    let mediaTypeRow = null;
    const initialIconOptions = getIconOptionsForCategory(categoryInput.getValue(), associationInput.getValue());

    const iconInput = createSingleSelect(
      getIconValueFromImageUrl(currentImageUrl, initialIconOptions),
      initialIconOptions,
      {
        placeholderLabel: "Select icon",
        searchable: false,
        onChange: (value) => {
          currentImageUrl = String(value || "").trim();
          selectedImageFile = null;
          selectedImagePreserveSource = false;
          if (imageFileInput) imageFileInput.value = "";
          if (previewObjectUrl) {
            URL.revokeObjectURL(previewObjectUrl);
            previewObjectUrl = "";
          }
          if (imagePreview) {
            imagePreview.src = currentImageUrl || "";
            imagePreview.hidden = !currentImageUrl;
          }
          if (imageChooseBtn) imageChooseBtn.textContent = currentImageUrl ? "Change image" : "Select image";
          if (imageUploadStatus) imageUploadStatus.textContent = currentImageUrl ? "Icon selected." : "";
          setError("");
        },
      }
    );
    const iconRow = addRow("Icon", iconInput.root, "cp-edit-row--line-start");

    const youtubeVideoInput = document.createElement("input");
    youtubeVideoInput.type = "text";
    youtubeVideoInput.placeholder = "jNQXAC9IVRw";
    youtubeVideoInput.autocomplete = "off";
    youtubeVideoInput.value = normalizeYouTubeVideoId(source?.youtube_video_id ?? source?.youtubeVideoId ?? "");
    const youtubeVideoRow = addRow("YouTube URL or ID", youtubeVideoInput, "cp-edit-row--line-start");

    const youtubePreviewWrap = document.createElement("div");
    youtubePreviewWrap.className = "cp-youtube-preview";
    youtubePreviewWrap.hidden = true;
    const youtubePreviewImage = document.createElement("img");
    youtubePreviewImage.alt = "";
    youtubePreviewImage.loading = "lazy";
    const youtubePreviewPlay = document.createElement("span");
    youtubePreviewPlay.className = "cp-youtube-preview-play";
    youtubePreviewPlay.setAttribute("aria-hidden", "true");
    youtubePreviewWrap.appendChild(youtubePreviewImage);
    youtubePreviewWrap.appendChild(youtubePreviewPlay);
    const youtubePreviewRow = addRow("Preview", youtubePreviewWrap);

    const imageUploadWrap = document.createElement("div");
    imageUploadWrap.className = "cp-image-upload";
    imageChooseBtn = document.createElement("button");
    imageChooseBtn.type = "button";
    imageChooseBtn.className = "cp-btn cp-btn-secondary cp-image-select-btn";
    imageChooseBtn.textContent = currentImageUrl ? "Change image" : "Select image";
    imageFileInput = document.createElement("input");
    imageFileInput.type = "file";
    imageFileInput.accept = "image/*";
    imageFileInput.className = "cp-hidden";
    const imagePreview = document.createElement("img");
    imagePreview.className = "cp-image-preview";
    imagePreview.alt = "";
    imagePreview.hidden = !currentImageUrl;
    if (currentImageUrl) imagePreview.src = currentImageUrl;
    const imageUploadStatus = document.createElement("div");
    imageUploadStatus.className = "cp-image-upload-status";
    imageUploadStatus.textContent = currentImageUrl ? "Current image will be kept unless a new file is selected." : "";
    imageUploadWrap.appendChild(imageChooseBtn);
    imageUploadWrap.appendChild(imageFileInput);
    imageUploadWrap.appendChild(imagePreview);
    imageUploadWrap.appendChild(imageUploadStatus);
    const imageRow = addRow("Image", imageUploadWrap, "cp-edit-row--line-start");
    mediaTypeRow = addRow("Media type", mediaTypeInput.root);

    const chooseExistingNewsImage = (image) => {
      const imageUrl = getImagePickerUrl(image, "large")
        || getImagePickerUrl(image, "medium")
        || getImagePickerUrl(image, "original");
      if (!imageUrl) {
        throw new Error("Selected image has no public URL.");
      }
      if (previewObjectUrl) {
        URL.revokeObjectURL(previewObjectUrl);
        previewObjectUrl = "";
      }
      selectedImageFile = null;
      selectedImagePreserveSource = false;
      imageFileInput.value = "";
      currentImageUrl = imageUrl;
      imagePreview.src = currentImageUrl;
      imagePreview.hidden = false;
      imageChooseBtn.textContent = "Change image";
      imageUploadStatus.textContent = "Existing image selected.";
      setError("");
    };

    imageChooseBtn.addEventListener("click", () => {
      closeAllDropdowns();
      showImagePickerDialog({
        title: "Choose image",
        currentUrl: currentImageUrl,
        chooseLabel: "Choose",
        uploadLabel: "Upload new image",
        canUploadSource: canUploadSourceImage,
        currentUserId: currentUserAuthId,
        isAdmin: isAdminNewsUser,
        sourceUploadLabel: "Upload source",
        onChoose: chooseExistingNewsImage,
        onUploadNew: () => {
          selectedImagePreserveSource = false;
          imageFileInput.value = "";
          imageFileInput.click();
        },
        onUploadSourceNew: () => {
          selectedImagePreserveSource = true;
          imageFileInput.value = "";
          imageFileInput.click();
        },
      });
    });

    imageFileInput.addEventListener("change", () => {
      const file = imageFileInput.files && imageFileInput.files[0] ? imageFileInput.files[0] : null;
      if (previewObjectUrl) {
        URL.revokeObjectURL(previewObjectUrl);
        previewObjectUrl = "";
      }
      selectedImageFile = null;
      if (!file) {
        selectedImagePreserveSource = false;
        imagePreview.hidden = !currentImageUrl;
        imagePreview.src = currentImageUrl || "";
        imageUploadStatus.textContent = currentImageUrl ? "Current image will be kept unless a new file is selected." : "";
        return;
      }
      const sizeError = getImageUploadSizeError(file);
      if (sizeError) {
        imageFileInput.value = "";
        selectedImagePreserveSource = false;
        imagePreview.hidden = !currentImageUrl;
        imagePreview.src = currentImageUrl || "";
        imageUploadStatus.textContent = sizeError;
        setError(sizeError);
        return;
      }
      if (!String(file.type || "").startsWith("image/")) {
        imageFileInput.value = "";
        selectedImagePreserveSource = false;
        imagePreview.hidden = !currentImageUrl;
        imagePreview.src = currentImageUrl || "";
        imageUploadStatus.textContent = "Select an image file.";
        return;
      }
      selectedImageFile = file;
      setError("");
      previewObjectUrl = URL.createObjectURL(file);
      imagePreview.src = previewObjectUrl;
      imagePreview.hidden = false;
      imageChooseBtn.textContent = "Change image";
      imageUploadStatus.textContent = selectedImagePreserveSource ? `${file.name} (source saved)` : file.name;
    });

    const setCurrentIconImage = (nextValue, statusText = "") => {
      currentImageUrl = String(nextValue || "").trim();
      selectedImageFile = null;
      selectedImagePreserveSource = false;
      if (imageFileInput) imageFileInput.value = "";
      if (previewObjectUrl) {
        URL.revokeObjectURL(previewObjectUrl);
        previewObjectUrl = "";
      }
      imagePreview.src = currentImageUrl || "";
      imagePreview.hidden = !currentImageUrl;
      imageChooseBtn.textContent = currentImageUrl ? "Change image" : "Select image";
      imageUploadStatus.textContent = statusText || "";
    };

    const getYoutubeThumbnailUrl = (videoId) => (
      videoId ? `https://img.youtube.com/vi/${encodeURIComponent(videoId)}/hqdefault.jpg` : ""
    );

    const updateYoutubeVideoPreview = () => {
      const videoId = normalizeYouTubeVideoId(youtubeVideoInput.value);
      const shouldShowPreview = getCategoryKind() === "youtube" && !!videoId;
      youtubePreviewRow.classList.toggle("cp-hidden", !shouldShowPreview);
      youtubePreviewWrap.hidden = !shouldShowPreview;
      if (!shouldShowPreview) {
        youtubePreviewImage.removeAttribute("src");
        return;
      }
      const previewUrl = getYoutubeThumbnailUrl(videoId);
      if (youtubePreviewImage.src !== previewUrl) {
        youtubePreviewImage.src = previewUrl;
      }
    };

    const normalizeYoutubeVideoInputValue = () => {
      const videoId = normalizeYouTubeVideoId(youtubeVideoInput.value);
      if (videoId && String(youtubeVideoInput.value || "").trim() !== videoId) {
        youtubeVideoInput.value = videoId;
      }
      updateYoutubeVideoPreview();
      setError("");
    };

    youtubeVideoInput.addEventListener("input", normalizeYoutubeVideoInputValue);
    youtubeVideoInput.addEventListener("paste", () => {
      requestAnimationFrame(normalizeYoutubeVideoInputValue);
    });
    youtubeVideoInput.addEventListener("blur", normalizeYoutubeVideoInputValue);

    function updateIconOptionsForContext(useIcon) {
      const selectedCategory = categoryInput.getValue() || "";
      const categoryKey = normalizeCategoryKey(selectedCategory);
      const selectedAssociationId = associationInput.getValue() || "";
      const needsAssociation = categoryKey === "local";
      const isMissingIconContext = !categoryKey || (needsAssociation && !selectedAssociationId);
      const nextIconOptions = getIconOptionsForCategory(selectedCategory, selectedAssociationId);
      const availableIcons = nextIconOptions.filter((item) => String(item?.value || "").trim());
      const currentIconValue = iconInput.getValue() || getIconValueFromImageUrl(currentImageUrl, nextIconOptions);
      let nextIconValue = nextIconOptions.some((item) => item.value && item.value === currentIconValue)
        ? currentIconValue
        : "";

      if (!nextIconValue && availableIcons.length === 1) {
        nextIconValue = availableIcons[0].value;
      }

      iconInput.setOptions(nextIconOptions, useIcon && !isMissingIconContext ? nextIconValue : "");
      iconInput.setDisabled(!useIcon || isMissingIconContext);
      if (!useIcon) return;

      setCurrentIconImage(nextIconValue, nextIconValue ? "Icon selected." : "");
    }

    let previousSignificance = initialSignificance;
    function updateConditionalNewsFields() {
      const categoryKind = getCategoryKind();
      const isYouTubeCategory = categoryKind === "youtube";
      if (isYouTubeCategory) {
        significanceInput.setValue("Regular");
        newsMediaMode = "icon";
      }
      significanceInput.setDisabled(isYouTubeCategory);
      const significance = String(significanceInput.getValue() || "Regular").trim() || "Regular";
      if (significance !== previousSignificance && significance === "Important") {
        newsMediaMode = "icon";
      }
      previousSignificance = significance;

      const selectedCategory = categoryInput.getValue() || "";
      const showAssociation = categoryKind === "local";
      const showTournament = categoryKind === "tournament";
      const showYouTubeChannel = isYouTubeCategory;
      const showAssociations = categoryKind !== "local";
      associationRow.classList.toggle("cp-hidden", !showAssociation);
      tournamentRow.classList.toggle("cp-hidden", !showTournament);
      youtubeStreamerRow.classList.toggle("cp-hidden", !showYouTubeChannel);
      youtubeVideoRow.classList.toggle("cp-hidden", !isYouTubeCategory);
      associationsRow.classList.toggle("cp-hidden", !showAssociations);
      if (showAssociation) {
        const selectableAssociationOptions = localAssociationOptions.filter((item) => String(item?.value || "").trim());
        const currentAssociationId = associationInput.getValue();
        const nextAssociationId = selectableAssociationOptions.length === 1
          ? selectableAssociationOptions[0].value
          : selectableAssociationOptions.some((item) => normalizeCode(item.value) === normalizeCode(currentAssociationId))
            ? currentAssociationId
            : "";
        associationInput.setOptions(localAssociationOptions, nextAssociationId);
      } else {
        associationInput.setOptions(localAssociationOptions, "");
      }
      if (showTournament) {
        const nextTournamentOptions = getTournamentOptionsForCategory(selectedCategory);
        const selectableTournamentOptions = getSelectableTournamentOptionsForCategory(selectedCategory);
        const currentTournamentId = tournamentInput.getValue();
        const nextTournamentId = selectableTournamentOptions.length === 1
          ? selectableTournamentOptions[0].value
          : selectableTournamentOptions.some((item) => item.value === currentTournamentId)
            ? currentTournamentId
            : "";
        tournamentInput.setOptions(nextTournamentOptions, nextTournamentId);
      } else {
        tournamentInput.setOptions([emptyTournamentOption], "");
      }
      if (showYouTubeChannel) {
        const currentStreamerId = youtubeStreamerInput.getValue();
        const nextStreamerId = isAdminNewsUser
          ? currentStreamerId
          : selectableYoutubeStreamerOptions.length === 1
            ? selectableYoutubeStreamerOptions[0].value
            : selectableYoutubeStreamerOptions.some((item) => item.value === currentStreamerId)
              ? currentStreamerId
              : "";
        youtubeStreamerInput.setOptions(youtubeStreamerOptions, nextStreamerId);
        youtubeStreamerInput.setDisabled(!isAdminNewsUser);
      } else {
        youtubeStreamerInput.setOptions(youtubeStreamerOptions, "");
        youtubeStreamerInput.setDisabled(true);
      }
      if (!showAssociations) associationsInput.setValue([]);

      const isImportant = significance === "Important";
      const useImage = significance === "Major" || (isImportant && newsMediaMode === "image");
      const useIcon = !useImage && !isYouTubeCategory;
      if (significance === "Regular") {
        newsMediaMode = "icon";
      } else if (significance === "Major") {
        newsMediaMode = "image";
      }
      mediaTypeInput.setValue(newsMediaMode);
      updateIconOptionsForContext(useIcon);
      updateYoutubeVideoPreview();
      mediaTypeRow.classList.toggle("cp-hidden", !isImportant || isYouTubeCategory);
      iconRow.classList.toggle("cp-hidden", !useIcon);
      imageRow.classList.toggle("cp-hidden", !useImage);
      if (shortDescriptionRow) shortDescriptionRow.classList.toggle("cp-hidden", !useImage);
    }
    const shortTitleInput = document.createElement("input");
    shortTitleInput.type = "text";
    shortTitleInput.maxLength = 40;
    shortTitleInput.value = String(source?.short_title || "").trim();
    addRow("Short title", withRemainingCounter(shortTitleInput), "cp-edit-row--line-start");

    const titleInput = document.createElement("input");
    titleInput.type = "text";
    titleInput.maxLength = 100;
    titleInput.value = String(source?.title || "").trim();
    addRow("Title", withRemainingCounter(titleInput), "cp-edit-row--full");

    const shortDescriptionInput = document.createElement("textarea");
    shortDescriptionInput.maxLength = 200;
    shortDescriptionInput.rows = 2;
    shortDescriptionInput.value = String(source?.short_description || "").trim();
    const shortDescriptionRow = addRow("Short description", withRemainingCounter(shortDescriptionInput), "cp-edit-row--full cp-edit-row--short-description");
    updateConditionalNewsFields();

    const descriptionInput = createNewsDescriptionEditor(source?.description || "", {
      canUploadSource: canUploadSourceImage,
      currentUserAuthId,
      isAdmin: isAdminNewsUser,
    });
    addRow("Description", descriptionInput.root, "cp-edit-row--full cp-edit-row--description");

    const shouldUseNewsImageUpload = () => {
      const significance = String(significanceInput.getValue() || "Regular").trim() || "Regular";
      return significance === "Major" || (significance === "Important" && newsMediaMode === "image");
    };

    const buildPayload = () => {
      const categoryKind = getCategoryKind();
      const useImageUpload = shouldUseNewsImageUpload();
      return {
        status: statusInput.getValue() || "Draft",
        significance: significanceInput.getValue() || "Regular",
        category: categoryInput.getValue() || "",
        association_id: categoryKind === "local" ? associationInput.getValue() || "" : "",
        tournament_id: categoryKind === "tournament" ? tournamentInput.getValue() || "" : "",
        streamer_id: categoryKind === "youtube" ? Number.parseInt(String(youtubeStreamerInput.getValue() || "").trim(), 10) : null,
        youtube_video_id: categoryKind === "youtube" ? normalizeYouTubeVideoId(youtubeVideoInput.value) : null,
        associations: categoryKind === "local" ? [] : associationsInput.getValue(),
        time_utc: toUtcIsoFromDatetimeLocal(timeInput.value),
        image: categoryKind === "youtube" ? "" : useImageUpload ? currentImageUrl : iconInput.getValue() || currentImageUrl,
        media_type: categoryKind === "youtube" ? "icon" : useImageUpload ? "image" : "icon",
        title: String(titleInput.value || "").trim(),
        short_title: String(shortTitleInput.value || "").trim(),
        short_description: useImageUpload ? String(shortDescriptionInput.value || "").trim() : "",
        description: descriptionInput.getHtml(),
      };
    };

    const validatePayload = (payload) => {
      const useImageUpload = shouldUseNewsImageUpload();
      if (!payload.title) return "Title is required.";
      if (payload.title.length > 100) return "Title must be 100 characters or fewer.";
      if (!payload.short_title) return "Short title is required.";
      if (payload.short_title.length > 40) return "Short title must be 40 characters or fewer.";
      if (useImageUpload && !payload.short_description) return "Short description is required.";
      if (payload.short_description.length > 200) return "Short description must be 200 characters or fewer.";
      if (!String(timeInput.value || "").trim()) return "Time, UTC is required.";
      if (String(timeInput.value || "").trim() && !payload.time_utc) return "Time, UTC is invalid.";
      if (!isAdminNewsUser && !payload.category) return "Category is required.";
      if (getCategoryKind() === "local" && !payload.association_id) return "Association is required.";
      if (getCategoryKind() === "youtube" && (!Number.isInteger(payload.streamer_id) || payload.streamer_id <= 0)) return "YouTube Channel is required.";
      if (getCategoryKind() === "youtube" && !payload.youtube_video_id) return "YouTube URL or ID is required.";
      if (useImageUpload && !payload.image && !selectedImageFile) return "Image is required.";
      if (getCategoryKind() !== "youtube" && !useImageUpload && !iconInput.getValue()) return "Icon is required.";
      if (!payload.description) return "Description is required.";
      const selectableTournamentOptions = getSelectableTournamentOptionsForCategory(categoryInput.getValue());
      if (
        getCategoryKind() === "tournament"
        && (restrictNewsEditorAccess ? selectableTournamentOptions.length > 0 : selectableTournamentOptions.length > 1)
        && !payload.tournament_id
      ) {
        return "Tournament is required.";
      }
      if (descriptionInput?.isUploading?.()) return "Wait until the description image finishes uploading.";
      return "";
    };

    const uploadSelectedNewsImage = async () => {
      if (!selectedImageFile) return currentImageUrl;
      const sizeError = getImageUploadSizeError(selectedImageFile);
      if (sizeError) throw new Error(sizeError);

      const formData = new FormData();
      formData.append("image", selectedImageFile);
      formData.append("visibility", "public");
      if (selectedImagePreserveSource) {
        formData.append("preserve_original", "true");
      }

      const titleText = String(shortTitleInput.value || "").trim();
      if (titleText) {
        formData.append("title", titleText);
        formData.append("alt_text", titleText);
      }

      let response = null;
      try {
        response = await fetch(IMAGE_UPLOAD_URL, {
          method: "POST",
          credentials: "include",
          body: formData,
        });
      } catch (error) {
        const networkSizeError = getImageUploadSizeError(selectedImageFile);
        throw new Error(networkSizeError || error?.message || "Failed to upload image.");
      }
      const result = await response.json().catch(() => ({}));
      if (!response.ok || !result?.ok) {
        if (response.status === 413) {
          throw new Error(result?.message || `Uploaded image is too large. Maximum allowed size is ${formatFileSize(IMAGE_UPLOAD_MAX_BYTES)}.`);
        }
        throw new Error(result?.message || "Failed to upload image.");
      }

      const variants = Array.isArray(result?.variants) ? result.variants : [];
      const preferredVariant = variants.find((variant) => String(variant?.variant || "") === "large")
        || variants.find((variant) => String(variant?.variant || "") === "medium")
        || variants.find((variant) => String(variant?.variant || "") === "original")
        || variants[0]
        || null;
      const uploadedUrl = toApiAbsoluteUrl(preferredVariant?.public_url || preferredVariant?.storage_path || "");
      if (!uploadedUrl) {
        throw new Error("Image uploaded, but no public URL was returned.");
      }

      currentImageUrl = uploadedUrl;
      selectedImageFile = null;
      selectedImagePreserveSource = false;
      imageFileInput.value = "";
      if (previewObjectUrl) {
        URL.revokeObjectURL(previewObjectUrl);
        previewObjectUrl = "";
      }
      imagePreview.src = currentImageUrl;
      imagePreview.hidden = false;
      if (imageChooseBtn) imageChooseBtn.textContent = "Change image";
      imageUploadStatus.textContent = "Image uploaded.";
      return currentImageUrl;
    };

    cancelBtn.addEventListener("click", () => {
      resetCaptainSubview(CAPTAIN_VIEWS.NEWS);
    });

    if (deleteBtn) {
      deleteBtn.addEventListener("click", async () => {
        setError("");
        if (!window.confirm("Delete this news item?")) return;
        setSaving(true, "Saving...");
        deleteBtn.textContent = "Deleting...";
        try {
          const response = await fetch(`${NEWS_URL}/${encodeURIComponent(String(source?.id || ""))}`, {
            method: "DELETE",
            credentials: "include",
          });
          const result = await response.json().catch(() => ({}));
          if (!response.ok || !result?.ok) {
            setError(result?.message || "Failed to delete news.");
            return;
          }
          resetCaptainSubview(CAPTAIN_VIEWS.NEWS);
        } catch (_error) {
          setError("Failed to delete news.");
        } finally {
          if (deleteBtn) deleteBtn.textContent = "Delete";
          setSaving(false);
        }
      });
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      setError("");
      closeAllDropdowns();
      let payload = buildPayload();
      const validationError = validatePayload(payload);
      if (validationError) {
        setError(validationError);
        return;
      }

      setSaving(true, "Saving...");
      try {
        if (selectedImageFile && shouldUseNewsImageUpload()) {
          setSaving(true, "Uploading...");
          const uploadedImageUrl = await uploadSelectedNewsImage();
          payload = { ...payload, image: uploadedImageUrl };
          setSaving(true, "Saving...");
        }
        const isEdit = !isCreateMode;
        const response = await fetch(
          isEdit ? `${NEWS_URL}/${encodeURIComponent(String(source?.id || ""))}` : NEWS_URL,
          {
            method: isEdit ? "PATCH" : "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(isEdit ? { id: source?.id, ...payload } : payload),
          }
        );
        const result = await response.json().catch(() => ({}));
        if (!response.ok || !result?.ok) {
          setError(result?.message || `Failed to ${isEdit ? "update" : "create"} news.`);
          return;
        }
        resetCaptainSubview(CAPTAIN_VIEWS.NEWS);
      } catch (error) {
        setError(error?.message || `Failed to ${isCreateMode ? "create" : "update"} news.`);
      } finally {
        setSaving(false);
      }
    });

    contentEl.appendChild(form);
  }

  async function initCaptainPage() {
    if (isCaptainPageInitializing) {
      captainPageRefreshQueued = true;
      return;
    }
    isCaptainPageInitializing = true;
    try {
      renderCaptainLoadingState();
      const isEditMode = captainPageState.mode === "edit";
      const isCreateMode = captainPageState.mode === "create";
      const editNewsId = String(captainPageState.newsId || "").trim();
      let isAdminUser = false;
      let isAuthenticatedUser = false;
      let currentUserAuthId = "";
      let currentUserProfileId = "";
      let isNewsEditorUser = false;

      try {
        const meRes = await fetch(ME_URL, { method: "GET", credentials: "include" });
        if (meRes.ok) {
          const meData = await meRes.json();
          const meUser = meData?.authenticated ? meData?.user : null;
          isAuthenticatedUser = !!meData?.authenticated;
          isAdminUser = meUser?.isAdmin === true || Number(meUser?.admin) === 1;
          currentUserAuthId = getAuthUserId(meUser);
          currentUserProfileId = getCurrentUserProfileId(meUser);
        }
      } catch (_error) {
        // keep defaults; access rules below will handle unauthorized state
      }

      if (!isAuthenticatedUser) {
        renderAccessMessage();
        return;
      }

      const [tournamentsRes, newsEditorsRes] = await Promise.all([
        fetch(NEWS_TOURNAMENTS_URL, { method: "GET", credentials: "include" }),
        fetch(NEWS_EDITORS_URL, { method: "GET", credentials: "include" }),
      ]);
      const newsEditorsData = newsEditorsRes?.ok
        ? await newsEditorsRes.json().catch(() => ({}))
        : {};
      const newsEditors = Array.isArray(newsEditorsData?.news_editors) ? newsEditorsData.news_editors : [];
      isNewsEditorUser = !!currentUserProfileId && newsEditors.some((entry) => (
        String(entry?.profile_id ?? entry?.player_id ?? "").trim() === currentUserProfileId
      ));
      const canUseNewsSection = isAdminUser || isNewsEditorUser;
      let tournaments = [];
      if (tournamentsRes?.ok) {
        const tournamentsData = await tournamentsRes.json().catch(() => ({}));
        tournaments = Array.isArray(tournamentsData?.tournaments) ? tournamentsData.tournaments : [];
      }
      setPageHeading(getImmediatePageHeading());

      if (!canUseNewsSection) {
        renderStaticInfoSection("My News", [
          "In this section, you can create local news for your association or news for a tournament you organize.",
          "To get permission to create publications, contact your association captain or email us at carcassonne.gg@gmail.com.",
        ]);
        return;
      }

      const [newsRes, associationsRes, categoriesRes, iconsRes, streamersRes] = await Promise.all([
        fetch(NEWS_URL, { method: "GET", credentials: "include" }),
        fetch(ASSOCIATIONS_URL, { method: "GET", credentials: "include" }),
        fetch(CATEGORIES_URL, { method: "GET", credentials: "include" }),
        fetch(ICONS_URL, { method: "GET", credentials: "include" }),
        fetch(STREAMERS_URL, { method: "GET", credentials: "include" }),
      ]);
      const newsData = newsRes?.ok
        ? await newsRes.json().catch(() => ({}))
        : {};
      const newsItems = Array.isArray(newsData?.news) ? newsData.news : [];
      const associationsData = associationsRes?.ok
        ? await associationsRes.json().catch(() => ({}))
        : {};
      const associations = Array.isArray(associationsData?.associations) ? associationsData.associations : [];
      const categoriesData = categoriesRes?.ok
        ? await categoriesRes.json().catch(() => ({}))
        : {};
      const categories = Array.isArray(categoriesData?.categories) ? categoriesData.categories : [];
      const iconsData = iconsRes?.ok
        ? await iconsRes.json().catch(() => ({}))
        : {};
      const icons = Array.isArray(iconsData?.icons) ? iconsData.icons : [];
      const streamersData = streamersRes?.ok
        ? await streamersRes.json().catch(() => ({}))
        : {};
      const streamers = Array.isArray(streamersData?.streamers) ? streamersData.streamers : [];
      const associationsById = new Map();
      associations.forEach((item) => {
        const associationId = normalizeCode(item?.id || item?.code);
        if (!associationId) return;
        associationsById.set(associationId, {
          id: associationId,
          name: String(item?.name || associationId).trim(),
          flag: String(item?.flag || "").trim(),
        });
      });

      const tournamentsById = new Map();
      tournaments.forEach((tournament) => {
        const tournamentId = String(tournament?.id || "").trim();
        if (!tournamentId) return;
        tournamentsById.set(tournamentId, tournament);
      });

      addButtonEl.classList.remove("cp-hidden");
      addButtonEl.textContent = "Create";
      addButtonEl.onclick = () => {
        openCaptainCreate(CAPTAIN_VIEWS.NEWS);
      };
      if (isCreateMode || isEditMode) {
        addButtonEl.classList.add("cp-hidden");
      }

      if (isCreateMode) {
        renderNewsEditForm(null, associations, tournaments, categories, icons, streamers, "create", {
          canUploadSource: isAdminUser,
          currentUserAuthId,
          currentUserProfileId,
          isAdmin: isAdminUser,
          newsEditors,
        });
        return;
      }

      if (isEditMode) {
        const newsToEdit = newsItems.find((item) => String(item?.id || "") === editNewsId);
        if (!newsToEdit) {
          contentEl.className = "captain-alert";
          contentEl.textContent = `News not found: ${editNewsId}`;
          countEl.textContent = "";
          return;
        }
        renderNewsEditForm(newsToEdit, associations, tournaments, categories, icons, streamers, "edit", {
          canUploadSource: isAdminUser,
          currentUserAuthId,
          currentUserProfileId,
          isAdmin: isAdminUser,
          newsEditors,
        });
        return;
      }

      renderNewsList(newsItems, associationsById, tournamentsById);
    } catch (_error) {
      contentEl.className = "captain-alert";
      contentEl.textContent = "Failed to load data.";
      countEl.textContent = "";
      hintEl.textContent = "";
    } finally {
      isCaptainPageInitializing = false;
      if (captainPageRefreshQueued) {
        captainPageRefreshQueued = false;
        initCaptainPage();
      }
    }
  }

  window.addEventListener("gg-auth-state-change", () => {
    initCaptainPage();
  });

  window.addEventListener("popstate", () => {
    syncCaptainPageStateFromUrl();
    initCaptainPage();
  });

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initCaptainPage);
  } else {
    initCaptainPage();
  }
})();
</script>
