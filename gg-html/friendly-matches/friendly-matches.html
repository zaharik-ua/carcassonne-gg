    pointer-events: auto;
  }

  .loading-indicator img {
    height: 32px;
    width: 32px;
  }

</style>
<div class="matches-shell">
  <div id="matches-loading" class="loading-indicator">
    <img src="https://carcassonne.gg/gallery/loading-red.gif" alt="Loading...">
  </div>
  <div id="matches-container"></div>
</div>

<script>
const TOURNAMENT_ID = "Friendly-Matches";
const MATCHES_URL = "https://api.carcassonne.gg/public/friendly-matches";
const RESULTS_PAGE_SIZE_OPTIONS = [15, 30, 50];
const resultsPaginationState = {
  pageSize: 15,
  currentPage: 1,
  totalItems: 0,
  totalPages: 1
};
const autoUpdate = new URLSearchParams(window.location.search).get("autoupdate") === "true";
const openLineupsSet = new Set();
const openMatchId = new URLSearchParams(window.location.search).get("open");

if (openMatchId) {
  openMatchId.split(",").map(id => String(id || "").trim()).filter(Boolean).forEach(id => openLineupsSet.add(id));
}

function esc(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function parseUtc(value) {
  const ts = Date.parse(String(value || "").trim());
  return Number.isFinite(ts) ? ts : 0;
}

function readFriendlyMatchesFiltersFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return {
    association: String(params.get("association") || "").trim().toUpperCase(),
    year: String(params.get("year") || "").trim(),
    player: String(params.get("player") || "").trim()
  };
}

function getTodayBoundsLocal() {
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const end = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1).getTime();
  return { start, end };
}

function buildMatchesUrl() {
  const filters = readFriendlyMatchesFiltersFromUrl();
  const url = new URL(MATCHES_URL);
  url.searchParams.set("results_page_size", String(resultsPaginationState.pageSize));
  url.searchParams.set("results_page", String(resultsPaginationState.currentPage));
  url.searchParams.set("results_before", new Date(getTodayBoundsLocal().start).toISOString());
  if (filters.association) url.searchParams.set("association", filters.association);
  if (filters.year) url.searchParams.set("year", filters.year);
  if (filters.player) url.searchParams.set("player", filters.player);
  return url.toString();
}

function getMatchSectionKey(match) {
  const ts = parseUtc(match?.time_utc);
  const { start, end } = getTodayBoundsLocal();
  if (!ts) return "upcoming";
  if (ts < start) return "results";
  if (ts < end) return "today";
  return "upcoming";
}

function formatMatchTime(isoValue, { isToday = false, showYear = true, showTime = true } = {}) {
  const ts = parseUtc(isoValue);
  if (!ts) return "--:--";
  const date = new Date(ts);
  const MONTHS_3 = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  const dd = String(date.getDate()).padStart(2, "0");
  const mon = MONTHS_3[date.getMonth()];
  const yyyy = String(date.getFullYear());
  const time = date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", hour12: false });
  if (isToday) return time;

  const parts = [`${dd} ${mon}`];
  if (showYear) parts.push(yyyy);
  if (showTime) parts.push(time);
  return parts.join("\n");
}

function createRatingElement(rating) {
  const rNum = rating === null || rating === undefined || rating === "" ? null : parseInt(rating, 10);
  if (!Number.isInteger(rNum)) return null;

  const wrap = document.createElement("div");
  wrap.className = "match-rating" + (rNum === 6 ? " match-rating--gold" : "");

  const filledCount = rNum >= 1 && rNum <= 5 ? rNum : rNum === 6 ? 5 : 0;
  const emptyCount = 5 - filledCount;

  for (let i = 0; i < filledCount; i += 1) {
    const star = document.createElement("span");
    star.className = "material-icons-round";
    star.textContent = "star";
    if (rNum !== 6) {
      star.style.color = "#333";
    }
    wrap.appendChild(star);
  }

  for (let i = 0; i < emptyCount; i += 1) {
    const star = document.createElement("span");
    star.className = "material-icons-round";
    star.textContent = "star";
    star.style.color = "#bbb";
    wrap.appendChild(star);
  }

  return wrap;
}

function createTournamentHeader(tournament) {
  const header = document.createElement("div");
  header.className = "tournament-header";

  const linkValue = String(tournament?.link || "").trim();
  const titleEl = document.createElement(linkValue ? "a" : "div");
  titleEl.className = "tournament-header__title";
  if (linkValue) {
    titleEl.href = linkValue;
    titleEl.target = "_self";
    titleEl.rel = "noopener noreferrer";
  }

  const icon = document.createElement("img");
  icon.className = "tournament-icon";
  icon.src = String(tournament?.logo || "https://carcassonne.gg/gallery/friendly-matches.png").trim();
  icon.alt = String(tournament?.name || "Friendly Matches").trim();

  const span = document.createElement("span");
  span.textContent = String(tournament?.name || tournament?.short_title || "Friendly Matches").trim();

  titleEl.appendChild(icon);
  titleEl.appendChild(span);
  header.appendChild(titleEl);

  const right = document.createElement("div");
  right.className = "tournament-header__right";
  header.appendChild(right);
  header._right = right;

  return header;
}

function hasValue(value) {
  return value !== null && value !== undefined && String(value).trim() !== "";
}

function hasScores(match) {
  return hasValue(match?.dw1) || hasValue(match?.dw2) || hasValue(match?.gw1) || hasValue(match?.gw2);
}

function isLiveStatus(status) {
  const raw = String(status || "").trim().toLowerCase();
  return raw === "in progress" || raw === "live";
}

function sortLineups(lineups) {
  return (Array.isArray(lineups) ? lineups.slice() : []).sort((a, b) => {
    const aNo = Number(a?.duel_number);
    const bNo = Number(b?.duel_number);
    if (Number.isFinite(aNo) && Number.isFinite(bNo) && aNo !== bNo) {
      return aNo - bNo;
    }
    return String(a?.id || "").localeCompare(String(b?.id || ""));
  });
}

function buildLineupMap(duels) {
  const map = new Map();
  (Array.isArray(duels) ? duels : []).forEach((duel) => {
    const matchId = String(duel?.match_id || "").trim();
    if (!matchId) return;
    if (!map.has(matchId)) {
      map.set(matchId, []);
    }
    map.get(matchId).push(duel);
  });
  map.forEach((list, key) => {
    map.set(key, sortLineups(list));
  });
  return map;
}

function playerLabel(duel, side) {
  const name = String(duel?.[`player_${side}_name`] || "").trim();
  if (name) return name;
  const id = String(duel?.[`player_${side}_id`] || "").trim();
  return id || "-";
}

function isTruthyOne(value) {
  return value === 1 || value === true || String(value || "").trim() === "1";
}

function collectGameEntries(duel) {
  if (Array.isArray(duel?.games) && duel.games.length > 0) {
    return duel.games.filter(Boolean);
  }

  const hasSingleGameData =
    hasValue(duel?.player_1_score) ||
    hasValue(duel?.player_2_score) ||
    hasValue(duel?.player_1_rank) ||
    hasValue(duel?.player_2_rank) ||
    isTruthyOne(duel?.player_1_clock) ||
    isTruthyOne(duel?.player_2_clock) ||
    hasValue(duel?.bga_table_id);

  return hasSingleGameData ? [duel] : [];
}

function createGameBadge(game) {
  const p1Clock = isTruthyOne(game?.player_1_clock);
  const p2Clock = isTruthyOne(game?.player_2_clock);
  const p1RankWon = String(game?.player_1_rank || "").trim() === "1";
  const p2RankWon = String(game?.player_2_rank || "").trim() === "1";
  const p1Score = String(game?.player_1_score ?? "").trim();
  const p2Score = String(game?.player_2_score ?? "").trim();

  const badge = document.createElement("span");
  badge.className = "lineup__game-badge";

  if ((p1Clock || p2Clock) && p1Clock !== p2Clock) {
    badge.classList.add("lineup__game-badge--clock");
    const left = document.createElement("span");
    const right = document.createElement("span");
    const icon = document.createElement("i");
    icon.className = "fa-regular fa-clock lineup__game-clock";

    if (p1Clock) {
      left.textContent = "";
      right.textContent = "0-1";
      badge.appendChild(left);
      badge.appendChild(icon);
      badge.appendChild(right);
    } else {
      left.textContent = "1-0";
      right.textContent = "";
      badge.appendChild(left);
      badge.appendChild(icon);
      badge.appendChild(right);
    }

    return badge;
  }

  if (!hasValue(p1Score) || !hasValue(p2Score)) {
    return null;
  }

  if (p1RankWon) {
    badge.classList.add("lineup__game-badge--p1");
  } else if (p2RankWon) {
    badge.classList.add("lineup__game-badge--p2");
  }

  badge.textContent = `${p1Score}-${p2Score}`;
  return badge;
}

function createGameBadgesWrap(duel) {
  const games = collectGameEntries(duel);
  if (!games.length) return null;

  const wrap = document.createElement("span");
  wrap.className = "lineup__games";

  games.forEach((game) => {
    const badge = createGameBadge(game);
    if (!badge) return;

    const tableId = String(game?.bga_table_id || "").trim();
    if (tableId) {
      const link = document.createElement("a");
      link.className = "lineup__game-link";
      link.href = `https://boardgamearena.com/table?table=${encodeURIComponent(tableId)}`;
      link.target = "_blank";
      link.rel = "noopener noreferrer";
      link.appendChild(badge);
      wrap.appendChild(link);
      return;
    }

    wrap.appendChild(badge);
  });

  return wrap.childNodes.length ? wrap : null;
}

function createLineupPanel(matchId, lineups, chevronIcon) {
  const lineupPanel = document.createElement("div");
  lineupPanel.className = "lineup";

  const lineupBody = document.createElement("div");
  lineupBody.className = "lineup__overview";

  sortLineups(lineups).forEach((duel) => {
    const row = document.createElement("div");
    row.className = "lineup__row";

    const p1Id = String(duel?.player_1_id || "").trim();
    const p2Id = String(duel?.player_2_id || "").trim();

    const p1Link = document.createElement("a");
    p1Link.href = p1Id ? `https://boardgamearena.com/player?id=${encodeURIComponent(p1Id)}` : "#";
    p1Link.target = "_blank";
    p1Link.rel = "noopener noreferrer";
    p1Link.textContent = playerLabel(duel, 1);
    if (!p1Id) {
      p1Link.removeAttribute("href");
      p1Link.removeAttribute("target");
      p1Link.removeAttribute("rel");
    }

    const sep = document.createElement("span");
    sep.className = "lineup__row-sep";
    sep.textContent = " - ";

    const p2Link = document.createElement("a");
    p2Link.href = p2Id ? `https://boardgamearena.com/player?id=${encodeURIComponent(p2Id)}` : "#";
    p2Link.target = "_blank";
    p2Link.rel = "noopener noreferrer";
    p2Link.textContent = playerLabel(duel, 2);
    if (!p2Id) {
      p2Link.removeAttribute("href");
      p2Link.removeAttribute("target");
      p2Link.removeAttribute("rel");
    }

    const hasDuelScore = hasValue(duel?.dw1) && hasValue(duel?.dw2);
    const scoreEl = document.createElement("span");
    scoreEl.className = "lineup__row-score";
    scoreEl.textContent = hasDuelScore ? ` ${duel.dw1} - ${duel.dw2} ` : " - ";
    const gamesWrap = createGameBadgesWrap(duel);

    row.appendChild(p1Link);
    row.appendChild(hasDuelScore ? scoreEl : sep);
    row.appendChild(p2Link);
    if (gamesWrap) {
      row.appendChild(gamesWrap);
    }
    lineupBody.appendChild(row);
  });

  lineupPanel.appendChild(lineupBody);

  const isOpen = openLineupsSet.has(matchId);
  if (isOpen) {
    lineupPanel.classList.add("open");
    lineupPanel.style.height = "auto";
    chevronIcon.style.transform = "rotate(0deg)";
  }

  return lineupPanel;
}

function bindLineupToggle(matchId, lineupPanel, chevronIcon, toggleBtn) {
  toggleBtn.addEventListener("click", () => {
    const isOpen = lineupPanel.classList.contains("open");
    if (isOpen) {
      lineupPanel.style.height = `${lineupPanel.scrollHeight}px`;
      requestAnimationFrame(() => {
        lineupPanel.style.height = "0px";
        lineupPanel.classList.remove("open");
        chevronIcon.style.transform = "rotate(180deg)";
        openLineupsSet.delete(matchId);
      });
      return;
    }

    lineupPanel.style.height = "0px";
    lineupPanel.classList.add("open");
    chevronIcon.style.transform = "rotate(0deg)";
    openLineupsSet.add(matchId);
    requestAnimationFrame(() => {
      lineupPanel.style.height = `${lineupPanel.scrollHeight}px`;
    });
    lineupPanel.addEventListener("transitionend", function handler() {
      if (lineupPanel.classList.contains("open")) {
        lineupPanel.style.height = "auto";
      }
      lineupPanel.removeEventListener("transitionend", handler);
    });
  });
}

function createMatchElement(match, lineups, options = {}) {
  const { isToday = false, showRating = false, showYear = true, showTime = true, showExpandedTime = false } = options;
  const wrapper = document.createElement("div");
  wrapper.className = "match-wrapper";

  const row = document.createElement("div");
  row.className = "match-row";
  row.dataset.id = String(match?.id || "").trim();

  const timeDiv = document.createElement("div");
  timeDiv.className = "match-time";
  if (showRating) {
    const ratingEl = createRatingElement(match?.rating);
    if (ratingEl) timeDiv.appendChild(ratingEl);
  }
  const timeText = document.createElement("div");
  timeText.className = "match-time-text";
  const renderTimeText = (expanded = false) => {
    timeText.innerHTML = esc(formatMatchTime(match?.time_utc, {
      isToday,
      showYear,
      showTime: expanded ? true : showTime
    })).replaceAll("\n", "<br>");
  };
  renderTimeText(false);
  timeDiv.appendChild(timeText);
  row.appendChild(timeDiv);

  const divider = document.createElement("div");
  divider.className = "divider-vertical";
  row.appendChild(divider);

  const teamsDiv = document.createElement("div");
  teamsDiv.className = "teams";

  [
    { flag: match?.team_1_flag, name: match?.team_1_name || match?.team_1 },
    { flag: match?.team_2_flag, name: match?.team_2_name || match?.team_2 }
  ].forEach((team) => {
    const teamRow = document.createElement("div");
    teamRow.className = "team-row";

    if (String(team.flag || "").trim()) {
      const flag = document.createElement("img");
      flag.className = "team-flag";
      flag.src = team.flag;
      flag.alt = String(team.name || "").trim();
      teamRow.appendChild(flag);
    }

    const name = document.createElement("span");
    name.textContent = String(team.name || "-").trim() || "-";
    teamRow.appendChild(name);
    teamsDiv.appendChild(teamRow);
  });

  row.appendChild(teamsDiv);

  const rightDiv = document.createElement("div");
  rightDiv.className = "match-right";

  if (isLiveStatus(match?.status)) {
    const liveIcon = document.createElement("img");
    liveIcon.className = "live-icon";
    liveIcon.src = "https://carcassonne.gg/gallery_gen/f4d6792e3ac5f7356502e64aefa51f32_60x28_fit.png";
    liveIcon.alt = "LIVE";
    rightDiv.appendChild(liveIcon);
  }

  if (hasScores(match)) {
    const scoreBox = document.createElement("div");
    scoreBox.className = "score-box match-score";
    scoreBox.innerHTML = `<div>${esc(hasValue(match?.dw1) ? match.dw1 : "-")}</div><div>${esc(hasValue(match?.dw2) ? match.dw2 : "-")}</div>`;
    rightDiv.appendChild(scoreBox);

    const gamesBox = document.createElement("div");
    gamesBox.className = "score-box-alt";
    gamesBox.innerHTML = `<div>(${esc(hasValue(match?.gw1) ? match.gw1 : "-")})</div><div>(${esc(hasValue(match?.gw2) ? match.gw2 : "-")})</div>`;
    rightDiv.appendChild(gamesBox);
  }

  const matchId = String(match?.id || "").trim();
  const matchLineups = Array.isArray(lineups) ? lineups.filter(Boolean) : [];
  let lineupPanel = null;

  if (matchId && matchLineups.length > 0) {
    const toggleBtn = document.createElement("div");
    toggleBtn.className = "chevron";

    const chevronIcon = document.createElement("i");
    chevronIcon.className = "fas fa-chevron-down";
    chevronIcon.style.transition = "transform 0.3s ease";
    chevronIcon.style.transform = "rotate(180deg)";
    chevronIcon.style.fontSize = "12px";
    chevronIcon.style.padding = "0 4px";
    toggleBtn.appendChild(chevronIcon);

    lineupPanel = createLineupPanel(matchId, matchLineups, chevronIcon);
    bindLineupToggle(matchId, lineupPanel, chevronIcon, toggleBtn);
    if (showExpandedTime) {
      const syncExpandedTime = () => renderTimeText(lineupPanel.classList.contains("open"));
      syncExpandedTime();
      toggleBtn.addEventListener("click", () => {
        requestAnimationFrame(syncExpandedTime);
      });
    }
    rightDiv.appendChild(toggleBtn);
  }

  row.appendChild(rightDiv);
  wrapper.appendChild(row);
  if (lineupPanel) {
    wrapper.appendChild(lineupPanel);
  }

  return wrapper;
}

function createSectionTitle(text) {
  const sectionTitle = document.createElement("div");
  sectionTitle.className = "section-title";
  const titleSpan = document.createElement("span");
  titleSpan.textContent = text;
  sectionTitle.appendChild(titleSpan);
  return sectionTitle;
}

function createEmptyCard(text) {
  const card = document.createElement("div");
  card.className = "tournament-card";
  const row = document.createElement("div");
  row.className = "match-row";
  row.style.justifyContent = "center";
  row.style.color = "#666";
  row.textContent = text;
  card.appendChild(row);
  return card;
}

function renderSection(container, title, tournament, matches, lineupMap, options = {}) {
  if (!Array.isArray(matches) || matches.length === 0) return;

  container.appendChild(createSectionTitle(title));

  const card = document.createElement("div");
  card.className = "tournament-card";

  matches.forEach((match, index) => {
    const matchId = String(match?.id || "").trim();
    const matchEl = createMatchElement(match, lineupMap.get(matchId) || [], options);
    if (index === 0) matchEl.classList.add("match-wrapper--first");
    card.appendChild(matchEl);
  });

  container.appendChild(card);
}

function renderResultsSection(container, title, matches, lineupMap, options = {}) {
  if (!Array.isArray(matches) || matches.length === 0) return;

  container.appendChild(createSectionTitle(title));

  const card = document.createElement("div");
  card.className = "tournament-card";
  container.appendChild(card);

  const controls = document.createElement("div");
  controls.className = "results-controls";
  card.appendChild(controls);

  const pageSizeWrap = document.createElement("label");
  pageSizeWrap.className = "results-pagesize";
  pageSizeWrap.appendChild(document.createTextNode("Per page:"));

  const pageSizePicker = document.createElement("div");
  pageSizePicker.className = "results-pagesize-picker";
  const pageSizeBtn = document.createElement("button");
  pageSizeBtn.type = "button";
  pageSizeBtn.className = "results-pagesize-btn";
  const pageSizeBtnLabel = document.createElement("span");
  pageSizeBtnLabel.className = "results-pagesize-label";
  pageSizeBtnLabel.textContent = String(resultsPaginationState.pageSize);
  const pageSizeChevron = document.createElement("span");
  pageSizeChevron.className = "results-pagesize-chevron";
  pageSizeChevron.innerHTML = '<i class="fa fa-chevron-down"></i>';
  pageSizeBtn.appendChild(pageSizeBtnLabel);
  pageSizeBtn.appendChild(pageSizeChevron);

  const pageSizeMenu = document.createElement("div");
  pageSizeMenu.className = "results-pagesize-menu";
  RESULTS_PAGE_SIZE_OPTIONS.forEach((size) => {
    const option = document.createElement("button");
    option.type = "button";
    option.className = "results-pagesize-option";
    option.dataset.value = String(size);
    option.textContent = String(size);
    if (size === resultsPaginationState.pageSize) option.classList.add("active");
    pageSizeMenu.appendChild(option);
  });

  pageSizePicker.appendChild(pageSizeBtn);
  pageSizePicker.appendChild(pageSizeMenu);
  pageSizeWrap.appendChild(pageSizePicker);
  controls.appendChild(pageSizeWrap);

  const pagination = document.createElement("div");
  pagination.className = "results-pagination";

  const prevBtn = document.createElement("button");
  prevBtn.type = "button";
  prevBtn.className = "results-pagebtn";
  prevBtn.textContent = "Prev";

  const pageInfo = document.createElement("span");
  pageInfo.className = "results-pageinfo";

  const nextBtn = document.createElement("button");
  nextBtn.type = "button";
  nextBtn.className = "results-pagebtn";
  nextBtn.textContent = "Next";

  pagination.appendChild(prevBtn);
  pagination.appendChild(pageInfo);
  pagination.appendChild(nextBtn);
  controls.appendChild(pagination);

  function renderPage() {
    card.querySelectorAll(".match-wrapper").forEach((el) => el.remove());

    matches.forEach((match, index) => {
      const matchId = String(match?.id || "").trim();
      const matchEl = createMatchElement(match, lineupMap.get(matchId) || [], options);
      if (index === 0) matchEl.classList.add("match-wrapper--first");
      card.appendChild(matchEl);
    });

    pageInfo.textContent = `Page ${resultsPaginationState.currentPage} of ${resultsPaginationState.totalPages}`;
    prevBtn.disabled = resultsPaginationState.currentPage <= 1;
    nextBtn.disabled = resultsPaginationState.currentPage >= resultsPaginationState.totalPages;
  }

  function closePageSizeMenu() {
    pageSizeMenu.classList.remove("open");
    pageSizeMenu.style.maxHeight = "0px";
    pageSizeBtn.classList.remove("open");
  }

  function setPageSize(nextSize) {
    resultsPaginationState.pageSize = RESULTS_PAGE_SIZE_OPTIONS.includes(nextSize) ? nextSize : 15;
    resultsPaginationState.currentPage = 1;
    pageSizeBtnLabel.textContent = String(resultsPaginationState.pageSize);
    pageSizeMenu.querySelectorAll(".results-pagesize-option").forEach((el) => {
      el.classList.toggle("active", el.dataset.value === String(resultsPaginationState.pageSize));
    });
    fetchAndRenderMatches();
  }

  pageSizeBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    const isOpen = pageSizeMenu.classList.contains("open");
    closePageSizeMenu();
    if (!isOpen) {
      pageSizeMenu.classList.add("open");
      pageSizeMenu.style.maxHeight = `${pageSizeMenu.scrollHeight}px`;
      pageSizeBtn.classList.add("open");
    }
  });

  pageSizeMenu.querySelectorAll(".results-pagesize-option").forEach((optBtn) => {
    optBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      const nextSize = Number(optBtn.dataset.value) || 15;
      setPageSize(nextSize);
      closePageSizeMenu();
    });
  });

  if (window.__friendlyMatchesResultsPageSizeHandler) {
    document.removeEventListener("click", window.__friendlyMatchesResultsPageSizeHandler);
  }
  window.__friendlyMatchesResultsPageSizeHandler = (e) => {
    if (!pageSizeWrap.contains(e.target)) closePageSizeMenu();
  };
  document.addEventListener("click", window.__friendlyMatchesResultsPageSizeHandler);

  prevBtn.addEventListener("click", () => {
    if (resultsPaginationState.currentPage <= 1) return;
    resultsPaginationState.currentPage -= 1;
    fetchAndRenderMatches();
  });

  nextBtn.addEventListener("click", () => {
    if (resultsPaginationState.currentPage >= resultsPaginationState.totalPages) return;
    resultsPaginationState.currentPage += 1;
    fetchAndRenderMatches();
  });

  renderPage();
}

function renderAllSectionsFromData(data) {
  const container = document.getElementById("matches-container");
  if (!container) return;
  container.innerHTML = "";

  const tournament = data?.tournament && String(data.tournament.id || "").trim() === TOURNAMENT_ID
    ? data.tournament
    : {
        id: TOURNAMENT_ID,
        name: "Friendly Matches",
        short_title: "Friendly Matches",
        logo: "https://carcassonne.gg/gallery/friendly-matches.png",
        link: "https://carcassonne.gg/Friendly-Matches/",
        type: "TEAM"
      };

  const matches = (Array.isArray(data?.matches) ? data.matches : [])
    .filter((match) => String(match?.tournament_id || "").trim() === TOURNAMENT_ID);

  const lineupMap = buildLineupMap(
    (Array.isArray(data?.duels) ? data.duels : [])
      .filter((duel) => String(duel?.match_id || "").trim())
  );
  const resultsPagination = data?.pagination?.results || null;
  resultsPaginationState.totalItems = Number(resultsPagination?.total) || 0;
  resultsPaginationState.totalPages = Math.max(1, Number(resultsPagination?.total_pages) || 1);
  resultsPaginationState.currentPage = Math.min(
    Math.max(1, Number(resultsPagination?.page) || resultsPaginationState.currentPage || 1),
    resultsPaginationState.totalPages
  );

  const sections = {
    today: [],
    upcoming: [],
    results: []
  };

  matches.forEach((match) => {
    sections[getMatchSectionKey(match)].push(match);
  });

  sections.today.sort((a, b) => parseUtc(a?.time_utc) - parseUtc(b?.time_utc));
  sections.upcoming.sort((a, b) => parseUtc(a?.time_utc) - parseUtc(b?.time_utc));
  sections.results.sort((a, b) => parseUtc(b?.time_utc) - parseUtc(a?.time_utc));

  renderSection(container, "Today", tournament, sections.today, lineupMap, { isToday: true, showRating: true, showYear: false, showTime: true });
  renderSection(container, "Upcoming", tournament, sections.upcoming, lineupMap, { isToday: false, showRating: true, showYear: false, showTime: true });
  renderResultsSection(container, "Results", sections.results, lineupMap, { isToday: false, showRating: false, showYear: true, showTime: false, showExpandedTime: true });

  if (!sections.today.length && !sections.upcoming.length && !sections.results.length) {
    container.appendChild(createEmptyCard("No friendly matches found."));
  }
}

function setLoading(visible) {
  const el = document.getElementById("matches-loading");
  if (!el) return;
  el.classList.toggle("is-visible", Boolean(visible));
}

async function fetchAndRenderMatches() {
  setLoading(true);
  try {
    const response = await fetch(buildMatchesUrl(), { method: "GET" });
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }
    const data = await response.json();
    renderAllSectionsFromData(data || {});
  } catch (error) {
    console.error("Failed to load friendly matches:", error);
    const container = document.getElementById("matches-container");
    if (container) {
      container.innerHTML = "";
      container.appendChild(createEmptyCard("Failed to load friendly matches."));
    }
  } finally {
    setLoading(false);
  }
}

fetchAndRenderMatches();

if (autoUpdate) {
  setInterval(fetchAndRenderMatches, 60000);
}

function resetPaginationAndReloadFriendlyMatches() {
  resultsPaginationState.currentPage = 1;
  fetchAndRenderMatches();
}

window.addEventListener("popstate", resetPaginationAndReloadFriendlyMatches);
window.addEventListener("friendly-matches-filter-change", resetPaginationAndReloadFriendlyMatches);
</script>
