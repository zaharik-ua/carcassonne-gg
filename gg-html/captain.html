    gw1Input.step = "1";
    gw1Input.value = String(source?.gw1 ?? "");

    const gw2Input = document.createElement("input");
    gw2Input.type = "number";
    gw2Input.step = "1";
    gw2Input.value = String(source?.gw2 ?? "");

    const statusInput = createDropdown(
      String(source?.status || "").trim() || "Planned",
      [
        { value: "Planned", label: "Planned" },
        { value: "Done", label: "Done" },
      ]
    );

    const lineupsToggleWrap = document.createElement("div");
    lineupsToggleWrap.style.gridColumn = "1 / -1";
    const createLineupsBtn = document.createElement("button");
    createLineupsBtn.type = "button";
    createLineupsBtn.className = "cp-btn cp-btn-secondary";
    createLineupsBtn.textContent = "Create Lineups";
    lineupsToggleWrap.appendChild(createLineupsBtn);
    form.appendChild(lineupsToggleWrap);

    const lineupsWrap = document.createElement("div");
    lineupsWrap.style.gridColumn = "1 / -1";
    lineupsWrap.style.display = "none";
    lineupsWrap.style.border = "1px solid #e0e0e0";
    lineupsWrap.style.borderRadius = "6px";
    lineupsWrap.style.padding = "10px";
    lineupsWrap.style.background = "#fff";
    lineupsWrap.style.marginTop = "4px";
    form.appendChild(lineupsWrap);

    const lineupsHeader = document.createElement("div");
    lineupsHeader.style.display = "grid";
    lineupsHeader.style.gridTemplateColumns = "20px 1fr 1fr";
    lineupsHeader.style.gap = "8px";
    lineupsHeader.style.alignItems = "center";
    lineupsHeader.style.marginBottom = "8px";
    lineupsWrap.appendChild(lineupsHeader);

    const lineupTitle1 = document.createElement("div");
    lineupTitle1.textContent = "";
    lineupTitle1.style.fontSize = "12px";
    lineupTitle1.style.fontWeight = "600";
    lineupsHeader.appendChild(lineupTitle1);

    const lineupTitleTeam1 = document.createElement("div");
    lineupTitleTeam1.style.fontSize = "12px";
    lineupTitleTeam1.style.fontWeight = "600";
    lineupTitleTeam1.style.display = "inline-flex";
    lineupTitleTeam1.style.alignItems = "center";
    lineupTitleTeam1.style.gap = "6px";
    lineupsHeader.appendChild(lineupTitleTeam1);

    const lineupTitleTeam2 = document.createElement("div");
    lineupTitleTeam2.style.fontSize = "12px";
    lineupTitleTeam2.style.fontWeight = "600";
    lineupTitleTeam2.style.display = "inline-flex";
    lineupTitleTeam2.style.alignItems = "center";
    lineupTitleTeam2.style.gap = "6px";
    lineupsHeader.appendChild(lineupTitleTeam2);

    const lineupsRows = document.createElement("div");
    lineupsRows.style.display = "grid";
    lineupsRows.style.gap = "8px";
    lineupsWrap.appendChild(lineupsRows);

    const lineupsOpenActions = document.createElement("div");
    lineupsOpenActions.style.display = "inline-flex";
    lineupsOpenActions.style.alignItems = "center";
    lineupsOpenActions.style.gap = "8px";
    lineupsOpenActions.style.marginTop = "8px";
    const addLineupRowBtn = document.createElement("button");
    addLineupRowBtn.type = "button";
    addLineupRowBtn.className = "cp-btn cp-btn-secondary";
    addLineupRowBtn.textContent = "Add Duel";
    lineupsOpenActions.appendChild(addLineupRowBtn);
    lineupsWrap.appendChild(lineupsOpenActions);

    const sortedInitialLineups = sortLineups(initialLineups);
    let lineupsEnabled = sortedInitialLineups.length > 0;
    const hadInitialLineups = sortedInitialLineups.length > 0;
    let lineupsState = sortedInitialLineups.map((l, index) => ({
      id: String(l?.id || buildLineupIdFromMatch(source?.time_utc ?? source?.time, l?.player_1_id, l?.player_2_id)).trim(),
      duelNumber: readLineupDuelNumber(l) ?? index + 1,
      player1Id: String(l?.player_1_id || "").trim(),
      player2Id: String(l?.player_2_id || "").trim(),
    }));
    if (!lineupsState.length && isCreateMode) lineupsState = [];

    const createEmptyLineupEntry = () => ({
      id: buildLineupIdFromMatch(source?.time_utc ?? source?.time, "", ""),
      duelNumber: null,
      player1Id: "",
      player2Id: "",
    });

    const createDefaultLineupsState = () => {
      if (isSecretLineupType()) {
        const n = requiredDuelRows();
        return Array.from({ length: n }, () => createEmptyLineupEntry());
      }
      return Array.from({ length: 5 }, () => createEmptyLineupEntry());
    };

    const syncLineupsToggleButton = () => {
      createLineupsBtn.textContent = lineupsEnabled ? "Delete Lineups" : "Create Lineups";
    };

    const getPlayersForTeam = (teamId) => {
      const association = normalizeCode(teamId);
      return allProfiles
        .filter((p) => normalizeCode(p?.association) === association)
        .sort((a, b) => playerLabel(a).localeCompare(playerLabel(b)));
    };

    const createAddPlayerInline = (associationCode, onCreated, onCancel) => {
      const wrap = document.createElement("div");
      wrap.style.marginTop = "6px";
      wrap.style.padding = "8px";
      wrap.style.border = "1px solid #e0e0e0";
      wrap.style.borderRadius = "4px";
      wrap.style.display = "grid";
      wrap.style.gap = "6px";

      const bgaIdInput = document.createElement("input");
      bgaIdInput.type = "text";
      bgaIdInput.placeholder = "BGA ID";
      bgaIdInput.style.height = "30px";
      bgaIdInput.style.border = "1px solid #c8ced8";
      bgaIdInput.style.borderRadius = "4px";
      bgaIdInput.style.padding = "4px 8px";
      wrap.appendChild(bgaIdInput);

      const bgaNicknameInput = document.createElement("input");
      bgaNicknameInput.type = "text";
      bgaNicknameInput.placeholder = "BGA nickname";
      bgaNicknameInput.style.height = "30px";
      bgaNicknameInput.style.border = "1px solid #c8ced8";
      bgaNicknameInput.style.borderRadius = "4px";
      bgaNicknameInput.style.padding = "4px 8px";
      wrap.appendChild(bgaNicknameInput);

      const associationInput = document.createElement("input");
      associationInput.type = "text";
      associationInput.value = associationCode;
      associationInput.readOnly = true;
      associationInput.style.height = "30px";
      associationInput.style.border = "1px solid #c8ced8";
      associationInput.style.borderRadius = "4px";
      associationInput.style.padding = "4px 8px";
      associationInput.style.background = "#f3f4f6";
      wrap.appendChild(associationInput);

      const err = document.createElement("div");
      err.className = "cp-edit-error cp-hidden";
      wrap.appendChild(err);

      const actions = document.createElement("div");
      actions.style.display = "inline-flex";
      actions.style.gap = "8px";
      const createBtn = document.createElement("button");
      createBtn.type = "button";
      createBtn.className = "cp-btn cp-btn-primary";
      createBtn.textContent = "Create";
      const cancelBtnInline = document.createElement("button");
      cancelBtnInline.type = "button";
      cancelBtnInline.className = "cp-btn cp-btn-secondary";
      cancelBtnInline.textContent = "Cancel";
      actions.appendChild(createBtn);
      actions.appendChild(cancelBtnInline);
      wrap.appendChild(actions);

      const setInlineError = (msg) => {
        if (!msg) {
          err.textContent = "";
          err.classList.add("cp-hidden");
          return;
        }
        err.textContent = msg;
        err.classList.remove("cp-hidden");
      };

      cancelBtnInline.addEventListener("click", () => {
        onCancel();
      });

      createBtn.addEventListener("click", async () => {
        setInlineError("");
        const pid = String(bgaIdInput.value || "").trim();
        const nick = String(bgaNicknameInput.value || "").trim();
        if (!/^\d{6,9}$/.test(pid)) {
          setInlineError("BGA ID must be 6-9 digits.");
          return;
        }
        if (!nick) {
          setInlineError("BGA nickname is required.");
          return;
        }
        createBtn.disabled = true;
        createBtn.textContent = "Creating...";
        try {
          const resp = await fetch(PROFILES_URL, {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              id: pid,
              bga_nickname: nick,
              association: associationCode,
            }),
          });
          const result = await resp.json().catch(() => ({}));
          if (!resp.ok || !result?.ok) {
            setInlineError(result?.message || "Failed to create profile.");
            return;
          }
          const profile = result?.profile || {
            id: pid,
            bga_nickname: nick,
            name: nick,
            association: associationCode,
          };
          allProfiles.push(profile);
          onCreated(profile);
        } catch (_error) {
          setInlineError("Failed to create profile.");
        } finally {
          createBtn.disabled = false;
          createBtn.textContent = "Create";
        }
      });

      return wrap;
    };

    const syncLineupsHeader = () => {
      lineupTitleTeam1.innerHTML = "";
      lineupTitleTeam2.innerHTML = "";
      const team1Meta = teamsById.get(normalizeCode(team1Input.getValue())) || null;
      const team2Meta = teamsById.get(normalizeCode(team2Input.getValue())) || null;
      if (team1Meta?.logo) {
        const img = document.createElement("img");
        img.className = "cp-dd-flag";
        img.src = team1Meta.logo;
        img.alt = "";
        lineupTitleTeam1.appendChild(img);
      }
      const t1 = document.createElement("span");
      t1.textContent = team1Meta?.name || "Team 1";
      lineupTitleTeam1.appendChild(t1);
      if (team2Meta?.logo) {
        const img = document.createElement("img");
        img.className = "cp-dd-flag";
        img.src = team2Meta.logo;
        img.alt = "";
        lineupTitleTeam2.appendChild(img);
      }
      const t2 = document.createElement("span");
      t2.textContent = team2Meta?.name || "Team 2";
      lineupTitleTeam2.appendChild(t2);
    };

    const isSecretLineupType = () => String(lineupTypeInput.getValue() || "").trim() === "Secret";
    const requiredDuelRows = () => {
      const duels = parseNullableInt(duelsInput.value);
      return Number.isInteger(duels) && duels > 0 ? duels : 1;
    };

    const reindexLineupsState = () => {
      lineupsState = lineupsState.map((entry, index) => ({
        ...entry,
        duelNumber: index + 1,
      }));
    };

    const moveLineupRow = (fromIndex, toIndex) => {
      if (toIndex < 0 || toIndex >= lineupsState.length || fromIndex === toIndex) return;
      const nextState = lineupsState.slice();
      const [moved] = nextState.splice(fromIndex, 1);
      if (!moved) return;
      nextState.splice(toIndex, 0, moved);
      lineupsState = nextState;
      reindexLineupsState();
      renderLineupsRows();
    };

    const renderLineupsRows = () => {
      lineupsRows.innerHTML = "";
      syncLineupsHeader();
      syncLineupsToggleButton();
      lineupsWrap.style.display = lineupsEnabled ? "" : "none";
      if (!lineupsEnabled) return;

      const team1Code = normalizeCode(team1Input.getValue());
      const team2Code = normalizeCode(team2Input.getValue());
      const canChangeCount = !isSecretLineupType();
      const canReorder = lineupsState.length > 1;
      lineupsHeader.style.gridTemplateColumns = canChangeCount
        ? "32px minmax(0, 1fr) minmax(0, 1fr) 30px 26px"
        : "32px minmax(0, 1fr) minmax(0, 1fr) 30px";
      lineupsOpenActions.style.display = canChangeCount ? "" : "none";
      reindexLineupsState();

      lineupsState.forEach((entry, index) => {
        const row = document.createElement("div");
        row.style.display = "grid";
        row.style.gridTemplateColumns = canChangeCount
          ? "32px minmax(0, 1fr) minmax(0, 1fr) 30px 26px"
          : "32px minmax(0, 1fr) minmax(0, 1fr) 30px";
        row.style.gap = "8px";
        row.style.alignItems = "start";

        const duelNo = document.createElement("div");
        duelNo.className = "cp-lineup-order";
        duelNo.style.height = "30px";
        duelNo.style.display = "inline-flex";
        duelNo.style.alignItems = "center";
        duelNo.style.fontSize = "13px";
        duelNo.style.fontWeight = "600";
        duelNo.textContent = `${index + 1}:`;
        row.appendChild(duelNo);

        const createPlayerCell = (teamCodeForCell, currentValue, onSelect, cellConfig = {}) => {
          const cell = document.createElement("div");
          const optionPlayers = getPlayersForTeam(teamCodeForCell).map((p) => ({
            value: String(p.id ?? p.player_id ?? "").trim(),
            label: `${playerLabel(p)}`,
          }));
          const playerOptions = [{ value: "", label: "Select player" }]
            .concat(optionPlayers)
            .concat([{ value: "__add_new__", label: "Add new player" }]);
          const dd = createDropdown(currentValue || "", playerOptions, {
            allowEmpty: true,
            searchable: true,
            alignMenuRight: !!cellConfig.alignMenuRight,
          });
          cell.style.minWidth = "0";
          dd.root.style.minWidth = "0";
          const ddBtn = dd.root.querySelector(".cp-dd-btn");
          const syncSelectedHighlight = () => {
            if (!ddBtn) return;
            const selectedValue = String(dd.getValue() || "").trim();
            const hasSelectedPlayer = selectedValue !== "" && selectedValue !== "__add_new__";
            ddBtn.style.background = hasSelectedPlayer ? "#f4fbf4" : "#fff";
            ddBtn.style.borderColor = hasSelectedPlayer ? "#d7ebd7" : "#c8ced8";
          };
          syncSelectedHighlight();
          const inlineArea = document.createElement("div");
          cell.appendChild(dd.root);
          cell.appendChild(inlineArea);
          dd.setOnChange((nextValue) => {
            if (nextValue === "__add_new__") {
              dd.setValue("", false);
              syncSelectedHighlight();
              const inline = createAddPlayerInline(teamCodeForCell, (profile) => {
                inlineArea.innerHTML = "";
                onSelect(String(profile?.id ?? profile?.player_id ?? "").trim());
                renderLineupsRows();
              }, () => {
                inlineArea.innerHTML = "";
              });
              inlineArea.innerHTML = "";
              inlineArea.appendChild(inline);
              return;
            }
            inlineArea.innerHTML = "";
            onSelect(nextValue);
            syncSelectedHighlight();
          });
          return cell;
        };

        const p1Cell = createPlayerCell(team1Code, entry.player1Id, (v) => {
          lineupsState[index].player1Id = String(v || "").trim();
        });
        const p2Cell = createPlayerCell(team2Code, entry.player2Id, (v) => {
          lineupsState[index].player2Id = String(v || "").trim();
        }, { alignMenuRight: true });
        row.appendChild(p1Cell);
        row.appendChild(p2Cell);

        const moveControls = document.createElement("div");
        moveControls.className = "cp-lineup-move";

        const moveUpBtn = document.createElement("button");
        moveUpBtn.type = "button";
        moveUpBtn.className = "cp-btn cp-btn-secondary cp-lineup-move-btn";
        moveUpBtn.textContent = "↑";
        moveUpBtn.disabled = !canReorder || index === 0;
        moveUpBtn.addEventListener("click", () => {
          moveLineupRow(index, index - 1);
        });

        const moveDownBtn = document.createElement("button");
        moveDownBtn.type = "button";
        moveDownBtn.className = "cp-btn cp-btn-secondary cp-lineup-move-btn";
        moveDownBtn.textContent = "↓";
        moveDownBtn.disabled = !canReorder || index === lineupsState.length - 1;
        moveDownBtn.addEventListener("click", () => {
          moveLineupRow(index, index + 1);
        });

        moveControls.appendChild(moveUpBtn);
        moveControls.appendChild(moveDownBtn);
        row.appendChild(moveControls);

        if (canChangeCount) {
          const removeBtn = document.createElement("button");
          removeBtn.type = "button";
          removeBtn.className = "cp-btn cp-btn-secondary";
          removeBtn.textContent = "×";
          removeBtn.style.width = "22px";
          removeBtn.style.height = "22px";
          removeBtn.style.padding = "0";
          removeBtn.style.minWidth = "22px";
          removeBtn.style.lineHeight = "1";
          removeBtn.style.alignSelf = "center";
          removeBtn.addEventListener("click", () => {
            if (lineupsState.length <= 1) return;
            lineupsState.splice(index, 1);
            reindexLineupsState();
            renderLineupsRows();
          });
          row.appendChild(removeBtn);
        }

        lineupsRows.appendChild(row);
      });
    };

    const syncLineupsByRules = () => {
      if (!lineupsEnabled) return;
      if (isSecretLineupType()) {
        const needed = requiredDuelRows();
        while (lineupsState.length < needed) lineupsState.push(createEmptyLineupEntry());
        if (lineupsState.length > needed) lineupsState = lineupsState.slice(0, needed);
      } else if (lineupsState.length < 1) {
        lineupsState = [createEmptyLineupEntry()];
      }
      reindexLineupsState();
      renderLineupsRows();
    };

    createLineupsBtn.addEventListener("click", () => {
      if (lineupsEnabled) {
        lineupsEnabled = false;
        lineupsState = [];
        renderLineupsRows();
        return;
      }
      lineupsEnabled = true;
      if (!lineupsState.length) lineupsState = createDefaultLineupsState();
      syncLineupsByRules();
    });

    addLineupRowBtn.addEventListener("click", () => {
      if (isSecretLineupType()) return;
      lineupsState.push(createEmptyLineupEntry());
      reindexLineupsState();
      renderLineupsRows();
    });

    if (lineupsEnabled) {
      syncLineupsByRules();
    } else {
      syncLineupsToggleButton();
    }

    let previousLineupType = String(lineupTypeInput.getValue() || "").trim();
    const syncDeadlineVisibility = () => {
      const currentLineupType = String(lineupTypeInput.getValue() || "").trim();
      const isOpen = currentLineupType === "Open";
      deadlineHoursRow.classList.toggle("cp-hidden", isOpen);
      duelsRow.classList.toggle("cp-hidden", isOpen);
      if (!isOpen && previousLineupType === "Open") {
        deadlineHoursInput.setValue("24h", true);
      }
      previousLineupType = currentLineupType;
      syncLineupsByRules();
    };
    lineupTypeInput.setOnChange(syncDeadlineVisibility);
    syncDeadlineVisibility();

    const refreshLocalTimes = () => {
      const team1Code = team1Input.getValue();
      const team2Code = team2Input.getValue();
      const team1Meta = teamsById.get(normalizeCode(team1Code)) || null;
      const team2Meta = teamsById.get(normalizeCode(team2Code)) || null;
      const timeUtc = toUtcIsoFromDatetimeLocal(timeInput.value);

      localTimeFlag1.style.visibility = team1Meta?.logo ? "visible" : "hidden";
      localTimeFlag1.src = team1Meta?.logo || "";
      localTimeFlag1.alt = "";
      localTimeText1.textContent = `Local time: ${formatTeamLocalTime(team1Meta?.timezone, timeUtc)}`;

      localTimeFlag2.style.visibility = team2Meta?.logo ? "visible" : "hidden";
      localTimeFlag2.src = team2Meta?.logo || "";
      localTimeFlag2.alt = "";
      localTimeText2.textContent = `Local time: ${formatTeamLocalTime(team2Meta?.timezone, timeUtc)}`;
    };
    team1Input.setOnChange(() => {
      refreshLocalTimes();
      syncLineupsByRules();
    });
    team2Input.setOnChange(() => {
      refreshLocalTimes();
      syncLineupsByRules();
    });
    timeInput.addEventListener("input", refreshLocalTimes);
    timeInput.addEventListener("change", refreshLocalTimes);
    duelsInput.addEventListener("input", syncLineupsByRules);
    duelsInput.addEventListener("change", syncLineupsByRules);
    refreshLocalTimes();

    document.addEventListener("click", (event) => {
      if (!form.contains(event.target)) {
        dropdowns.forEach((dd) => dd.close());
      }
    });

    const setError = (msg) => {
      const messages = Array.isArray(msg)
        ? msg.map((item) => String(item || "").trim()).filter(Boolean)
        : [String(msg || "").trim()].filter(Boolean);
      if (!messages.length) {
        errorEl.textContent = "";
        errorEl.classList.add("cp-hidden");
        return;
      }
      errorEl.innerHTML = "";
      if (messages.length === 1) {
        errorEl.textContent = messages[0];
      } else {
        const list = document.createElement("ul");
        list.className = "cp-edit-error-list";
        messages.forEach((message) => {
          const item = document.createElement("li");
          item.textContent = message;
          list.appendChild(item);
        });
        errorEl.appendChild(list);
      }
      errorEl.classList.remove("cp-hidden");
    };

    const setSaving = (isSaving) => {
      saveBtn.disabled = isSaving;
      cancelBtn.disabled = isSaving;
      if (deleteBtn) deleteBtn.disabled = isSaving;
      saveBtn.textContent = isSaving ? "Saving..." : "Save";
    };

    cancelBtn.addEventListener("click", () => {
      window.location.href = buildCaptainUrl({
        view: CAPTAIN_VIEWS.FRIENDLIES,
        edit: false,
        create: false,
        matchId: null,
        playerId: null,
      });
    });

    if (deleteBtn) {
      deleteBtn.addEventListener("click", async () => {
        const ok = window.confirm(`Delete match ${String(match?.id || "")}?`);
        if (!ok) return;
        setError("");
        setSaving(true);
        try {
          const response = await fetch(`${MATCHES_URL}/${encodeURIComponent(String(match?.id || ""))}`, {
            method: "DELETE",
            credentials: "include",
          });
          const result = await response.json().catch(() => ({}));
          if (!response.ok || !result?.ok) {
            setError(result?.message || "Failed to delete match.");
            return;
          }
          window.location.href = buildCaptainUrl({
            view: CAPTAIN_VIEWS.FRIENDLIES,
            edit: false,
            create: false,
            matchId: null,
            playerId: null,
          });
        } catch (_error) {
          setError("Failed to delete match.");
        } finally {
          setSaving(false);
        }
      });
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      setError("");
      const validationErrors = [];

      if (!team1Input.getValue() || !team2Input.getValue()) {
        validationErrors.push("Team 1 and Team 2 are required.");
      }
      if (team1Input.getValue() === team2Input.getValue()) {
        validationErrors.push("Team 1 and Team 2 must be different.");
      }
      const timeUtc = toUtcIsoFromDatetimeLocal(timeInput.value);
      if (!timeUtc) {
        validationErrors.push("Time, UTC is required.");
      }
      const lineupType = String(lineupTypeInput.getValue() || "").trim();
      const deadlineHoursRaw = String(deadlineHoursInput.getValue() || "").trim();
      const deadlineHours = deadlineHoursRaw.endsWith("h")
        ? Number(deadlineHoursRaw.slice(0, -1))
        : Number(deadlineHoursRaw);
      if (lineupType === "Secret" && !DEADLINE_HOURS_OPTIONS.includes(deadlineHours)) {
        validationErrors.push("To Lineup Deadline is required for Secret lineup.");
      }
      const lineupDeadlineUtc = lineupType === "Open"
        ? null
        : computeLineupDeadlineUtc(timeUtc, deadlineHours);
      if (lineupType === "Secret" && !lineupDeadlineUtc) {
        validationErrors.push("Failed to calculate Lineup Deadline, UTC.");
      }
      const duels = parseNullableInt(duelsInput.value);
      if (!Number.isInteger(duels) || duels <= 0) {
        validationErrors.push("Number of Duels must be a positive integer.");
      }

      const payload = {
        id: buildMatchIdFromUtcAndTeams(timeUtc, team1Input.getValue(), team2Input.getValue()),
        tournament_id: String(source?.tournament_id || DEFAULT_TOURNAMENT_ID),
        team_1: normalizeCode(team1Input.getValue()),
        team_2: normalizeCode(team2Input.getValue()),
        time_utc: timeUtc,
        lineup_type: lineupType,
        lineup_deadline_h: lineupType === "Open" ? null : deadlineHours,
        lineup_deadline_utc: lineupDeadlineUtc,
        number_of_duels: duels,
        status: String(statusInput.getValue() || "").trim() || "Planned",
        dw1: parseNullableInt(dw1Input.value),
        dw2: parseNullableInt(dw2Input.value),
        gw1: parseNullableInt(gw1Input.value),
        gw2: parseNullableInt(gw2Input.value),
      };

      if (lineupsEnabled) {
        if (!lineupsState.length) {
          validationErrors.push("At least one lineup row is required.");
        }
        const invalidRowIndex = lineupsState.findIndex((row) => {
          const hasPlayer1 = !!String(row?.player1Id || "").trim();
          const hasPlayer2 = !!String(row?.player2Id || "").trim();
          return !hasPlayer1 && !hasPlayer2;
        });
        if (invalidRowIndex >= 0) {
          validationErrors.push(`Select at least one player for duel ${invalidRowIndex + 1}.`);
        }
        const seenPlayers = new Map();
        let duplicatePlayerId = "";
        for (const row of lineupsState) {
          const rowPlayers = [
            String(row?.player1Id || "").trim(),
            String(row?.player2Id || "").trim(),
          ];
          const duplicateInRow = rowPlayers.find((playerId) => seenPlayers.has(playerId));
          if (duplicateInRow) {
            duplicatePlayerId = duplicateInRow;
            break;
          }
          rowPlayers.forEach((playerId) => {
            if (playerId) seenPlayers.set(playerId, true);
          });
        }
        if (duplicatePlayerId) {
          const duplicateProfile = profilesMap.get(duplicatePlayerId) || { id: duplicatePlayerId };
          validationErrors.push(`Player ${playerLabel(duplicateProfile)} cannot be added more than once.`);
        }
      }
      if (validationErrors.length) {
        setError(validationErrors);
        return;
      }

      setSaving(true);
      try {
        const url = isCreateMode
          ? MATCHES_URL
          : `${MATCHES_URL}/${encodeURIComponent(String(match?.id || ""))}`;
        const method = isCreateMode ? "POST" : "PATCH";
        const response = await fetch(url, {
          method,
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok || !result?.ok) {
          setError(result?.message || "Failed to save match.");
          return;
        }

        if (lineupsEnabled) {
          const matchIdForLineups = String(payload.id || match?.id || "").trim();
          reindexLineupsState();
          const lineupRowsPayload = lineupsState.map((row, index) => ({
            id: String(row.id || buildLineupIdFromMatch(timeUtc, row.player1Id, row.player2Id)).trim(),
            tournament_id: DEFAULT_TOURNAMENT_ID,
            match_id: matchIdForLineups,
            duel_number: index + 1,
            duel_format: "Bo3",
            time_utc: timeUtc,
            custom_time: 0,
            player_1_id: String(row.player1Id || "").trim(),
            player_2_id: String(row.player2Id || "").trim(),
            dw1: null,
            dw2: null,
            status: "Planned",
          }));
          if (lineupRowsPayload.some((r) => !r.id)) {
            setError("Failed to generate lineup IDs.");
            return;
          }
          const lineupsResp = await fetch(`${LINEUPS_URL}/bulk-upsert`, {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              match_id: matchIdForLineups,
              lineups: lineupRowsPayload,
            }),
          });
          const lineupsResult = await lineupsResp.json().catch(() => ({}));
          if (!lineupsResp.ok || !lineupsResult?.ok) {
            setError(lineupsResult?.message || "Failed to save lineups.");
            return;
          }
        } else if (hadInitialLineups && !isCreateMode) {
          const matchIdForLineups = String(payload.id || match?.id || "").trim();
          const lineupsResp = await fetch(`${LINEUPS_URL}/bulk-upsert`, {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              match_id: matchIdForLineups,
              lineups: [],
            }),
          });
          const lineupsResult = await lineupsResp.json().catch(() => ({}));
          if (!lineupsResp.ok || !lineupsResult?.ok) {
            setError(lineupsResult?.message || "Failed to delete lineups.");
            return;
          }
        }

        window.location.href = buildCaptainUrl({
          view: CAPTAIN_VIEWS.FRIENDLIES,
          edit: false,
          create: false,
          matchId: null,
          playerId: null,
        });
      } catch (_error) {
        setError("Failed to save match.");
      } finally {
        setSaving(false);
      }
    });

    contentEl.className = "";
    contentEl.innerHTML = "";
    contentEl.appendChild(form);
  }

  async function initCaptainPage() {
    try {
      clearFilters();
      setPageHeading(getImmediatePageHeading());
      const isTestMode = isTestModeEnabled();
      const activeView = getViewFromUrl();
      const isEditMode = isEditModeEnabled();
      const isCreateMode = isCreateModeEnabled();
      const editMatchId = getMatchIdFromUrl();
      const editPlayerId = getPlayerIdFromUrl();
      const associationOverride = getAssociationOverrideFromUrl();
      let associationCode = associationOverride;
      let captainAssociationCode = "";
      let isCaptainUser = false;
      let isAdminUser = false;
      let currentUserPlayerId = "";

      try {
        const meRes = await fetch(ME_URL, { method: "GET", credentials: "include" });
        if (meRes.ok) {
          const meData = await meRes.json();
          const meUser = meData?.authenticated ? meData?.user : null;
          const meAssociation = normalizeCode(
            meUser?.profile?.association ?? meUser?.association ?? ""
          );
          isAdminUser = meUser?.isAdmin === true;
          const meIsCaptain = Number(
            meUser?.profile?.team_captain ??
            meUser?.team_captain ??
            (meUser?.profile?.teamCaptain === true ? 1 : 0)
          ) === 1;
          currentUserPlayerId = String(
            meUser?.profile?.id ??
            meUser?.player_id ??
            meUser?.playerId ??
            ""
          ).trim();
          captainAssociationCode = meAssociation;
          isCaptainUser = meIsCaptain;
        }
      } catch (_error) {
        // keep defaults; access rules below will handle non-test mode
      }

      if (!isTestMode && !associationOverride) {
        if (!isAdminUser && (!isCaptainUser || !captainAssociationCode)) {
          renderAccessMessage();
          return;
        }
        associationCode = isAdminUser ? associationCode : captainAssociationCode;
      }

      const dataRequests = [
        fetch(MATCHES_URL, { method: "GET" }),
        fetch(TEAMS_URL, { method: "GET" }),
        fetch(PROFILES_PUBLIC_URL, { method: "GET" }),
      ];
      if (activeView === CAPTAIN_VIEWS.FRIENDLY_FIND) {
        dataRequests.push(fetch(FRIENDLY_FIND_URL, { method: "GET", credentials: "include" }));
      }
      const [matchesRes, teamsRes, profilesRes, friendlyFindRes] = await Promise.all(dataRequests);

      if (!matchesRes.ok) {
        contentEl.className = "captain-alert";
        contentEl.textContent = "Failed to load matches.";
        countEl.textContent = "";
        return;
      }

      const matchesData = await matchesRes.json();
      const matches = Array.isArray(matchesData?.matches) ? matchesData.matches : [];
      const friendlyFindData = friendlyFindRes?.ok
        ? await friendlyFindRes.json().catch(() => ({}))
        : {};
      const friendlyFindRequests = Array.isArray(friendlyFindData?.requests) ? friendlyFindData.requests : [];

      const teamsById = new Map();
      if (teamsRes.ok) {
        const teamsData = await teamsRes.json();
        const teams = Array.isArray(teamsData?.teams) ? teamsData.teams : [];
        teams.forEach((team) => {
          const key = normalizeCode(team?.id);
          if (!key) return;
          teamsById.set(key, {
            id: key,
            name: String(team?.name || key).trim(),
            logo: String(team?.logo || "").trim(),
            timezone: String(team?.timezone || "").trim(),
          });
        });
      }

      const allProfiles = [];
      const profilesById = new Map();
      if (profilesRes.ok) {
        const profilesData = await profilesRes.json().catch(() => ({}));
        const profiles = Array.isArray(profilesData?.profiles) ? profilesData.profiles : [];
        profiles.forEach((profile) => {
          const playerId = String(profile?.id ?? profile?.player_id ?? "").trim();
          if (!playerId) return;
          const profileObj = {
            id: playerId,
            bga_nickname: String(profile?.bga_nickname || "").trim(),
            name: String(profile?.name || "").trim(),
            association: normalizeCode(profile?.association),
            team_captain: profile?.team_captain,
            status: String(profile?.status || "").trim(),
            created_by: String(profile?.created_by || "").trim(),
            email: String(profile?.email || "").trim(),
            master_title: profile?.master_title,
            master_title_date: String(profile?.master_title_date || "").trim(),
            telegram: String(profile?.telegram || "").trim(),
            whatsapp: String(profile?.whatsapp || "").trim(),
            discord: String(profile?.discord || "").trim(),
            instagram: String(profile?.instagram || "").trim(),
            contact_email: String(profile?.contact_email || "").trim(),
          };
          allProfiles.push(profileObj);
          profilesById.set(playerId, profileObj);
        });
      }

      const filtered = matches
        .filter((match) => {
          if (isTestMode) return true;
          if (isAdminUser) return true;
          const team1 = readMatchTeam1(match);
          const team2 = readMatchTeam2(match);
          return team1 === associationCode || team2 === associationCode;
        })
        .sort((a, b) => {
          const ta = Date.parse(String(a?.time_utc || a?.time || "")) || 0;
          const tb = Date.parse(String(b?.time_utc || b?.time || "")) || 0;
          return tb - ta;
        });

      if (activeView === CAPTAIN_VIEWS.PLAYERS) {
        addButtonEl.classList.remove("cp-hidden");
        addButtonEl.textContent = "Create";
        addButtonEl.onclick = () => {
          window.location.href = buildCaptainUrl({
            view: CAPTAIN_VIEWS.PLAYERS,
            create: true,
            edit: false,
            matchId: null,
            playerId: null,
          });
        };
        if (isCreateMode || isEditMode) {
          addButtonEl.classList.add("cp-hidden");
        }
      } else if (activeView === CAPTAIN_VIEWS.FRIENDLIES) {
        addButtonEl.classList.remove("cp-hidden");
        addButtonEl.textContent = "Create";
        addButtonEl.onclick = () => {
          window.location.href = buildCaptainUrl({
            view: CAPTAIN_VIEWS.FRIENDLIES,
            create: true,
            edit: false,
            matchId: null,
            playerId: null,
          });
        };
        if (isCreateMode || isEditMode) {
          addButtonEl.classList.add("cp-hidden");
        }
      } else if (activeView === CAPTAIN_VIEWS.FRIENDLY_FIND) {
        addButtonEl.classList.remove("cp-hidden");
        addButtonEl.textContent = "Create";
        addButtonEl.onclick = () => {
          window.location.href = buildCaptainUrl({
            view: CAPTAIN_VIEWS.FRIENDLY_FIND,
            create: true,
            edit: false,
            matchId: null,
            playerId: null,
          });
        };
        if (isCreateMode || isEditMode) {
          addButtonEl.classList.add("cp-hidden");
        }
      } else {
        addButtonEl.classList.add("cp-hidden");
      }

      if (activeView === CAPTAIN_VIEWS.FRIENDLY_FIND) {
        const friendlyFindAssociationCode = normalizeCode(associationCode || captainAssociationCode);
        const captainsByTeam = new Map();
        allProfiles.forEach((profile) => {
          const teamCode = normalizeCode(profile?.association);
          if (!teamCode || !isTruthyFlag(profile?.team_captain)) return;
          const current = Array.isArray(captainsByTeam.get(teamCode)) ? captainsByTeam.get(teamCode) : [];
          current.push(profile);
          current.sort((a, b) => playerLabel(a).localeCompare(playerLabel(b)));
          captainsByTeam.set(teamCode, current);
        });
        if (isCreateMode || isEditMode) {
          if (!friendlyFindAssociationCode) {
            contentEl.className = "captain-alert";
            contentEl.textContent = "Cannot detect your team association for creating a match request.";
            countEl.textContent = "";
            return;
          }
          const requestToEdit = isEditMode
            ? friendlyFindRequests.find((entry) => String(entry?.id || "") === editMatchId)
            : null;
          if (isEditMode && !requestToEdit) {
            contentEl.className = "captain-alert";
            contentEl.textContent = `Friendly find request not found: ${editMatchId}`;
            countEl.textContent = "";
            return;
          }
          renderFriendlyFindEditForm(
            teamsById,
            { associationCode: friendlyFindAssociationCode, request: requestToEdit },
            isEditMode ? "edit" : "create"
          );
        } else {
          renderFriendlyFindList(friendlyFindRequests, teamsById, friendlyFindAssociationCode, captainsByTeam);
        }
        if (isTestMode) {
          hintEl.textContent = "test mode: all matches";
        } else if (associationOverride) {
          hintEl.textContent = `association override: ${associationOverride}`;
        } else {
          hintEl.textContent = "";
        }
        return;
      }

      if (activeView === CAPTAIN_VIEWS.FRIENDLIES && isCreateMode) {
        if (!captainAssociationCode && !isAdminUser) {
          contentEl.className = "captain-alert";
          contentEl.textContent = "Cannot detect your team association for creating a match.";
          countEl.textContent = "";
          return;
        }
        renderMatchEditForm(
          null,
          teamsById,
          {
            lockedTeamField: isAdminUser ? "" : "team_1",
            team1Default: captainAssociationCode,
            profiles: allProfiles,
            lineups: [],
          },
          "create"
        );
        if (isTestMode) {
          hintEl.textContent = "test mode: all matches";
        }
        return;
      }

      if (activeView === CAPTAIN_VIEWS.FRIENDLIES && !filtered.length) {
        setPageHeading("Team Friendly Matches");
        renderNoMatchesMessage(isTestMode ? "TEST MODE" : associationCode);
        return;
      }

      if (activeView === CAPTAIN_VIEWS.FRIENDLIES && isEditMode && editMatchId) {
        const matchToEdit = filtered.find((m) => String(m?.id || "") === editMatchId);
        if (!matchToEdit) {
          contentEl.className = "captain-alert";
          contentEl.textContent = `Match not found: ${editMatchId}`;
          countEl.textContent = "";
          return;
        }
        const matchTeam1 = readMatchTeam1(matchToEdit);
        const matchTeam2 = readMatchTeam2(matchToEdit);
        let lockedTeamField = "";
        if (!isAdminUser && isCaptainUser && captainAssociationCode) {
          if (matchTeam1 === captainAssociationCode) lockedTeamField = "team_1";
          if (matchTeam2 === captainAssociationCode) lockedTeamField = "team_2";
        }
        let existingLineups = [];
        try {
          const lineupsRes = await fetch(`${LINEUPS_URL}?match_id=${encodeURIComponent(String(matchToEdit?.id || ""))}`, {
            method: "GET",
            credentials: "include",
          });
          if (lineupsRes.ok) {
            const lineupsData = await lineupsRes.json().catch(() => ({}));
            existingLineups = Array.isArray(lineupsData?.lineups) ? lineupsData.lineups : [];
          }
        } catch (_error) {
          existingLineups = [];
        }
        renderMatchEditForm(matchToEdit, teamsById, { lockedTeamField, profiles: allProfiles, lineups: existingLineups }, "edit");
        if (isTestMode) {
          hintEl.textContent = "test mode: all matches";
        }
        return;
      }

      if (activeView === CAPTAIN_VIEWS.FRIENDLIES) {
        setPageHeading("Team Friendly Matches");
        const lineupsByMatch = await loadLineupsByMatchIds(filtered);
        renderMatches(filtered, teamsById, lineupsByMatch, profilesById);
      } else if (activeView === CAPTAIN_VIEWS.PLAYERS) {
        const defaultAdminAssociationCode = normalizeCode(
          associationOverride || captainAssociationCode || Array.from(teamsById.keys())[0] || ""
        );
        const playersAssociationCode = isTestMode
          ? "UKR"
          : isAdminUser
            ? defaultAdminAssociationCode
            : normalizeCode(associationCode || captainAssociationCode);
        const playersAssociationName = String(
          teamsById.get(playersAssociationCode)?.name || playersAssociationCode || "Players"
        ).trim();
        if (isAdminUser && !isCreateMode && !isEditMode) {
          renderAdminPlayersAssociationFilter(teamsById, playersAssociationCode);
        }
        const players = allProfiles
          .filter((profile) => {
            if (playersAssociationCode) {
              return normalizeCode(profile?.association) === playersAssociationCode;
            }
            return isTestMode;
          })
          .sort((a, b) => String(a?.bga_nickname || "").localeCompare(String(b?.bga_nickname || "")));

        if (!players.length) {
          renderNoPlayersMessage(playersAssociationCode || (isTestMode ? "TEST MODE" : associationCode));
          return;
        }

        const contactsByPlayerId = await loadProfileContactsByIds(players.map((player) => player?.id));
        const playersWithContacts = players.map((player) => ({
          ...player,
          ...(contactsByPlayerId.get(String(player?.id || "").trim()) || {}),
        }));

        if (isCreateMode) {
          renderPlayerCreateForm({
            associationCode: playersAssociationCode,
            canEditAssociation: isAdminUser,
          });
        } else if (isEditMode && editPlayerId) {
          const playerToEdit = playersWithContacts.find((p) => String(p?.id || "") === editPlayerId);
          if (!playerToEdit) {
            contentEl.className = "captain-alert";
            contentEl.textContent = `Player not found: ${editPlayerId}`;
            countEl.textContent = "";
            return;
          }
          setPageHeading(String(playerToEdit?.bga_nickname || playerToEdit?.id || editPlayerId));
          renderPlayerEditForm(playerToEdit, { currentUserPlayerId });
        } else {
          setPageHeading(`Players: ${playersAssociationName}`);
          renderPlayers(playersWithContacts);
        }
      }

      if (isTestMode) {
        hintEl.textContent = "test mode: all matches";
      } else if (associationOverride) {
        hintEl.textContent = `association override: ${associationOverride}`;
      } else {
        hintEl.textContent = "";
      }
    } catch (_error) {
      contentEl.className = "captain-alert";
      contentEl.textContent = "Failed to load data.";
      countEl.textContent = "";
      hintEl.textContent = "";
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initCaptainPage);
  } else {
    initCaptainPage();
  }
})();
</script>
