      if (isFixedTournamentLineup) return fixedTournamentLineupSize;
      const duels = parseNullableInt(duelsInput.value);
      return Number.isInteger(duels) && duels > 0 ? duels : 1;
    };

    const reindexLineupsState = () => {
      lineupsState = lineupsState.map((entry, index) => ({
        ...entry,
        duelNumber: index + 1,
      }));
    };

    const moveLineupRow = (fromIndex, toIndex) => {
      if (toIndex < 0 || toIndex > lineupsState.length || fromIndex === toIndex) return;
      const nextState = lineupsState.slice();
      const [moved] = nextState.splice(fromIndex, 1);
      if (!moved) return;
      const normalizedIndex = fromIndex < toIndex ? toIndex - 1 : toIndex;
      if (normalizedIndex === fromIndex) return;
      nextState.splice(normalizedIndex, 0, moved);
      lineupsState = nextState;
      reindexLineupsState();
      renderLineupsRows();
    };

    let draggedLineupIndex = null;
    let draggedLineupDropIndex = null;

    const clearLineupDropMarkers = () => {
      lineupsRows.querySelectorAll(".cp-lineup-row-drop-before, .cp-lineup-row-drop-after").forEach((node) => {
        node.classList.remove("cp-lineup-row-drop-before", "cp-lineup-row-drop-after");
      });
    };

    const renderLineupsRows = () => {
      lineupsRows.innerHTML = "";
      syncLineupsHeader();
      syncLineupsToggleButton();
      lineupsWrap.style.display = lineupsEnabled ? "" : "none";
      if (!lineupsEnabled) return;

      const team1Code = normalizeCode(team1Input.getValue());
      const team2Code = normalizeCode(team2Input.getValue());
      const canChangeCount = !isFixedTournamentLineup && !isSecretLineupType();
      lineupsHeader.style.gridTemplateColumns = canChangeCount
        ? "24px minmax(0, 1fr) minmax(0, 1fr) 26px"
        : "24px minmax(0, 1fr) minmax(0, 1fr)";
      lineupsOpenActions.style.display = canChangeCount ? "" : "none";
      reindexLineupsState();

      lineupsState.forEach((entry, index) => {
        const row = document.createElement("div");
        row.dataset.index = String(index);
        row.style.display = "grid";
        row.style.gridTemplateColumns = canChangeCount
          ? "24px minmax(0, 1fr) minmax(0, 1fr) 26px"
          : "24px minmax(0, 1fr) minmax(0, 1fr)";
        row.style.gap = "8px";
        row.style.alignItems = "center";

        row.addEventListener("dragover", (event) => {
          if (draggedLineupIndex === null || draggedLineupIndex === index) return;
          event.preventDefault();
          const rect = row.getBoundingClientRect();
          const placeAfter = event.clientY >= rect.top + rect.height / 2;
          clearLineupDropMarkers();
          row.classList.add(placeAfter ? "cp-lineup-row-drop-after" : "cp-lineup-row-drop-before");
          draggedLineupDropIndex = index + (placeAfter ? 1 : 0);
        });
        row.addEventListener("dragleave", () => {
          row.classList.remove("cp-lineup-row-drop-before", "cp-lineup-row-drop-after");
        });
        row.addEventListener("drop", (event) => {
          if (draggedLineupIndex === null) return;
          event.preventDefault();
          clearLineupDropMarkers();
          if (draggedLineupDropIndex !== null) {
            moveLineupRow(draggedLineupIndex, draggedLineupDropIndex);
          }
          draggedLineupIndex = null;
          draggedLineupDropIndex = null;
        });

        const dragHandle = document.createElement("div");
        dragHandle.className = "cp-lineup-drag";
        dragHandle.draggable = lineupsState.length > 1;
        dragHandle.title = lineupsState.length > 1 ? "Drag to reorder duel" : "";
        dragHandle.style.alignSelf = "center";
        const dragIcon = document.createElement("i");
        dragIcon.className = "fa-solid fa-grip-vertical";
        dragHandle.appendChild(dragIcon);
        const duelNo = document.createElement("span");
        duelNo.className = "cp-lineup-order";
        duelNo.style.height = "30px";
        duelNo.style.display = "inline-flex";
        duelNo.style.alignItems = "center";
        duelNo.style.fontSize = "13px";
        duelNo.style.fontWeight = "600";
        duelNo.textContent = `${index + 1}:`;
        dragHandle.appendChild(duelNo);
        dragHandle.addEventListener("dragstart", (event) => {
          if (lineupsState.length <= 1) {
            event.preventDefault();
            return;
          }
          draggedLineupIndex = index;
          row.classList.add("cp-lineup-row-dragging");
          if (event.dataTransfer) {
            event.dataTransfer.effectAllowed = "move";
            event.dataTransfer.setData("text/plain", String(index));
          }
        });
        dragHandle.addEventListener("dragend", () => {
          draggedLineupIndex = null;
          draggedLineupDropIndex = null;
          row.classList.remove("cp-lineup-row-dragging");
          clearLineupDropMarkers();
        });
        row.appendChild(dragHandle);

        const createPlayerCell = (teamCodeForCell, currentValue, onSelect, cellConfig = {}) => {
          const cell = document.createElement("div");
          const optionPlayers = getPlayersForTeam(teamCodeForCell).map((p) => ({
            value: String(p.id ?? p.player_id ?? "").trim(),
            label: `${playerLabel(p)}`,
          }));
          const playerOptions = [{ value: "", label: "Select player" }]
            .concat(optionPlayers)
            .concat([{ value: "__add_new__", label: "Add new player" }]);
          const dd = createDropdown(currentValue || "", playerOptions, {
            allowEmpty: true,
            searchable: true,
            alignMenuRight: !!cellConfig.alignMenuRight,
            autoFocusSearch: shouldAutoFocusLineupPlayerSearch,
            maxMenuHeight: 300,
          });
          cell.style.minWidth = "0";
          dd.root.style.minWidth = "0";
          const ddBtn = dd.root.querySelector(".cp-dd-btn");
          const syncSelectedHighlight = () => {
            if (!ddBtn) return;
            const selectedValue = String(dd.getValue() || "").trim();
            const hasSelectedPlayer = selectedValue !== "" && selectedValue !== "__add_new__";
            ddBtn.style.fontWeight = "400";
            ddBtn.style.color = hasSelectedPlayer ? "#2f3947" : "#999";
          };
          syncSelectedHighlight();
          const inlineArea = document.createElement("div");
          cell.appendChild(dd.root);
          cell.appendChild(inlineArea);
          dd.setOnChange((nextValue) => {
            if (nextValue === "__add_new__") {
              dd.setValue("", false);
              syncSelectedHighlight();
              const inline = createAddPlayerInline(teamCodeForCell, (profile) => {
                inlineArea.innerHTML = "";
                onSelect(String(profile?.id ?? profile?.player_id ?? "").trim());
                renderLineupsRows();
              }, () => {
                inlineArea.innerHTML = "";
              });
              inlineArea.innerHTML = "";
              inlineArea.appendChild(inline);
              return;
            }
            inlineArea.innerHTML = "";
            onSelect(nextValue);
            syncSelectedHighlight();
          });
          return cell;
        };

        const p1Cell = createPlayerCell(team1Code, entry.player1Id, (v) => {
          lineupsState[index].player1Id = String(v || "").trim();
        });
        const p2Cell = createPlayerCell(team2Code, entry.player2Id, (v) => {
          lineupsState[index].player2Id = String(v || "").trim();
        }, { alignMenuRight: true });
        row.appendChild(p1Cell);
        row.appendChild(p2Cell);

        if (canChangeCount) {
          const removeBtn = document.createElement("button");
          removeBtn.type = "button";
          removeBtn.className = "cp-btn cp-btn-secondary";
          removeBtn.textContent = "×";
          removeBtn.style.width = "22px";
          removeBtn.style.height = "22px";
          removeBtn.style.padding = "0";
          removeBtn.style.minWidth = "22px";
          removeBtn.style.lineHeight = "1";
          removeBtn.style.alignSelf = "center";
          removeBtn.addEventListener("click", () => {
            if (lineupsState.length <= 1) return;
            lineupsState.splice(index, 1);
            reindexLineupsState();
            renderLineupsRows();
          });
          row.appendChild(removeBtn);
        }

        lineupsRows.appendChild(row);
      });
    };

    const syncLineupsByRules = () => {
      if (!lineupsEnabled) return;
      if (isFixedTournamentLineup || isSecretLineupType()) {
        const needed = requiredDuelRows();
        while (lineupsState.length < needed) lineupsState.push(createEmptyLineupEntry());
        if (lineupsState.length > needed) lineupsState = lineupsState.slice(0, needed);
      } else if (lineupsState.length < 1) {
        lineupsState = [createEmptyLineupEntry()];
      }
      reindexLineupsState();
      renderLineupsRows();
    };

    createLineupsBtn.addEventListener("click", () => {
      if (lineupsEnabled) {
        lineupsEnabled = false;
        lineupsState = [];
        renderLineupsRows();
        return;
      }
      lineupsEnabled = true;
      if (!lineupsState.length) lineupsState = createDefaultLineupsState();
      syncLineupsByRules();
    });

    addLineupRowBtn.addEventListener("click", () => {
      if (isFixedTournamentLineup || isSecretLineupType()) return;
      lineupsState.push(createEmptyLineupEntry());
      reindexLineupsState();
      renderLineupsRows();
    });

    if (lineupsEnabled) {
      syncLineupsByRules();
    } else {
      syncLineupsToggleButton();
    }

    let previousLineupType = String(lineupTypeInput.getValue() || "").trim();
    const syncDeadlineVisibility = () => {
      const currentLineupType = String(lineupTypeInput.getValue() || "").trim();
      const isOpen = currentLineupType === "Open";
      deadlineHoursRow.classList.toggle("cp-hidden", isOpen);
      duelsRow.classList.toggle("cp-hidden", isOpen);
      if (!isOpen && previousLineupType === "Open") {
        deadlineHoursInput.setValue("24h", true);
      }
      previousLineupType = currentLineupType;
      syncLineupsByRules();
    };
    lineupTypeInput.setOnChange(syncDeadlineVisibility);
    syncDeadlineVisibility();

    const refreshLocalTimes = () => {
      const team1Code = team1Input.getValue();
      const team2Code = team2Input.getValue();
      const team1Meta = teamsById.get(normalizeCode(team1Code)) || null;
      const team2Meta = teamsById.get(normalizeCode(team2Code)) || null;
      const timeUtc = toUtcIsoFromDatetimeLocal(timeInput.value);

      localTimeFlag1.style.visibility = team1Meta?.logo ? "visible" : "hidden";
      localTimeFlag1.src = team1Meta?.logo || "";
      localTimeFlag1.alt = "";
      localTimeText1.textContent = `Local time: ${formatTeamLocalTime(team1Meta?.timezone, timeUtc)}`;

      localTimeFlag2.style.visibility = team2Meta?.logo ? "visible" : "hidden";
      localTimeFlag2.src = team2Meta?.logo || "";
      localTimeFlag2.alt = "";
      localTimeText2.textContent = `Local time: ${formatTeamLocalTime(team2Meta?.timezone, timeUtc)}`;
    };
    team1Input.setOnChange(() => {
      refreshLocalTimes();
      syncLineupsByRules();
    });
    team2Input.setOnChange(() => {
      refreshLocalTimes();
      syncLineupsByRules();
    });
    timeInput.addEventListener("input", refreshLocalTimes);
    timeInput.addEventListener("change", refreshLocalTimes);
    duelsInput.addEventListener("input", syncLineupsByRules);
    duelsInput.addEventListener("change", syncLineupsByRules);
    refreshLocalTimes();

    if (isLineupsOnly) {
      team1Input.setDisabled(true);
      team2Input.setDisabled(true);
      lineupTypeInput.setDisabled(true);
      deadlineHoursInput.setDisabled(true);
      statusInput.setDisabled(true);
      setNativeControlDisabled(timeInput, true);
      setNativeControlDisabled(duelsInput, true);
      setNativeControlDisabled(dw1Input, true);
      setNativeControlDisabled(dw2Input, true);
      setNativeControlDisabled(gw1Input, true);
      setNativeControlDisabled(gw2Input, true);
    }

    document.addEventListener("click", (event) => {
      if (!form.contains(event.target)) {
        dropdowns.forEach((dd) => dd.close());
      }
    });

    const setError = (msg) => {
      const messages = Array.isArray(msg)
        ? msg.map((item) => String(item || "").trim()).filter(Boolean)
        : [String(msg || "").trim()].filter(Boolean);
      if (!messages.length) {
        errorEl.textContent = "";
        errorEl.classList.add("cp-hidden");
        return;
      }
      errorEl.innerHTML = "";
      if (messages.length === 1) {
        errorEl.textContent = messages[0];
      } else {
        const list = document.createElement("ul");
        list.className = "cp-edit-error-list";
        messages.forEach((message) => {
          const item = document.createElement("li");
          item.textContent = message;
          list.appendChild(item);
        });
        errorEl.appendChild(list);
      }
      errorEl.classList.remove("cp-hidden");
    };

    const setActionStatus = (message, type = "info", loading = false) => {
      const text = String(message || "").trim();
      actionStatusEl.classList.remove("cp-action-status--success", "cp-action-status--error");
      if (!text) {
        actionStatusText.textContent = "";
        actionStatusSpinner.classList.add("cp-hidden");
        actionStatusEl.classList.add("cp-hidden");
        return;
      }
      if (type === "success") actionStatusEl.classList.add("cp-action-status--success");
      if (type === "error") actionStatusEl.classList.add("cp-action-status--error");
      actionStatusText.textContent = text;
      actionStatusSpinner.classList.toggle("cp-hidden", !loading);
      actionStatusEl.classList.remove("cp-hidden");
    };

    const setSaving = (isSaving) => {
      saveBtn.disabled = isSaving;
      cancelBtn.disabled = isSaving;
      if (getResultsBtn) getResultsBtn.disabled = isSaving;
      if (deleteBtn) deleteBtn.disabled = isSaving;
      saveBtn.textContent = isSaving ? "Saving..." : (isLineupsOnly ? "Save Lineups" : "Save");
    };

    const setResultsLoading = (isLoading) => {
      saveBtn.disabled = isLoading;
      cancelBtn.disabled = isLoading;
      if (getResultsBtn) getResultsBtn.disabled = isLoading;
      if (deleteBtn) deleteBtn.disabled = isLoading;
      if (getResultsBtn) {
        getResultsBtn.textContent = isLoading ? "Getting..." : "Get Results";
      }
    };

    cancelBtn.addEventListener("click", () => {
      resetCaptainSubview(CAPTAIN_VIEWS.MATCHES);
    });

    if (deleteBtn) {
      deleteBtn.addEventListener("click", async () => {
        const ok = window.confirm(`Delete match ${String(match?.id || "")}?`);
        if (!ok) return;
        setError("");
        setSaving(true);
        try {
          const response = await fetch(`${MATCHES_URL}/${encodeURIComponent(String(match?.id || ""))}`, {
            method: "DELETE",
            credentials: "include",
          });
          const result = await response.json().catch(() => ({}));
          if (!response.ok || !result?.ok) {
            setError(result?.message || "Failed to delete match.");
            return;
          }
          resetCaptainSubview(CAPTAIN_VIEWS.MATCHES);
        } catch (_error) {
          setError("Failed to delete match.");
        } finally {
          setSaving(false);
        }
      });
    }

    if (getResultsBtn) {
      getResultsBtn.addEventListener("click", async () => {
        setError("");
        setActionStatus("Updating results from BGA...", "info", true);
        setResultsLoading(true);
        try {
          const response = await fetch(`${MATCHES_URL}/${encodeURIComponent(String(match?.id || ""))}/get-results`, {
            method: "POST",
            credentials: "include",
          });
          const result = await response.json().catch(() => ({}));
          if (!response.ok || !result?.ok) {
            setActionStatus(result?.message || "Failed to update match results.", "error", false);
            return;
          }
          const duelsError = Number(result?.summary?.duels_error || 0);
          const gamesTotal = Number(result?.summary?.games_total || 0);
          const duelsDone = Number(result?.summary?.duels_done || 0);
          const successText = duelsError > 0
            ? `Completed with ${duelsError} duel errors. Loaded ${gamesTotal} games, finished ${duelsDone} duels.`
            : `Completed. Loaded ${gamesTotal} games, finished ${duelsDone} duels.`;
          setActionStatus(successText, duelsError > 0 ? "error" : "success", false);
        } catch (_error) {
          setActionStatus("Failed to update match results.", "error", false);
        } finally {
          setResultsLoading(false);
        }
      });
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      setError("");
      setActionStatus("");
      const validationErrors = [];

      if (!team1Input.getValue() || !team2Input.getValue()) {
        validationErrors.push("Team 1 and Team 2 are required.");
      }
      if (team1Input.getValue() === team2Input.getValue()) {
        validationErrors.push("Team 1 and Team 2 must be different.");
      }
      const timeUtc = toUtcIsoFromDatetimeLocal(timeInput.value);
      if (!timeUtc) {
        validationErrors.push("Time, UTC is required.");
      }
      const lineupType = String(lineupTypeInput.getValue() || "").trim();
      const deadlineHoursRaw = String(deadlineHoursInput.getValue() || "").trim();
      const deadlineHours = deadlineHoursRaw.endsWith("h")
        ? Number(deadlineHoursRaw.slice(0, -1))
        : Number(deadlineHoursRaw);
      if (lineupType === "Secret" && !DEADLINE_HOURS_OPTIONS.includes(deadlineHours)) {
        validationErrors.push("To Lineup Deadline is required for Secret lineup.");
      }
      const lineupDeadlineUtc = lineupType === "Open"
        ? null
        : computeLineupDeadlineUtc(timeUtc, deadlineHours);
      if (lineupType === "Secret" && !lineupDeadlineUtc) {
        validationErrors.push("Failed to calculate Lineup Deadline, UTC.");
      }
      const duels = isFixedTournamentLineup ? fixedTournamentLineupSize : parseNullableInt(duelsInput.value);
      if (!Number.isInteger(duels) || duels <= 0) {
        validationErrors.push("Number of Duels must be a positive integer.");
      }

      const payload = {
        id: buildMatchIdFromUtcAndTeams(timeUtc, team1Input.getValue(), team2Input.getValue()),
        tournament_id: String(source?.tournament_id || currentTournamentId),
        team_1: normalizeCode(team1Input.getValue()),
        team_2: normalizeCode(team2Input.getValue()),
        time_utc: timeUtc,
        lineup_type: lineupType,
        lineup_deadline_h: lineupType === "Open" ? null : deadlineHours,
        lineup_deadline_utc: lineupDeadlineUtc,
        number_of_duels: duels,
        status: String(statusInput.getValue() || "").trim() || "Planned",
        dw1: parseNullableInt(dw1Input.value),
        dw2: parseNullableInt(dw2Input.value),
        gw1: parseNullableInt(gw1Input.value),
        gw2: parseNullableInt(gw2Input.value),
      };

      if (lineupsEnabled) {
        if (!lineupsState.length) {
          validationErrors.push("At least one lineup row is required.");
        }
        const invalidRowIndex = lineupsState.findIndex((row) => {
          const hasPlayer1 = !!String(row?.player1Id || "").trim();
          const hasPlayer2 = !!String(row?.player2Id || "").trim();
          return !hasPlayer1 && !hasPlayer2;
        });
        if (invalidRowIndex >= 0) {
          validationErrors.push(`Select at least one player for duel ${invalidRowIndex + 1}.`);
        }
        const seenPlayers = new Map();
        let duplicatePlayerId = "";
        for (const row of lineupsState) {
          const rowPlayers = [
            String(row?.player1Id || "").trim(),
            String(row?.player2Id || "").trim(),
          ];
          const duplicateInRow = rowPlayers.find((playerId) => seenPlayers.has(playerId));
          if (duplicateInRow) {
            duplicatePlayerId = duplicateInRow;
            break;
          }
          rowPlayers.forEach((playerId) => {
            if (playerId) seenPlayers.set(playerId, true);
          });
        }
        if (duplicatePlayerId) {
          const duplicateProfile = profilesMap.get(duplicatePlayerId) || { id: duplicatePlayerId };
          validationErrors.push(`Player ${playerLabel(duplicateProfile)} cannot be added more than once.`);
        }
      }
      if (validationErrors.length) {
        setError(validationErrors);
        return;
      }

      setSaving(true);
      try {
        if (!isLineupsOnly) {
          const url = isCreateMode
            ? MATCHES_URL
            : `${MATCHES_URL}/${encodeURIComponent(String(match?.id || ""))}`;
          const method = isCreateMode ? "POST" : "PATCH";
          const response = await fetch(url, {
            method,
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const result = await response.json().catch(() => ({}));
          if (!response.ok || !result?.ok) {
            setError(result?.message || "Failed to save match.");
            return;
          }
        }

        if (lineupsEnabled) {
          const matchIdForLineups = String(isLineupsOnly ? match?.id : (payload.id || match?.id || "")).trim();
          reindexLineupsState();
          const lineupRowsPayload = lineupsState.map((row, index) => ({
            id: String(row.id || buildLineupIdFromMatch(timeUtc, row.player1Id, row.player2Id)).trim(),
            tournament_id: String(source?.tournament_id || currentTournamentId),
            match_id: matchIdForLineups,
            duel_number: index + 1,
            duel_format: "Bo3",
            time_utc: timeUtc,
            custom_time: 0,
            player_1_id: String(row.player1Id || "").trim(),
            player_2_id: String(row.player2Id || "").trim(),
            dw1: null,
            dw2: null,
            status: "Planned",
          }));
          if (lineupRowsPayload.some((r) => !r.id)) {
            setError("Failed to generate lineup IDs.");
            return;
          }
          const lineupsResp = await fetch(`${DUELS_URL}/bulk-upsert`, {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              match_id: matchIdForLineups,
              duels: lineupRowsPayload,
            }),
          });
          const lineupsResult = await lineupsResp.json().catch(() => ({}));
          if (!lineupsResp.ok || !lineupsResult?.ok) {
            setError(lineupsResult?.message || "Failed to save lineups.");
            return;
          }
        } else if (hadInitialLineups && !isCreateMode) {
          const matchIdForLineups = String(isLineupsOnly ? match?.id : (payload.id || match?.id || "")).trim();
          const lineupsResp = await fetch(`${DUELS_URL}/bulk-upsert`, {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              match_id: matchIdForLineups,
              duels: [],
            }),
          });
          const lineupsResult = await lineupsResp.json().catch(() => ({}));
          if (!lineupsResp.ok || !lineupsResult?.ok) {
            setError(lineupsResult?.message || "Failed to delete lineups.");
            return;
          }
        }

        resetCaptainSubview(CAPTAIN_VIEWS.MATCHES);
      } catch (_error) {
        setError("Failed to save match.");
      } finally {
        setSaving(false);
      }
    });

    contentEl.className = "";
    contentEl.innerHTML = "";
    contentEl.appendChild(form);
  }

  async function initCaptainPage() {
    if (isCaptainPageInitializing) {
      captainPageRefreshQueued = true;
      return;
    }
    isCaptainPageInitializing = true;
    try {
      clearFilters();
      const activeView = captainPageState.view;
      const requestedTournamentId = String(captainPageState.tournamentId || "").trim();
      const isEditMode = captainPageState.mode === "edit";
      const isCreateMode = captainPageState.mode === "create";
      const editMatchId = String(captainPageState.matchId || "").trim();
      const editPlayerId = String(captainPageState.playerId || "").trim();
      const associationOverride = captainPageState.associationOverride;
      let associationCode = associationOverride;
      let captainAssociationCode = "";
      let isCaptainUser = false;
      let isAdminUser = false;
      let isAuthenticatedUser = false;
      let currentUserPlayerId = "";

      try {
        const meRes = await fetch(ME_URL, { method: "GET", credentials: "include" });
        if (meRes.ok) {
          const meData = await meRes.json();
          const meUser = meData?.authenticated ? meData?.user : null;
          isAuthenticatedUser = !!meData?.authenticated;
          const meAssociation = normalizeCode(
            meUser?.profile?.association ?? meUser?.association ?? ""
          );
          isAdminUser = meUser?.isAdmin === true;
          const meIsCaptain = Number(
            meUser?.profile?.team_captain ??
            meUser?.team_captain ??
            (meUser?.profile?.teamCaptain === true ? 1 : 0)
          ) === 1;
          currentUserPlayerId = String(
            meUser?.profile?.id ??
            meUser?.player_id ??
            meUser?.playerId ??
            ""
          ).trim();
          captainAssociationCode = meAssociation;
          isCaptainUser = meIsCaptain;
        }
      } catch (_error) {
        // keep defaults; access rules below will handle unauthorized state
      }

      if (!activeView && !requestedTournamentId && !isCreateMode && !isEditMode) {
        let tournaments = [];
        try {
          const tournamentsRes = await fetch(TOURNAMENTS_URL, { method: "GET", credentials: "include" });
          if (tournamentsRes.ok) {
            const tournamentsData = await tournamentsRes.json().catch(() => ({}));
            tournaments = Array.isArray(tournamentsData?.tournaments) ? tournamentsData.tournaments : [];
          }
        } catch (_error) {
          tournaments = [];
        }

        const sectionItems = tournaments.map((tournament) => ({
          type: "tournament",
          id: String(tournament?.id || "").trim(),
          label: String(tournament?.short_title || tournament?.name || tournament?.id || "").trim(),
          subtitle: "Open tournament matches",
          icon: String(tournament?.logo || "https://carcassonne.gg/gallery/friendly-matches.png").trim(),
        }))
          .filter((item) => item.id && item.label)
          .concat(CAPTAIN_STATIC_SECTION_ITEMS);

        renderCaptainHomeSelection(sectionItems);
        return;
      }

      if (!associationOverride) {
        if (activeView === CAPTAIN_VIEWS.MATCHES) {
          if (!isAuthenticatedUser) {
            renderAccessMessage();
            return;
          }
          associationCode = isAdminUser ? associationCode : captainAssociationCode;
        } else {
          if (!isAdminUser && (!isCaptainUser || !captainAssociationCode)) {
            renderAccessMessage();
            return;
          }
          associationCode = isAdminUser ? associationCode : captainAssociationCode;
        }
      }

      const [matchesRes, teamsRes, tournamentsRes, profilesRes, friendlyFindRes] = await Promise.all([
        activeView === CAPTAIN_VIEWS.MATCHES
          ? fetch(MATCHES_URL, { method: "GET", credentials: "include" })
          : Promise.resolve(null),
        fetch(TEAMS_URL, { method: "GET" }),
        fetch(TOURNAMENTS_URL, { method: "GET", credentials: "include" }),
        fetch(PROFILES_PUBLIC_URL, { method: "GET" }),
        activeView === CAPTAIN_VIEWS.FRIENDLY_FIND
          ? fetch(FRIENDLY_FIND_URL, { method: "GET", credentials: "include" })
          : Promise.resolve(null),
      ]);

      if (activeView === CAPTAIN_VIEWS.MATCHES && (!matchesRes || !matchesRes.ok)) {
        contentEl.className = "captain-alert";
        contentEl.textContent = "Failed to load matches.";
        countEl.textContent = "";
        return;
      }

      const matchesData = activeView === CAPTAIN_VIEWS.MATCHES
        ? await matchesRes.json().catch(() => ({}))
        : {};
      const matches = Array.isArray(matchesData?.matches) ? matchesData.matches : [];
      let tournaments = [];
      if (tournamentsRes.ok) {
        const tournamentsData = await tournamentsRes.json().catch(() => ({}));
        tournaments = Array.isArray(tournamentsData?.tournaments) ? tournamentsData.tournaments : [];
      }
      const friendlyFindData = friendlyFindRes?.ok
        ? await friendlyFindRes.json().catch(() => ({}))
        : {};
      const friendlyFindRequests = Array.isArray(friendlyFindData?.requests) ? friendlyFindData.requests : [];

      const teamsById = new Map();
      if (teamsRes.ok) {
        const teamsData = await teamsRes.json();
        const teams = Array.isArray(teamsData?.teams) ? teamsData.teams : [];
        teams.forEach((team) => {
          const key = normalizeCode(team?.id);
          if (!key) return;
          teamsById.set(key, {
            id: key,
            name: String(team?.name || key).trim(),
            logo: String(team?.logo || "").trim(),
            timezone: String(team?.timezone || "").trim(),
          });
        });
      }

      const allProfiles = [];
      const profilesById = new Map();
      if (profilesRes.ok) {
        const profilesData = await profilesRes.json().catch(() => ({}));
        const profiles = Array.isArray(profilesData?.profiles) ? profilesData.profiles : [];
        profiles.forEach((profile) => {
          const playerId = String(profile?.id ?? profile?.player_id ?? "").trim();
          if (!playerId) return;
          const profileObj = {
            id: playerId,
            bga_nickname: String(profile?.bga_nickname || "").trim(),
            name: String(profile?.name || "").trim(),
            association: normalizeCode(profile?.association),
            team_captain: profile?.team_captain,
            status: String(profile?.status || "").trim(),
            created_by: String(profile?.created_by || "").trim(),
            email: String(profile?.email || "").trim(),
            master_title: profile?.master_title,
            master_title_date: String(profile?.master_title_date || "").trim(),
            telegram: String(profile?.telegram || "").trim(),
            whatsapp: String(profile?.whatsapp || "").trim(),
            discord: String(profile?.discord || "").trim(),
            instagram: String(profile?.instagram || "").trim(),
            contact_email: String(profile?.contact_email || "").trim(),
          };
          allProfiles.push(profileObj);
          profilesById.set(playerId, profileObj);
        });
      }

      const tournamentsById = new Map();
      tournaments.forEach((tournament) => {
        const tournamentId = String(tournament?.id || "").trim();
        if (!tournamentId) return;
        tournamentsById.set(tournamentId, tournament);
      });
      const currentTournament = activeView === CAPTAIN_VIEWS.MATCHES
        ? (tournamentsById.get(requestedTournamentId) || null)
        : null;
      const currentTournamentRole = String(currentTournament?.access_role || "").trim().toLowerCase();
      const canManageClosedTournamentMatches = Number(currentTournament?.access_type) === 2
        ? (isAdminUser || currentTournamentRole === "admin")
        : true;
      setPageHeading(getImmediatePageHeading(currentTournament));
      if (
        activeView === CAPTAIN_VIEWS.MATCHES
        && currentTournament
        && Number(currentTournament?.access_type) !== 2
        && !isAdminUser
        && (!isCaptainUser || !captainAssociationCode)
      ) {
        renderAccessMessage();
        return;
      }

      const friendlyMatchesAdminAssociation = activeView === CAPTAIN_VIEWS.MATCHES && isAdminUser
        ? (
          captainPageState.associationOverrideTouched
            ? normalizeCode(associationOverride || "")
            : (
                Number(currentTournament?.access_type) === 2
                  ? normalizeCode(captainAssociationCode || "")
                  : (
                      String(currentTournament?.id || requestedTournamentId || "").trim() === "Friendly-Matches"
                        ? normalizeCode(captainAssociationCode || "")
                        : ""
                    )
              )
        )
        : "";

      const filtered = matches
        .filter((match) => {
          if (activeView === CAPTAIN_VIEWS.MATCHES) {
            const tournamentId = String(match?.tournament_id || "").trim();
            if (!requestedTournamentId || tournamentId !== requestedTournamentId) return false;
          }
          const closedTournamentMatches = activeView === CAPTAIN_VIEWS.MATCHES
            && Number(currentTournament?.access_type) === 2;
          if (closedTournamentMatches) {
            if (canManageClosedTournamentMatches) return true;
            const team1 = readMatchTeam1(match);
            const team2 = readMatchTeam2(match);
            return !!captainAssociationCode && (team1 === captainAssociationCode || team2 === captainAssociationCode);
          }
          if (isAdminUser) {
            if (activeView === CAPTAIN_VIEWS.MATCHES && friendlyMatchesAdminAssociation) {
              const team1 = readMatchTeam1(match);
              const team2 = readMatchTeam2(match);
              return team1 === friendlyMatchesAdminAssociation || team2 === friendlyMatchesAdminAssociation;
            }
            return true;
          }
          const team1 = readMatchTeam1(match);
          const team2 = readMatchTeam2(match);
          return team1 === associationCode || team2 === associationCode;
        })
        .sort((a, b) => {
          const ta = Date.parse(String(a?.time_utc || a?.time || "")) || 0;
          const tb = Date.parse(String(b?.time_utc || b?.time || "")) || 0;
          return tb - ta;
        });

      if (activeView === CAPTAIN_VIEWS.PLAYERS) {
        addButtonEl.classList.remove("cp-hidden");
        addButtonEl.textContent = "Create";
        addButtonEl.onclick = () => {
          openCaptainCreate(CAPTAIN_VIEWS.PLAYERS);
        };
        if (isCreateMode || isEditMode) {
          addButtonEl.classList.add("cp-hidden");
        }
      } else if (activeView === CAPTAIN_VIEWS.MATCHES) {
        if (canManageClosedTournamentMatches) {
          addButtonEl.classList.remove("cp-hidden");
          addButtonEl.textContent = "Create";
          addButtonEl.onclick = () => {
            openCaptainCreate(CAPTAIN_VIEWS.MATCHES);
          };
        } else {
          addButtonEl.classList.add("cp-hidden");
        }
        if (isCreateMode || isEditMode) {
          addButtonEl.classList.add("cp-hidden");
        }
      } else if (activeView === CAPTAIN_VIEWS.FRIENDLY_FIND) {
        addButtonEl.classList.remove("cp-hidden");
        addButtonEl.textContent = "Create";
        addButtonEl.onclick = () => {
          openCaptainCreate(CAPTAIN_VIEWS.FRIENDLY_FIND);
        };
        if (isCreateMode || isEditMode) {
          addButtonEl.classList.add("cp-hidden");
        }
      } else {
        addButtonEl.classList.add("cp-hidden");
      }

      if (
        activeView === CAPTAIN_VIEWS.MATCHES
        && isAdminUser
        && !isCreateMode
        && !isEditMode
        && Number(currentTournament?.access_type) !== 2
      ) {
        const ownTeamMeta = teamsById.get(normalizeCode(captainAssociationCode)) || null;
        const filterOptions = [{ value: "", label: "All associations", logo: "" }];
        if (captainAssociationCode) {
          filterOptions.push({
            value: captainAssociationCode,
            label: ownTeamMeta?.name || captainAssociationCode,
            logo: ownTeamMeta?.logo || "",
          });
        }
        renderAdminAssociationFilter(
          filterOptions,
          friendlyMatchesAdminAssociation,
          (nextAssociation) => {
            applyCaptainPageState({
              view: CAPTAIN_VIEWS.MATCHES,
              associationOverride: normalizeCode(nextAssociation),
              mode: "list",
              matchId: "",
              playerId: "",
            }, { syncUrl: true });
          }
        );
      }

      if (activeView === CAPTAIN_VIEWS.FRIENDLY_FIND) {
        const friendlyFindAssociationCode = normalizeCode(associationCode || captainAssociationCode);
        const captainsByTeam = new Map();
        allProfiles.forEach((profile) => {
          const teamCode = normalizeCode(profile?.association);
          if (!teamCode || !isTruthyFlag(profile?.team_captain)) return;
          const current = Array.isArray(captainsByTeam.get(teamCode)) ? captainsByTeam.get(teamCode) : [];
          current.push(profile);
          current.sort((a, b) => playerLabel(a).localeCompare(playerLabel(b)));
          captainsByTeam.set(teamCode, current);
        });
        if (isCreateMode || isEditMode) {
          if (!friendlyFindAssociationCode) {
            contentEl.className = "captain-alert";
            contentEl.textContent = "Cannot detect your team association for creating a match request.";
            countEl.textContent = "";
            return;
          }
          const requestToEdit = isEditMode
            ? friendlyFindRequests.find((entry) => String(entry?.id || "") === editMatchId)
            : null;
          if (isEditMode && !requestToEdit) {
            contentEl.className = "captain-alert";
            contentEl.textContent = `Friendly find request not found: ${editMatchId}`;
            countEl.textContent = "";
            return;
          }
          renderFriendlyFindEditForm(
            teamsById,
            { associationCode: friendlyFindAssociationCode, request: requestToEdit },
            isEditMode ? "edit" : "create"
          );
        } else {
          renderFriendlyFindList(friendlyFindRequests, teamsById, friendlyFindAssociationCode, captainsByTeam);
        }
        if (associationOverride) {
          hintEl.textContent = `association override: ${associationOverride}`;
        } else {
          hintEl.textContent = "";
        }
        return;
      }

      if (activeView === CAPTAIN_VIEWS.MATCHES && isCreateMode) {
        if (!currentTournament) {
          contentEl.className = "captain-alert";
          contentEl.textContent = "Tournament not found or unavailable.";
          countEl.textContent = "";
          return;
        }
        if (!canManageClosedTournamentMatches) {
          contentEl.className = "captain-alert";
          contentEl.textContent = "Your role in this closed tournament allows lineups management only.";
          countEl.textContent = "";
          return;
        }
        if (!captainAssociationCode && !isAdminUser && Number(currentTournament?.access_type) !== 2) {
          contentEl.className = "captain-alert";
          contentEl.textContent = "Cannot detect your team association for creating a match.";
          countEl.textContent = "";
          return;
        }
        renderMatchEditForm(
          null,
          teamsById,
          {
            lockedTeamField: (!isAdminUser && Number(currentTournament?.access_type) !== 2) ? "team_1" : "",
            team1Default: captainAssociationCode,
            profiles: allProfiles,
            lineups: [],
            tournament: currentTournament,
            isGlobalAdmin: isAdminUser,
          },
          "create"
        );
        return;
      }

      if (activeView === CAPTAIN_VIEWS.MATCHES && !filtered.length) {
        if (!currentTournament) {
          renderNoMatchesMessage("Tournament not found or unavailable.");
          return;
        }
        renderNoMatchesMessage(
          Number(currentTournament?.access_type) === 2
            ? "No matches found for this tournament."
            : `No matches found for association ${associationCode}.`
        );
        return;
      }

      if (activeView === CAPTAIN_VIEWS.MATCHES && isEditMode && editMatchId) {
        const matchToEdit = filtered.find((m) => String(m?.id || "") === editMatchId);
        if (!matchToEdit) {
          contentEl.className = "captain-alert";
          contentEl.textContent = `Match not found: ${editMatchId}`;
          countEl.textContent = "";
          return;
        }
        const matchTeam1 = readMatchTeam1(matchToEdit);
        const matchTeam2 = readMatchTeam2(matchToEdit);
        let lockedTeamField = "";
        if (
          Number(currentTournament?.access_type) !== 2
          && !isAdminUser
          && isCaptainUser
          && captainAssociationCode
        ) {
          if (matchTeam1 === captainAssociationCode) lockedTeamField = "team_1";
          if (matchTeam2 === captainAssociationCode) lockedTeamField = "team_2";
        }
        let existingLineups = [];
        try {
          const lineupsRes = await fetch(`${DUELS_URL}?match_id=${encodeURIComponent(String(matchToEdit?.id || ""))}`, {
            method: "GET",
            credentials: "include",
          });
          if (lineupsRes.ok) {
            const lineupsData = await lineupsRes.json().catch(() => ({}));
            existingLineups = Array.isArray(lineupsData?.duels) ? lineupsData.duels : [];
          }
        } catch (_error) {
          existingLineups = [];
        }
        renderMatchEditForm(
          matchToEdit,
          teamsById,
          {
            lockedTeamField,
            profiles: allProfiles,
            lineups: existingLineups,
            tournament: currentTournament,
            lineupsOnly: Number(currentTournament?.access_type) === 2 && !canManageClosedTournamentMatches,
            isGlobalAdmin: isAdminUser,
          },
          "edit"
        );
        return;
      }

      if (activeView === CAPTAIN_VIEWS.MATCHES) {
        const lineupsByMatch = await loadLineupsByMatchIds(filtered);
        renderMatches(filtered, teamsById, lineupsByMatch, profilesById, {
          lineupsOnly: Number(currentTournament?.access_type) === 2 && !canManageClosedTournamentMatches,
        });
      } else if (activeView === CAPTAIN_VIEWS.PLAYERS) {
        const defaultAdminAssociationCode = normalizeCode(
          associationOverride || captainAssociationCode || Array.from(teamsById.keys())[0] || ""
        );
        const playersAssociationCode = isAdminUser
          ? defaultAdminAssociationCode
          : normalizeCode(associationCode || captainAssociationCode);
        const playersAssociationName = String(
          teamsById.get(playersAssociationCode)?.name || playersAssociationCode || "Players"
        ).trim();
        if (isAdminUser && !isCreateMode && !isEditMode) {
          const playerFilterOptions = Array.from(teamsById.values())
            .sort((a, b) => String(a?.name || "").localeCompare(String(b?.name || "")))
            .map((team) => ({
              value: team.id,
              label: team.name,
              logo: team.logo,
            }));
          renderAdminAssociationFilter(playerFilterOptions, playersAssociationCode, (nextAssociation) => {
            applyCaptainPageState({
              view: CAPTAIN_VIEWS.PLAYERS,
              associationOverride: normalizeCode(nextAssociation),
              mode: "list",
              matchId: "",
              playerId: "",
            }, { syncUrl: true });
          });
        }
        const players = allProfiles
          .filter((profile) => {
            if (playersAssociationCode) {
              return normalizeCode(profile?.association) === playersAssociationCode;
            }
            return false;
          })
          .sort((a, b) => String(a?.bga_nickname || "").localeCompare(String(b?.bga_nickname || "")));

        if (!players.length) {
          renderNoPlayersMessage(playersAssociationCode || associationCode);
          return;
        }

        const contactsByPlayerId = await loadProfileContactsByIds(players.map((player) => player?.id));
        const playersWithContacts = players.map((player) => ({
          ...player,
          ...(contactsByPlayerId.get(String(player?.id || "").trim()) || {}),
        }));

        if (isCreateMode) {
          renderPlayerCreateForm({
            associationCode: playersAssociationCode,
            canEditAssociation: isAdminUser,
          });
        } else if (isEditMode && editPlayerId) {
          const playerToEdit = playersWithContacts.find((p) => String(p?.id || "") === editPlayerId);
          if (!playerToEdit) {
            contentEl.className = "captain-alert";
            contentEl.textContent = `Player not found: ${editPlayerId}`;
            countEl.textContent = "";
            return;
          }
          setPageHeading(String(playerToEdit?.bga_nickname || playerToEdit?.id || editPlayerId));
          renderPlayerEditForm(playerToEdit, { currentUserPlayerId });
        } else {
          setPageHeading(`Players: ${playersAssociationName}`);
          renderPlayers(playersWithContacts);
        }
      }

      if (associationOverride) {
        hintEl.textContent = `association override: ${associationOverride}`;
      } else {
        hintEl.textContent = "";
      }
    } catch (_error) {
      contentEl.className = "captain-alert";
      contentEl.textContent = "Failed to load data.";
      countEl.textContent = "";
      hintEl.textContent = "";
    } finally {
      isCaptainPageInitializing = false;
      if (captainPageRefreshQueued) {
        captainPageRefreshQueued = false;
        initCaptainPage();
      }
    }
  }

  window.addEventListener("gg-auth-state-change", () => {
    initCaptainPage();
  });

  window.addEventListener("popstate", () => {
    syncCaptainPageStateFromUrl();
    initCaptainPage();
  });

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initCaptainPage);
  } else {
    initCaptainPage();
  }
})();
</script>
