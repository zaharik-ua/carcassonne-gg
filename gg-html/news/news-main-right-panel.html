<div class="gg-rp-news-widget">
  <div class="gg-rp-news-header">
    <span class="gg-rp-news-header-title">Recent News</span>
  </div>
  <div id="gg-rp-news-container"></div>
</div>

<script>
  const NEWS_PUBLIC_URL = "https://api.carcassonne.gg/public/news";
  const PLAYERS_PUBLIC_URL = "https://zaharik-ua.github.io/carcassonne-gg/json-data/list_of_players.json";
  const NEWS_API_ORIGIN = new URL(NEWS_PUBLIC_URL).origin;
  const NEWS_DESCRIPTION_PREVIEW_LIMIT = 200;
  const NEWS_LIST_LIMIT = 10;
  const newsContainer = document.getElementById("gg-rp-news-container");
  let imageModal;
  let allNewsItems = [];
  let selectedNewsItem = null;
  let playersById = new Map();
  let hasNewsDataLoaded = false;
  const imageVariantsCache = new Map();

  function isLocalWebsiteNews(newsItem) {
    return String(newsItem?.category || "").trim().toLowerCase() === "local website";
  }

  const closeImageModal = () => {
    if (!imageModal) return;
    imageModal.classList.remove("gg-rp-news-is-open");
    const img = imageModal.querySelector("img");
    if (img) img.src = "";
  };

  const ensureImageModal = () => {
    if (imageModal) return imageModal;

    imageModal = document.createElement("div");
    imageModal.className = "gg-rp-news-modal";
    imageModal.innerHTML = `
      <div class="gg-rp-news-modal-content">
        <img src="" alt="News preview">
      </div>
    `;

    imageModal.addEventListener("click", closeImageModal);
    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && imageModal.classList.contains("gg-rp-news-is-open")) {
        closeImageModal();
      }
    });

    document.body.appendChild(imageModal);
    return imageModal;
  };

  const openImageModal = (src, alt) => {
    const modal = ensureImageModal();
    const img = modal.querySelector("img");
    img.src = src;
    img.alt = alt || "News preview";
    modal.classList.add("gg-rp-news-is-open");
  };

  const getSelectedNewsId = () => {
    const params = new URLSearchParams(window.location.search);
    return String(params.get("id") || params.get("news_id") || "").trim();
  };

  const getSelectedNewsSlug = () => {
    const params = new URLSearchParams(window.location.search);
    const querySlug = String(params.get("news") || "").trim();
    if (querySlug) return querySlug;

    const match = window.location.pathname.match(/\/news\/([^/?#]+)\/?$/i);
    return match ? decodeURIComponent(match[1] || "").trim() : "";
  };

  const toNewsImageUrl = (value) => {
    const raw = String(value || "").trim();
    if (!raw) return "";
    if (/^(https?:|data:|blob:)/i.test(raw)) return raw;
    return `${NEWS_API_ORIGIN}${raw.startsWith("/") ? "" : "/"}${raw}`;
  };

  const getNewsImageVariantUrl = (value, variant) => {
    const imageUrl = toNewsImageUrl(value);
    const variantName = String(variant || "").trim();
    if (!imageUrl || !variantName) return imageUrl;
    try {
      const url = new URL(imageUrl, window.location.href);
      if (!/\/uploads\/images\/\d{4}\/\d{2}\/[^/]+\/[^/]+$/i.test(url.pathname)) {
        return imageUrl;
      }
      url.pathname = url.pathname.replace(/\/[^/]+$/, `/${variantName}.webp`);
      return url.toString();
    } catch (_error) {
      return imageUrl.replace(/\/[^/]+$/, `/${variantName}.webp`);
    }
  };

  const getNewsImageKeyFromUrl = (value) => {
    const imageUrl = toNewsImageUrl(value);
    if (!imageUrl) return "";
    try {
      const url = new URL(imageUrl, window.location.href);
      const match = url.pathname.match(/\/uploads\/images\/\d{4}\/\d{2}\/([^/]+)\//i);
      return match ? decodeURIComponent(match[1]) : "";
    } catch (_error) {
      return "";
    }
  };

  const fetchNewsImageVariants = async (value) => {
    const imageKey = getNewsImageKeyFromUrl(value);
    if (!imageKey) return [];
    if (imageVariantsCache.has(imageKey)) return imageVariantsCache.get(imageKey);

    const variantsPromise = fetch(`${NEWS_API_ORIGIN}/public/images/${encodeURIComponent(imageKey)}/variants`, {
      method: "GET",
    })
      .then(response => response.ok ? response.json() : null)
      .then(result => result?.ok && Array.isArray(result.variants) ? result.variants : [])
      .catch(() => []);
    imageVariantsCache.set(imageKey, variantsPromise);
    return variantsPromise;
  };

  const formatFileSize = (value) => {
    const bytes = Number(value);
    if (!Number.isFinite(bytes) || bytes <= 0) return "";
    if (bytes >= 1024 * 1024 * 1024) return `${(bytes / 1024 / 1024 / 1024).toFixed(1)} GB`;
    if (bytes >= 1024 * 1024) return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
    if (bytes >= 1024) return `${Math.round(bytes / 1024)} KB`;
    return `${Math.round(bytes)} B`;
  };

  const renderSourceImageLink = async (value, hostEl) => {
    if (!hostEl) return;
    const variants = await fetchNewsImageVariants(value);
    if (!hostEl.isConnected) return;

    const sourceVariant = variants.find(variant => String(variant?.variant || "") === "source" && (variant.public_url || variant.storage_path));
    if (!sourceVariant) {
      hostEl.innerHTML = "";
      return;
    }

    const sourceUrl = toNewsImageUrl(sourceVariant.public_url || sourceVariant.storage_path || "");
    if (!sourceUrl) return;

    const fileSize = formatFileSize(sourceVariant.file_size_bytes);
    const downloadUrl = new URL(sourceUrl, window.location.href);
    downloadUrl.searchParams.set("download", "1");
    const link = document.createElement("a");
    link.href = downloadUrl.toString();
    link.download = "";
    link.textContent = fileSize ? `Download source image (${fileSize})` : "Download source image";
    hostEl.innerHTML = "";
    hostEl.appendChild(link);
  };

  const renderDescriptionImageSourceLinks = (hostEl) => {
    if (!hostEl) return;
    hostEl.querySelectorAll("img").forEach(image => {
      const imageSrc = toNewsImageUrl(image.getAttribute("src") || "");
      if (!imageSrc) return;

      const sourceLink = document.createElement("div");
      sourceLink.className = "gg-rp-news-description-source";
      const imageRow = image.parentElement?.tagName?.toUpperCase() === "P"
        && Array.from(image.parentElement.childNodes).every(child => (
          child === image
          || (child.nodeType === Node.TEXT_NODE && !child.textContent.trim())
          || (child.nodeType === Node.ELEMENT_NODE && child.tagName.toUpperCase() === "BR")
        ))
        ? image.parentElement
        : image;
      imageRow.insertAdjacentElement("afterend", sourceLink);
      renderSourceImageLink(imageSrc, sourceLink);
    });
  };

  const namespaceNewsContentClasses = (hostEl) => {
    if (!hostEl) return;
    const classMap = {
      "news-section-title": "gg-rp-news-section-title",
      "news-quote-block": "gg-rp-news-quote-block",
      "news-quote-author": "gg-rp-news-quote-author",
      "news-quote-text": "gg-rp-news-quote-text",
      "news-quote-text-no-italic": "gg-rp-news-quote-text-no-italic",
      "news-quote-text-bold": "gg-rp-news-quote-text-bold",
    };

    Object.entries(classMap).forEach(([sourceClass, scopedClass]) => {
      hostEl.querySelectorAll(`.${sourceClass}`).forEach(element => {
        element.classList.remove(sourceClass);
        element.classList.add(scopedClass);
      });
    });
  };

  const getNewsSlug = (newsItem) => {
    const slugSource = String(newsItem?.short_title || newsItem?.title || "").trim();
    return slugSource
      .normalize("NFKD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[^\p{L}\p{N}]+/gu, "-")
      .replace(/^-+|-+$/g, "");
  };

  const getNewsDetailUrl = (newsItem) => {
    const newsSlug = getNewsSlug(newsItem);
    const url = new URL("/news/", window.location.href);
    if (newsSlug) {
      url.searchParams.set("news", newsSlug);
      return url.toString();
    }

    const newsId = String(newsItem?.id || "").trim();
    if (!newsId) return "";
    url.searchParams.set("id", newsId);
    return url.toString();
  };

  const getNewsDescriptionTextLength = (html) => {
    const template = document.createElement("template");
    template.innerHTML = String(html || "");
    return String(template.content.textContent || "")
      .replace(/\u00a0/g, " ")
      .replace(/\s+/g, " ")
      .trim()
      .length;
  };

  const hasNewsDescriptionImages = (html) => {
    const template = document.createElement("template");
    template.innerHTML = String(html || "");
    return !!template.content.querySelector("img");
  };

  const getNewsListTitle = (newsItem) => {
    return String(newsItem?.short_title || newsItem?.title || "").trim() || "News";
  };

  const fetchPublicNewsItem = (newsId) => {
    const normalizedNewsId = String(newsId || "").trim();
    if (!normalizedNewsId) return Promise.resolve(null);

    return fetch(`${NEWS_PUBLIC_URL}/${encodeURIComponent(normalizedNewsId)}`, { method: "GET" }).then(res => {
      if (res.status === 404) return null;
      if (!res.ok) throw new Error(`News item request failed: ${res.status}`);
      return res.json();
    }).then(result => result?.news || null);
  };

  const getNewsCreatorName = (newsItem) => {
    const directName = String(
      newsItem?.player_name ||
      newsItem?.created_by_name ||
      newsItem?.creator_name ||
      newsItem?.author_name ||
      newsItem?.author ||
      newsItem?.user_name ||
      newsItem?.username ||
      ""
    ).trim();

    if (directName) return directName;

    const creatorId = String(newsItem?.created_by || newsItem?.creator || "").trim();
    return playersById.get(creatorId) || creatorId;
  };

  const getNewsCreatorId = (newsItem) => {
    return String(newsItem?.created_by || newsItem?.creator || newsItem?.author_id || newsItem?.user_id || "").trim();
  };

  const normalizeImportance = (value) => {
    const normalized = String(value ?? "").trim().toLowerCase();
    if (normalized === "major" || normalized === "high") return "high";
    if (normalized === "important" || normalized === "medium") return "medium";
    return "low";
  };

  const normalizeMediaType = (value) => {
    const normalized = String(value ?? "").trim().toLowerCase();
    return normalized === "image" ? "image" : "icon";
  };

  const normalizeYouTubeVideoId = (value) => {
    const raw = String(value || "").trim();
    if (!raw) return "";

    const getCandidateId = (candidate) => {
      const text = String(candidate || "").trim();
      const match = text.match(/^([A-Za-z0-9_-]{11})(?:[^A-Za-z0-9_-]|$)/);
      return match ? match[1] : "";
    };

    const directId = getCandidateId(raw);
    if (directId && raw === directId) return directId;

    try {
      const url = new URL(/^https?:\/\//i.test(raw) ? raw : `https://${raw}`);
      const host = String(url.hostname || "").toLowerCase().replace(/^www\./, "").replace(/^m\./, "");
      const isShortHost = host === "youtu.be";
      const isYouTubeHost = host === "youtube.com"
        || host.endsWith(".youtube.com")
        || host === "youtube-nocookie.com"
        || host.endsWith(".youtube-nocookie.com");
      if (!isShortHost && !isYouTubeHost) return "";

      const queryVideoId = getCandidateId(url.searchParams.get("v"))
        || getCandidateId(url.searchParams.get("vi"));
      if (queryVideoId) return queryVideoId;

      const pathParts = url.pathname.split("/").filter(Boolean);
      if (isShortHost) return getCandidateId(pathParts[0]);

      const videoPathKeys = new Set(["embed", "live", "shorts", "v", "video"]);
      for (let index = 0; index < pathParts.length; index += 1) {
        if (videoPathKeys.has(String(pathParts[index] || "").toLowerCase())) {
          const pathVideoId = getCandidateId(pathParts[index + 1]);
          if (pathVideoId) return pathVideoId;
        }
      }
    } catch (_error) {
      // Fall through to regex fallback.
    }

    const fallbackMatch = raw.match(/(?:youtu\.be\/|youtube(?:-nocookie)?\.com\/(?:watch\?[^#\s]*v=|embed\/|live\/|shorts\/|v\/|video\/))([A-Za-z0-9_-]{11})(?:[^A-Za-z0-9_-]|$)/i);
    return fallbackMatch ? fallbackMatch[1] : "";
  };

  const getYoutubeVideoId = (newsItem) => {
    return normalizeYouTubeVideoId(newsItem?.youtube_video_id ?? newsItem?.youtubeVideoId ?? "");
  };

  const getYoutubeWatchUrl = (videoId) => {
    const normalizedVideoId = normalizeYouTubeVideoId(videoId);
    return normalizedVideoId ? `https://www.youtube.com/watch?v=${encodeURIComponent(normalizedVideoId)}` : "";
  };

  const getYoutubeThumbnailUrls = (videoId) => {
    const normalizedVideoId = normalizeYouTubeVideoId(videoId);
    if (!normalizedVideoId) return [];
    const encodedVideoId = encodeURIComponent(normalizedVideoId);
    return [
      `https://img.youtube.com/vi/${encodedVideoId}/maxresdefault.jpg`,
      `https://img.youtube.com/vi/${encodedVideoId}/hqdefault.jpg`,
    ];
  };

  const createYoutubePreview = (videoId, altText) => {
    const thumbnailUrls = getYoutubeThumbnailUrls(videoId);
    const preview = document.createElement("div");
    preview.className = "gg-rp-news-youtube-preview";

    const image = document.createElement("img");
    image.src = thumbnailUrls[0] || "";
    image.alt = altText || "YouTube video preview";
    image.loading = "lazy";
    image.dataset.videoId = normalizeYouTubeVideoId(videoId);
    image.dataset.thumbnailIndex = "0";
    image.addEventListener("error", () => {
      const urls = getYoutubeThumbnailUrls(image.dataset.videoId || "");
      const nextIndex = Number(image.dataset.thumbnailIndex || 0) + 1;
      const nextUrl = urls[nextIndex] || "";
      if (!nextUrl) return;
      image.dataset.thumbnailIndex = String(nextIndex);
      image.src = nextUrl;
    });

    const play = document.createElement("span");
    play.className = "gg-rp-news-youtube-play";
    play.setAttribute("aria-hidden", "true");
    preview.appendChild(image);
    preview.appendChild(play);
    return preview;
  };

  const getNewsTimestampValue = (item) => {
    return item?.time_utc || item?.updated_at || item?.created_at || item?.time || "";
  };

  const parseDateTime = (value) => {
    if (!value) return 0;

    const trimmed = String(value).trim();
    if (!trimmed) return 0;

    const directDate = new Date(trimmed);
    if (!Number.isNaN(directDate.getTime())) {
      return directDate.getTime();
    }

    const [rawDate = "", rawTime = "00:00"] = trimmed.split(/\s+/);
    const separatorMatch = rawDate.match(/[./-]/);
    if (!separatorMatch) return 0;

    const dateSegments = rawDate.split(separatorMatch[0]);
    if (dateSegments.length !== 3) return 0;

    let day;
    let month;
    let rawYear;
    if (separatorMatch[0] === "-" && dateSegments[0].length === 4) {
      [rawYear, month, day] = dateSegments;
    } else {
      [day, month, rawYear] = dateSegments;
    }

    const year = rawYear && rawYear.length === 2 ? `20${rawYear}` : rawYear;
    const normalizedTime = rawTime.includes(":") ? rawTime : `${rawTime}:00`;
    const parsed = new Date(`${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}T${normalizedTime}`);

    return Number.isNaN(parsed.getTime()) ? 0 : parsed.getTime();
  };

  const formatDisplayDate = (value) => {
    const timestamp = parseDateTime(value);
    if (!timestamp) return "";

    const date = new Date(timestamp);
    if (Number.isNaN(date.getTime())) return "";

    const monthLabels = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const day = String(date.getDate()).padStart(2, "0");
    const month = monthLabels[date.getMonth()] || "";
    const year = date.getFullYear();
    return month ? `${day}.${month} ${year}` : "";
  };

  const setNewsState = (message) => {
    if (!newsContainer) return;
    newsContainer.innerHTML = "";
    const state = document.createElement("div");
    state.className = "gg-rp-news-state";
    state.textContent = message;
    newsContainer.appendChild(state);
  };

  function renderNewsDetail(newsItem) {
    if (!newsContainer) return;

    newsContainer.innerHTML = "";

    const card = document.createElement("article");
    card.className = "gg-rp-news-detail-card";

    const titleText = String(newsItem.title || newsItem.short_title || "").trim() || "News";
    const rawMediaType = newsItem.media_type ?? newsItem.mediaType;
    const isIconMedia = String(rawMediaType ?? "").trim().toLowerCase() === "icon";
    const baseImageUrl = newsItem.image || newsItem.icon || newsItem.icon1 || "";
    const iconUrl = getNewsImageVariantUrl(baseImageUrl, "small");

    const title = document.createElement("h1");
    title.className = "gg-rp-news-detail-title";
    title.textContent = titleText;

    if (isIconMedia && iconUrl) {
      const titleRow = document.createElement("div");
      titleRow.className = "gg-rp-news-detail-title-row";

      const icon = document.createElement("img");
      icon.className = "gg-rp-news-detail-title-icon";
      icon.src = iconUrl;
      icon.alt = newsItem.short_title || titleText;
      titleRow.appendChild(icon);
      titleRow.appendChild(title);
      card.appendChild(titleRow);
    } else {
      card.appendChild(title);
    }

    const meta = document.createElement("div");
    meta.className = "gg-rp-news-detail-meta";

    const creatorName = getNewsCreatorName(newsItem);
    if (creatorName) {
      const player = document.createElement("div");
      player.className = "gg-rp-news-detail-player";
      const creatorId = getNewsCreatorId(newsItem);
      if (creatorId) {
        const playerLink = document.createElement("a");
        playerLink.className = "gg-rp-news-detail-player-link";
        playerLink.href = `https://carcassonne.gg/player/?id=${encodeURIComponent(creatorId)}`;
        playerLink.textContent = creatorName;
        player.appendChild(playerLink);
      } else {
        player.textContent = creatorName;
      }
      meta.appendChild(player);
    }

    const dateText = formatDisplayDate(getNewsTimestampValue(newsItem));
    if (dateText) {
      const date = document.createElement("div");
      date.className = "gg-rp-news-detail-date";
      date.textContent = dateText;
      meta.appendChild(date);
    }

    if (meta.children.length) {
      card.appendChild(meta);
    }

    const shortDescriptionText = String(newsItem.short_description || "").trim();
    if (shortDescriptionText) {
      const shortDescription = document.createElement("div");
      shortDescription.className = "gg-rp-news-detail-short-description";
      shortDescription.textContent = shortDescriptionText;
      card.appendChild(shortDescription);
    }

    const imageUrl = getNewsImageVariantUrl(baseImageUrl, "large");
    const originalImageUrl = getNewsImageVariantUrl(baseImageUrl, "original");
    if (imageUrl && !isIconMedia) {
      const image = document.createElement("img");
      image.className = "gg-rp-news-detail-image";
      image.src = imageUrl;
      image.alt = titleText;
      image.addEventListener("click", () => {
        openImageModal(originalImageUrl || imageUrl, titleText);
      });
      card.appendChild(image);

      const sourceLink = document.createElement("div");
      sourceLink.className = "gg-rp-news-detail-source";
      card.appendChild(sourceLink);
      renderSourceImageLink(baseImageUrl, sourceLink);
    }

    const descriptionHtml = String(newsItem.description || "").trim();
    if (descriptionHtml) {
      const description = document.createElement("div");
      description.className = "gg-rp-news-detail-description";
      description.innerHTML = descriptionHtml;
      namespaceNewsContentClasses(description);
      description.querySelectorAll("img").forEach(image => {
        const imageSrc = toNewsImageUrl(image.getAttribute("src") || "");
        if (!imageSrc) return;
        image.src = imageSrc;
        image.loading = "lazy";
        image.addEventListener("click", () => {
          openImageModal(getNewsImageVariantUrl(imageSrc, "original") || imageSrc, image.alt || titleText);
        });
      });
      renderDescriptionImageSourceLinks(description);
      card.appendChild(description);
    }

    newsContainer.appendChild(card);
  }

  function renderNewsView() {
    const selectedNewsId = getSelectedNewsId();
    const selectedNewsSlug = getSelectedNewsSlug();
    if (!selectedNewsId && !selectedNewsSlug) {
      renderNewsList();
      return;
    }

    const newsItem = selectedNewsSlug
      ? allNewsItems.find(item => getNewsSlug(item).toLowerCase() === selectedNewsSlug.toLowerCase()) || null
      : allNewsItems.find(item => String(item?.id || "").trim() === selectedNewsId)
        || (String(selectedNewsItem?.id || "").trim() === selectedNewsId ? selectedNewsItem : null);
    if (!newsItem) {
      setNewsState("News not found.");
      return;
    }

    renderNewsDetail(newsItem);
  }

  function renderNewsList() {
    if (!newsContainer) return;

    newsContainer.innerHTML = "";

    if (!allNewsItems.length) {
      if (hasNewsDataLoaded) {
        setNewsState("ℹ️ Наразі немає новин для відображення.");
      }
      return;
    }

    const displayedNewsItems = allNewsItems.slice(0, NEWS_LIST_LIMIT);

    displayedNewsItems.forEach(newsItem => {
      const row = document.createElement("div");
      row.className = "gg-rp-news-row";

      const normalizedImportance = normalizeImportance(newsItem.significance || newsItem.importance);
      const mediaType = normalizeMediaType(newsItem.media_type ?? newsItem.mediaType);
      const isImageMedia = mediaType === "image";
      const youtubeVideoId = getYoutubeVideoId(newsItem);
      const youtubeWatchUrl = getYoutubeWatchUrl(youtubeVideoId);
      const isYouTubeNews = !!youtubeVideoId;
      const isMajor = normalizedImportance === "high";
      const isImportant = normalizedImportance === "medium";
      const isImportantImage = isImportant && isImageMedia;
      const displayAsMajor = isMajor;
      const descriptionHtml = String(newsItem.description || "").trim();
      const descriptionTextLength = getNewsDescriptionTextLength(descriptionHtml);
      const hasDescriptionImages = hasNewsDescriptionImages(descriptionHtml);
      const hasNewsImages = isImageMedia || hasDescriptionImages;
      const detailUrl = getNewsDetailUrl(newsItem);
      const shouldShowInlinePreview = (
        !!descriptionHtml
        && !displayAsMajor
        && !isYouTubeNews
        && !hasNewsImages
        && descriptionTextLength <= NEWS_DESCRIPTION_PREVIEW_LIMIT
      );
      const shouldLinkDetailInsteadOfPreview = (
        !!detailUrl
        && !isYouTubeNews
        && !displayAsMajor
        && (
          hasNewsImages
          || (!!descriptionHtml && descriptionTextLength > NEWS_DESCRIPTION_PREVIEW_LIMIT)
        )
      );
      if (displayAsMajor || shouldLinkDetailInsteadOfPreview || isYouTubeNews) {
        row.classList.add("gg-rp-news-row-link");
      }
      if (isMajor) {
        row.classList.add("gg-rp-news-row-major");
      }

      const iconSource = newsItem.image || newsItem.icon || newsItem.icon1 || "";
      const iconUrl = getNewsImageVariantUrl(iconSource, isMajor ? "medium" : "small");
      if (isYouTubeNews) {
        const youtubePreview = createYoutubePreview(youtubeVideoId, getNewsListTitle(newsItem));
        youtubePreview.addEventListener("click", event => {
          event.stopPropagation();
          if (youtubeWatchUrl) {
            window.open(youtubeWatchUrl, "_blank", "noopener,noreferrer");
          }
        });
        row.appendChild(youtubePreview);
      } else if (iconUrl) {
        const icon = document.createElement("img");
        icon.className = "gg-rp-news-icon";
        icon.src = iconUrl;
        icon.alt = getNewsListTitle(newsItem);
        icon.classList.add(isImportantImage ? "gg-rp-news-icon-important-image" : `gg-rp-news-icon-${normalizedImportance}`);
        if (displayAsMajor || shouldLinkDetailInsteadOfPreview) {
          icon.addEventListener("click", event => {
            event.stopPropagation();
            if (detailUrl) {
              window.location.href = detailUrl;
            }
          });
        }
        if (isMajor) {
          const imageFrame = document.createElement("div");
          imageFrame.className = "gg-rp-news-major-image-frame";
          imageFrame.appendChild(icon);
          row.appendChild(imageFrame);
        } else {
          row.appendChild(icon);
        }
      }

      const contentWrapper = document.createElement("div");
      contentWrapper.className = "gg-rp-news-content";
      if (isMajor) {
        contentWrapper.classList.add("gg-rp-news-content-major");
      }

      const title = document.createElement("div");
      title.className = "gg-rp-news-title";
      if (isMajor) {
        title.classList.add("gg-rp-news-title-major");
      } else if (isImportant || isYouTubeNews) {
        title.classList.add("gg-rp-news-title-important");
      }

      const titleText = getNewsListTitle(newsItem);
      const streamerNameText = String(newsItem.streamer_short_name || newsItem.streamerShortName || newsItem.streamer_name || "").trim();
      if (streamerNameText) {
        const streamerName = document.createElement("div");
        streamerName.className = "gg-rp-news-streamer-name";
        streamerName.textContent = streamerNameText;
        contentWrapper.appendChild(streamerName);
      }

      const linkValue = String(newsItem.link || "").trim();
      if (shouldLinkDetailInsteadOfPreview) {
        const link = document.createElement("a");
        link.textContent = titleText;
        link.href = detailUrl;
        title.appendChild(link);
      } else if (linkValue && !displayAsMajor) {
        const link = document.createElement("a");
        link.textContent = titleText;
        link.href = linkValue;
        if (!link.href.toLowerCase().includes("carcassonne.gg")) {
          link.target = "_blank";
          link.rel = "noopener noreferrer";
        }
        title.appendChild(link);
      } else {
        const span = document.createElement("span");
        span.textContent = titleText;
        title.appendChild(span);
      }

      contentWrapper.appendChild(title);
      row.appendChild(contentWrapper);

      if (displayAsMajor || shouldLinkDetailInsteadOfPreview || isYouTubeNews) {
        row.addEventListener("click", event => {
          if (event.target?.closest?.("a")) return;
          if (youtubeWatchUrl) {
            window.open(youtubeWatchUrl, "_blank", "noopener,noreferrer");
            return;
          }
          if (detailUrl) {
            window.location.href = detailUrl;
          }
        });
      }

      if (shouldShowInlinePreview) {
        const chevron = document.createElement("i");
        chevron.className = "fa fa-chevron-down gg-rp-news-chevron";
        row.appendChild(chevron);

        const descriptionBlock = document.createElement("div");
        descriptionBlock.className = "gg-rp-news-description";

        const descriptionContent = document.createElement("div");
        descriptionContent.className = "gg-rp-news-description-content";
        const descriptionTemplate = document.createElement("template");
        descriptionTemplate.innerHTML = descriptionHtml;
        descriptionContent.appendChild(descriptionTemplate.content);
        namespaceNewsContentClasses(descriptionContent);
        descriptionContent.querySelectorAll("img").forEach(image => {
          const imageSrc = toNewsImageUrl(image.getAttribute("src") || "");
          if (!imageSrc) return;
          image.src = imageSrc;
          image.loading = "lazy";
        });
        descriptionBlock.appendChild(descriptionContent);

        const toggleDescription = () => {
          const isOpen = descriptionBlock.classList.contains("gg-rp-news-is-open");
          if (isOpen) {
            descriptionBlock.style.height = `${descriptionBlock.scrollHeight}px`;
            requestAnimationFrame(() => {
              descriptionBlock.style.height = "0px";
              descriptionBlock.classList.remove("gg-rp-news-is-open");
              chevron.style.transform = "rotate(0deg)";
            });
          } else {
            descriptionBlock.style.height = "0px";
            descriptionBlock.classList.add("gg-rp-news-is-open");
            chevron.style.transform = "rotate(180deg)";
            requestAnimationFrame(() => {
              descriptionBlock.style.height = `${descriptionBlock.scrollHeight}px`;
            });
          }
        };

        descriptionBlock.addEventListener("transitionend", event => {
          if (event.propertyName === "height" && descriptionBlock.classList.contains("gg-rp-news-is-open")) {
            descriptionBlock.style.height = "auto";
          }
        });

        chevron.addEventListener("click", event => {
          event.stopPropagation();
          toggleDescription();
        });

        if (!linkValue) {
          row.addEventListener("click", toggleDescription);
        }

        newsContainer.appendChild(row);
        newsContainer.appendChild(descriptionBlock);
      } else {
        newsContainer.appendChild(row);
      }
    });

    if (displayedNewsItems.length >= NEWS_LIST_LIMIT) {
      const moreLinkRow = document.createElement("div");
      moreLinkRow.className = "gg-rp-news-more-link";

      const moreLink = document.createElement("a");
      moreLink.href = "https://carcassonne.gg/news/";
      moreLink.textContent = "More news";
      moreLinkRow.appendChild(moreLink);
      newsContainer.appendChild(moreLinkRow);
    }
  }

  function fetchNews() {
    setNewsState("Loading news...");

    const selectedNewsId = getSelectedNewsId();
    selectedNewsItem = null;

    Promise.allSettled([
      fetch(NEWS_PUBLIC_URL, { method: "GET" }).then(res => {
        if (!res.ok) throw new Error(`News request failed: ${res.status}`);
        return res.json();
      }),
      fetch(PLAYERS_PUBLIC_URL, { method: "GET" }).then(res => {
        if (!res.ok) throw new Error(`Players request failed: ${res.status}`);
        return res.json();
      }),
      selectedNewsId ? fetchPublicNewsItem(selectedNewsId) : Promise.resolve(null)
    ])
      .then(([newsResult, playersResult, selectedNewsResult]) => {
        if (playersResult.status === "fulfilled") {
          const playerEntries = Array.isArray(playersResult.value?.gg_profiles) ? playersResult.value.gg_profiles : [];
          playersById = new Map();
          playerEntries.forEach(player => {
            const playerId = String(player?.id || player?.player_id || "").trim();
            const playerName = String(player?.bga_nickname || player?.player || "").trim();
            if (playerId && playerName) {
              playersById.set(playerId, playerName);
            }
          });
        }

        if (selectedNewsResult.status === "fulfilled") {
          selectedNewsItem = selectedNewsResult.value || null;
        } else {
          console.error(selectedNewsResult.reason || new Error("News item request failed"));
        }

        if (newsResult.status !== "fulfilled") {
          throw newsResult.reason || new Error("News request failed");
        }

        allNewsItems = Array.isArray(newsResult.value.news)
          ? newsResult.value.news.filter(newsItem => !isLocalWebsiteNews(newsItem))
          : [];
        allNewsItems.sort((a, b) => {
          const byTime = parseDateTime(getNewsTimestampValue(b)) - parseDateTime(getNewsTimestampValue(a));
          return byTime || Number(b?.id || 0) - Number(a?.id || 0);
        });
        hasNewsDataLoaded = true;
        renderNewsView();
      })
      .catch(err => {
        hasNewsDataLoaded = true;
        allNewsItems = [];
        setNewsState("❌ Failed to load news.");
        console.error(err);
      });
  }

  fetchNews();
</script>
