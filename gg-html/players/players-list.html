<div class="players-header">
  <div class="section-title">Players</div>
  <div class="players-count" id="players-count">Count: 0</div>
</div>
<div id="players-container"></div>

<script>
(function() {
  const AUTH_BASE = window.AUTH_BASE_URL || "https://api.carcassonne.gg";
  const PROFILES_PUBLIC_URL = `${AUTH_BASE}/profiles/public`;
  const PLAYERS_PAGE_SIZE_OPTIONS = [100, 200, 500];
  const playersPaginationState = {
    pageSize: 100,
    currentPage: 1,
    totalItems: 0,
    totalPages: 1
  };

  let allPlayers = [];
  let countriesByKey = new Map();
  let achievementMap = new Map();
  let activeAssociationFilter = null;

  function normalizeKey(value) {
    return String(value || "").trim().toUpperCase();
  }

  function readAssociationFilterFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const raw = params.get("association") || "";
    return normalizeKey(raw);
  }

  function readPlayerFilterFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return String(params.get("player") || "").trim();
  }

  function readMastersFilterFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const raw = String(params.get("masters") || "").trim().toLowerCase();
    return raw === "1" || raw === "true" || raw === "yes" || raw === "on";
  }

  function readCaptainsFilterFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const raw = String(params.get("captains") || "").trim().toLowerCase();
    return raw === "1" || raw === "true" || raw === "yes" || raw === "on";
  }

  function readRatingChangedFilterFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const raw = String(params.get("rating_changed") || "").trim().toLowerCase();
    return raw === "1" || raw === "true" || raw === "yes" || raw === "on";
  }

  function readAchievementTypeFilterFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return String(params.get("achievement_type") || "").trim();
  }
  function readMatchesMinFilterFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const raw = String(params.get("matches_min") || "").trim();
    const n = Number(raw);
    return Number.isFinite(n) && n > 0 ? Math.trunc(n) : 0;
  }

  function isActivePlayerStatus(status) {
    return String(status || "").trim().toLowerCase() === "active";
  }

  function toBool(value) {
    if (typeof value === "number") return value === 1;
    const raw = String(value || "").trim().toLowerCase();
    return raw === "1" || raw === "true" || raw === "yes" || raw === "on" || raw === "master" || raw === "captain";
  }

  function hasRatingChange(player) {
    const rawElo = String(player?.gg_elo ?? "").trim();
    const rawPreviousElo = String(player?.gg_elo_previous ?? "").trim();
    const current = Number(rawElo);
    const previous = Number(rawPreviousElo);
    return rawElo !== "" && rawPreviousElo !== "" && Number.isFinite(current) && Number.isFinite(previous) && current !== previous;
  }

  async function fetchProfilesMap() {
    try {
      const response = await fetch(PROFILES_PUBLIC_URL);
      if (!response.ok) return new Map();
      const payload = await response.json();
      const rows = Array.isArray(payload?.profiles) ? payload.profiles : [];
      const map = new Map();
      rows.forEach((row) => {
        const key = String(row?.id ?? row?.player_id ?? "").trim();
        if (!key) return;
        map.set(key, row);
      });
      return map;
    } catch (_error) {
      return new Map();
    }
  }

  function createPlayerElement(player, index) {
    const tr = document.createElement("tr");

    const tdRank = document.createElement("td");
    tdRank.className = "col-rank";
    tdRank.textContent = String(player.rank ?? (index + 1));
    tr.appendChild(tdRank);

    const tdPlayer = document.createElement("td");
    tdPlayer.className = "col-player";

    const playerCell = document.createElement("div");
    playerCell.className = "player-cell";

    if (player.flag && String(player.flag).trim() !== "") {
      const flag = document.createElement("img");
      flag.className = "player-flag";
      flag.src = player.flag;
      flag.alt = "flag";
      playerCell.appendChild(flag);
    }

    const textContainer = document.createElement("div");
    textContainer.className = "player-text";

    const nick = document.createElement("div");
    nick.className = "player-nick";
    nick.textContent = player.player || "";

    const name = document.createElement("div");
    name.className = "player-name";
    name.textContent = player.name || "";

    textContainer.appendChild(nick);
    if (player.name) textContainer.appendChild(name);
    playerCell.appendChild(textContainer);

    if (player.achievements && player.achievements.length > 0) {
      const achievementsDiv = document.createElement("div");
      achievementsDiv.className = "player-achievements";
      player.achievements.forEach(achievementName => {
        const info = achievementMap.get(achievementName);
        if (info && info.logo_url) {
          const img = document.createElement("img");
          img.src = info.logo_url;
          img.alt = achievementName;
          img.title = achievementName;
          achievementsDiv.appendChild(img);
        }
      });
      if (achievementsDiv.childElementCount > 0) {
        playerCell.appendChild(achievementsDiv);
      }
    }

    tdPlayer.appendChild(playerCell);
    tr.appendChild(tdPlayer);

    const tdElo = document.createElement("td");
    tdElo.className = "col-elo";
    {
      const rawElo = (player.gg_elo ?? "").toString().trim();
      const rawPreviousElo = (player.gg_elo_previous ?? "").toString().trim();
      const val = Number(rawElo);
      const previousVal = Number(rawPreviousElo);
      if (rawElo !== "" && Number.isFinite(val)) {
        const span = document.createElement("span");
        span.classList.add("elo-rating");
        span.textContent = String(Math.trunc(val));
        tdElo.appendChild(span);

        if (rawPreviousElo !== "" && Number.isFinite(previousVal) && val !== previousVal) {
          const diff = Math.round(val - previousVal);
          const diffEl = document.createElement("span");
          diffEl.classList.add("elo-rating-change");
          if (diff > 0) {
            diffEl.classList.add("positive");
            diffEl.textContent = `+${diff}`;
          } else if (diff < 0) {
            diffEl.classList.add("negative");
            diffEl.textContent = String(diff);
          } else {
            diffEl.textContent = "+0";
          }
          tdElo.appendChild(diffEl);
        }
      } else if (rawElo) {
        const span = document.createElement("span");
        span.textContent = rawElo;
        tdElo.appendChild(span);
      } else {
        tdElo.textContent = "";
      }
    }
    tr.appendChild(tdElo);

    if (player.profile) {
      tr.dataset.profile = player.profile;
    }

    return tr;
  }

  function renderPlayersSection(container, players) {
    if (!players || players.length === 0) return;
    playersPaginationState.totalItems = players.length;
    playersPaginationState.totalPages = Math.max(1, Math.ceil(players.length / playersPaginationState.pageSize));
    if (playersPaginationState.currentPage > playersPaginationState.totalPages) {
      playersPaginationState.currentPage = playersPaginationState.totalPages;
    }
    if (playersPaginationState.currentPage < 1) playersPaginationState.currentPage = 1;

    const card = document.createElement("div");
    card.className = "tournament-card";
    container.appendChild(card);

    const controls = document.createElement("div");
    controls.className = "results-controls";
    card.appendChild(controls);

    const pageSizeWrap = document.createElement("label");
    pageSizeWrap.className = "results-pagesize";
    pageSizeWrap.appendChild(document.createTextNode("Per page:"));

    const pageSizePicker = document.createElement("div");
    pageSizePicker.className = "results-pagesize-picker";
    const pageSizeBtn = document.createElement("button");
    pageSizeBtn.type = "button";
    pageSizeBtn.className = "results-pagesize-btn";
    const pageSizeBtnLabel = document.createElement("span");
    pageSizeBtnLabel.className = "results-pagesize-label";
    pageSizeBtnLabel.textContent = String(playersPaginationState.pageSize);
    const pageSizeChevron = document.createElement("span");
    pageSizeChevron.className = "results-pagesize-chevron";
    pageSizeChevron.innerHTML = '<i class="fa fa-chevron-down"></i>';
    pageSizeBtn.appendChild(pageSizeBtnLabel);
    pageSizeBtn.appendChild(pageSizeChevron);

    const pageSizeMenu = document.createElement("div");
    pageSizeMenu.className = "results-pagesize-menu";
    PLAYERS_PAGE_SIZE_OPTIONS.forEach((size) => {
      const option = document.createElement("button");
      option.type = "button";
      option.className = "results-pagesize-option";
      option.dataset.value = String(size);
      option.textContent = String(size);
      if (size === playersPaginationState.pageSize) option.classList.add("active");
      pageSizeMenu.appendChild(option);
    });

    pageSizePicker.appendChild(pageSizeBtn);
    pageSizePicker.appendChild(pageSizeMenu);
    pageSizeWrap.appendChild(pageSizePicker);
    controls.appendChild(pageSizeWrap);

    const pagination = document.createElement("div");
    pagination.className = "results-pagination";

    const prevBtn = document.createElement("button");
    prevBtn.type = "button";
    prevBtn.className = "results-pagebtn";
    prevBtn.textContent = "Prev";

    const pageInfo = document.createElement("span");
    pageInfo.className = "results-pageinfo";
    pageInfo.textContent = `Page ${playersPaginationState.currentPage} of ${playersPaginationState.totalPages}`;

    const nextBtn = document.createElement("button");
    nextBtn.type = "button";
    nextBtn.className = "results-pagebtn";
    nextBtn.textContent = "Next";

    pagination.appendChild(prevBtn);
    pagination.appendChild(pageInfo);
    pagination.appendChild(nextBtn);
    controls.appendChild(pagination);

    const table = document.createElement("table");
    table.className = "masters-table";

    const thead = document.createElement("thead");
    const hr = document.createElement("tr");

    const thPlayer = document.createElement("th");
    thPlayer.textContent = "Player";
    hr.appendChild(thPlayer);

    const thRank = document.createElement("th");
    thRank.className = "col-rank";
    thRank.textContent = "#";
    hr.insertBefore(thRank, thPlayer);

    const thTopElo = document.createElement("th");
    thTopElo.className = "col-elo";
    thTopElo.textContent = "GG Elo";
    hr.appendChild(thTopElo);

    thead.appendChild(hr);
    table.appendChild(thead);

    const tbody = document.createElement("tbody");
    const startIndex = (playersPaginationState.currentPage - 1) * playersPaginationState.pageSize;
    const pagePlayers = players.slice(startIndex, startIndex + playersPaginationState.pageSize);
    pagePlayers.forEach((player, index) => {
      const tr = createPlayerElement(player, startIndex + index);
      tr.classList.add("player-row");
      tbody.appendChild(tr);

      tr.addEventListener("click", (e) => {
        if (e.target.closest("a")) return;
        if (tr.dataset.profile) window.location.href = tr.dataset.profile;
      });
    });
    table.appendChild(tbody);

    card.appendChild(table);

    const pagingOff = playersPaginationState.totalItems <= playersPaginationState.pageSize;
    prevBtn.disabled = pagingOff || playersPaginationState.currentPage <= 1;
    nextBtn.disabled = pagingOff || playersPaginationState.currentPage >= playersPaginationState.totalPages;

    function closePageSizeMenu() {
      pageSizeMenu.classList.remove("open");
      pageSizeMenu.style.maxHeight = "0px";
      pageSizeBtn.classList.remove("open");
    }

    function setPageSize(nextSize) {
      playersPaginationState.pageSize = PLAYERS_PAGE_SIZE_OPTIONS.includes(nextSize) ? nextSize : 100;
      playersPaginationState.currentPage = 1;
      renderFilteredPlayers();
    }

    pageSizeBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      const isOpen = pageSizeMenu.classList.contains("open");
      closePageSizeMenu();
      if (!isOpen) {
        pageSizeMenu.classList.add("open");
        pageSizeMenu.style.maxHeight = `${pageSizeMenu.scrollHeight}px`;
        pageSizeBtn.classList.add("open");
      }
    });

    pageSizeMenu.querySelectorAll(".results-pagesize-option").forEach((optBtn) => {
      optBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        const nextSize = Number(optBtn.dataset.value) || 100;
        setPageSize(nextSize);
        closePageSizeMenu();
      });
    });

    if (window.__playersResultsPageSizeHandler) {
      document.removeEventListener("click", window.__playersResultsPageSizeHandler);
    }
    window.__playersResultsPageSizeHandler = (e) => {
      if (!pageSizeWrap.contains(e.target)) closePageSizeMenu();
    };
    document.addEventListener("click", window.__playersResultsPageSizeHandler);

    prevBtn.addEventListener("click", () => {
      if (playersPaginationState.currentPage <= 1) return;
      playersPaginationState.currentPage -= 1;
      renderFilteredPlayers();
    });

    nextBtn.addEventListener("click", () => {
      if (playersPaginationState.currentPage >= playersPaginationState.totalPages) return;
      playersPaginationState.currentPage += 1;
      renderFilteredPlayers();
    });
  }

  function renderFilteredPlayers(resetPage) {
    if (resetPage) playersPaginationState.currentPage = 1;
    let filtered = [...allPlayers];
    activeAssociationFilter = readAssociationFilterFromUrl();
    const activePlayerFilter = readPlayerFilterFromUrl();
    const mastersOnly = readMastersFilterFromUrl();
    const captainsOnly = readCaptainsFilterFromUrl();
    const ratingChangedOnly = readRatingChangedFilterFromUrl();
    const achievementType = readAchievementTypeFilterFromUrl();
    const matchesMin = readMatchesMinFilterFromUrl();

    if (activeAssociationFilter) {
      filtered = filtered.filter(p => normalizeKey(p.association) === activeAssociationFilter);
    }
    if (activePlayerFilter) {
      const target = activePlayerFilter.toLowerCase();
      filtered = filtered.filter(p => String(p.player || "").toLowerCase() === target);
    }
    if (mastersOnly) {
      filtered = filtered.filter(p => toBool(p.master_title));
    }
    if (captainsOnly) {
      filtered = filtered.filter(p => toBool(p.team_captain));
    }
    if (ratingChangedOnly) {
      filtered = filtered.filter(p => hasRatingChange(p));
    }
    if (achievementType) {
      filtered = filtered.filter(p =>
        Array.isArray(p.achievements) && p.achievements.some(a => {
          const info = achievementMap.get(a);
          return info && info.type === achievementType;
        })
      );
    }
    if (matchesMin > 0) {
      filtered = filtered.filter(p => {
        const val = Number(String(p.matches ?? "").trim());
        return Number.isFinite(val) && val >= matchesMin;
      });
    }

    filtered.sort((a, b) => (a.rank ?? 0) - (b.rank ?? 0));

    const container = document.getElementById("players-container");
    const countEl = document.getElementById("players-count");
    if (countEl) countEl.textContent = `Count: ${filtered.length}`;
    container.innerHTML = "";
    if (window.__playersResultsPageSizeHandler) {
      document.removeEventListener("click", window.__playersResultsPageSizeHandler);
      window.__playersResultsPageSizeHandler = null;
    }
    playersPaginationState.totalItems = filtered.length;
    playersPaginationState.totalPages = Math.max(1, Math.ceil(filtered.length / playersPaginationState.pageSize));
    renderPlayersSection(container, filtered);
  }

  async function fetchAndRenderPlayers() {
    const dataURL = "https://zaharik-ua.github.io/carcassonne-gg/json-data/list_of_players.json";

    try {
      const [playersRes, profilesMap] = await Promise.all([
        fetch(dataURL),
        fetchProfilesMap(),
      ]);
      if (!playersRes.ok) throw new Error("Failed to load JSON file");

      const data = await playersRes.json();
      const ggProfiles = data.gg_profiles || [];
      const ggById = new Map(
        ggProfiles
          .map((p) => [String(p?.id ?? p?.profile_id ?? "").trim(), p])
          .filter(([id]) => Boolean(id))
      );
      const countries = data.countries || [];
      const achievements = data.achievements || [];

      achievementMap = new Map();
      achievements.forEach(a => {
        const key = String(a.achievement || a.title || "").trim();
        if (key) achievementMap.set(key, a);
      });

      countriesByKey = new Map();
      countries.forEach(c => {
        if (c.iso) countriesByKey.set(normalizeKey(c.iso), c);
        if (c.team) countriesByKey.set(normalizeKey(c.team), c);
      });

      allPlayers = [...profilesMap.values()]
        .filter((dbProfile) => isActivePlayerStatus(dbProfile?.status))
        .map((dbProfile) => {
        const profileId = String(dbProfile?.id ?? dbProfile?.player_id ?? "").trim();
        const jsonProfile = ggById.get(profileId) || {};
        const assocRaw = String(dbProfile?.association || "");
        const assocKey = normalizeKey(assocRaw);
        const country = assocKey ? countriesByKey.get(assocKey) : null;
        return {
          id: profileId,
          player: String(dbProfile?.bga_nickname || jsonProfile?.bga_nickname || jsonProfile?.bga_name || "").trim(),
          name: String(dbProfile?.name || ""),
          gg_elo: jsonProfile?.gg_elo || "",
          gg_elo_previous: jsonProfile?.gg_elo_previous || "",
          achievements: Array.isArray(jsonProfile?.achievements) ? jsonProfile.achievements : [],
          master_title: Number(dbProfile?.master_title || 0),
          team_captain: Number(dbProfile?.team_captain || 0),
          matches: jsonProfile?.matches || "",
          association: assocKey,
          flag: country?.flag || "",
          profile: profileId ? `https://carcassonne.gg/player/?id=${encodeURIComponent(profileId)}` : ""
        };
      });

      const fullSorted = [...allPlayers].sort((a, b) => {
        const aRaw = (a.gg_elo ?? "").toString().trim();
        const bRaw = (b.gg_elo ?? "").toString().trim();
        const aNum = Number(aRaw);
        const bNum = Number(bRaw);
        const aIsNum = Number.isFinite(aNum);
        const bIsNum = Number.isFinite(bNum);

        if (aIsNum && bIsNum) return bNum - aNum;
        if (aIsNum) return -1;
        if (bIsNum) return 1;
        return a.player.localeCompare(b.player);
      });
      const rankById = new Map(fullSorted.map((p, idx) => [String(p.id), idx + 1]));
      allPlayers = allPlayers.map(p => ({ ...p, rank: rankById.get(String(p.id)) }));

      renderFilteredPlayers();
    } catch (error) {
      console.error("Failed to load player data:", error);
    }
  }

  const initPlayers = () => fetchAndRenderPlayers();
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initPlayers);
  } else {
    initPlayers();
  }
  window.addEventListener("popstate", () => renderFilteredPlayers(true));
  window.addEventListener("association-filter-change", () => renderFilteredPlayers(true));
  window.addEventListener("achievement-filter-change", () => renderFilteredPlayers(true));
  window.addEventListener("player-filter-change", () => renderFilteredPlayers(true));
  window.addEventListener("masters-filter-change", () => renderFilteredPlayers(true));
  window.addEventListener("captains-filter-change", () => renderFilteredPlayers(true));
  window.addEventListener("rating-change-filter-change", () => renderFilteredPlayers(true));
  window.addEventListener("matches-filter-change", () => renderFilteredPlayers(true));
})();
</script>
