</style>

<script>
(function () {
  const DEFAULT_AUTH_BASE = "https://api.carcassonne.gg";

  function getAuthBase(authBase) {
    return String(authBase || window.AUTH_BASE_URL || DEFAULT_AUTH_BASE).replace(/\/+$/, "");
  }

  function toApiAbsoluteUrl(value, authBase) {
    const raw = String(value || "").trim();
    if (!raw) return "";
    if (/^(https?:|data:|blob:)/i.test(raw)) return raw;
    const base = getAuthBase(authBase);
    return `${base}${raw.startsWith("/") ? "" : "/"}${raw}`;
  }

  function toApiImageVariantUrl(value, variant, authBase) {
    const absoluteUrl = toApiAbsoluteUrl(value, authBase);
    const variantName = String(variant || "").trim();
    if (!absoluteUrl || !variantName) return absoluteUrl;
    try {
      const url = new URL(absoluteUrl, window.location.href);
      if (!/\/uploads\/images\/\d{4}\/\d{2}\/[^/]+\/[^/]+$/i.test(url.pathname)) {
        return absoluteUrl;
      }
      url.pathname = url.pathname.replace(/\/[^/]+$/, `/${variantName}.webp`);
      return url.toString();
    } catch (_error) {
      return absoluteUrl.replace(/\/[^/]+$/, `/${variantName}.webp`);
    }
  }

  function getImageKeyFromUrl(value, authBase) {
    const imageUrl = toApiAbsoluteUrl(value, authBase);
    if (!imageUrl) return "";
    try {
      const url = new URL(imageUrl, window.location.href);
      const match = url.pathname.match(/\/uploads\/images\/\d{4}\/\d{2}\/([^/]+)\//i);
      return match ? String(match[1] || "").trim().toLowerCase() : "";
    } catch (_error) {
      const match = imageUrl.match(/\/uploads\/images\/\d{4}\/\d{2}\/([^/]+)\//i);
      return match ? String(match[1] || "").trim().toLowerCase() : "";
    }
  }

  function getImageDisplayName(image) {
    return String(
      image?.title
      || image?.alt_text
      || image?.original_filename
      || image?.image_key
      || (image?.id ? `Image #${image.id}` : "Image")
    ).trim();
  }

  function getImagePickerUrl(image, variant = "large", authBase) {
    const source = String(image?.storage_path || image?.public_url || "").trim();
    if (!source) return "";
    return toApiImageVariantUrl(source, variant, authBase) || toApiAbsoluteUrl(source, authBase);
  }

  function normalizeUserId(value) {
    const raw = String(value ?? "").trim();
    return /^\d+$/.test(raw) ? String(Number(raw)) : raw;
  }

  function getAuthUserId(user) {
    return normalizeUserId(user?.id ?? user?.user_id ?? user?.userId ?? "");
  }

  function imageWasAddedByUser(image, userId) {
    const normalizedUserId = normalizeUserId(userId);
    if (!normalizedUserId) return false;
    return normalizeUserId(image?.owner_user_id ?? image?.ownerUserId ?? "") === normalizedUserId
      || normalizeUserId(image?.uploaded_by_user_id ?? image?.uploadedByUserId ?? "") === normalizedUserId;
  }

  async function fetchCurrentUser(options = {}) {
    const authBase = getAuthBase(options.authBase);
    try {
      const response = await fetch(`${authBase}/auth/me`, { credentials: "include" });
      const result = await response.json().catch(() => ({}));
      return response.ok && result?.authenticated ? result.user || null : null;
    } catch (_error) {
      return null;
    }
  }

  async function fetchImages(options = {}) {
    const authBase = getAuthBase(options.authBase);
    const url = new URL(`${authBase}/images`, window.location.href);
    url.searchParams.set("status", String(options.status || "ready"));
    url.searchParams.set("visibility", String(options.visibility || "public"));
    const response = await fetch(url.toString(), { credentials: "include" });
    const result = await response.json().catch(() => ({}));
    if (!response.ok || !result?.ok) {
      throw new Error(result?.message || "Failed to load images.");
    }
    return Array.isArray(result?.images) ? result.images : [];
  }

  async function deleteImage(image, options = {}) {
    const authBase = getAuthBase(options.authBase);
    const imageId = String(image?.id || image?.image_key || "").trim();
    if (!imageId) throw new Error("Select an image to delete.");
    const response = await fetch(`${authBase}/images/${encodeURIComponent(imageId)}`, {
      method: "DELETE",
      credentials: "include",
    });
    const result = await response.json().catch(() => ({}));
    if (!response.ok || !result?.ok) {
      throw new Error(result?.message || "Failed to delete image.");
    }
    return result;
  }

  function showImagePickerDialog(options = {}) {
    const authBase = getAuthBase(options.authBase);
    const titleText = String(options.title || "Choose image").trim();
    const chooseLabel = String(options.chooseLabel || "Choose").trim();
    const uploadLabel = String(options.uploadLabel || "Upload new image").trim();
    const currentImageKey = getImageKeyFromUrl(options.currentUrl || "", authBase);
    const hasAdminOption = Object.prototype.hasOwnProperty.call(options, "isAdmin")
      || Object.prototype.hasOwnProperty.call(options, "isGlobalAdmin");
    let imagePickerUserId = normalizeUserId(options.currentUserId ?? options.currentUserAuthId ?? options.userId ?? "");
    let isGlobalAdmin = options.isAdmin === true || options.isGlobalAdmin === true;
    let imagePickerScope = "mine";
    let selectedImage = null;
    let loadedImages = [];
    let isDeleting = false;
    let isClosed = false;

    const overlay = document.createElement("div");
    overlay.className = "cp-modal-overlay";

    const dialog = document.createElement("div");
    dialog.className = "cp-modal-dialog";

    const title = document.createElement("div");
    title.className = "cp-modal-title";
    title.textContent = titleText || "Choose image";

    const status = document.createElement("div");
    status.className = "cp-image-picker-status";
    status.textContent = "Loading images...";

    const toolbar = document.createElement("div");
    toolbar.className = "cp-image-picker-toolbar";

    const uploadActions = document.createElement("div");
    uploadActions.className = "cp-image-picker-upload-actions";

    const grid = document.createElement("div");
    grid.className = "cp-image-picker-grid";

    const actions = document.createElement("div");
    actions.className = "cp-modal-actions";

    const actionsLeft = document.createElement("div");
    actionsLeft.className = "cp-image-picker-actions-left";

    const uploadBtn = document.createElement("button");
    uploadBtn.type = "button";
    uploadBtn.className = "cp-btn cp-btn-secondary";
    uploadBtn.textContent = uploadLabel || "Upload new image";

    const uploadSourceBtn = document.createElement("button");
    uploadSourceBtn.type = "button";
    uploadSourceBtn.className = "cp-btn cp-btn-secondary";
    uploadSourceBtn.textContent = String(options.sourceUploadLabel || "Upload source").trim() || "Upload source";

    const allImagesBtn = document.createElement("button");
    allImagesBtn.type = "button";
    allImagesBtn.className = "cp-btn cp-btn-secondary";
    allImagesBtn.textContent = "All Images";

    const deleteBtn = document.createElement("button");
    deleteBtn.type = "button";
    deleteBtn.className = "cp-btn cp-btn-danger";
    deleteBtn.textContent = "Delete";
    deleteBtn.disabled = true;

    const cancelBtn = document.createElement("button");
    cancelBtn.type = "button";
    cancelBtn.className = "cp-btn cp-btn-secondary";
    cancelBtn.textContent = "Cancel";

    const chooseBtn = document.createElement("button");
    chooseBtn.type = "button";
    chooseBtn.className = "cp-btn cp-btn-primary";
    chooseBtn.textContent = chooseLabel || "Choose";
    chooseBtn.disabled = true;

    const closeModal = (reason = "cancel") => {
      if (isClosed) return;
      isClosed = true;
      document.removeEventListener("keydown", handleKeyDown);
      overlay.remove();
      if (reason === "cancel" && typeof options.onCancel === "function") {
        options.onCancel();
      }
    };

    function handleKeyDown(event) {
      if (event.key === "Escape") closeModal("cancel");
    }

    const setPickerStatus = (message, isError = false, statusOptions = {}) => {
      const text = String(message || "").trim();
      status.innerHTML = "";
      status.style.color = isError ? "#c62828" : "#667085";
      if (text) {
        const label = document.createElement("span");
        label.textContent = text;
        status.appendChild(label);
        return;
      }
      if (statusOptions.showAdminButton !== false && isGlobalAdmin && imagePickerScope !== "all") {
        status.appendChild(allImagesBtn);
      }
    };

    const setDeleting = (value) => {
      isDeleting = value === true;
      uploadBtn.disabled = isDeleting;
      uploadSourceBtn.disabled = isDeleting;
      cancelBtn.disabled = isDeleting;
      chooseBtn.disabled = isDeleting || !selectedImage;
      deleteBtn.disabled = isDeleting || !selectedImage;
      deleteBtn.textContent = isDeleting ? "Deleting..." : "Delete";
    };

    const setSelectedImage = (image) => {
      selectedImage = image || null;
      grid.querySelectorAll(".cp-image-picker-option").forEach((node) => {
        node.classList.toggle("active", String(node.dataset.imageId || "") === String(selectedImage?.id || ""));
      });
      chooseBtn.disabled = isDeleting || !selectedImage;
      deleteBtn.disabled = isDeleting || !selectedImage;
    };

    const renderImages = (images) => {
      if (isClosed) return;
      grid.innerHTML = "";
      loadedImages = Array.isArray(images) ? images : [];
      const scopedImages = isGlobalAdmin && imagePickerScope === "all"
        ? loadedImages
        : loadedImages.filter((image) => imageWasAddedByUser(image, imagePickerUserId));
      const rows = scopedImages
        .filter((image) => getImagePickerUrl(image, "thumb", authBase) || getImagePickerUrl(image, "original", authBase));
      if (!rows.length) {
        const empty = document.createElement("div");
        empty.className = "cp-image-picker-empty";
        empty.textContent = "No uploaded images yet.";
        grid.appendChild(empty);
        setPickerStatus("");
        setSelectedImage(null);
        return;
      }

      rows.forEach((image) => {
        const optionBtn = document.createElement("button");
        optionBtn.type = "button";
        optionBtn.className = "cp-image-picker-option";
        optionBtn.dataset.imageId = String(image?.id || "");
        optionBtn.title = getImageDisplayName(image);

        const imageEl = document.createElement("img");
        const thumbUrl = getImagePickerUrl(image, "thumb", authBase);
        const fallbackUrl = getImagePickerUrl(image, "small", authBase) || getImagePickerUrl(image, "original", authBase);
        imageEl.src = thumbUrl || fallbackUrl;
        imageEl.alt = getImageDisplayName(image);
        imageEl.loading = "lazy";
        imageEl.addEventListener("error", () => {
          if (fallbackUrl && imageEl.src !== fallbackUrl) {
            imageEl.src = fallbackUrl;
          }
        }, { once: true });
        optionBtn.appendChild(imageEl);

        optionBtn.addEventListener("click", () => {
          setSelectedImage(image);
        });
        optionBtn.addEventListener("dblclick", () => {
          setSelectedImage(image);
          chooseBtn.click();
        });
        grid.appendChild(optionBtn);

        if (!selectedImage && currentImageKey && currentImageKey === String(image?.image_key || "").trim().toLowerCase()) {
          selectedImage = image;
        }
      });

      setSelectedImage(selectedImage);
      setPickerStatus("");
    };

    uploadBtn.addEventListener("click", () => {
      closeModal("upload");
      if (typeof options.onUploadNew === "function") {
        options.onUploadNew();
      }
    });
    uploadSourceBtn.addEventListener("click", () => {
      closeModal("upload-source");
      if (typeof options.onUploadSourceNew === "function") {
        options.onUploadSourceNew();
      }
    });
    allImagesBtn.addEventListener("click", () => {
      imagePickerScope = "all";
      setPickerStatus("");
      renderImages(loadedImages);
    });
    deleteBtn.addEventListener("click", async () => {
      if (!selectedImage || isDeleting) return;
      if (!window.confirm("Delete this image permanently?")) return;
      setPickerStatus("Deleting image...");
      setDeleting(true);
      try {
        const imageDeleter = typeof options.deleteImage === "function"
          ? options.deleteImage
          : (image) => deleteImage(image, { authBase });
        await imageDeleter(selectedImage);
        const deletedImageId = String(selectedImage?.id || "");
        selectedImage = null;
        renderImages(loadedImages.filter((image) => String(image?.id || "") !== deletedImageId));
        setPickerStatus("Image deleted.");
      } catch (error) {
        setPickerStatus(error?.message || "Failed to delete image.", true);
      } finally {
        setDeleting(false);
      }
    });
    cancelBtn.addEventListener("click", () => closeModal("cancel"));
    chooseBtn.addEventListener("click", () => {
      if (!selectedImage || typeof options.onChoose !== "function") return;
      try {
        options.onChoose(selectedImage, {
          displayName: getImageDisplayName(selectedImage),
          getUrl: (variant = "large") => getImagePickerUrl(selectedImage, variant, authBase),
        });
        closeModal("choose");
      } catch (error) {
        status.textContent = error?.message || "Failed to choose image.";
        status.style.color = "#c62828";
      }
    });
    overlay.addEventListener("click", (event) => {
      if (event.target === overlay) closeModal("cancel");
    });
    document.addEventListener("keydown", handleKeyDown);

    uploadActions.appendChild(uploadBtn);
    if (options.canUploadSource === true && typeof options.onUploadSourceNew === "function") {
      uploadActions.appendChild(uploadSourceBtn);
    }
    toolbar.appendChild(status);
    toolbar.appendChild(uploadActions);
    actionsLeft.appendChild(deleteBtn);
    actions.appendChild(actionsLeft);
    actions.appendChild(cancelBtn);
    actions.appendChild(chooseBtn);
    dialog.appendChild(title);
    dialog.appendChild(toolbar);
    dialog.appendChild(grid);
    dialog.appendChild(actions);
    overlay.appendChild(dialog);
    document.body.appendChild(overlay);

    const imageLoader = typeof options.fetchImages === "function"
      ? options.fetchImages
      : () => fetchImages({
        authBase,
        status: options.status,
        visibility: options.visibility,
      });

    Promise.all([
      Promise.resolve((imagePickerUserId && hasAdminOption) ? null : fetchCurrentUser({ authBase })),
      Promise.resolve(imageLoader()),
    ])
      .then(([currentUser, images]) => {
        if (currentUser) {
          imagePickerUserId = getAuthUserId(currentUser);
          isGlobalAdmin = isGlobalAdmin || currentUser?.isAdmin === true || Number(currentUser?.admin) === 1;
        }
        renderImages(images);
      })
      .catch((error) => {
        if (isClosed) return;
        grid.innerHTML = "";
        const empty = document.createElement("div");
        empty.className = "cp-image-picker-empty";
        empty.textContent = error?.message || "Failed to load images.";
        grid.appendChild(empty);
        setPickerStatus("", false, { showAdminButton: false });
      });
  }

  window.CarcassonneImagesModal = {
    deleteImage,
    fetchImages,
    getImageDisplayName,
    getImageKeyFromUrl,
    getImagePickerUrl,
    show: showImagePickerDialog,
    showImagePickerDialog,
    toApiAbsoluteUrl,
    toApiImageVariantUrl,
  };

  if (!window.showImagePickerDialog) {
    window.showImagePickerDialog = showImagePickerDialog;
  }
})();
</script>

<script>
(function () {
  const DEFAULT_AUTH_BASE = "https://api.carcassonne.gg";
  const PLAYER_PHOTOS_MAX_DEFAULT = 5;
  const PLAYER_PHOTOS_PLACEHOLDER_URL = "https://carcassonne.gg/gallery/photo_placeholder.png";
  const PLAYER_PHOTOS_ACCESS_HELP_URL = "https://carcassonne.gg/player/?id=noprofile";
  const root = getInstanceRoot(document.currentScript);
  if (!root) return;
  root.dataset.playerPhotosInitialized = "1";

  const state = {
    playerId: "",
    editMode: false,
    currentUser: null,
    canManage: false,
    canViewPhotos: false,
    photosRestricted: false,
    photos: [],
    maxPhotos: PLAYER_PHOTOS_MAX_DEFAULT,
    isBusy: false,
    isLoading: true,
    statusMessage: "",
    statusIsError: false,
    draggedPhotoId: "",
  };

  function getInstanceRoot(script) {
    let node = script ? script.previousElementSibling : null;
    while (node) {
      if (node.matches?.("[data-player-photos-root]")) {
        return node.dataset.playerPhotosInitialized === "1" ? null : node;
      }
      node = node.previousElementSibling;
    }
    return document.querySelector("[data-player-photos-root]:not([data-player-photos-initialized='1'])");
  }

  function getAuthBase() {
    return String(window.AUTH_BASE_URL || DEFAULT_AUTH_BASE).replace(/\/+$/, "");
  }

  function getImagePickerDialog() {
    const modalApi = window.CarcassonneImagesModal || null;
    return modalApi?.show || modalApi?.showImagePickerDialog || window.showImagePickerDialog || null;
  }

  async function ensureImagePickerDialog() {
    const existingDialog = getImagePickerDialog();
    if (typeof existingDialog === "function") return existingDialog;
    throw new Error("Image picker is not available.");
  }

  function toApiAbsoluteUrl(value) {
    const raw = String(value || "").trim();
    if (!raw) return "";
    if (/^(https?:|data:|blob:)/i.test(raw)) return raw;
    const base = getAuthBase();
    return `${base}${raw.startsWith("/") ? "" : "/"}${raw}`;
  }

  function toApiImageVariantUrl(value, variant) {
    const imageUrl = toApiAbsoluteUrl(value);
    const variantName = String(variant || "").trim();
    if (!imageUrl || !variantName) return imageUrl;
    try {
      const url = new URL(imageUrl, window.location.href);
      if (!/\/uploads\/images\/\d{4}\/\d{2}\/[^/]+\/[^/]+$/i.test(url.pathname)) {
        return imageUrl;
      }
      url.pathname = url.pathname.replace(/\/[^/]+$/, `/${variantName}.webp`);
      return url.toString();
    } catch (_error) {
      return imageUrl.replace(/\/[^/]+$/, `/${variantName}.webp`);
    }
  }

  function getPlayerIdFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return String(params.get("id") || "").trim();
  }

  function isEditModeFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const raw = String(params.get("edit") || "").trim().toLowerCase();
    return raw === "1" || raw === "true" || raw === "yes" || raw === "on";
  }

  function buildPlayerPageUrl(editMode) {
    const url = new URL(window.location.href);
    url.searchParams.set("id", state.playerId);
    if (editMode) {
      url.searchParams.set("edit", "1");
    } else {
      url.searchParams.delete("edit");
    }
    return url.toString();
  }

  function normalizeUserPlayerId(user) {
    return String(user?.player_id || user?.playerId || user?.profile?.player_id || "").trim();
  }

  function userCanViewPhotos(user) {
    return !!normalizeUserPlayerId(user);
  }

  function userIsAdmin(user) {
    return user?.isAdmin === true || Number(user?.admin) === 1;
  }

  function computeCanManage(user) {
    if (!user || !state.playerId) return false;
    return userIsAdmin(user) || normalizeUserPlayerId(user) === state.playerId;
  }

  function getPhotoId(photo) {
    return String(photo?.id || photo?.photo_id || photo?.imageable_record_id || "").trim();
  }

  function getPhotoImage(photo) {
    return photo?.image && typeof photo.image === "object" ? photo.image : {};
  }

  function photoIsRestricted(photo) {
    return photo?.restricted === true;
  }

  function shouldShowRestrictedPhotos() {
    return !state.editMode
      && state.photos.length > 0
      && (!state.canViewPhotos || state.photosRestricted || state.photos.some(photoIsRestricted));
  }

  function getPhotoDisplayName(photo) {
    const image = getPhotoImage(photo);
    return String(
      image.title
      || image.alt_text
      || image.original_filename
      || image.image_key
      || "Player photo"
    ).trim();
  }

  function getPhotoUrl(photo, variant) {
    const urls = photo?.urls && typeof photo.urls === "object" ? photo.urls : {};
    const image = getPhotoImage(photo);
    const direct = String(urls[variant] || "").trim();
    if (direct) return toApiAbsoluteUrl(direct);
    const source = String(image.storage_path || image.public_url || "").trim();
    if (!source) return "";
    return toApiImageVariantUrl(source, variant);
  }

  async function fetchJson(url, options = {}) {
    const response = await fetch(url, {
      credentials: "include",
      ...options,
      headers: {
        ...(options.body instanceof FormData ? {} : { "Content-Type": "application/json" }),
        ...(options.headers || {}),
      },
    });
    const result = await response.json().catch(() => ({}));
    if (!response.ok || !result?.ok) {
      throw new Error(result?.message || "Request failed.");
    }
    return result;
  }

  async function fetchCurrentUser() {
    try {
      const response = await fetch(`${getAuthBase()}/auth/me`, {
        method: "GET",
        credentials: "include",
      });
      const result = await response.json().catch(() => ({}));
      return response.ok && result?.authenticated ? result.user || null : null;
    } catch (_error) {
      return null;
    }
  }

  async function loadPublicPhotos() {
    return fetchJson(`${getAuthBase()}/public/players/${encodeURIComponent(state.playerId)}/photos`, {
      method: "GET",
    });
  }

  async function loadManagedPhotos() {
    return fetchJson(`${getAuthBase()}/players/${encodeURIComponent(state.playerId)}/photos`, {
      method: "GET",
    });
  }

  function setStatus(message, isError = false) {
    state.statusMessage = String(message || "").trim();
    state.statusIsError = !!isError;
    const statusEl = root.querySelector(".player-photos-status");
    if (statusEl) {
      statusEl.textContent = state.statusMessage;
      statusEl.classList.toggle("error", state.statusIsError);
    }
  }

  function closePreviewModal() {
    const modal = document.querySelector(".player-photos-modal");
    if (!modal) return;
    modal.classList.remove("open");
    const image = modal.querySelector("img");
    if (image) image.src = "";
  }

  function ensurePreviewModal() {
    let modal = document.querySelector(".player-photos-modal");
    if (modal) return modal;

    modal = document.createElement("div");
    modal.className = "player-photos-modal";

    const content = document.createElement("div");
    content.className = "player-photos-modal-content";

    const image = document.createElement("img");
    image.alt = "Player photo preview";
    content.appendChild(image);
    modal.appendChild(content);

    modal.addEventListener("click", closePreviewModal);
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modal.classList.contains("open")) {
        closePreviewModal();
      }
    });
    document.body.appendChild(modal);
    return modal;
  }

  function openPreview(photo) {
    const originalUrl = getPhotoUrl(photo, "original") || getPhotoUrl(photo, "large") || getPhotoUrl(photo, "medium");
    if (!originalUrl) return;
    const modal = ensurePreviewModal();
    const image = modal.querySelector("img");
    image.src = originalUrl;
    image.alt = getPhotoDisplayName(photo);
    modal.classList.add("open");
  }

  function createPhotoButton(photo, className) {
    const button = document.createElement("button");
    button.type = "button";
    button.className = className;
    button.title = "Preview photo";
    button.addEventListener("click", () => openPreview(photo));

    const image = document.createElement("img");
    image.src = getPhotoUrl(photo, "medium") || getPhotoUrl(photo, "large") || getPhotoUrl(photo, "original");
    image.alt = getPhotoDisplayName(photo);
    image.loading = "lazy";
    image.addEventListener("error", () => {
      const fallbackUrl = getPhotoUrl(photo, "original");
      if (fallbackUrl && image.src !== fallbackUrl) {
        image.src = fallbackUrl;
      }
    }, { once: true });
    button.appendChild(image);
    return button;
  }

  function createPhotoPlaceholder() {
    const placeholder = document.createElement("div");
    placeholder.className = "player-photo-placeholder";

    const image = document.createElement("img");
    image.src = PLAYER_PHOTOS_PLACEHOLDER_URL;
    image.alt = "Photo hidden";
    image.loading = "lazy";
    placeholder.appendChild(image);
    return placeholder;
  }

  function createPhotosAccessNote() {
    const note = document.createElement("div");
    note.className = "player-photos-access-note";
    note.appendChild(document.createTextNode(
      "To view player photos, log in to the site and link your email to your BGA account. Instructions are "
    ));

    const link = document.createElement("a");
    link.href = PLAYER_PHOTOS_ACCESS_HELP_URL;
    link.target = "_top";
    link.textContent = "here";
    note.appendChild(link);
    note.appendChild(document.createTextNode("."));
    return note;
  }

  function createManageLink() {
    const link = document.createElement("a");
    link.className = "player-photos-link";
    link.href = buildPlayerPageUrl(true);
    link.textContent = state.photos.length ? "Edit photos" : "Add photo";
    return link;
  }

  function renderViewMode(body) {
    if (!state.photos.length) {
      if (state.canManage) {
        const empty = document.createElement("div");
        empty.className = "player-photos-empty";
        empty.textContent = "No photos yet.";
        body.appendChild(empty);
        body.appendChild(createManageLink());
      }
      return;
    }

    if (shouldShowRestrictedPhotos()) {
      body.appendChild(createPhotosAccessNote());
      state.photos.forEach(() => {
        body.appendChild(createPhotoPlaceholder());
      });
      if (state.canManage) {
        body.appendChild(createManageLink());
      }
      return;
    }

    state.photos.forEach((photo, index) => {
      body.appendChild(createPhotoButton(photo, "player-photo-view"));
      if (state.canManage && index === state.photos.length - 1) {
        body.appendChild(createManageLink());
      }
    });
  }

  function createIconButton(label, html, onClick, options = {}) {
    const button = document.createElement("button");
    button.type = "button";
    button.className = `player-photo-btn${options.className ? ` ${options.className}` : ""}`;
    button.title = label;
    button.setAttribute("aria-label", label);
    button.innerHTML = html;
    button.disabled = !!options.disabled;
    button.addEventListener("click", onClick);
    return button;
  }

  function handleDropOnPhoto(targetPhotoId) {
    if (!state.draggedPhotoId || state.draggedPhotoId === targetPhotoId || state.isBusy) return;
    const currentIndex = state.photos.findIndex((photo) => getPhotoId(photo) === state.draggedPhotoId);
    const targetIndex = state.photos.findIndex((photo) => getPhotoId(photo) === targetPhotoId);
    if (currentIndex < 0 || targetIndex < 0) return;
    const nextPhotos = state.photos.slice();
    const [moved] = nextPhotos.splice(currentIndex, 1);
    nextPhotos.splice(targetIndex, 0, moved);
    savePhotoOrder(nextPhotos);
  }

  function renderEditMode(body) {
    if (state.photos.length >= state.maxPhotos) {
      const limit = document.createElement("div");
      limit.className = "player-photos-limit";
      limit.textContent = `Maximum ${state.maxPhotos} photos. Remove a photo before adding another.`;
      body.appendChild(limit);
    }

    if (!state.photos.length) {
      const empty = document.createElement("div");
      empty.className = "player-photos-empty";
      empty.textContent = "No photos yet.";
      body.appendChild(empty);
      return;
    }

    state.photos.forEach((photo, index) => {
      const photoId = getPhotoId(photo);
      const item = document.createElement("div");
      item.className = "player-photo-edit-item";
      item.draggable = !state.isBusy;
      item.dataset.photoId = photoId;
      item.addEventListener("dragstart", (event) => {
        state.draggedPhotoId = photoId;
        event.dataTransfer.effectAllowed = "move";
        event.dataTransfer.setData("text/plain", photoId);
      });
      item.addEventListener("dragover", (event) => {
        if (!state.draggedPhotoId || state.draggedPhotoId === photoId || state.isBusy) return;
        event.preventDefault();
        item.classList.add("drag-over");
      });
      item.addEventListener("dragleave", () => item.classList.remove("drag-over"));
      item.addEventListener("drop", (event) => {
        event.preventDefault();
        item.classList.remove("drag-over");
        handleDropOnPhoto(photoId);
      });
      item.addEventListener("dragend", () => {
        state.draggedPhotoId = "";
        root.querySelectorAll(".drag-over").forEach((node) => node.classList.remove("drag-over"));
      });

      item.appendChild(createPhotoButton(photo, "player-photo-preview-btn"));

      const actions = document.createElement("div");
      actions.className = "player-photo-actions";

      const orderActions = document.createElement("div");
      orderActions.className = "player-photo-order-actions";
      orderActions.appendChild(createIconButton(
        "Move up",
        "&#8593;",
        () => movePhoto(index, -1),
        { disabled: state.isBusy || index === 0 }
      ));
      orderActions.appendChild(createIconButton(
        "Move down",
        "&#8595;",
        () => movePhoto(index, 1),
        { disabled: state.isBusy || index === state.photos.length - 1 }
      ));

      const mainActions = document.createElement("div");
      mainActions.className = "player-photo-main-actions";
      mainActions.appendChild(createIconButton(
        "Remove photo",
        "&times;",
        () => deletePhoto(photo),
        { className: "player-photo-btn-danger", disabled: state.isBusy }
      ));

      actions.appendChild(orderActions);
      actions.appendChild(mainActions);
      item.appendChild(actions);
      body.appendChild(item);
    });
  }

  function render() {
    if (!state.playerId || state.playerId === "noprofile") {
      root.hidden = true;
      return;
    }

    if (!state.editMode && state.isLoading && !state.canManage) {
      root.hidden = true;
      return;
    }

    if (!state.editMode && !state.isLoading && !state.photos.length && !state.canManage) {
      root.hidden = true;
      return;
    }

    root.hidden = false;
    root.innerHTML = "";

    const header = document.createElement("div");
    header.className = "player-photos-header";

    const title = document.createElement("div");
    title.className = "player-photos-title";
    title.textContent = "Photos";
    header.appendChild(title);

    if (state.editMode && state.canManage) {
      const addButton = document.createElement("button");
      addButton.type = "button";
      addButton.className = "player-photo-btn player-photo-btn-primary";
      addButton.textContent = "Add";
      addButton.disabled = state.isBusy || state.photos.length >= state.maxPhotos;
      addButton.addEventListener("click", openAddPhotoDialog);
      header.appendChild(addButton);
    }

    root.appendChild(header);

    const body = document.createElement("div");
    body.className = "player-photos-list";

    if (state.isLoading) {
      const loading = document.createElement("div");
      loading.className = "player-photos-empty";
      loading.textContent = "Loading photos...";
      body.appendChild(loading);
    } else if (state.editMode && !state.canManage) {
      const denied = document.createElement("div");
      denied.className = "player-photos-status error";
      denied.textContent = "You do not have permission to edit these photos.";
      body.appendChild(denied);
    } else if (state.editMode) {
      renderEditMode(body);
    } else {
      renderViewMode(body);
    }

    root.appendChild(body);

    const status = document.createElement("div");
    status.className = `player-photos-status${state.statusIsError ? " error" : ""}`;
    status.textContent = state.statusMessage;
    root.appendChild(status);
  }

  async function addImageToPlayer(image) {
    if (state.photos.length >= state.maxPhotos) {
      setStatus(`Maximum ${state.maxPhotos} photos. Remove a photo before adding another.`, true);
      return;
    }
    const imageId = String(image?.id || image?.image_id || image?.image_key || "").trim();
    if (!imageId) {
      setStatus("Choose an image first.", true);
      return;
    }

    state.isBusy = true;
    state.statusMessage = "Adding photo...";
    state.statusIsError = false;
    render();
    try {
      const result = await fetchJson(`${getAuthBase()}/players/${encodeURIComponent(state.playerId)}/photos`, {
        method: "POST",
        body: JSON.stringify({ image_id: imageId }),
      });
      state.photos = Array.isArray(result.photos) ? result.photos : state.photos;
      state.maxPhotos = Number(result.max_photos || state.maxPhotos);
      state.statusMessage = "Photo added.";
      state.statusIsError = false;
    } catch (error) {
      state.statusMessage = error?.message || "Failed to add photo.";
      state.statusIsError = true;
    } finally {
      state.isBusy = false;
      render();
    }
  }

  async function uploadAndAddPhoto(file) {
    if (!file) return;
    state.isBusy = true;
    state.statusMessage = "Uploading photo...";
    state.statusIsError = false;
    render();
    try {
      const formData = new FormData();
      formData.append("image", file);
      formData.append("visibility", "public");
      const response = await fetch(`${getAuthBase()}/images/upload`, {
        method: "POST",
        credentials: "include",
        body: formData,
      });
      const result = await response.json().catch(() => ({}));
      if (!response.ok || !result?.ok || !result?.image) {
        throw new Error(result?.message || "Failed to upload photo.");
      }
      state.isBusy = false;
      await addImageToPlayer(result.image);
    } catch (error) {
      state.statusMessage = error?.message || "Failed to upload photo.";
      state.statusIsError = true;
      state.isBusy = false;
      render();
    }
  }

  function chooseUploadFile() {
    if (state.photos.length >= state.maxPhotos) {
      setStatus(`Maximum ${state.maxPhotos} photos. Remove a photo before adding another.`, true);
      return;
    }
    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";
    input.hidden = true;
    input.addEventListener("change", () => {
      const file = input.files && input.files[0] ? input.files[0] : null;
      input.remove();
      if (file) uploadAndAddPhoto(file);
    }, { once: true });
    document.body.appendChild(input);
    input.click();
  }

  async function openAddPhotoDialog() {
    if (state.photos.length >= state.maxPhotos) {
      setStatus(`Maximum ${state.maxPhotos} photos. Remove a photo before adding another.`, true);
      return;
    }
    let showDialog = null;
    try {
      setStatus("Loading image picker...");
      showDialog = await ensureImagePickerDialog();
    } catch (error) {
      setStatus(error?.message || "Failed to load image picker popup.", true);
      return;
    }
    setStatus("");

    showDialog({
      title: "Add player photo",
      chooseLabel: "Add photo",
      uploadLabel: "Upload photo",
      currentUserId: state.currentUser?.id || state.currentUser?.user_id || "",
      isAdmin: userIsAdmin(state.currentUser),
      onChoose: (image) => {
        addImageToPlayer(image);
      },
      onUploadNew: chooseUploadFile,
    });
  }

  async function savePhotoOrder(nextPhotos) {
    const previousPhotos = state.photos.slice();
    state.photos = nextPhotos;
    state.isBusy = true;
    state.statusMessage = "Saving order...";
    state.statusIsError = false;
    render();
    try {
      const result = await fetchJson(`${getAuthBase()}/players/${encodeURIComponent(state.playerId)}/photos/order`, {
        method: "PATCH",
        body: JSON.stringify({ photo_ids: nextPhotos.map(getPhotoId) }),
      });
      state.photos = Array.isArray(result.photos) ? result.photos : nextPhotos;
      state.maxPhotos = Number(result.max_photos || state.maxPhotos);
      state.statusMessage = "Order saved.";
      state.statusIsError = false;
    } catch (error) {
      state.photos = previousPhotos;
      state.statusMessage = error?.message || "Failed to save order.";
      state.statusIsError = true;
    } finally {
      state.isBusy = false;
      render();
    }
  }

  function movePhoto(index, direction) {
    if (state.isBusy) return;
    const targetIndex = index + direction;
    if (targetIndex < 0 || targetIndex >= state.photos.length) return;
    const nextPhotos = state.photos.slice();
    const temp = nextPhotos[index];
    nextPhotos[index] = nextPhotos[targetIndex];
    nextPhotos[targetIndex] = temp;
    savePhotoOrder(nextPhotos);
  }

  async function deletePhoto(photo) {
    const photoId = getPhotoId(photo);
    if (!photoId || state.isBusy) return;
    if (!window.confirm("Remove this photo from the profile?")) return;

    state.isBusy = true;
    state.statusMessage = "Removing photo...";
    state.statusIsError = false;
    render();
    try {
      const result = await fetchJson(`${getAuthBase()}/players/${encodeURIComponent(state.playerId)}/photos/${encodeURIComponent(photoId)}`, {
        method: "DELETE",
      });
      state.photos = Array.isArray(result.photos) ? result.photos : state.photos.filter((item) => getPhotoId(item) !== photoId);
      state.maxPhotos = Number(result.max_photos || state.maxPhotos);
      state.statusMessage = result.hard_deleted_image
        ? "Photo removed. The unused image was deleted."
        : "Photo removed.";
      state.statusIsError = false;
    } catch (error) {
      state.statusMessage = error?.message || "Failed to remove photo.";
      state.statusIsError = true;
    } finally {
      state.isBusy = false;
      render();
    }
  }

  async function init() {
    state.playerId = getPlayerIdFromUrl();
    state.editMode = isEditModeFromUrl();
    if (!state.playerId || state.playerId === "noprofile") {
      render();
      return;
    }

    render();
    try {
      const [publicResult, currentUser] = await Promise.all([
        loadPublicPhotos(),
        fetchCurrentUser(),
      ]);
      state.currentUser = currentUser;
      state.canManage = computeCanManage(currentUser);
      state.canViewPhotos = userCanViewPhotos(currentUser) || publicResult.can_view_photos === true;
      state.maxPhotos = Number(publicResult.max_photos || state.maxPhotos);

      if (state.editMode && state.canManage) {
        const managedResult = await loadManagedPhotos();
        state.photos = Array.isArray(managedResult.photos) ? managedResult.photos : [];
        state.maxPhotos = Number(managedResult.max_photos || state.maxPhotos);
        state.photosRestricted = false;
      } else {
        state.photos = Array.isArray(publicResult.photos) ? publicResult.photos : [];
        state.photosRestricted = !!publicResult.photos_restricted
          || (!state.canViewPhotos && state.photos.length > 0);
      }
      state.statusMessage = "";
      state.statusIsError = false;
    } catch (error) {
      state.photos = [];
      state.statusMessage = error?.message || "Failed to load player photos.";
      state.statusIsError = true;
    } finally {
      state.isLoading = false;
      render();
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
