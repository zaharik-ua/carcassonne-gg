</style>
<div id="wtcoc-stage2-content"></div>

<script>
  const currentTournamentId = "WTCOC-2026";
  const TOURNAMENT_THEMES = {
    blue: { main: '#2C6DA3', hover: '#24598a' },
    red: { main: '#d85c5c', hover: '#c64a4b' },
    green: { main: '#197457', hover: '#145c44' },
    deepnavy: { main: '#0f3a5a', hover: '#072840' },
    gold: { main: '#153b52', hover: '#0e2d40', text: '#fff' }
  };

  function applyTournamentTheme(styleName) {
    const normalized = (styleName || '').trim().toLowerCase();
    const theme = TOURNAMENT_THEMES[normalized] || TOURNAMENT_THEMES.blue;
    document.documentElement.style.setProperty('--wtcoc-main-bg-color', theme.main);
    document.documentElement.style.setProperty('--wtcoc-hover-bg-color', theme.hover);
    document.documentElement.style.setProperty('--wtcoc-accent-text-color', theme.text || '#fff');
  }

  applyTournamentTheme('gold');

  let currentTournament = null;
  let matches = [];
  let duels = [];
  let players = [];
  let teams = [];

  const BRACKET_MARGIN = 15;
  const MATCH_HEIGHT = 60;
  let MATCH_WIDTH = 250;
  const COMPACT_MATCH_WIDTH = 80;
  const ROUND_TITLE_TO_MATCH_SPACING = 60;
  const VERTICAL_SPACING = 25;
  const HORIZONTAL_SPACING = 20;
  let THIRD_PLACE_VERTICAL_OFFSET = 140;

  function hasMatchValue(value) {
    return value !== null && value !== undefined && String(value).trim() !== "";
  }

  function isMatchPlayed(match) {
    const status = hasMatchValue(match?.status) ? String(match.status).trim().toLowerCase() : "";
    if (status) {
      if (["done", "finished", "complete", "completed", "played"].includes(status)) {
        return true;
      }
      if (["planned", "scheduled", "pending", "not started", "in progress", "live"].includes(status)) {
        return false;
      }
    }

    const hasTeamScore = hasMatchValue(match?.duels_won1) && hasMatchValue(match?.duels_won2);
    const hasPlayerScore = hasMatchValue(match?.score1) && hasMatchValue(match?.score2);
    return hasTeamScore || hasPlayerScore;
  }

  function isRoundPlayed(roundMatches) {
    return Array.isArray(roundMatches) && roundMatches.length > 0 && roundMatches.every(isMatchPlayed);
  }

  function splitRoundLabel(rawRound) {
    const label = String(rawRound || "").trim();
    const idx = label.indexOf(":");
    if (idx === -1) return [label, ""];
    return [label.slice(0, idx).trim(), label.slice(idx + 1).trim()];
  }

  function getRoundLabelParts(matches, roundNum, compactRound) {
    const labelMatch = matches.find(m => m.knockout_stage !== "third_place") || matches[0] || {};
    const rawRound = labelMatch.round || `Round ${roundNum}`;
    const [fullTitle, parsedDates] = splitRoundLabel(rawRound);
    const shortTitle = String(labelMatch.round_short_name || "").trim();
    const dates = String(labelMatch.round_dates || "").trim() || parsedDates;
    return [compactRound && shortTitle ? shortTitle : fullTitle, dates];
  }

  function getMatchRoundLabelParts(match, fallbackTitle, compactRound) {
    const rawRound = match?.round || fallbackTitle;
    const [fullTitle, parsedDates] = splitRoundLabel(rawRound);
    const shortTitle = String(match?.round_short_name || "").trim();
    const dates = String(match?.round_dates || "").trim() || parsedDates;
    return [compactRound && shortTitle ? shortTitle : fullTitle, dates];
  }

  function buildRoundLayout(groupedByRound, sortedRounds, options = {}) {
    const layout = { compact: {}, left: {}, width: {}, totalWidth: BRACKET_MARGIN };
    let nextLeft = BRACKET_MARGIN;
    sortedRounds.forEach(roundNum => {
      const compactRound = !options.forceFullWidthRounds && isRoundPlayed(groupedByRound[roundNum]);
      const roundWidth = compactRound ? COMPACT_MATCH_WIDTH : MATCH_WIDTH;
      layout.compact[roundNum] = compactRound;
      layout.left[roundNum] = nextLeft;
      layout.width[roundNum] = roundWidth;
      nextLeft += roundWidth + HORIZONTAL_SPACING;
    });
    layout.totalWidth = sortedRounds.length ? nextLeft - HORIZONTAL_SPACING + BRACKET_MARGIN : BRACKET_MARGIN;
    return layout;
  }

  function getRoundLeft(roundLayout, roundNum) {
    return roundLayout?.left?.[roundNum] ?? BRACKET_MARGIN;
  }

  function getRoundWidth(roundLayout, roundNum) {
    return roundLayout?.width?.[roundNum] ?? MATCH_WIDTH;
  }

  function isCompactRound(roundLayout, roundNum) {
    return Boolean(roundLayout?.compact?.[roundNum]);
  }

  function getMatchWidth(match, roundLayout) {
    return getRoundWidth(roundLayout, Number(match?.round_order));
  }

  function getBracketRight(matches, roundLayout) {
    if (!matches.length) return BRACKET_MARGIN;
    return Math.max(...matches.map(m => (m.cord_left || 0) + getMatchWidth(m, roundLayout)));
  }

  function formatMatchTime(raw) {
    if (!raw || typeof raw !== "string") return "";
    const s = raw.trim();
    // ISO timestamp from API: 2026-05-18T12:00:00.000Z or 2026-05-18 12:00:00
    if (/^\d{4}-\d{2}-\d{2}(?:[T\s]\d{2}:\d{2}(?::\d{2}(?:\.\d{1,3})?)?(?:Z|[+-]\d{2}:?\d{2})?)?$/.test(s)) {
      const d = new Date(s.includes("T") ? s : s.replace(" ", "T") + "Z");
      if (!Number.isNaN(d.getTime())) {
        const dayMon = d.toLocaleDateString("en-GB", { day: "2-digit", month: "short" });
        if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
          return dayMon;
        }
        const hm = d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", hour12: false });
        return `${dayMon} ${hm}`;
      }
    }
    // With time: DD.MM.YYYY HH:MM:SS
    if (/^\d{2}\.\d{2}\.\d{4}\s+\d{2}:\d{2}:\d{2}$/.test(s)) {
      const [datePart, timePart] = s.split(/\s+/);
      const [dd, mm, yyyy] = datePart.split(".").map(Number);
      const [HH, MM, SS] = timePart.split(":").map(Number);
      const ts = Date.UTC(yyyy, mm - 1, dd, HH, MM, SS);
      const d = new Date(ts);
      const dayMon = d.toLocaleDateString("en-GB", { day: "2-digit", month: "short" });
      const hm = d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", hour12: false });
      return `${dayMon} ${hm}`; // e.g., 12 Aug 14:00
    }
    // Date only: DD.MM.YYYY → show as DD Mon
    if (/^\d{2}\.\d{2}\.\d{4}$/.test(s)) {
      const [dd, mm, yyyy] = s.split(".").map(Number);
      // Use noon UTC to avoid TZ shifting date
      const ts = Date.UTC(yyyy, mm - 1, dd, 12, 0, 0);
      const d = new Date(ts);
      return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short" });
    }
    // Fallback: return as-is
    return s;
  }

  function calculatePlayoffMatchCoordinates(groupedByRound, sortedRounds, roundLayout, playoffMatches, currentTournamentId) {
    const sortByKnockoutId = (a, b) => Number(a.knockout_id ?? a.game_id ?? a.id) - Number(b.knockout_id ?? b.game_id ?? b.id);

    Object.values(groupedByRound).forEach(roundMatches => {
      roundMatches.sort(sortByKnockoutId);
    });

    // 1. Find the round with the maximum number of matches
    const maxMatchRound = sortedRounds.reduce((maxRound, r) => {
      return (groupedByRound[r].length > groupedByRound[maxRound]?.length || !maxRound) ? r : maxRound;
    }, sortedRounds[0]);

    // 2. Layout matches of maxMatchRound
    groupedByRound[maxMatchRound]
      .filter(m => m.knockout_stage !== "third_place")
      .forEach((m, index) => {
        const cord_top = BRACKET_MARGIN + ROUND_TITLE_TO_MATCH_SPACING + index * (MATCH_HEIGHT + VERTICAL_SPACING);
        const cord_left = getRoundLeft(roundLayout, maxMatchRound);
        const cord_bottom = cord_top + MATCH_HEIGHT;
        m.cord_top = cord_top;
        m.cord_left = cord_left;
        m.cord_bottom = cord_bottom;
      });

    // 3. Layout rounds to the right of maxMatchRound
    for (let i = sortedRounds.indexOf(maxMatchRound) + 1; i < sortedRounds.length; i++) {
      const roundNum = sortedRounds[i];
      groupedByRound[roundNum]
        .filter(m => m.knockout_stage !== "third_place")
        .forEach(m => {
          const sources = sortedRounds[i - 1] ? groupedByRound[sortedRounds[i - 1]].filter(pm => pm.next_game_win === m.knockout_id) : [];
          let cord_top = 0;
          if (sources.length === 2) {
            const cord_top1 = groupedByRound[sortedRounds[i - 1]].find(pm => pm.knockout_id === sources[0].knockout_id).cord_top;
            const cord_top2 = groupedByRound[sortedRounds[i - 1]].find(pm => pm.knockout_id === sources[1].knockout_id).cord_top;
            const center = (cord_top1 + cord_top2 + MATCH_HEIGHT) / 2;
            cord_top = center - MATCH_HEIGHT / 2;
          } else if (sources.length === 1) {
            cord_top = groupedByRound[sortedRounds[i - 1]].find(pm => pm.knockout_id === sources[0].knockout_id).cord_top;
          }
          // Якщо немає "попередників": розміщуємо під останнім матчем цього раунду
          if (sources.length === 0) {
            const sameRoundPlaced = groupedByRound[roundNum]
              .filter(x => x.knockout_stage !== "third_place" && x.knockout_id !== m.knockout_id && typeof x.cord_bottom === "number");
            if (sameRoundPlaced.length > 0) {
              const maxBottom = Math.max(...sameRoundPlaced.map(x => x.cord_bottom));
              cord_top = maxBottom + VERTICAL_SPACING;
            } else {
              // Якщо це перший матч у раунді — починаємо одразу під заголовком раунду
              cord_top = BRACKET_MARGIN + ROUND_TITLE_TO_MATCH_SPACING;
            }
          }
          
          const cord_left = getRoundLeft(roundLayout, roundNum);
          const cord_bottom = cord_top + MATCH_HEIGHT;
          m.cord_top = cord_top;
          m.cord_left = cord_left;
          m.cord_bottom = cord_bottom;
        });
    }

    // 4. Layout rounds to the left of maxMatchRound
    for (let i = sortedRounds.indexOf(maxMatchRound) - 1; i >= 0; i--) {
      const roundNum = sortedRounds[i];
      const nextRound = sortedRounds[i + 1];
      groupedByRound[nextRound]
        .filter(s => s.knockout_stage !== "third_place")
        .forEach(s => {
          const predecessors = groupedByRound[roundNum]?.filter(m => m.next_game_win === s.knockout_id) || [];
          if (predecessors.length === 1) {
            const cord_top = groupedByRound[nextRound].find(m => m.knockout_id === s.knockout_id).cord_top;
            const cord_left = getRoundLeft(roundLayout, roundNum);
            const cord_bottom = cord_top + MATCH_HEIGHT;
            const match = groupedByRound[roundNum].find(m => m.knockout_id === predecessors[0].knockout_id);
            if (match) {
              match.cord_top = cord_top;
              match.cord_left = cord_left;
              match.cord_bottom = cord_bottom;
            }
          } else if (predecessors.length === 2) {
            const cord_topCenter = groupedByRound[nextRound].find(m => m.knockout_id === s.knockout_id).cord_top + MATCH_HEIGHT / 2;
            const cord_top1 = cord_topCenter - VERTICAL_SPACING / 2 - MATCH_HEIGHT;
            const cord_top2 = cord_topCenter + VERTICAL_SPACING / 2;
            const cord_left = getRoundLeft(roundLayout, roundNum);
            const cord_bottom1 = cord_top1 + MATCH_HEIGHT;
            const cord_bottom2 = cord_top2 + MATCH_HEIGHT;
            const match1 = groupedByRound[roundNum].find(m => m.knockout_id === predecessors[0].knockout_id);
            const match2 = groupedByRound[roundNum].find(m => m.knockout_id === predecessors[1].knockout_id);
            if (match1) {
              match1.cord_top = cord_top1;
              match1.cord_left = cord_left;
              match1.cord_bottom = cord_bottom1;
            }
            if (match2) {
              match2.cord_top = cord_top2;
              match2.cord_left = cord_left;
              match2.cord_bottom = cord_bottom2;
            }
          }
        });
    }

    // 5. Add 3rd place match if exists
    const thirdPlaceMatch = playoffMatches.find(g => g.tournament_id === currentTournamentId && g.knockout_stage === "third_place");
    if (thirdPlaceMatch) {
      const thirdPlaceRound = Number(thirdPlaceMatch.round_order);
      const existingMatch = groupedByRound[thirdPlaceRound]?.find(m => m.knockout_id === thirdPlaceMatch.knockout_id);
      if (existingMatch) {
        let startTop = 0;
        const matchesInRound = groupedByRound[thirdPlaceRound].filter(m => m.knockout_id !== thirdPlaceMatch.knockout_id);
        if (matchesInRound.length > 0) {
          const lastMatch = matchesInRound[matchesInRound.length - 1];
          startTop = lastMatch.cord_bottom + THIRD_PLACE_VERTICAL_OFFSET;
        }
        existingMatch.cord_top = startTop;
        existingMatch.cord_left = getRoundLeft(roundLayout, thirdPlaceRound);
        existingMatch.cord_bottom = startTop + ROUND_TITLE_TO_MATCH_SPACING + MATCH_HEIGHT;
        existingMatch.knockout_stage = "third_place";
      }
    }
  }

  function renderPlayoffMatches(groupedByRound, sortedRounds, roundLayout, tournamentType, container){
    sortedRounds.forEach((roundNum, colIndex) => {
      const matches = groupedByRound[roundNum];
      matches.sort((a, b) => Number(a.knockout_id ?? a.game_id ?? a.id) - Number(b.knockout_id ?? b.game_id ?? b.id));

      // Додаємо назву раунду (label) і, якщо є, дати (після двокрапки)
      const roundIsCompact = isCompactRound(roundLayout, roundNum);
      const roundWidth = getRoundWidth(roundLayout, roundNum);
      const [roundTitle, roundDates] = getRoundLabelParts(matches, roundNum, roundIsCompact);
      const baseLeft = getRoundLeft(roundLayout, roundNum);

      const label = document.createElement("div");
      label.className = "wtcoc-round-label";
      label.textContent = roundTitle;
      label.style.position = "absolute";
      label.style.width = `${roundWidth}px`;
      label.style.textAlign = "center";
      label.style.left = `${baseLeft}px`;
      label.style.top = `${BRACKET_MARGIN}px`;
      container.appendChild(label);

      if (roundDates) {
        const dateLabel = document.createElement("div");
        dateLabel.className = "wtcoc-round-label";
        dateLabel.textContent = roundDates;
        dateLabel.style.position = "absolute";
        dateLabel.style.width = `${roundWidth}px`;
        dateLabel.style.textAlign = "center";
        dateLabel.style.left = `${baseLeft}px`;
        // Place just under the title, within ROUND_TITLE_TO_MATCH_SPACING space
        dateLabel.style.top = `${BRACKET_MARGIN + 16}px`;
        dateLabel.style.fontWeight = "400";
        container.appendChild(dateLabel);
      }
      
      // Додаємо матчі
      matches.forEach((m) => {
        const matchWidth = getMatchWidth(m, roundLayout);
        const matchIsCompact = isCompactRound(roundLayout, Number(m.round_order));
        const matchBox = document.createElement("div");
        matchBox.className = `wtcoc-match-box${matchIsCompact ? " wtcoc-match-box-compact" : ""}`;
        matchBox.style.width = `${matchWidth}px`;
        matchBox.style.height = `${MATCH_HEIGHT}px`;
        matchBox.style.position = "absolute";

        let topOffset = m.cord_top;
        if (m.knockout_stage === "third_place") {
          // Назву раунду для матчу за 3-є місце додаємо окремо нижче
          const label = document.createElement("div");
          label.className = "wtcoc-round-label";
          label.style.position = "absolute";
          label.style.width = `${matchWidth}px`;
          label.style.textAlign = "center";
          label.style.left = `${m.cord_left}px`;
          label.style.top = `${topOffset}px`;
          const [thirdTitle, thirdDates] = getMatchRoundLabelParts(m, "3rd place", matchIsCompact);
          label.textContent = thirdTitle;
          container.appendChild(label);
          if (thirdDates) {
            const dateLabel = document.createElement("div");
            dateLabel.className = "wtcoc-round-label";
            dateLabel.textContent = thirdDates;
            dateLabel.style.position = "absolute";
            dateLabel.style.width = `${matchWidth}px`;
            dateLabel.style.textAlign = "center";
            dateLabel.style.left = `${m.cord_left}px`;
            dateLabel.style.top = `${topOffset + 16}px`;
            dateLabel.style.fontWeight = "400";
            container.appendChild(dateLabel);
          }
          topOffset += ROUND_TITLE_TO_MATCH_SPACING;
        }

  function drawPlayoffLines(groupedByRound, sortedRounds, roundLayout, container) {
    const matchById = {};
    Object.values(groupedByRound).flat().forEach(m => {
      matchById[m.knockout_id] = m;
    });

    const playoffConnectors = [];
    sortedRounds.forEach(roundNum => {
      groupedByRound[roundNum].forEach(match => {
        if (!match.next_game_win) return;
        const from = matchById[match.knockout_id];
        const to = matchById[match.next_game_win];
        if (!from || !to) return;

        const fromLeft = from.cord_left;
        const fromTop = from.cord_top;
        const toLeft = to.cord_left;
        const toTop = to.cord_top;
        const fromWidth = getMatchWidth(from, roundLayout);

        const yFrom = fromTop + MATCH_HEIGHT / 2 - 1;
        const yTo = toTop + MATCH_HEIGHT / 2 - 1;
        const xFrom = fromLeft + fromWidth;
        const xTo = toLeft;

        const connector = {
          game_from: match.knockout_id,
          game_to: match.next_game_win,
          lines: []
        };

        if (yFrom === yTo) {
          connector.lines.push({
            x1: xFrom,
            y1: yFrom,
            x2: xTo,
            y2: yTo
          });
        } else {
          const midX = fromLeft + fromWidth + HORIZONTAL_SPACING / 2;
          const preX = toLeft - HORIZONTAL_SPACING / 2;
          const adjustedY2 = fromTop > toTop ? yTo + 5 : yTo - 5;

          connector.lines.push({
            x1: xFrom,
            y1: yFrom,
            x2: midX + 2,
            y2: yFrom
          });
          connector.lines.push({
            x1: midX,
            y1: yFrom,
            x2: midX,
            y2: adjustedY2
          });
          connector.lines.push({
            x1: preX + 3,
            y1: yTo,
            x2: xTo,
            y2: yTo
          });
        }

        playoffConnectors.push(connector);
      });
    });

    playoffConnectors.forEach(connector => {
      connector.lines.forEach(lineCoords => {
        const isHorizontal = lineCoords.y1 === lineCoords.y2;
        const lineDiv = document.createElement("div");
        lineDiv.style.position = "absolute";
        lineDiv.style.backgroundColor = "#ccc";
        lineDiv.style.zIndex = "0";

        if (isHorizontal) {
          lineDiv.style.left = `${lineCoords.x1}px`;
          lineDiv.style.top = `${lineCoords.y1}px`;
          lineDiv.style.width = `${lineCoords.x2 - lineCoords.x1}px`;
          lineDiv.style.height = "2px";
        } else {
          lineDiv.style.left = `${lineCoords.x1}px`;
          lineDiv.style.top = `${Math.min(lineCoords.y1, lineCoords.y2)}px`;
          lineDiv.style.width = "2px";
          lineDiv.style.height = `${Math.abs(lineCoords.y2 - lineCoords.y1)}px`;
        }

        container.appendChild(lineDiv);
      });
    });
  }

  function getHighlightOpponentName(row) {
    const opponentName = (row.getAttribute("data-opponent-name") || "").trim();
    const normalized = opponentName.toLowerCase();
    if (!opponentName || normalized === "undefined" || normalized === "null") {
      return "";
    }
    return opponentName;
  }

  function addOpponentHoverHighlight(playoffContainer) {
    const rows = playoffContainer.querySelectorAll(".wtcoc-match-row-winner, .wtcoc-match-row-loser");
    rows.forEach(row => {
      const opponentName = getHighlightOpponentName(row);
      if (!opponentName) {
        return;
      }

      row.addEventListener("mouseenter", () => {
        rows.forEach(el => {
          if (getHighlightOpponentName(el) === opponentName) {
            el.classList.add("wtcoc-highlight-player");
          }
        });
      });

      row.addEventListener("mouseleave", () => {
        rows.forEach(el => {
          if (getHighlightOpponentName(el) === opponentName) {
            el.classList.remove("wtcoc-highlight-player");
          }
        });
      });
    });
  }

  function renderSingleElimination(playoffMatches, containerOverride, tournamentType, options = {}) {
    
    // Optionally override THIRD_PLACE_VERTICAL_OFFSET from currentTournament (ignore null/empty)
    if (currentTournament && currentTournament.hasOwnProperty('third_place_vertical_offset')) {
      const tpo = currentTournament.third_place_vertical_offset;
      if (tpo !== null && tpo !== "" && tpo !== undefined) {
        const parsed = Number(tpo);
        if (!Number.isNaN(parsed)) {
          THIRD_PLACE_VERTICAL_OFFSET = parsed;
        }
      }
    }

    // Optionally override MATCH_WIDTH from currentTournament (ignore null/empty)
    if (currentTournament && currentTournament.hasOwnProperty('match_width')) {
      const mw = currentTournament.match_width;
      if (mw !== null && mw !== "" && mw !== undefined) {
        const parsedMw = Number(mw);
        if (!Number.isNaN(parsedMw)) {
          MATCH_WIDTH = parsedMw;
        }
      }
    }
    // Build layout and UI for playoff bracket including match positions, labels, and connectors
    let container;
    let bracketDiv;
    if (containerOverride) {
      container = containerOverride;
      container.innerHTML = '';
      // Add a scrollable wrapper
      const scrollWrapper = document.createElement("div");
      scrollWrapper.className = "wtcoc-playoff-scroll-wrapper";
      // Add a wrapper for the bracket
      bracketDiv = document.createElement("div");
      bracketDiv.id = "wtcoc-playoff-bracket";
      scrollWrapper.appendChild(bracketDiv);
      container.appendChild(scrollWrapper);
      container = bracketDiv;
      if (!options.hideExpandButton) {
        // Floating fullscreen button inside bracket
        const expandBtn = document.createElement("button");
        expandBtn.className = "wtcoc-expand-bracket-btn wtcoc-expand-bracket-floating";
        expandBtn.title = "Open full-screen bracket";
        expandBtn.setAttribute("aria-label", "Open full-screen bracket");
        expandBtn.innerHTML = '<i class="fas fa-up-right-and-down-left-from-center"></i>';
        container.appendChild(expandBtn);
        expandBtn.addEventListener('click', () => openBracketFullscreen(fullscreenContainer => {
          const fullscreenMatches = (playoffMatches || []).map(match => ({ ...match }));
          renderSingleElimination(fullscreenMatches, fullscreenContainer, tournamentType, {
            forceFullWidthRounds: true,
            hideExpandButton: true
          });
        }));
      }
    } else {
      // fallback: legacy behavior
      container = document.getElementById("wtcoc-playoff-bracket");
      container.innerHTML = '';
    }
    
    // Group matches by numeric round_order
    const groupedByRound = {};
    playoffMatches.forEach(match => {
      const roundNum = Number(match.round_order);
      if (!groupedByRound[roundNum]) groupedByRound[roundNum] = [];
      groupedByRound[roundNum].push(match);
    });

    // Sort rounds numerically ascending
    const sortedRounds = Object.keys(groupedByRound).map(Number).sort((a, b) => a - b);
    const roundLayout = buildRoundLayout(groupedByRound, sortedRounds, options);
    
    // Calculate playoff match coordinates
    calculatePlayoffMatchCoordinates(groupedByRound, sortedRounds, roundLayout, playoffMatches, currentTournamentId);
    // Render matches with absolute positioning inside #wtcoc-playoff-bracket
    renderPlayoffMatches(groupedByRound, sortedRounds, roundLayout, tournamentType, container);
    // --- DRAW LINES ---
    drawPlayoffLines(groupedByRound, sortedRounds, roundLayout, container);
    // Set container's fixed height based on the maximum cord_bottom plus BRACKET_MARGIN
    const allMatches = Object.values(groupedByRound).flat();
    const maxCordBottom = Math.max(...allMatches.map(m => m.cord_bottom || 0));
    container.style.height = `${maxCordBottom + BRACKET_MARGIN}px`;
    // Set container's fixed width based on variable round widths
    container.style.width = `${getBracketRight(allMatches, roundLayout) + BRACKET_MARGIN}px`;

    addOpponentHoverHighlight(container);
  }

  function renderDoubleElimination(playoffMatches, containerOverride, tournamentType, options = {}) {
    
    // Optionally override THIRD_PLACE_VERTICAL_OFFSET from currentTournament (ignore null/empty)
    if (currentTournament && currentTournament.hasOwnProperty('third_place_vertical_offset')) {
      const tpo = currentTournament.third_place_vertical_offset;
      if (tpo !== null && tpo !== "" && tpo !== undefined) {
        const parsed = Number(tpo);
        if (!Number.isNaN(parsed)) {
          THIRD_PLACE_VERTICAL_OFFSET = parsed;
        }
      }
    }

    // Optionally override MATCH_WIDTH from currentTournament (ignore null/empty)
    if (currentTournament && currentTournament.hasOwnProperty('match_width')) {
      const mw = currentTournament.match_width;
      if (mw !== null && mw !== "" && mw !== undefined) {
        const parsedMw = Number(mw);
        if (!Number.isNaN(parsedMw)) {
          MATCH_WIDTH = parsedMw;
        }
      }
    }
    // Build layout and UI for playoff bracket including match positions, labels, and connectors
    let container;
    let bracketDiv;
    if (containerOverride) {
      container = containerOverride;
      container.innerHTML = '';
      // Add a scrollable wrapper
      const scrollWrapper = document.createElement("div");
      scrollWrapper.className = "wtcoc-playoff-scroll-wrapper";
      // Add a wrapper for the bracket
      bracketDiv = document.createElement("div");
      bracketDiv.id = "wtcoc-playoff-bracket";
      bracketDiv.style.position = "relative";
      scrollWrapper.appendChild(bracketDiv);
      container.appendChild(scrollWrapper);
      container = bracketDiv;
      if (!options.hideExpandButton) {
        // Floating fullscreen button inside bracket
        const expandBtn = document.createElement("button");
        expandBtn.className = "wtcoc-expand-bracket-btn wtcoc-expand-bracket-floating";
        expandBtn.title = "Open full-screen bracket";
        expandBtn.setAttribute("aria-label", "Open full-screen bracket");
        expandBtn.innerHTML = '<i class="fas fa-up-right-and-down-left-from-center"></i>';
        container.appendChild(expandBtn);
        expandBtn.addEventListener('click', () => openBracketFullscreen(fullscreenContainer => {
          const fullscreenMatches = (playoffMatches || []).map(match => ({ ...match }));
          renderDoubleElimination(fullscreenMatches, fullscreenContainer, tournamentType, {
            forceFullWidthRounds: true,
            hideExpandButton: true
          });
        }));
      }
    } else {
      // fallback: legacy behavior
      container = document.getElementById("wtcoc-playoff-bracket");
      container.innerHTML = '';
      container.style.position = "relative";
    }

    // 1) Split matches by multiple_elimination_stage
    const stageGroups = {};
    (playoffMatches || []).forEach(m => {
      const key = (m.multiple_elimination_stage ?? '').toString();
      if (!stageGroups[key]) stageGroups[key] = [];
      stageGroups[key].push(m);
    });
    // 2) Sort groups alphabetically by stage key
    const stageOrder = Object.keys(stageGroups).sort((a, b) => a.localeCompare(b));
    // Track global sizing across all groups
    let cumulativeTopOffset = 0;
    let globalMaxRight = 0;
    // 3) Process each group sequentially
    stageOrder.forEach(stageKey => {
      const stageMatches = stageGroups[stageKey];
      if (!stageMatches || !stageMatches.length) return;
      // Group by round within this stage
      const groupedByRound = {};
      stageMatches.forEach(match => {
        const roundNum = Number(match.round_order);
        if (!groupedByRound[roundNum]) groupedByRound[roundNum] = [];
        groupedByRound[roundNum].push(match);
      });
      const sortedRounds = Object.keys(groupedByRound).map(Number).sort((a, b) => a - b);
      const roundLayout = buildRoundLayout(groupedByRound, sortedRounds, options);

      // Compute coordinates for this stage
      calculatePlayoffMatchCoordinates(groupedByRound, sortedRounds, roundLayout, stageMatches, currentTournamentId);
      // Create a sub-container for this stage to apply vertical offset cleanly
      const stageContainer = document.createElement("div");
      stageContainer.style.position = "absolute";
      stageContainer.style.left = "0px";
      stageContainer.style.top = `${cumulativeTopOffset}px`;
      stageContainer.style.width = "max-content";
      container.appendChild(stageContainer);
      // Render matches and lines for this stage inside the sub-container
      renderPlayoffMatches(groupedByRound, sortedRounds, roundLayout, tournamentType, stageContainer);
      drawPlayoffLines(groupedByRound, sortedRounds, roundLayout, stageContainer);
      // Update global sizing info
      const allStageMatches = Object.values(groupedByRound).flat();
      const stageMaxBottom = Math.max(...allStageMatches.map(m => m.cord_bottom || 0));
      const stageMaxRight = getBracketRight(allStageMatches, roundLayout);

      globalMaxRight = Math.max(globalMaxRight, stageMaxRight);
      cumulativeTopOffset += stageMaxBottom + BRACKET_MARGIN; // space between stages
    });

    // 4) After all groups, set container dimensions
    container.style.height = `${cumulativeTopOffset}px`;
    container.style.width = `${globalMaxRight + BRACKET_MARGIN}px`;

    // 5) Hover highlight across entire bracket container
    addOpponentHoverHighlight(container);
  }



  // Opens a fullscreen overlay that shows only the bracket block

  function openBracketFullscreen(renderFullscreenContent) {
    try {
      const overlay = document.createElement('div');
      overlay.className = 'wtcoc-fullscreen-overlay';

      // Close button (top-left, icon only)
      const closeBtn = document.createElement('button');
      closeBtn.className = 'wtcoc-fullscreen-close-btn';
      closeBtn.title = 'Закрити (Esc)';
      closeBtn.innerHTML = '<i class="fas fa-xmark"></i>';
      overlay.appendChild(closeBtn);

      const content = document.createElement('div');
      content.className = 'wtcoc-fullscreen-content';
      overlay.appendChild(content);

      document.body.appendChild(overlay);

      if (typeof renderFullscreenContent === 'function') {
        renderFullscreenContent(content);
      }

      const onClose = () => {
        if (overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay);
        document.removeEventListener('keydown', onKeyDown);
      };
      closeBtn.addEventListener('click', onClose);
      overlay.addEventListener('click', (e) => {
        // allow clicking the dark background to close (but not inner content)
        if (e.target === overlay) onClose();
      });

      // Close on Esc
      const onKeyDown = (e) => {
        if (e.key === 'Escape' || e.key === 'Esc') onClose();
      };
      document.addEventListener('keydown', onKeyDown);
    } catch (e) {
      console.error('Fullscreen open failed', e);
    }
  }

  function renderStage2() {
    const container = document.getElementById('wtcoc-stage2-content');
    if (!container) {
      return;
    }

    container.innerHTML = '';

    const accordionToggle = document.createElement('div');
    accordionToggle.className = 'wtcoc-accordion-toggle';
    const labelSpan = document.createElement('span');
    labelSpan.textContent = 'WTCOC 2026 Playoffs';
    const wtcocChevron = document.createElement('div');

    wtcocChevron.innerHTML = '<i class="fas fa-chevron-down"></i>';
    accordionToggle.appendChild(labelSpan);
    accordionToggle.appendChild(wtcocChevron);

    const accordionContent = document.createElement('div');
    accordionContent.className = 'wtcoc-accordion-content';
    accordionContent.style.maxHeight = '0px';

    const contentInner = document.createElement('div');
    contentInner.className = 'wtcoc-accordion-content-inner';
    const bracketContainer = document.createElement('div');
    contentInner.appendChild(bracketContainer);
    accordionContent.appendChild(contentInner);

    container.appendChild(accordionToggle);
    container.appendChild(accordionContent);

    const collapseContent = () => {
      accordionContent.style.maxHeight = `${accordionContent.scrollHeight}px`;
      void accordionContent.offsetHeight;
      accordionToggle.classList.remove('wtcoc-open');
      accordionContent.style.maxHeight = '0px';
    };

    const expandContent = () => {
      accordionToggle.classList.add('wtcoc-open');
      accordionContent.style.maxHeight = `${accordionContent.scrollHeight}px`;
    };

    accordionToggle.addEventListener('click', () => {
      if (accordionToggle.classList.contains('wtcoc-open')) {
        collapseContent();
      } else {
        expandContent();
      }
    });

    const ensureExpandedHeight = () => {
      if (accordionToggle.classList.contains('wtcoc-open')) {
        accordionContent.style.maxHeight = `${accordionContent.scrollHeight}px`;
      }
    };

    if (!currentTournament) {
      bracketContainer.textContent = 'Stage 2 info not available.';
      return;
    }

    const tournamentType = String(currentTournament.type || currentTournament.tournament_type || '').trim().toUpperCase();
    const isTeamTournament = tournamentType === 'TEAM' || tournamentType === 'TEAMS';
    const stageNameSet = new Set(['stage 2', 'playoffs', 'final stage']);
    const source = isTeamTournament ? matches : duels;

    MATCH_WIDTH = 180;
    THIRD_PLACE_VERTICAL_OFFSET = 140;

    const stage2Items = source.filter(item => {
      if (!item || item.tournament_id !== currentTournamentId) {
        return false;
      }
      const stageName = String(item.stage || '').trim().toLowerCase();
      const hasKnockoutId = item.knockout_id !== null && item.knockout_id !== undefined && String(item.knockout_id).trim() !== '';
      return stageNameSet.has(stageName) || hasKnockoutId;
    });
    const inferredStage2Format = stage2Items.some(item => (
      item.next_game_lose !== null && item.next_game_lose !== undefined && String(item.next_game_lose).trim() !== ''
    ) || (
      item.multiple_elimination_stage !== null
      && item.multiple_elimination_stage !== undefined
      && String(item.multiple_elimination_stage).trim() !== ''
    )) ? 'double elimination' : 'single elimination';
    const stage2FormatRaw = (currentTournament.stage2_format || inferredStage2Format || '').trim();
    const stage2Format = stage2FormatRaw.toLowerCase();

    if (stage2Format === 'single elimination' && stage2Items.length) {
      renderSingleElimination(stage2Items, bracketContainer, isTeamTournament ? 'TEAM' : currentTournament.type);
      ensureExpandedHeight();
      return;
    }

    if (stage2Format === 'double elimination' && stage2Items.length) {
      renderDoubleElimination(stage2Items, bracketContainer, isTeamTournament ? 'TEAM' : currentTournament.type);
      ensureExpandedHeight();
      return;
    }

    if (typeof currentTournament.stage2_html === 'string' && currentTournament.stage2_html.trim() !== '') {
      bracketContainer.innerHTML = currentTournament.stage2_html.trim();
      ensureExpandedHeight();
      return;
    }

    bracketContainer.textContent = 'Stage 2 info not available.';
    ensureExpandedHeight();
  }

  function getTournamentId(tournament) {
    return String(tournament?.tournament_id || tournament?.id || '').trim();
  }

  function buildRoundLabel(item) {
    const existing = String(item?.round || '').trim();
    if (existing) return existing;
    const title = String(item?.round_name || item?.round_short_name || item?.badge_name || item?.match_short_name || '').trim();
    const dates = String(item?.round_dates || '').trim();
    if (title && dates) return `${title}: ${dates}`;
    return title || dates;
  }

  function normalizeTournament(item) {
    const tournamentId = getTournamentId(item);
    return {
      ...item,
      tournament_id: tournamentId,
      type: item?.type || item?.tournament_type || '',
      stage2_format: item?.stage2_format || '',
      match_width: item?.match_width ?? null,
      third_place_vertical_offset: item?.third_place_vertical_offset ?? 140,
    };
  }

  function normalizeBracketItem(item) {
    const thirdPlace = Number(item?.third_place_match) === 1 || String(item?.knockout_stage || '').trim() === 'third_place';
    return {
      ...item,
      match_id: item?.match_id ?? item?.id ?? '',
      tournament_id: String(item?.tournament_id || '').trim(),
      time: item?.time ?? item?.time_utc ?? '',
      round: buildRoundLabel(item),
      knockout_stage: thirdPlace ? 'third_place' : (item?.knockout_stage || ''),
      team1: item?.team1 ?? item?.team_1_name ?? item?.team_1 ?? '',
      team2: item?.team2 ?? item?.team_2_name ?? item?.team_2 ?? '',
      duels_won1: item?.duels_won1 ?? item?.dw1 ?? '',
      duels_won2: item?.duels_won2 ?? item?.dw2 ?? '',
      games_won1: item?.games_won1 ?? item?.gw1 ?? '',
      games_won2: item?.games_won2 ?? item?.gw2 ?? '',
      player1_id: item?.player1_id ?? item?.player_1_id ?? '',
      player2_id: item?.player2_id ?? item?.player_2_id ?? '',
      player1: item?.player1 ?? item?.player_1_name ?? '',
      player2: item?.player2 ?? item?.player_2_name ?? '',
      score1: item?.score1 ?? item?.dw1 ?? '',
      score2: item?.score2 ?? item?.dw2 ?? '',
    };
  }

  function buildTeamsFromMatches(items) {
    const byName = new Map();
    (items || []).forEach(item => {
      [
        [item.team1, item.team_1, item.team_1_flag],
        [item.team2, item.team_2, item.team_2_flag],
      ].forEach(([name, iso, logo]) => {
        const teamName = String(name || '').trim();
        if (teamName && !byName.has(teamName)) {
          byName.set(teamName, { iso: iso || '', team: teamName, logo: logo || null });
        }
      });
    });
    return Array.from(byName.values());
  }

  function handleData(data) {
    const container = document.getElementById('wtcoc-stage2-content');
    if (!container) {
      return;
    }

    if (!data || typeof data !== 'object') {
      container.textContent = 'Stage 2 info not available.';
      return;
    }

    const tournaments = (Array.isArray(data.tournaments) ? data.tournaments : []).map(normalizeTournament);
    currentTournament = tournaments.find(t => t.tournament_id === currentTournamentId) || null;

    matches = (Array.isArray(data.matches) ? data.matches : []).map(normalizeBracketItem);
    duels = (Array.isArray(data.duels) ? data.duels : []).map(normalizeBracketItem);
    players = Array.isArray(data.players) ? data.players : [];
    teams = Array.isArray(data.teams) && data.teams.length ? data.teams : buildTeamsFromMatches(matches);

    if (currentTournament && currentTournament.style) {
      applyTournamentTheme(currentTournament.style);
    }

    renderStage2();
  }

  document.addEventListener('DOMContentLoaded', () => {
    const container = document.getElementById('wtcoc-stage2-content');
    if (!container) {
      console.error('Stage 2 container not found.');
      return;
    }

    fetch(`https://api.carcassonne.gg/public/main-page-matches?tournament_id=${encodeURIComponent(currentTournamentId)}&include_bracket=1`)
      .then(res => {
        if (!res.ok) {
          throw new Error('Failed to fetch tournament data');
        }
        return res.json();
      })
      .then(handleData)
      .catch(err => {
        container.textContent = '❌ Failed to load tournament data.';
        console.error(err);
      });
  });
</script>
